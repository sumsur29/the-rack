 number of repetitions."},{"i":"0767","n":"smith shrug","b":"back","q":"smith machine","t":"traps","s":["shoulders"],"img":"images/0767-OUQ0ZyW.jpg","gif":"videos/0767-OUQ0ZyW.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Grasp the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Keep your arms straight and your shoulders relaxed. Lift your shoulders up towards your ears, squeezing your traps at the top. Hold for a moment, then slowly lower your shoulders back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0768","n":"smith single leg split squat","b":"upper legs","q":"smith machine","t":"quads","s":["glutes","hamstrings"],"img":"images/0768-wWFspEi.jpg","gif":"videos/0768-wWFspEi.gif","h":"Stand in front of the smith machine with your feet shoulder-width apart. Place one foot behind you on a bench or step, with your toes pointing forward. Hold onto the smith machine bar for stability. Bend your front knee and lower your body down into a lunge position, keeping your back straight. Pause for a moment at the bottom, then push through your front heel to return to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"0769","n":"smith sprint lunge","b":"upper legs","q":"smith machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0769-HsjbB1z.jpg","gif":"videos/0769-HsjbB1z.gif","h":"Set up the smith machine with the barbell at hip height. Stand facing away from the machine with your feet shoulder-width apart. Step back with your right foot and place it on the barbell, resting the top of your foot on the bar. Bend your left knee and lower your body into a lunge position, keeping your back straight. Push through your left heel to return to the starting position. Repeat on the other side, stepping back with your left foot. Continue alternating sides for the desired number of repetitions."},{"i":"0770","n":"smith squat","b":"upper legs","q":"smith machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0770-jFtipLl.jpg","gif":"videos/0770-jFtipLl.gif","h":"Set up the smith machine with the barbell at an appropriate height for your squat. Stand with your feet shoulder-width apart, toes slightly turned out. Position yourself under the barbell, resting it on your upper traps and shoulders. Grip the barbell with a wide grip, slightly wider than shoulder-width apart. Engage your core and unrack the barbell, stepping back to clear the rack. Keeping your chest up and back straight, initiate the squat by bending at the hips and knees. Lower your body until your thighs are parallel to the ground or slightly below. Pause for a moment at the bottom, then drive through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0771","n":"smith standing back wrist curl","b":"lower arms","q":"smith machine","t":"forearms","s":["biceps","triceps"],"img":"images/0771-hfmQ0Tz.jpg","gif":"videos/0771-hfmQ0Tz.gif","h":"Stand facing the smith machine with your feet shoulder-width apart. Grasp the barbell with an overhand grip, hands shoulder-width apart. Keep your back straight and your elbows close to your body. Slowly curl your wrists upwards, bringing the barbell towards your body. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0772","n":"smith standing behind head military press","b":"shoulders","q":"smith machine","t":"delts","s":["triceps","upper back"],"img":"images/0772-ht8xDrP.jpg","gif":"videos/0772-ht8xDrP.gif","h":"Adjust the seat height of the smith machine so that the bar is at shoulder level. Stand with your feet shoulder-width apart and your knees slightly bent. Grasp the bar with an overhand grip, slightly wider than shoulder-width apart. Lift the bar off the rack and step back, maintaining a stable stance. Position the bar behind your head, resting on your upper traps. Keep your core engaged and your chest lifted throughout the exercise. Press the bar overhead by extending your arms, fully straightening them. Pause briefly at the top of the movement, then slowly lower the bar back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0773","n":"smith standing leg calf raise","b":"lower legs","q":"smith machine","t":"calves","s":["hamstrings","glutes"],"img":"images/0773-6MaEjVA.jpg","gif":"videos/0773-6MaEjVA.gif","h":"Adjust the smith machine bar to a height that allows you to stand with your feet flat on the ground and your shoulders under the bar. Position yourself under the bar with your feet shoulder-width apart and your toes pointing forward. Place your hands on the bar for stability. Engage your calves and slowly raise your heels off the ground, lifting your body up onto your toes. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0774","n":"smith standing military press","b":"shoulders","q":"smith machine","t":"delts","s":["triceps","upper back"],"img":"images/0774-jjUPrze.jpg","gif":"videos/0774-jjUPrze.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart. Lift the barbell off the rack and bring it down to shoulder level, with your palms facing forward. Press the barbell upward until your arms are fully extended overhead. Pause for a moment at the top, then slowly lower the barbell back down to shoulder level. Repeat for the desired number of repetitions."},{"i":"3142","n":"smith sumo squat","b":"upper legs","q":"smith machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3142-dzz6BiV.jpg","gif":"videos/3142-dzz6BiV.gif","h":"Set up the smith machine with the barbell at hip height. Stand with your feet wider than shoulder-width apart, toes pointing outwards. Position yourself under the barbell, resting it on your upper back and shoulders. Engage your core and keep your chest up as you lower your body down into a squat position, pushing your hips back and bending your knees. Lower yourself until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1396","n":"smith toe raise","b":"lower legs","q":"smith machine","t":"calves","s":["ankles","shins"],"img":"images/1396-Y4QlY8z.jpg","gif":"videos/1396-Y4QlY8z.gif","h":"Adjust the smith machine bar to a height that allows you to comfortably stand with your feet flat on the ground. Position yourself under the bar with your shoulders directly below it and your feet shoulder-width apart. Place the balls of your feet on a raised platform or weight plates, with your heels hanging off the edge. Grasp the bar with an overhand grip, slightly wider than shoulder-width apart. Engage your core and keep your back straight throughout the exercise. Slowly raise your heels as high as possible, lifting your body weight onto the balls of your feet. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0775","n":"smith upright row","b":"shoulders","q":"smith machine","t":"delts","s":["traps","biceps"],"img":"images/0775-1DN3iz4.jpg","gif":"videos/0775-1DN3iz4.gif","h":"Stand with your feet shoulder-width apart, facing the smith machine. Grasp the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Keep your back straight and your core engaged. Pull the barbell up towards your chin, leading with your elbows. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1308","n":"smith wide grip bench press","b":"chest","q":"smith machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/1308-zoOvPcx.jpg","gif":"videos/1308-zoOvPcx.gif","h":"Adjust the bench to a comfortable position on the smith machine. Lie down on the bench with your feet flat on the ground. Grasp the barbell with a wide grip, slightly wider than shoulder-width apart. Unrack the barbell and lower it slowly towards your chest, keeping your elbows out to the sides. Pause for a moment when the barbell touches your chest. Push the barbell back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"1309","n":"smith wide grip decline bench press","b":"chest","q":"smith machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/1309-wi2H9QX.jpg","gif":"videos/1309-wi2H9QX.gif","h":"Adjust the decline bench to the desired angle. Lie down on the bench with your feet secured under the foot pads. Grasp the barbell with a wide grip, slightly wider than shoulder-width apart. Unrack the barbell and lower it slowly towards your chest, keeping your elbows pointed outwards. Pause for a moment when the barbell touches your chest. Push the barbell back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0776","n":"snatch pull","b":"upper legs","q":"barbell","t":"quads","s":["hamstrings","glutes","calves"],"img":"images/0776-dG5Smob.jpg","gif":"videos/0776-dG5Smob.gif","h":"Stand with your feet shoulder-width apart and the barbell on the ground in front of you. Bend your knees and hinge at the hips to lower into a squat position, gripping the barbell with an overhand grip. Keep your back straight and chest up as you drive through your heels to lift the barbell off the ground, extending your hips and knees. As the barbell reaches hip level, explosively pull it upwards, shrugging your shoulders and pulling your elbows high and to the sides. As the barbell reaches its highest point, quickly drop underneath it, pulling yourself into a deep squat position. Catch the barbell overhead with your arms fully extended and your knees bent. Stand up by extending your hips and knees, keeping the barbell overhead. Lower the barbell back down to the starting position by reversing the movement. Repeat for the desired number of repetitions."},{"i":"0777","n":"spell caster","b":"waist","q":"dumbbell","t":"abs","s":["obliques","lower back"],"img":"images/0777-p9cCe2r.jpg","gif":"videos/0777-p9cCe2r.gif","h":"Stand with your feet shoulder-width apart and hold a dumbbell in one hand. Bend your knees slightly and hinge forward at the waist, keeping your back straight. Extend your arm with the dumbbell towards the opposite foot, rotating your torso as you do so. Return to the starting position and repeat on the other side. Continue alternating sides for the desired number of repetitions."},{"i":"1362","n":"sphinx","b":"back","q":"body weight","t":"spine","s":["glutes","hamstrings"],"img":"images/1362-DIVyqrU.jpg","gif":"videos/1362-DIVyqrU.gif","h":"Lie face down on the ground with your forearms flat on the floor, elbows directly under your shoulders. Engage your core and lift your chest off the ground, keeping your forearms and toes on the floor. Hold this position for a few seconds, making sure to keep your neck in a neutral position. Slowly lower your chest back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0778","n":"spider crawl push up","b":"upper legs","q":"body weight","t":"glutes","s":["core","chest","shoulders"],"img":"images/0778-P9GFBME.jpg","gif":"videos/0778-P9GFBME.gif","h":"Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together. Bring your right knee towards your right elbow, keeping it off the ground. As you bring your right knee back, simultaneously lower your body towards the ground by bending your elbows. Push back up to the starting position and repeat with your left knee towards your left elbow. Continue alternating sides for the desired number of repetitions."},{"i":"1363","n":"spine stretch","b":"back","q":"body weight","t":"spine","s":["hamstrings","glutes"],"img":"images/1363-JbC2iaV.jpg","gif":"videos/1363-JbC2iaV.gif","h":"Sit on the ground with your legs extended in front of you. Place your hands on the ground behind you, fingers pointing towards your body. Engage your core and slowly lean back, keeping your back straight. Continue leaning back until you feel a stretch in your spine. Hold the stretch for a few seconds, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"2329","n":"spine twist","b":"waist","q":"body weight","t":"abs","s":["obliques","lower back"],"img":"images/2329-2jl9K55.jpg","gif":"videos/2329-2jl9K55.gif","h":"Sit on the ground with your legs extended in front of you. Bend your knees and place your feet flat on the ground, hip-width apart. Place your hands behind your head with your elbows pointing outwards. Engage your abs and slowly twist your torso to the right, bringing your right elbow towards your left knee. Pause for a moment at the end of the twist, then slowly return to the starting position. Repeat the twist to the left side, bringing your left elbow towards your right knee. Continue alternating sides for the desired number of repetitions."},{"i":"2368","n":"split squats","b":"upper legs","q":"body weight","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/2368-9E25EOx.jpg","gif":"videos/2368-9E25EOx.gif","h":"Stand with your feet shoulder-width apart. Take a step forward with one foot and place it about two feet in front of the other foot. Lower your body by bending your knees and hips, keeping your back straight. Continue lowering until your front thigh is parallel to the ground, and your back knee is hovering just above the ground. Pause for a moment, then push through your front heel to return to the starting position. Repeat for the desired number of repetitions, then switch legs and repeat."},{"i":"0786","n":"squat jerk","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0786-IMRsOCn.jpg","gif":"videos/0786-IMRsOCn.gif","h":"Start with the barbell resting on your shoulders, with your feet shoulder-width apart. Lower your body into a squat position, keeping your chest up and your knees tracking over your toes. As you reach the bottom of the squat, explosively drive through your legs and push the barbell overhead. As the barbell reaches its peak, quickly drop into a split position, with one foot forward and one foot back. Catch the barbell overhead with your arms fully extended and your back knee slightly touching the ground. Stand up from the split position, bringing your feet back together. Lower the barbell back to your shoulders and repeat for the desired number of repetitions."},{"i":"1705","n":"squat on bosu ball","b":"upper legs","q":"bosu ball","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/1705-T2fA5Ir.jpg","gif":"videos/1705-T2fA5Ir.gif","h":"Place the bosu ball on the ground with the flat side up. Stand with your feet shoulder-width apart and position yourself on top of the bosu ball. Lower your body down by bending your knees and hips, as if sitting back into a chair. Keep your chest up and your weight on your heels. Lower yourself until your thighs are parallel to the ground. Pause for a moment, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1685","n":"squat to overhead reach","b":"upper legs","q":"body weight","t":"quads","s":["glutes","hamstrings","core"],"img":"images/1685-QChZi3x.jpg","gif":"videos/1685-QChZi3x.gif","h":"Stand with your feet shoulder-width apart and toes slightly turned out. Lower your body down into a squat position by bending your knees and pushing your hips back. As you come up from the squat, extend your arms overhead, reaching towards the ceiling. Return to the starting position by lowering your arms and bending your knees to squat down again. Repeat for the desired number of repetitions."},{"i":"1686","n":"squat to overhead reach with twist","b":"upper legs","q":"body weight","t":"quads","s":["glutes","hamstrings","core"],"img":"images/1686-5BZHW9s.jpg","gif":"videos/1686-5BZHW9s.gif","h":"Stand with your feet shoulder-width apart and toes slightly turned out. Lower your body into a squat position by bending your knees and pushing your hips back. As you come up from the squat, raise your arms overhead and twist your torso to one side. Return to the starting position and repeat the squat, this time twisting your torso to the opposite side. Continue alternating sides with each squat repetition."},{"i":"2297","n":"stability ball crunch (full range hands behind head)","b":"waist","q":"stability ball","t":"abs","s":["hip flexors"],"img":"images/2297-Gn5FwYT.jpg","gif":"videos/2297-Gn5FwYT.gif","h":"Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly curl your upper body forward, bringing your chest towards your knees. Pause for a moment at the top, then slowly lower your upper body back to the starting position. Repeat for the desired number of repetitions."},{"i":"3291","n":"stalder press","b":"upper arms","q":"body weight","t":"triceps","s":["shoulders","core"],"img":"images/3291-zd4P4B2.jpg","gif":"videos/3291-zd4P4B2.gif","h":"Start by standing with your feet shoulder-width apart and your arms extended overhead. Bend your knees slightly and engage your core. Lower your body down into a squat position while keeping your arms extended overhead. As you squat down, press your arms down towards the ground, engaging your triceps. Pause for a moment at the bottom of the squat, then push through your heels to stand back up while simultaneously raising your arms back overhead. Repeat for the desired number of repetitions."},{"i":"3669","n":"standing archer","b":"back","q":"body weight","t":"upper back","s":["shoulders","biceps","forearms"],"img":"images/3669-JF8AkMX.jpg","gif":"videos/3669-JF8AkMX.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Extend your arms straight out in front of you at shoulder height, parallel to the ground. Rotate your torso to the right, keeping your arms extended and your back straight. As you rotate, extend your right arm forward and your left arm back, mimicking the motion of drawing a bowstring. Hold the position for a moment, then return to the starting position. Repeat the motion, this time rotating your torso to the left and extending your left arm forward and your right arm back. Continue alternating sides for the desired number of repetitions."},{"i":"0788","n":"standing behind neck press","b":"shoulders","q":"barbell","t":"delts","s":["triceps","upper back"],"img":"images/0788-xDh0lJr.jpg","gif":"videos/0788-xDh0lJr.gif","h":"Stand with your feet shoulder-width apart and hold the barbell behind your neck with an overhand grip. Keep your back straight and core engaged. Press the barbell overhead by extending your arms, fully extending your elbows. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1490","n":"standing calf raise (on a staircase)","b":"lower legs","q":"body weight","t":"calves","s":["ankles","feet"],"img":"images/1490-6HmFgmx.jpg","gif":"videos/1490-6HmFgmx.gif","h":"Stand on the edge of a step or a sturdy platform with your heels hanging off and your toes on the step. Hold onto a railing or wall for balance if needed. Slowly raise your heels as high as possible, lifting your body weight onto the balls of your feet. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1397","n":"standing calves","b":"lower legs","q":"body weight","t":"calves","s":["hamstrings","glutes"],"img":"images/1397-XIHEoCG.jpg","gif":"videos/1397-XIHEoCG.gif","h":"Stand with your feet shoulder-width apart, toes pointing forward. Raise your heels off the ground as high as possible, standing on your toes. Hold the position for a moment, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1398","n":"standing calves calf stretch","b":"lower legs","q":"body weight","t":"calves","s":["hamstrings","glutes"],"img":"images/1398-qOKcgVP.jpg","gif":"videos/1398-qOKcgVP.gif","h":"Stand facing a wall or sturdy object, about an arm's length away. Place your hands on the wall or object at shoulder height. Step back with one foot, keeping your heel flat on the ground. Bend your front knee slightly and lean forward, keeping your back leg straight. You should feel a stretch in your calf muscle. Hold the stretch for 20-30 seconds. Repeat on the other leg."},{"i":"1599","n":"standing hamstring and calf stretch with strap","b":"upper legs","q":"rope","t":"hamstrings","s":["calves"],"img":"images/1599-xTjr103.jpg","gif":"videos/1599-xTjr103.gif","h":"Stand upright with your feet shoulder-width apart. Hold the strap with both hands and place it around the ball of your foot. Keep your leg straight and slowly lean forward from your hips, keeping your back straight. Feel the stretch in your hamstring and calf muscles. Hold the stretch for 20-30 seconds. Release the stretch and repeat with the other leg. Repeat for the desired number of repetitions."},{"i":"0794","n":"standing lateral stretch","b":"back","q":"body weight","t":"lats","s":["shoulders","obliques"],"img":"images/0794-1jXLYEw.jpg","gif":"videos/0794-1jXLYEw.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Extend your arms straight out to the sides, parallel to the ground. Slowly lean your upper body to one side, feeling a stretch in your side and lats. Hold the stretch for 15-30 seconds. Return to the starting position and repeat on the other side. Repeat for the desired number of repetitions."},{"i":"1364","n":"standing pelvic tilt","b":"back","q":"body weight","t":"spine","s":["abdominals"],"img":"images/1364-cuKYxhu.jpg","gif":"videos/1364-cuKYxhu.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Place your hands on your hips or let them hang by your sides. Engage your core muscles and tilt your pelvis forward, pushing your lower back towards the wall behind you. Hold the position for a few seconds, then release and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0795","n":"standing single leg curl","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes"],"img":"images/0795-C5jncD2.jpg","gif":"videos/0795-C5jncD2.gif","h":"Stand with your feet hip-width apart and your hands on your hips. Shift your weight onto your left leg and lift your right foot off the ground, bending your knee. Slowly curl your right heel towards your glutes, squeezing your hamstring. Pause for a moment at the top, then slowly lower your right foot back down to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"0796","n":"standing wheel rollerout","b":"waist","q":"wheel roller","t":"abs","s":["lower back","shoulders"],"img":"images/0796-KtRomty.jpg","gif":"videos/0796-KtRomty.gif","h":"Start by standing tall with your feet shoulder-width apart and the wheel roller in front of you. Bend at your waist and slowly roll the wheel forward, keeping your back straight and your core engaged. Continue rolling forward until you feel a stretch in your abs and your body is extended as far as possible. Pause for a moment, then slowly roll the wheel back towards your body, returning to the starting position. Repeat for the desired number of repetitions."},{"i":"3223","n":"star jump (male)","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/3223-HtfCpfi.jpg","gif":"videos/3223-HtfCpfi.gif","h":"Stand with your feet shoulder-width apart and your arms by your sides. Bend your knees slightly and jump up explosively. As you jump, spread your legs and extend your arms out to the sides, forming a star shape with your body. Land softly on the balls of your feet with your knees slightly bent. Repeat for the desired number of repetitions."},{"i":"2138","n":"stationary bike run v. 3","b":"cardio","q":"stationary bike","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/2138-H1PESYI.jpg","gif":"videos/2138-H1PESYI.gif","h":"Adjust the seat height and position to ensure proper alignment. Place your feet on the pedals and secure them with the straps if available. Start pedaling at a comfortable pace. Maintain a steady rhythm and increase the resistance as desired. Engage your core muscles to maintain stability and proper posture. Continue pedaling for the desired duration of your workout. Gradually decrease the resistance and slow down before coming to a complete stop. Stretch your legs and cool down after the workout."},{"i":"0798","n":"stationary bike walk","b":"cardio","q":"leverage machine","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/0798-a8VDgLw.jpg","gif":"videos/0798-a8VDgLw.gif","h":"Adjust the seat height and position on the stationary bike to ensure proper alignment. Place your feet on the pedals and secure them with the straps if available. Start pedaling at a comfortable pace, keeping your back straight and core engaged. Maintain a steady rhythm and increase the resistance level if desired. Continue pedaling for the desired duration of your cardio workout. Cool down by gradually reducing your pace and resistance level. Stretch your leg muscles after the workout to prevent tightness and promote recovery."},{"i":"3314","n":"straddle maltese","b":"waist","q":"body weight","t":"abs","s":["shoulders","chest"],"img":"images/3314-HfqciZF.jpg","gif":"videos/3314-HfqciZF.gif","h":"Start by hanging from a pair of rings with your arms fully extended and your body in a straight line. Spread your legs wide apart, forming a straddle position. Engage your core and slowly lower your body until your arms are parallel to the ground. Hold this position for a few seconds, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"3298","n":"straddle planche","b":"waist","q":"body weight","t":"abs","s":["shoulders","triceps","chest"],"img":"images/3298-BL3GHeY.jpg","gif":"videos/3298-BL3GHeY.gif","h":"Start in a push-up position with your hands shoulder-width apart and your feet spread wide apart. Engage your core and slowly shift your weight forward, bringing your shoulders over your hands. Bend your elbows and lower your body towards the ground, keeping your elbows close to your sides. Pause for a moment at the bottom, then push through your hands to straighten your arms and lift your body back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1427","n":"straight leg outer hip abductor","b":"upper legs","q":"body weight","t":"abductors","s":["glutes","hamstrings"],"img":"images/1427-mQ1tBXn.jpg","gif":"videos/1427-mQ1tBXn.gif","h":"Lie on your side with your legs straight and stacked on top of each other. Place your bottom arm under your head for support. Engage your core and lift your top leg as high as possible without rotating your hips or leaning backward. Pause for a moment at the top, then slowly lower your leg back down to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0803","n":"superman push-up","b":"chest","q":"body weight","t":"pectorals","s":["core","shoulders"],"img":"images/0803-4GqRrAk.jpg","gif":"videos/0803-4GqRrAk.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart and your feet together. Engage your core and lower your body towards the ground, keeping your elbows close to your sides. As you lower your body, simultaneously lift your right arm and left leg off the ground, extending them straight out. Pause for a moment at the top, then lower your arm and leg back down while pushing yourself back up to the starting position. Repeat the movement, this time lifting your left arm and right leg. Continue alternating sides for the desired number of repetitions."},{"i":"0805","n":"suspended abdominal fallout","b":"waist","q":"body weight","t":"abs","s":["obliques","hip flexors"],"img":"images/0805-X3TCNEU.jpg","gif":"videos/0805-X3TCNEU.gif","h":"Attach a suspension trainer to a high anchor point and adjust the straps to waist height. Stand facing away from the anchor point and hold the handles with your arms extended in front of you. Lean forward at the waist, keeping your body straight and your core engaged. Lower your body as far as you can while maintaining control and tension in your abs. Pause for a moment at the bottom, then slowly raise your body back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0806","n":"suspended push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0806-IaGQCrC.jpg","gif":"videos/0806-IaGQCrC.gif","h":"Find a suspension trainer and adjust it to an appropriate height. Stand facing away from the anchor point and hold the handles with an overhand grip. Walk your feet forward, leaning your body forward until your weight is supported by the suspension trainer. Keep your body straight from head to heels, engage your core, and lower your chest towards the handles. Push through your chest and arms to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0807","n":"suspended reverse crunch","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0807-R1WYG5D.jpg","gif":"videos/0807-R1WYG5D.gif","h":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core and lift your knees up towards your chest, curling your pelvis towards your ribcage. Pause for a moment at the top, then slowly lower your knees back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0808","n":"suspended row","b":"back","q":"body weight","t":"upper back","s":["biceps","shoulders"],"img":"images/0808-4OaumBr.jpg","gif":"videos/0808-4OaumBr.gif","h":"Set up a suspension trainer at an appropriate height. Stand facing the anchor point with your feet shoulder-width apart. Hold the handles with an overhand grip, palms facing each other. Lean back, keeping your body straight and your heels on the ground. Pull your chest towards the handles, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower yourself back to the starting position. Repeat for the desired number of repetitions."},{"i":"0809","n":"suspended split squat","b":"upper legs","q":"body weight","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0809-QpXqiq8.jpg","gif":"videos/0809-QpXqiq8.gif","h":"Stand facing away from a suspension trainer with your feet shoulder-width apart. Extend one leg forward and place the top of your foot in the foot cradle of the suspension trainer. Bend your standing leg and lower your body down into a lunge position, keeping your chest up and your knee in line with your toes. Push through your heel to return to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"3433","n":"swimmer kicks v. 2 (male)","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps","calves"],"img":"images/3433-SP3hUez.jpg","gif":"videos/3433-SP3hUez.gif","h":"Lie face down on a mat with your arms extended overhead. Engage your core and lift your chest and legs off the ground simultaneously. Kick your legs up and down in a fluttering motion, as if you were swimming. Continue kicking for the desired number of repetitions. Lower your chest and legs back down to the starting position."},{"i":"3318","n":"swing 360","b":"cardio","q":"body weight","t":"cardiovascular system","s":["shoulders","core"],"img":"images/3318-tnaj0mT.jpg","gif":"videos/3318-tnaj0mT.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Hold your arms straight out in front of you, parallel to the ground. Engage your core and swing your arms in a circular motion, rotating your torso as you do so. Continue the circular motion, swinging your arms and rotating your torso for the desired number of repetitions. Remember to breathe throughout the exercise."},{"i":"1753","n":"three bench dip","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/1753-DQ0cqkT.jpg","gif":"videos/1753-DQ0cqkT.gif","h":"Sit on a bench with your hands gripping the edge, fingers pointing forward. Slide your butt off the bench, supporting your weight with your hands. Bend your elbows and lower your body until your upper arms are parallel to the ground. Push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"2459","n":"tire flip","b":"upper legs","q":"tire","t":"glutes","s":["hamstrings","quadriceps","core"],"img":"images/2459-oZjMu1t.jpg","gif":"videos/2459-oZjMu1t.gif","h":"Stand with your feet shoulder-width apart, facing the tire. Bend your knees and hinge at the hips, lowering into a squat position. Reach down and grab the bottom edge of the tire with both hands, fingers facing towards you. Engage your glutes and leg muscles, and explosively drive through your legs to lift the tire off the ground. As the tire flips over, use your upper body strength to guide it and maintain control. Once the tire is fully flipped, quickly step back and reset your stance. Repeat for the desired number of repetitions."},{"i":"0811","n":"trap bar deadlift","b":"upper legs","q":"trap bar","t":"glutes","s":["hamstrings","quadriceps","lower back"],"img":"images/0811-jQGwmxN.jpg","gif":"videos/0811-jQGwmxN.gif","h":"Stand with your feet shoulder-width apart and the trap bar on the ground in front of you. Bend at the hips and knees to lower yourself down and grip the handles of the trap bar with an overhand grip. Keep your back straight and chest up as you begin to lift the trap bar off the ground by extending your hips and knees. As you lift, focus on driving through your heels and squeezing your glutes at the top of the movement. Lower the trap bar back down to the ground by bending at the hips and knees, keeping your back straight throughout the movement. Repeat for the desired number of repetitions."},{"i":"0814","n":"triceps dip","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0814-X6C6i5Y.jpg","gif":"videos/0814-X6C6i5Y.gif","h":"Sit on the edge of a bench or chair with your hands gripping the edge, fingers pointing forward. Slide your butt off the bench, supporting your weight with your hands. Bend your elbows and lower your body towards the ground, keeping your back close to the bench. Pause for a moment at the bottom, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0812","n":"triceps dip (bench leg)","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0812-VuoerH0.jpg","gif":"videos/0812-VuoerH0.gif","h":"Sit on the edge of a bench with your hands gripping the edge, fingers pointing forward. Walk your feet forward, sliding your butt off the bench, and straighten your arms. Bend your elbows and lower your body towards the ground, keeping your back close to the bench. Push through your palms to straighten your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0813","n":"triceps dip (between benches)","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0813-Wgbn9qo.jpg","gif":"videos/0813-Wgbn9qo.gif","h":"Sit on a bench with your hands gripping the edge of the bench, fingers pointing forward. Slide your butt off the bench, supporting your weight with your hands. Bend your elbows and lower your body towards the ground, keeping your back close to the bench. Pause for a moment at the bottom, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0815","n":"triceps dips floor","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0815-7aVz15j.jpg","gif":"videos/0815-7aVz15j.gif","h":"Sit on the edge of a chair or bench with your hands next to your hips, fingers pointing forward. Slide your butt off the front of the chair with your legs extended in front of you. Straighten your arms, keeping a little bend in your elbows to keep tension on your triceps and off your elbow joints. Slowly bend your elbows to lower your body toward the floor until your elbows are at about a 90-degree angle. Once you reach the bottom of the movement, press down into the chair to straighten your elbows, returning to the starting position. Repeat for the desired number of repetitions."},{"i":"0816","n":"triceps press","b":"upper arms","q":"body weight","t":"triceps","s":["shoulders"],"img":"images/0816-fSrPP6B.jpg","gif":"videos/0816-fSrPP6B.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Extend your arms straight out in front of you, parallel to the ground. Bend your elbows and lower your body towards the ground, keeping your upper arms close to your sides. Pause for a moment at the bottom, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0817","n":"triceps stretch","b":"upper arms","q":"body weight","t":"triceps","s":["shoulders"],"img":"images/0817-uOV3Itw.jpg","gif":"videos/0817-uOV3Itw.gif","h":"Stand or sit upright with your back straight. Extend one arm overhead, bending it at the elbow. Place your opposite hand on the bent elbow and gently pull it towards your head. Hold the stretch for 15-30 seconds, feeling a gentle stretch in your triceps. Release the stretch and repeat on the other arm."},{"i":"0871","n":"tuck crunch","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0871-BMMolZ3.jpg","gif":"videos/0871-BMMolZ3.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, lift your shoulder blades off the ground and bring your knees towards your chest, simultaneously curling your upper body towards your knees. Pause for a moment at the top, then slowly lower your shoulder blades and extend your legs back to the starting position. Repeat for the desired number of repetitions."},{"i":"0818","n":"twin handle parallel grip lat pulldown","b":"back","q":"cable","t":"lats","s":["biceps","rhomboids","rear deltoids"],"img":"images/0818-rkg41Fb.jpg","gif":"videos/0818-rkg41Fb.gif","h":"Adjust the seat height and position yourself facing the cable machine. Grasp the handles with an overhand grip, hands shoulder-width apart. Sit down and position your thighs under the thigh pads, keeping your feet flat on the floor. Lean back slightly and keep your chest up, maintaining a neutral spine. Pull the handles down towards your upper chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, feeling the contraction in your lats. Slowly release the handles and return to the starting position. Repeat for the desired number of repetitions."},{"i":"1466","n":"twist hip lift","b":"upper legs","q":"body weight","t":"glutes","s":["obliques","hamstrings"],"img":"images/1466-AX1kB0o.jpg","gif":"videos/1466-AX1kB0o.gif","h":"Lie on your back with your knees bent and feet flat on the ground. Place your hands by your sides for support. Engage your glutes and lift your hips off the ground, forming a straight line from your knees to your shoulders. While keeping your hips lifted, twist your lower body to the right side, bringing your knees towards the ground. Return to the starting position and repeat the twist to the left side. Continue alternating twists for the desired number of repetitions."},{"i":"2802","n":"twisted leg raise","b":"waist","q":"body weight","t":"abs","s":["obliques","hip flexors"],"img":"images/2802-C0eCeEt.jpg","gif":"videos/2802-C0eCeEt.gif","h":"Lie flat on your back with your legs extended and your arms by your sides. Place your hands under your glutes for support. Engage your abs and lift both legs off the ground, keeping them straight. As you lift your legs, twist your hips to one side, bringing your legs towards your opposite shoulder. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat the movement, this time twisting your hips to the other side. Continue alternating sides for the desired number of repetitions."},{"i":"2801","n":"twisted leg raise (female)","b":"waist","q":"body weight","t":"abs","s":["obliques","hip flexors"],"img":"images/2801-yT9tk17.jpg","gif":"videos/2801-yT9tk17.gif","h":"Lie flat on your back with your legs extended and your arms by your sides. Bend your knees and lift your legs off the ground, bringing them towards your chest. As you lift your legs, twist your hips to one side, bringing your knees towards your opposite shoulder. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat the movement, this time twisting your hips to the other side. Continue alternating sides for the desired number of repetitions."},{"i":"3231","n":"two toe touch (male)","b":"back","q":"body weight","t":"spine","s":["hamstrings","glutes"],"img":"images/3231-p195zsJ.jpg","gif":"videos/3231-p195zsJ.gif","h":"Stand with your feet shoulder-width apart and your arms extended out to the sides. Bend forward at the waist, keeping your back straight and your knees slightly bent. Reach down towards your toes with both hands, keeping your legs straight. Pause for a moment at the bottom, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"1365","n":"upper back stretch","b":"back","q":"body weight","t":"upper back","s":["shoulders"],"img":"images/1365-GSDioYu.jpg","gif":"videos/1365-GSDioYu.gif","h":"Stand up straight with your feet shoulder-width apart. Extend your arms straight in front of you, parallel to the ground. Interlace your fingers and rotate your palms away from your body. Slowly raise your arms overhead, keeping them straight and parallel to each other. As you raise your arms, squeeze your shoulder blades together. Hold the stretch for 15-30 seconds, then release and repeat."},{"i":"1366","n":"upward facing dog","b":"back","q":"body weight","t":"spine","s":["shoulders","chest"],"img":"images/1366-01qpYSe.jpg","gif":"videos/1366-01qpYSe.gif","h":"Lie face down on the floor with your legs extended behind you. Place your hands on the floor next to your lower ribs, fingers pointing forward. Press your hands firmly into the floor and straighten your arms, lifting your torso and thighs off the ground. Roll your shoulders back and down, opening your chest and lifting your gaze towards the ceiling. Hold this position for a few breaths, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3420","n":"v-sit on floor","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/3420-ZuXu4Eq.jpg","gif":"videos/3420-ZuXu4Eq.gif","h":"Sit on the floor with your legs extended in front of you. Lean back slightly and lift your legs off the ground, keeping them straight. Simultaneously, lift your upper body off the ground and reach your arms towards your legs. Hold this position for a few seconds, then slowly lower your upper body and legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0826","n":"vertical leg raise (on parallel bars)","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0826-ZNgOYQU.jpg","gif":"videos/0826-ZNgOYQU.gif","h":"Hang from the parallel bars with your arms fully extended and your body straight. Engage your core and lift your legs up in front of you, keeping them straight. Continue lifting until your legs are parallel to the ground or slightly higher. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"2141","n":"walk elliptical cross trainer","b":"cardio","q":"elliptical machine","t":"cardiovascular system","s":["quadriceps","hamstrings","glutes"],"img":"images/2141-rjtuP6X.jpg","gif":"videos/2141-rjtuP6X.gif","h":"Adjust the resistance level and incline of the elliptical machine to your desired settings. Step onto the pedals of the machine and grip the handles lightly. Begin by pushing down with your feet and pulling the handles towards your body. Continue this motion, alternating between pushing and pulling, to simulate a walking or running motion. Maintain a steady pace and keep your core engaged throughout the exercise. Continue for the desired duration of your cardio workout. Gradually decrease the intensity and speed of the machine before stepping off."},{"i":"3655","n":"walking high knees lunge","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","glutes"],"img":"images/3655-J9zIWig.jpg","gif":"videos/3655-J9zIWig.gif","h":"Stand with your feet hip-width apart. Lift your right knee up towards your chest as high as you can while balancing on your left leg. Step forward with your right foot and lower your body into a lunge position, bending both knees to a 90-degree angle. Push off with your right foot and bring your left knee up towards your chest. Step forward with your left foot and lower your body into a lunge position. Continue alternating legs and lunging forward, keeping your core engaged and maintaining a steady pace. Repeat for the desired number of repetitions."},{"i":"1460","n":"walking lunge","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1460-IZVHb27.jpg","gif":"videos/1460-IZVHb27.gif","h":"Stand with your feet shoulder-width apart. Take a step forward with your right leg, lowering your body into a lunge position. Keep your torso upright and your front knee aligned with your ankle. Push off with your right foot and bring your left foot forward, stepping into a lunge position with your left leg. Continue alternating legs and walking forward, maintaining a controlled and steady pace. Repeat for the desired number of repetitions."},{"i":"3666","n":"walking on incline treadmill","b":"cardio","q":"leverage machine","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/3666-rjiM4L3.jpg","gif":"videos/3666-rjiM4L3.gif","h":"Adjust the incline level on the treadmill to your desired intensity. Stand on the treadmill with your feet shoulder-width apart. Start walking at a comfortable pace, ensuring that you maintain proper form. Engage your core muscles and keep your back straight throughout the exercise. Continue walking on the incline treadmill for the desired duration of your cardio workout. Gradually decrease the incline and speed of the treadmill to cool down before stopping."},{"i":"2311","n":"walking on stepmill","b":"cardio","q":"stepmill machine","t":"cardiovascular system","s":["quadriceps","hamstrings","glutes"],"img":"images/2311-j9Q5crt.jpg","gif":"videos/2311-j9Q5crt.gif","h":"Adjust the stepmill machine to a comfortable level. Step onto the machine and place your hands on the handrails for support. Start walking by placing one foot on a step and then the other, alternating between legs. Maintain an upright posture and engage your core muscles. Continue walking for the desired duration or distance. Gradually increase the intensity or speed as you become more comfortable with the exercise. Remember to cool down and stretch after completing the exercise."},{"i":"0830","n":"weighted bench dip","b":"upper arms","q":"weighted","t":"triceps","s":["chest","shoulders"],"img":"images/0830-MU9HnE7.jpg","gif":"videos/0830-MU9HnE7.gif","h":"Sit on a bench with your hands gripping the edge, fingers pointing forward. Slide your butt off the bench, supporting your weight with your hands. Lower your body by bending your elbows until your upper arms are parallel to the floor. Push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"2987","n":"weighted close grip chin-up on dip cage","b":"back","q":"weighted","t":"lats","s":["biceps","forearms"],"img":"images/2987-Gk1r408.jpg","gif":"videos/2987-Gk1r408.gif","h":"Stand in front of the dip cage and grab the parallel bars with an underhand grip, hands shoulder-width apart. Hang from the bars with your arms fully extended, feet off the ground, and body straight. Engage your back muscles and pull your body up towards the bars, keeping your elbows close to your sides. Continue pulling until your chin is above the bars, then pause for a moment. Slowly lower your body back down to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"3643","n":"weighted cossack squats (male)","b":"upper legs","q":"weighted","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3643-GWoKnIm.jpg","gif":"videos/3643-GWoKnIm.gif","h":"Stand with your feet wider than shoulder-width apart and toes pointing slightly outward. Hold a weight in front of your chest with both hands. Shift your weight to one side and lower your body by bending the knee of the side you shifted towards, while keeping the other leg straight. Go as low as you can while maintaining balance and keeping your chest up. Push through the heel of the bent leg to return to the starting position. Repeat on the other side, alternating between legs."},{"i":"0832","n":"weighted crunch","b":"waist","q":"weighted","t":"abs","s":["obliques"],"img":"images/0832-s8nrDXF.jpg","gif":"videos/0832-s8nrDXF.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Hold a weight plate or dumbbell on your chest. Engage your abs and lift your upper body off the ground, curling forward until your shoulder blades are off the ground. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3670","n":"weighted decline sit-up","b":"waist","q":"weighted","t":"abs","s":["hip flexors","lower back"],"img":"images/3670-EZeDVzO.jpg","gif":"videos/3670-EZeDVzO.gif","h":"Lie flat on a decline bench with your feet secured under the foot pads. Place your hands behind your head or across your chest. Engage your abs and slowly lift your upper body off the bench, curling forward until your torso is perpendicular to the ground. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0833","n":"weighted donkey calf raise","b":"lower legs","q":"weighted","t":"calves","s":["hamstrings","glutes"],"img":"images/0833-LmaFNZS.jpg","gif":"videos/0833-LmaFNZS.gif","h":"Stand on a raised platform with your toes on the edge and your heels hanging off. Hold onto a stable object for support. Raise your heels as high as possible by extending your ankles. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1310","n":"weighted drop push up","b":"chest","q":"weighted","t":"pectorals","s":["triceps","shoulders"],"img":"images/1310-PSlvNMs.jpg","gif":"videos/1310-PSlvNMs.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart and your feet together. Lower your chest towards the ground, keeping your elbows close to your body. Once your chest is just above the ground, explosively push yourself up, lifting your hands off the ground. As you push up, quickly move your hands out to the sides and slightly forward, allowing your body to drop down towards the ground. Catch yourself with your hands in the wider position and immediately lower your chest towards the ground again. Repeat the push-up motion, dropping down and catching yourself with your hands in the narrower position. Continue alternating between the wider and narrower hand positions for the desired number of repetitions."},{"i":"2135","n":"weighted front plank","b":"waist","q":"weighted","t":"abs","s":["shoulders","lower back"],"img":"images/2135-VBAWRPG.jpg","gif":"videos/2135-VBAWRPG.gif","h":"Start by lying face down on the floor. Place your forearms on the ground, with your elbows directly under your shoulders. Extend your legs straight out behind you, with your toes on the ground. Engage your core and lift your body off the ground, balancing on your forearms and toes. Keep your body in a straight line from your head to your heels. Hold this position for the desired amount of time. Lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0834","n":"weighted front raise","b":"shoulders","q":"weighted","t":"delts","s":["biceps","forearms"],"img":"images/0834-e4aFmFY.jpg","gif":"videos/0834-e4aFmFY.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing your thighs. Keeping your arms straight, exhale and lift the dumbbells in front of you until they are at shoulder level. Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0866","n":"weighted hanging leg-hip raise","b":"waist","q":"weighted","t":"abs","s":["hip flexors","lower back"],"img":"images/0866-QOA0FD0.jpg","gif":"videos/0866-QOA0FD0.gif","h":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core and lift your legs up in front of you, keeping them straight. Continue lifting until your legs are parallel to the ground or slightly higher. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0835","n":"weighted hyperextension (on stability ball)","b":"back","q":"weighted","t":"spine","s":["glutes","hamstrings"],"img":"images/0835-8urJS9b.jpg","gif":"videos/0835-8urJS9b.gif","h":"Position yourself face down on a stability ball with your hips resting on the ball and your feet against a wall for stability. Place your hands behind your head or cross them over your chest. Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3641","n":"weighted kneeling step with swing","b":"shoulders","q":"weighted","t":"delts","s":["triceps","core"],"img":"images/3641-7uFJuXp.jpg","gif":"videos/3641-7uFJuXp.gif","h":"Start in a kneeling position with your knees hip-width apart and your back straight. Hold a weight in each hand, with your arms extended straight down in front of you. Engage your core and swing the weights up and overhead, keeping your arms straight. Lower the weights back down to the starting position and repeat for the desired number of repetitions."},{"i":"3644","n":"weighted lunge with swing","b":"upper legs","q":"weighted","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3644-5WiFcYk.jpg","gif":"videos/3644-5WiFcYk.gif","h":"Stand with your feet shoulder-width apart, holding a weight in each hand. Take a step forward with your right foot, lowering your body into a lunge position. As you lunge forward, swing the weights forward and upward, keeping your arms straight. Push off with your right foot and return to the starting position, swinging the weights back down. Repeat with your left foot and continue alternating legs for the desired number of repetitions."},{"i":"3286","n":"weighted muscle up","b":"back","q":"weighted","t":"lats","s":["biceps","triceps","shoulders"],"img":"images/3286-JsOV1SU.jpg","gif":"videos/3286-JsOV1SU.gif","h":"Start by hanging from a pull-up bar with your palms facing away from you and your hands slightly wider than shoulder-width apart. Engage your core and pull your body up towards the bar, leading with your chest. As you reach the top of the movement, transition your grip so that your palms are facing towards you. Continue pulling yourself up until your chest reaches the bar, then pause for a moment. Slowly lower yourself back down to the starting position, maintaining control throughout the movement. Repeat for the desired number of repetitions."},{"i":"3312","n":"weighted muscle up (on bar)","b":"back","q":"weighted","t":"lats","s":["biceps","triceps","shoulders"],"img":"images/3312-MCkqdKE.jpg","gif":"videos/3312-MCkqdKE.gif","h":"Start by hanging from a pull-up bar with your palms facing away from you and your hands slightly wider than shoulder-width apart. Engage your core and pull your shoulder blades down and back. Bend your elbows and pull your chest towards the bar, keeping your body straight. Once your chest reaches the bar, push down with your hands and drive your elbows back, lifting your body above the bar. Pause at the top of the movement, then slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions."} function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function load(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch(e){return null}}
const todayStr=()=>new Date().toISOString().slice(0,10);
function relevant(ex,d){return d.bodyParts.includes(ex.b)||d.targets.includes(ex.t);}
function subIdx(ex,d){for(let i=0;i<d.subs.length;i++){if(d.subs[i].t(ex))return i;}return 99;}
function setSection(hue){document.documentElement.style.setProperty('--section',hue);}

function init(){
  DB_RAW.forEach(e=>{DB[e.i]=e;});
  ALLIDS=DB_RAW.map(e=>e.i).sort((a,b)=>DB[a].n.localeCompare(DB[b].n));
  DAYS.forEach(d=>{
    const planList=d.def.map(x=>x[0]).filter(id=>DB[id]);
    PLANSET[d.key]=new Set(planList);PLANPRES[d.key]={};
    d.def.forEach(([id,s,r])=>{if(DB[id]&&!(id in PLANPRES[d.key]))PLANPRES[d.key][id]={sets:s,reps:r};});
    const rel=DB_RAW.filter(e=>relevant(e,d)&&!PLANSET[d.key].has(e.i));
    rel.sort((a,b)=>subIdx(a,d)-subIdx(b,d)||a.n.localeCompare(b.n));
    POOL[d.key]=[...planList,...rel.map(e=>e.i)];
  });
  const w=load('rack_workout_v3');
  if(w){workout=w;}else{DAYS.forEach(d=>{workout[d.key]=d.def.map(x=>x[0]).filter(id=>DB[id]);});save('rack_workout_v3',workout);}
  pres=load('rack_pres_v3')||{};
  const ss=load('rack_session_v3');session=(ss&&ss.date===todayStr())?ss.data:{};
  hist=load('rack_hist_v1')||{};todayPlan=load('rack_todayplan_v1')||{};rest=load('rack_rest_v1')||{};
  libSection=getTodayKey()||WEEKMAP[new Date().getDay()];
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='block';
  wire();renderTodayView();
  if('serviceWorker' in navigator&&location.protocol.startsWith('http')){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
}

function getPres(k,id){return (pres[k]&&pres[k][id])||PLANPRES[k][id]||{sets:3,reps:'12'};}
function getTodayKey(){const tp=todayPlan[todayStr()];if(tp==='rest')return null;if(tp&&DAYS.find(d=>d.key===tp))return tp;return null;}

/* history / streak */
function dayTotal(o){return o?Object.values(o).reduce((a,b)=>a+b,0):0;}
function dateKey(off){const dt=new Date();dt.setDate(dt.getDate()+off);return dt.toISOString().slice(0,10);}
function dayActive(k){return dayTotal(hist[k])>0||!!rest[k];}
function syncHistToday(){const t=todayStr();const day={};let any=false;DAYS.forEach(d=>{const c=Object.values(session[d.key]||{}).filter(v=>v==='done').length;if(c){day[d.key]=c;any=true;}});if(any)hist[t]=day;else delete hist[t];saveHist();}
function streakCount(){let off=dayActive(dateKey(0))?0:-1;if(off===-1&&!dayActive(dateKey(-1)))return 0;let s=0;while(dayActive(dateKey(off))){s++;off--;}return s;}
function weekData(){const a=[];const wl=['S','M','T','W','T','F','S'];for(let i=6;i>=0;i--){const k=dateKey(-i);a.push({k,label:wl[new Date(k+'T12:00').getDay()],v:dayTotal(hist[k]),rest:!!rest[k],today:i===0});}return a;}
function totalAll(){return Object.values(hist).reduce((a,o)=>a+dayTotal(o),0);}
function weekTotal(){return weekData().reduce((a,d)=>a+d.v,0);}
function bestDay(){let m=0;Object.values(hist).forEach(o=>m=Math.max(m,dayTotal(o)));return m;}
function sectionWeek(key){return weekData().reduce((a,d)=>a+((hist[d.k]&&hist[d.k][key])||0),0);}
function sectionsThisWeek(){let n=0;DAYS.forEach(d=>{if(sectionWeek(d.key)>0)n++;});return n;}

/* ---------- TODAY ---------- */
function greeting(){const h=new Date().getHours();return h<12?'Good morning.':h<18?'Good afternoon.':'Good evening.';}
function estMin(key){let sets=0,card=0;(workout[key]||[]).forEach(id=>{const p=getPres(key,id);if(p.sets==null){const m=(''+p.reps).match(/(\d+)/);card+=m?+m[1]:10;}else sets+=p.sets;});return Math.max(5,Math.round(sets*1.5+card));}
function renderTodayView(){
  document.getElementById('tDate').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
  const t=todayStr(),tp=todayPlan[t],isRest=!!rest[t];
  const key=getTodayKey();
  const allDone=key&&(workout[key]||[]).length&&(workout[key]||[]).every(id=>(session[key]||{})[id]==='done');
  document.getElementById('tGreet').textContent=isRest?'Rest day.':allDone?'Crushed it. 💪':greeting();
  renderStreakStrip();
  const body=document.getElementById('todayBody');
  if(isRest&&!forcePick){body.innerHTML=restCardHTML();body.querySelector('#restTrain').onclick=()=>{forcePick=true;renderTodayView();};setSection('#FF6A4D');return;}
  if(key&&!forcePick){setSection(HUES[key]);body.innerHTML=sessionHTML(key);wireSession(key);return;}
  setSection('#FF6A4D');body.innerHTML=pickerHTML();wirePicker();
}
function renderStreakStrip(){
  const st=streakCount(),wd=weekData(),mx=Math.max(1,...wd.map(d=>d.v));
  const spark=wd.map(d=>`<span><i class="${d.today?'t':''}" style="height:${d.v?Math.max(20,Math.round(d.v/mx*100)):(d.rest?14:8)}%"></i></span>`).join('');
  document.getElementById('streakStrip').innerHTML=`<span class="ss-flame">🔥</span><div class="ss-main"><div class="ss-num">${st}</div><div class="ss-lbl">day streak</div></div><div class="ss-spark">${spark}</div>`;
}
function pickerHTML(){
  const tiles=DAYS.map(d=>{const n=(workout[d.key]||[]).length;return `<button class="pick-tile" data-k="${d.key}" style="--h:${HUES[d.key]}"><span class="pdot"></span><div class="pn">${d.name}</div><div class="pf">${d.focus}</div><div class="pc">${n} exercise${n===1?'':'s'}</div></button>`;}).join('');
  return `<div class="pick-grid">${tiles}<button class="pick-rest" data-k="rest"><span class="moon">🌙</span>Rest day — log recovery, keep your streak</button></div>`;
}
function wirePicker(){
  document.querySelectorAll('#todayBody .pick-tile, #todayBody .pick-rest').forEach(b=>b.onclick=()=>pickToday(b.dataset.k));
}
function pickToday(k){
  const t=todayStr();forcePick=false;
  if(k==='rest'){rest[t]=1;todayPlan[t]='rest';persistR();persistTP();renderTodayView();toast('Rest day logged 🌙');return;}
  delete rest[t];todayPlan[t]=k;persistR();persistTP();renderTodayView();
}
function sessionHTML(key){
  const d=DAYS.find(x=>x.key===key),ids=workout[key]||[],st=session[key]||{};
  const done=ids.filter(id=>st[id]==='done').length,total=ids.length;
  const pct=total?done/total:0,C=2*Math.PI*16,off=C*(1-pct);

  const shown=ids.slice(0,6).map(id=>{const ex=DB[id];if(!ex)return'';const p=getPres(key,id);const dn=st[id]==='done';const reps=p.sets==null?p.reps:`${p.sets}×${p.reps}`;return `<button class="mli" data-i="${ids.indexOf(id)}"><div class="mthumb"><img loading="lazy" src="${imgURL(ex)}" onerror="this.style.opacity=0"></div><div class="mname">${ex.n}</div><div class="mreps">${reps}</div><div class="mchk ${dn?'done':''}">${dn?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':''}</div></button>`;}).join('');

  return `<div class="sess"><div class="sess-top"><div class="sess-info"><div class="sess-eyebrow">Today's session</div><div class="sess-name">${d.name}</div><div class="sess-meta">${total} exercise${total===1?'':'s'} · ~${estMin(key)} min · ${d.focus}</div></div>${ring}</div>
    <button class="sess-start" id="startBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>${done?'Continue workout':'Start workout'}</button>
    <div class="sess-sub"><button id="editBtn">＋ Add / edit</button><button id="changeBtn">Change day</button></div></div>
    <div class="mini-list">${shown}${more}</div>`;

function wireSession(key){
  document.getElementById('startBtn').onclick=()=>openDeck(key,firstUndone(key));

function firstUndone(key){const ids=workout[key]||[],st=session[key]||{};let i=ids.findIndex(id=>st[id]!=='done');return i<0?0:i;}
function restCardHTML(){return `<div class="rest-card"><div class="rm">🌙</div><h3>Rest day</h3><p>Recovery logged. Your streak is safe — muscles grow when you rest.</p><button id="restTrain">Train instead</button></div>`;}

let catScope='rel',catEquip='all',catQuery='';
function renderLibrary(){
  setSection(HUES[libSection]);
  const tabs=DAYS.map(d=>`<button class="libtab ${libSection===d.key?'on':''}" data-k="${d.key}" style="--h:${HUES[d.key]}"><span class="d"></span>${d.name} · ${(workout[d.key]||[]).length}</button>`).join('');

function catBaseIds(){return catScope==='rel'?POOL[libSection].slice():ALLIDS.slice();}
function catFilteredIds(){let ids=catBaseIds();if(catEquip!=='all')ids=ids.filter(id=>DB[id].q===catEquip);if(catQuery){const q=catQuery.toLowerCase();ids=ids.filter(id=>DB[id].n.toLowerCase().includes(q)||DB[id].t.toLowerCase().includes(q));}return ids;}
function buildChips(){
  const base=catBaseIds();const eq={};base.forEach(id=>{const q=DB[id].q;eq[q]=(eq[q]||0)+1;});
  const sorted=Object.keys(eq).sort((a,b)=>eq[b]-eq[a]);

function gcardHTML(id){const ex=DB[id];const added=(workout[libSection]||[]).includes(id);const plan=PLANSET[libSection].has(id);
  return `<button class="gcard ${added?'gin':''}" data-tg="${id}">${plan?'<span class="gstar">★</span>':''}<span class="gflag">${added?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>'}</span><div class="gthumb"><img loading="lazy" src="${imgURL(ex)}" onerror="this.style.opacity=0"></div><div class="gbody"><div class="gname">${ex.n}</div><div class="gmeta">${ex.t} · ${ex.q}</div></div></button>`;}
function renderCatalog(){
  const grid=document.getElementById('catGrid');const ids=catFilteredIds();
  if(!ids.length){grid.innerHTML='<div class="empty">No exercises match.</div>';return;}
  let sections=[];
  if(catScope==='rel'){const d=DAYS.find(x=>x.key===libSection);const bk=d.subs.map(()=>[]);const other=[];ids.forEach(id=>{const si=subIdx(DB[id],d);if(si<d.subs.length)bk[si].push(id);else other.push(id);});d.subs.forEach((s,i)=>{if(bk[i].length)sections.push({label:s.l,ids:bk[i]});});if(other.length)sections.push({label:'Other',ids:other});}
  else{const map={};ids.forEach(id=>{const b=DB[id].b;(map[b]=map[b]||[]).push(id);});BPORDER.forEach(b=>{if(map[b])sections.push({label:b,ids:map[b]});});Object.keys(map).forEach(b=>{if(!BPORDER.includes(b))sections.push({label:b,ids:map[b]});});}
  grid.innerHTML=sections.map(sec=>`<div class="cat-sec"><div class="sec-h">${sec.label} · ${sec.ids.length}<span class="line"></span></div><div class="sec-grid">${sec.ids.map(gcardHTML).join('')}</div></div>`).join('');
  grid.querySelectorAll('[data-tg]').forEach(b=>b.onclick=()=>toggleCat(b));
}
function toggleCat(b){
  const id=b.dataset.tg,ex=DB[id],has=(workout[libSection]||[]).includes(id);
  if(has){workout[libSection]=workout[libSection].filter(x=>x!==id);if(session[libSection])delete session[libSection][id];toast('Removed '+ex.n);}
  else{(workout[libSection]=workout[libSection]||[]).push(id);toast('Added '+ex.n);}
  persistW();persistS();
  const nh=!has;b.classList.toggle('gin',nh);
  b.querySelector('.gflag').innerHTML=nh?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
  document.querySelectorAll('#libTabs .libtab').forEach((t,i)=>{if(DAYS[i].key===libSection)t.innerHTML=`<span class="d"></span>${DAYS[i].name} · ${(workout[libSection]||[]).length}`;});
}

/* ---------- PROGRESS ---------- */

  const st=streakCount(),wd=weekData(),mx=Math.max(1,...wd.map(d=>d.v));

/* ---------- NAV ---------- */
function showTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-'+tab).classList.add('on');
  document.getElementById('navToday').classList.toggle('on',tab==='today');
