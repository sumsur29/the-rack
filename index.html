ly begin to lower the cable rope attachment back to the starting position. Repeat for the desired number of repetitions."},{"i":"1722","n":"cable high pulley overhead tricep extension","b":"upper arms","q":"cable","t":"triceps","s":["shoulders"],"img":"images/1722-1xHyxys.jpg","gif":"videos/1722-1xHyxys.gif","h":"Attach a rope to a high pulley and stand facing away from the machine. Grasp the rope with both hands and extend your arms overhead. Keep your elbows close to your head and your upper arms stationary. Slowly lower the rope behind your head by bending your elbows. Pause for a moment, then extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0167","n":"cable high row (kneeling)","b":"back","q":"cable","t":"upper back","s":["biceps","shoulders"],"img":"images/0167-ZSJNetl.jpg","gif":"videos/0167-ZSJNetl.gif","h":"Attach a straight bar to a cable machine at chest height. Kneel down in front of the cable machine and grab the bar with an overhand grip, hands shoulder-width apart. Sit back on your heels, keeping your back straight and your core engaged. Pull the bar towards your upper abdomen, squeezing your shoulder blades together. Pause for a moment at the top of the movement, then slowly release the bar back to the starting position. Repeat for the desired number of repetitions."},{"i":"0168","n":"cable hip adduction","b":"upper legs","q":"cable","t":"adductors","s":["glutes","quadriceps"],"img":"images/0168-hBGWILP.jpg","gif":"videos/0168-hBGWILP.gif","h":"Attach the ankle cuff to your ankle and stand facing the cable machine. Position yourself far enough away from the machine so that there is tension on the cable. Place your hands on the machine for support. Keeping your leg straight, slowly move your leg across your body towards the midline. Pause for a moment at the end of the movement, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"0169","n":"cable incline bench press","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/0169-Vh0GsK4.jpg","gif":"videos/0169-Vh0GsK4.gif","h":"Adjust the bench to a 45-degree incline. Attach the cable handles to the high pulleys. Sit on the bench facing the cable machine with your feet flat on the ground. Grasp the handles with an overhand grip and bring them to shoulder height. Push the handles forward and upward until your arms are fully extended. Pause for a moment, then slowly lower the handles back to the starting position. Repeat for the desired number of repetitions."},{"i":"1318","n":"cable incline bench row","b":"back","q":"cable","t":"upper back","s":["biceps","rear deltoids"],"img":"images/1318-yaMIo4D.jpg","gif":"videos/1318-yaMIo4D.gif","h":"Set up an incline bench at a 45-degree angle and attach a cable handle to the low pulley. Sit on the bench facing the cable machine with your feet flat on the floor and your knees slightly bent. Grasp the cable handle with an overhand grip and extend your arms fully in front of you. Lean forward from your hips while keeping your back straight and your core engaged. Pull the cable handle towards your chest by retracting your shoulder blades and bending your elbows. Squeeze your back muscles at the top of the movement, then slowly extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0171","n":"cable incline fly","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/0171-tBWXbIT.jpg","gif":"videos/0171-tBWXbIT.gif","h":"Adjust the cable machine to a low position and attach the handles. Sit on an incline bench with your back against the pad and feet flat on the floor. Grasp the handles with an overhand grip and extend your arms straight out in front of you. Keeping a slight bend in your elbows, open your arms out to the sides in a controlled motion. Pause for a moment at the fully extended position, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"0170","n":"cable incline fly (on stability ball)","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/0170-27NNGFr.jpg","gif":"videos/0170-27NNGFr.gif","h":"Set up a stability ball at an incline angle. Attach the cable handles to the high pulleys of a cable machine. Sit on the stability ball facing away from the machine, with your feet firmly planted on the ground. Grasp the cable handles with an overhand grip, palms facing forward. Lean forward slightly, keeping your back straight and core engaged. With a controlled motion, bring your arms out to the sides, keeping a slight bend in your elbows. Continue the motion until your arms are parallel to the ground. Pause for a moment, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"0172","n":"cable incline pushdown","b":"back","q":"cable","t":"lats","s":["triceps","shoulders"],"img":"images/0172-1PK5Uo3.jpg","gif":"videos/0172-1PK5Uo3.gif","h":"Attach a straight bar to a high pulley cable machine. Stand facing away from the machine with your feet shoulder-width apart. Grasp the bar with an overhand grip, hands slightly wider than shoulder-width apart. Lean forward slightly and keep your back straight. Pull the bar down towards your thighs by extending your elbows. Pause for a moment at the bottom, then slowly return the bar to the starting position. Repeat for the desired number of repetitions."},{"i":"0173","n":"cable incline triceps extension","b":"upper arms","q":"cable","t":"triceps","s":["shoulders"],"img":"images/0173-Hx1WC8I.jpg","gif":"videos/0173-Hx1WC8I.gif","h":"Adjust the cable machine to a low pulley position. Attach a straight bar to the cable. Stand facing away from the machine with your feet shoulder-width apart. Grasp the bar with an overhand grip and extend your arms straight overhead. Lean forward slightly, keeping your back straight and core engaged. Bend your elbows and lower the bar behind your head, keeping your upper arms close to your ears. Pause for a moment, then extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0174","n":"cable judo flip","b":"waist","q":"cable","t":"abs","s":["obliques","shoulders"],"img":"images/0174-MvQPqVW.jpg","gif":"videos/0174-MvQPqVW.gif","h":"Stand facing the cable machine with your feet shoulder-width apart. Hold the cable handle with both hands at chest level, palms facing down. Engage your core and rotate your torso to the right, pulling the cable across your body. As you rotate, pivot your back foot and allow your hips to rotate naturally. Extend your arms fully and finish the movement by flipping the cable handle over your shoulder. Return to the starting position by reversing the movement, rotating your torso back to the center. Repeat the movement on the opposite side. Continue alternating sides for the desired number of repetitions."},{"i":"0860","n":"cable kickback","b":"upper arms","q":"cable","t":"triceps","s":["shoulders"],"img":"images/0860-HEJ6DIX.jpg","gif":"videos/0860-HEJ6DIX.gif","h":"Stand facing a cable machine with your feet shoulder-width apart. Hold the cable handle with your right hand and step back to create tension in the cable. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Keep your upper arm close to your body and your elbow bent at a 90-degree angle. Extend your forearm backward, straightening your arm fully. Pause for a moment, then slowly return to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0175","n":"cable kneeling crunch","b":"waist","q":"cable","t":"abs","s":["obliques"],"img":"images/0175-WW95auq.jpg","gif":"videos/0175-WW95auq.gif","h":"Attach a rope handle to a high pulley and kneel down facing away from the machine. Hold the rope handle with both hands and place it behind your head, keeping your elbows out to the sides. Keeping your hips stationary, flex your waist and crunch your torso down towards your thighs. Pause for a moment at the bottom, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"3697","n":"cable kneeling rear delt row (with rope) (male)","b":"shoulders","q":"cable","t":"delts","s":["trapezius","rhomboids","biceps"],"img":"images/3697-G61cXLk.jpg","gif":"videos/3697-G61cXLk.gif","h":"Attach a rope handle to a low cable pulley and kneel down facing the machine. Grasp the rope with a neutral grip (palms facing each other) and extend your arms fully in front of you. Keeping your back straight and core engaged, pull the rope towards your body by retracting your shoulder blades. Squeeze your shoulder blades together at the end of the movement and hold for a brief pause. Slowly release the tension and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0176","n":"cable kneeling triceps extension","b":"upper arms","q":"cable","t":"triceps","s":["shoulders"],"img":"images/0176-KWdF2JI.jpg","gif":"videos/0176-KWdF2JI.gif","h":"Attach a rope handle to a high pulley and kneel down facing the cable machine. Grasp the rope with a neutral grip (palms facing each other) and bring your hands to the sides of your head. Keep your elbows close to your head and your upper arms stationary throughout the exercise. Extend your forearms by contracting your triceps until your arms are fully extended. Pause for a moment, then slowly return to the starting position by bending your elbows. Repeat for the desired number of repetitions."},{"i":"2330","n":"cable lat pulldown full range of motion","b":"back","q":"cable","t":"lats","s":["biceps","rhomboids","rear deltoids"],"img":"images/2330-LEprlgG.jpg","gif":"videos/2330-LEprlgG.gif","h":"Sit on the lat pulldown machine with your knees positioned under the pads. Grasp the cable bar with an overhand grip, slightly wider than shoulder-width apart. Lean back slightly and keep your chest up, maintaining a slight arch in your lower back. Pull the bar down towards your upper chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly release the bar back to the starting position. Repeat for the desired number of repetitions."},{"i":"0177","n":"cable lateral pulldown (with rope attachment)","b":"back","q":"cable","t":"lats","s":["biceps","forearms"],"img":"images/0177-CuaWCmC.jpg","gif":"videos/0177-CuaWCmC.gif","h":"Attach a rope attachment to the cable machine at a high position. Stand facing the machine with your feet shoulder-width apart. Grasp the rope with an overhand grip, palms facing each other. Keep your back straight and lean slightly back. Pull the rope down towards your sides, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement. Slowly release the tension and allow the rope to return to the starting position. Repeat for the desired number of repetitions."},{"i":"2616","n":"cable lateral pulldown with v-bar","b":"back","q":"cable","t":"lats","s":["biceps","forearms"],"img":"images/2616-4c9BhzB.jpg","gif":"videos/2616-4c9BhzB.gif","h":"Sit down on the cable pulldown machine and grab the v-bar attachment with an overhand grip. Adjust the knee pad so that your thighs are secured under it. Keep your back straight and lean back slightly. Pull the v-bar down towards your upper chest while keeping your elbows close to your body. Squeeze your back muscles at the bottom of the movement. Slowly return the v-bar to the starting position and repeat for the desired number of repetitions."},{"i":"0178","n":"cable lateral raise","b":"shoulders","q":"cable","t":"delts","s":["traps","triceps"],"img":"images/0178-goJ6ezq.jpg","gif":"videos/0178-goJ6ezq.gif","h":"Stand with your feet shoulder-width apart and grasp the cable handles with an overhand grip. Keep your arms straight and your core engaged. Raise your arms out to the sides until they are parallel to the floor. Pause for a moment at the top, then slowly lower your arms back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0179","n":"cable low fly","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/0179-FVmZVhk.jpg","gif":"videos/0179-FVmZVhk.gif","h":"Attach the handles to the low pulleys of a cable machine and select an appropriate weight. Stand in the middle of the machine with your feet shoulder-width apart and a slight bend in your knees. Grasp the handles with an overhand grip and extend your arms out to the sides, keeping a slight bend in your elbows. Maintaining control, slowly bring your arms forward in a sweeping motion, crossing them in front of your body. Pause for a moment at the peak of the movement, feeling the stretch in your chest muscles. Reverse the motion and slowly return your arms to the starting position, keeping tension on your chest muscles throughout. Repeat for the desired number of repetitions."},{"i":"0180","n":"cable low seated row","b":"back","q":"cable","t":"upper back","s":["biceps","forearms"],"img":"images/0180-hvV79Si.jpg","gif":"videos/0180-hvV79Si.gif","h":"Sit on the machine with your feet flat on the footrests and your knees slightly bent. Grasp the handles with an overhand grip, palms facing down. Keep your back straight and lean slightly forward, maintaining a slight bend in your elbows. Pull the handles towards your body, squeezing your shoulder blades together. Pause for a moment at the peak of the movement, then slowly release the handles back to the starting position. Repeat for the desired number of repetitions."},{"i":"1634","n":"cable lying bicep curl","b":"upper arms","q":"cable","t":"biceps","s":["forearms"],"img":"images/1634-otqIxU4.jpg","gif":"videos/1634-otqIxU4.gif","h":"Attach a straight bar to a low pulley cable machine. Lie face up on a flat bench with your feet flat on the ground. Grasp the bar with an underhand grip, hands shoulder-width apart. Extend your arms fully, keeping your elbows close to your sides. Keeping your upper arms stationary, exhale and curl the bar up towards your shoulders. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the bar back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0182","n":"cable lying close-grip curl","b":"upper arms","q":"cable","t":"biceps","s":["forearms"],"img":"images/0182-61GrD55.jpg","gif":"videos/0182-61GrD55.gif","h":"Attach a straight bar to a low pulley cable machine. Lie face up on a flat bench with your feet flat on the ground. Grasp the bar with an underhand grip, hands shoulder-width apart. Extend your arms fully, keeping your elbows close to your sides. Keeping your upper arms stationary, curl the bar towards your chest by contracting your biceps. Pause for a moment at the top, squeezing your biceps. Slowly lower the bar back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0184","n":"cable lying extension pullover (with rope attachment)","b":"back","q":"cable","t":"lats","s":["triceps","shoulders"],"img":"images/0184-Q2Eu1Ax.jpg","gif":"videos/0184-Q2Eu1Ax.gif","h":"Attach a rope to a cable machine and set the pulley at the highest position. Lie down on a bench with your head towards the cable machine. Hold the rope with both hands and extend your arms straight up above your chest. Keeping your arms straight, slowly lower the rope behind your head while maintaining control. Pause for a moment at the bottom, then slowly raise the rope back to the starting position. Repeat for the desired number of repetitions."},{"i":"0185","n":"cable lying fly","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/0185-lJJ7Yq8.jpg","gif":"videos/0185-lJJ7Yq8.gif","h":"Attach the handles to the cables and lie flat on a bench with your feet flat on the ground. Hold the handles with your palms facing each other and your arms extended straight above your chest. Keeping a slight bend in your elbows, lower your arms out to the sides in a wide arc until you feel a stretch in your chest. Pause for a moment, then squeeze your chest muscles to bring your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0186","n":"cable lying triceps extension v. 2","b":"upper arms","q":"cable","t":"triceps","s":["shoulders"],"img":"images/0186-uxJcFUU.jpg","gif":"videos/0186-uxJcFUU.gif","h":"Attach a rope handle to a low pulley cable machine. Lie down on a flat bench facing up, with your head towards the cable machine. Grasp the rope handle with both hands, palms facing each other, and extend your arms straight up over your chest. Keeping your upper arms stationary, slowly lower the rope handle towards your forehead by bending your elbows. Pause for a moment at the bottom, then extend your arms back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0188","n":"cable middle fly","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/0188-xLYSdtg.jpg","gif":"videos/0188-xLYSdtg.gif","h":"Attach cables to both sides of a cable machine at chest height. Stand in the center of the machine with one foot slightly in front of the other. Grasp the handles with an overhand grip and extend your arms out to the sides. Keep a slight bend in your elbows and maintain a slight forward lean. Engage your chest muscles and bring your arms forward in a sweeping motion. Pause for a moment at the center, then slowly return your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0189","n":"cable one arm bent over row","b":"back","q":"cable","t":"upper back","s":["biceps","forearms"],"img":"images/0189-EIsE3u8.jpg","gif":"videos/0189-EIsE3u8.gif","h":"Stand facing a cable machine with your feet shoulder-width apart. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Grasp the cable handle with one hand, palm facing inward, and extend your arm fully. Pull the cable handle towards your body, keeping your elbow close to your side, until your hand reaches your lower chest. Pause for a moment, then slowly extend your arm back to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0190","n":"cable one arm curl","b":"upper arms","q":"cable","t":"biceps","s":["forearms"],"img":"images/0190-YTur5nR.jpg","gif":"videos/0190-YTur5nR.gif","h":"Stand facing the cable machine with your feet shoulder-width apart. Grasp the cable handle with an underhand grip, palm facing up. Keep your elbow close to your side and slowly curl your forearm up towards your shoulder. Pause for a moment at the top, then slowly lower your forearm back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1262","n":"cable one arm decline chest fly","b":"chest","q":"cable","t":"pectorals","s":["shoulders","triceps"],"img":"images/1262-w4dLzSx.jpg","gif":"videos/1262-w4dLzSx.gif","h":"Attach a D-handle to a low pulley cable machine and set the bench to a decline angle. Lie down on the bench with your head towards the machine and grab the handle with your right hand. Extend your arm straight up above your chest, keeping a slight bend in your elbow. With a controlled motion, lower your arm out to the side until your hand is in line with your shoulder. Pause for a moment, then reverse the motion and bring your arm back to the starting position. Repeat for the desired number of repetitions, then switch to your left arm and repeat the exercise."},{"i":"1263","n":"cable one arm fly on exercise ball","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/1263-hHy8tQG.jpg","gif":"videos/1263-hHy8tQG.gif","h":"Sit on an exercise ball with your feet flat on the ground and your back straight. Hold a cable handle in one hand and extend old the cable with both hands and extend your arms straight up above your chest. Bend your knees and lift your legs up, bringing your knees towards your chest. At the same time, curl your pelvis up towards your chest, lifting your hips off the ground. Pause for a moment at the top, then slowly lower your legs and hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0243","n":"cable twist","b":"waist","q":"cable","t":"abs","s":["obliques"],"img":"images/0243-aVs3BR3.jpg","gif":"videos/0243-aVs3BR3.gif","h":"Stand with your feet shoulder-width apart, facing the cable machine. Hold the cable handle with both hands in front of your chest, keeping your arms slightly bent. Engage your core and twist your torso to the right, pulling the cable across your body. Pause for a moment at the end of the movement, feeling the contraction in your abs and obliques. Slowly return to the starting position, resisting the cable's pull. Repeat the movement to the left side. Continue alternating sides for the desired number of repetitions."},{"i":"0862","n":"cable twist (up-down)","b":"waist","q":"cable","t":"abs","s":["obliques","lower back"],"img":"images/0862-fhZQPlV.jpg","gif":"videos/0862-fhZQPlV.gif","h":"Stand with your feet shoulder-width apart, facing the cable machine. Hold the cable handle with both hands in front of your chest, keeping your arms slightly bent. Engage your core and slowly rotate your torso to one side, keeping your hips and legs stable. Pause for a moment at the end of the rotation, then slowly return to the starting position. Repeat the rotation to the opposite side. Continue alternating sides for the desired number of repetitions."},{"i":"0244","n":"cable twisting pull","b":"back","q":"cable","t":"lats","s":["shoulders","biceps"],"img":"images/0244-zCgxPbV.jpg","gif":"videos/0244-zCgxPbV.gif","h":"Attach a cable handle to a low pulley and stand facing the machine. Grasp the handle with your left hand and step away from the machine, extending your arm fully. Position your feet shoulder-width apart, with your knees slightly bent. Keep your back straight and your core engaged throughout the exercise. Pull the handle towards your body, rotating your torso to the right as you do so. Squeeze your back muscles at the end of the movement. Slowly return to the starting position, keeping tension on the cable. Repeat for the desired number of repetitions, then switch sides and perform with your right hand."},{"i":"1645","n":"cable two arm curl on incline bench","b":"upper arms","q":"cable","t":"biceps","s":["forearms"],"img":"images/1645-H9y3Dkr.jpg","gif":"videos/1645-H9y3Dkr.gif","h":"Sit on an incline bench with your back against the pad and your feet flat on the ground. Grasp the cable handles with an underhand grip, palms facing up, and your arms fully extended. Keeping your upper arms stationary, exhale and curl the handles towards your shoulders while contracting your biceps. Pause for a moment at the top of the movement, squeezing your biceps. Inhale and slowly lower the handles back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"1728","n":"cable two arm tricep kickback","b":"upper arms","q":"cable","t":"triceps","s":["shoulders"],"img":"images/1728-vvNjDJS.jpg","gif":"videos/1728-vvNjDJS.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Hold the cable handle in each hand with your palms facing inwards and your arms bent at a 90-degree angle. Keeping your upper arms stationary, extend your forearms backwards until your arms are fully extended. Pause for a moment, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"0245","n":"cable underhand pulldown","b":"back","q":"cable","t":"lats","s":["biceps","forearms"],"img":"images/0245-xBYcQHj.jpg","gif":"videos/0245-xBYcQHj.gif","h":"Adjust the cable machine so that the pulldown bar is at a height above your head. Sit down on the seat and grab the pulldown bar with an underhand grip, hands slightly wider than shoulder-width apart. Keep your back straight and lean back slightly. Pull the bar down towards your chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly release the bar back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1270","n":"cable upper chest crossovers","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/1270-j7XMAyn.jpg","gif":"videos/1270-j7XMAyn.gif","h":"Attach the handles to the cables at chest height. Stand in the center of the cable machine with one foot slightly in front of the other. Grasp the handles with your palms facing down and your arms extended out to the sides. Keep a slight bend in your elbows and engage your core. Pull the cables together in front of your chest, crossing them over each other. Squeeze your chest muscles at the peak of the movement. Slowly release the cables back to the starting position. Repeat for the desired number of repetitions."},{"i":"1324","n":"cable upper row","b":"back","q":"cable","t":"upper back","s":["biceps","shoulders"],"img":"images/1324-PQStVXH.jpg","gif":"videos/1324-PQStVXH.gif","h":"Attach a straight bar to a cable machine at chest height. Stand facing the machine with your feet shoulder-width apart. Grasp the bar with an overhand grip, hands slightly wider than shoulder-width apart. Keep your back straight and your core engaged. Pull the bar towards your upper chest, squeezing your shoulder blades together. Pause for a moment at the top of the movement. Slowly release the bar back to the starting position. Repeat for the desired number of repetitions."},{"i":"0246","n":"cable upright row","b":"shoulders","q":"cable","t":"delts","s":["traps","biceps"],"img":"images/0246-cALKspW.jpg","gif":"videos/0246-cALKspW.gif","h":"Stand with your feet shoulder-width apart, knees slightly bent, and hold the cable attachment with an overhand grip. Keep your back straight and your core engaged throughout the exercise. Pull the cable attachment straight up towards your chin, leading with your elbows. Pause for a moment at the top, squeezing your shoulder blades together. Slowly lower the cable attachment back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1325","n":"cable wide grip rear pulldown behind neck","b":"back","q":"cable","t":"lats","s":["biceps","rhomboids","rear deltoids"],"img":"images/1325-CmEr4pM.jpg","gif":"videos/1325-CmEr4pM.gif","h":"Adjust the cable machine so that the pulldown bar is at a height above your head. Sit down on the seat and grab the pulldown bar with a wide overhand grip. Keep your back straight and your chest up as you lean back slightly. Pull the bar down towards your upper chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly release the bar back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0247","n":"cable wrist curl","b":"lower arms","q":"cable","t":"forearms","s":["biceps","brachialis"],"img":"images/0247-LrV4s90.jpg","gif":"videos/0247-LrV4s90.gif","h":"Attach a straight bar to a low pulley cable machine. Stand facing the machine with your feet shoulder-width apart. Grasp the bar with an underhand grip, palms facing up, and your hands shoulder-width apart. Rest your forearms on a bench or pad, with your wrists hanging off the edge. Keeping your forearms stationary, exhale and curl your wrists upward as far as possible. Pause for a moment at the top, then inhale and slowly lower the bar back to the starting position. Repeat for the desired number of repetitions."},{"i":"1407","n":"calf push stretch with hands against wall","b":"lower legs","q":"body weight","t":"calves","s":["hamstrings"],"img":"images/1407-PzNxakt.jpg","gif":"videos/1407-PzNxakt.gif","h":"Stand facing a wall with your feet hip-width apart. Place your hands against the wall at shoulder height. Step back with one foot, keeping your heel on the ground and your leg straight. Bend your front knee slightly and lean forward, feeling a stretch in your calf. Hold the stretch for 20-30 seconds. Switch legs and repeat the stretch."},{"i":"1377","n":"calf stretch with hands against wall","b":"lower legs","q":"body weight","t":"calves","s":["hamstrings"],"img":"images/1377-m0tCHqc.jpg","gif":"videos/1377-m0tCHqc.gif","h":"Stand facing a wall with your feet hip-width apart. Place your hands against the wall at shoulder height. Step your right foot back, keeping your heel on the ground and your leg straight. Bend your left knee and lean forward, keeping your back leg straight and your heel on the ground. Hold the stretch for 20-30 seconds. Switch legs and repeat the stretch."},{"i":"1378","n":"calf stretch with rope","b":"lower legs","q":"rope","t":"calves","s":["hamstrings"],"img":"images/1378-1LVFcEn.jpg","gif":"videos/1378-1LVFcEn.gif","h":"Stand facing a wall or sturdy object with your feet hip-width apart. Hold the ends of the rope in each hand and place the middle of the rope around the ball of your right foot. Step back with your left foot, keeping your heel on the ground and your leg straight. Lean forward, keeping your back straight, and gently pull on the rope to stretch your calf. Hold the stretch for 20-30 seconds, then release. Repeat on the other leg."},{"i":"0248","n":"cambered bar lying row","b":"back","q":"barbell","t":"upper back","s":["biceps","forearms"],"img":"images/0248-R5swFnc.jpg","gif":"videos/0248-R5swFnc.gif","h":"Set up a barbell on the floor and lie face down on a bench with your chest just off the edge. Reach down and grab the barbell with an overhand grip, slightly wider than shoulder-width apart. With your legs straight and feet on the ground, lift the barbell off the floor by extending your arms. Pull the barbell towards your chest, squeezing your shoulder blades together. Lower the barbell back down to the starting position and repeat for the desired number of repetitions."},{"i":"2963","n":"captains chair straight leg raise","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/2963-weoDEpH.jpg","gif":"videos/2963-weoDEpH.gif","h":"Sit on the captain's chair with your back against the backrest and your forearms resting on the arm pads. Keep your upper body stable and your back straight. Engage your abs and lift your legs up in front of you, keeping them straight. Continue lifting until your legs are parallel to the ground or as high as you can comfortably go. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1548","n":"chair leg extended stretch","b":"upper legs","q":"body weight","t":"quads","s":["hamstrings","calves"],"img":"images/1548-xGgAGPm.jpg","gif":"videos/1548-xGgAGPm.gif","h":"Sit on the edge of a chair with your back straight and feet flat on the ground. Extend one leg straight out in front of you, keeping your heel on the ground. Lean forward slightly, feeling a stretch in your quadriceps. Hold this position for 20-30 seconds. Switch legs and repeat the stretch."},{"i":"1271","n":"chest and front of shoulder stretch","b":"chest","q":"body weight","t":"pectorals","s":["deltoids"],"img":"images/1271-Uto7l43.jpg","gif":"videos/1271-Uto7l43.gif","h":"Stand tall with your feet shoulder-width apart. Extend your arms straight out in front of you at shoulder height. Cross your arms in front of your body, with your right arm on top of your left arm. Interlace your fingers and press your palms together. Gently squeeze your shoulder blades together and push your hands forward, feeling a stretch in your chest and front of your shoulders. Hold the stretch for 20-30 seconds, then release. Repeat for the desired number of repetitions."},{"i":"0251","n":"chest dip","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/0251-9WTm7dq.jpg","gif":"videos/0251-9WTm7dq.gif","h":"Position yourself on parallel bars with your arms fully extended and your body straight. Lower your body by bending your elbows until your shoulders are below your elbows. Push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"1430","n":"chest dip (on dip-pull-up cage)","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/1430-XgWyAiA.jpg","gif":"videos/1430-XgWyAiA.gif","h":"Adjust the dip bars to a height that allows you to comfortably grip them. Stand between the bars and place your hands on each bar, slightly wider than shoulder-width apart. Jump up and straighten your arms, supporting your body weight on the bars. Bend your knees and cross your ankles behind you. Lower your body by bending your elbows, keeping your chest up and your shoulders down. Continue lowering until your shoulders are below your elbows or until you feel a stretch in your chest. Push through your palms and extend your elbows to raise your body back up to the starting position. Repeat for the desired number of repetitions."},{"i":"2462","n":"chest dip on straight bar","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/2462-LQFOrMn.jpg","gif":"videos/2462-LQFOrMn.gif","h":"Grab the parallel bars with your palms facing down and your arms fully extended. Bend your knees and cross your ankles. Lower your body by bending your arms until your shoulders are below your elbows. Push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"1272","n":"chest stretch with exercise ball","b":"chest","q":"stability ball","t":"pectorals","s":["shoulders","triceps"],"img":"images/1272-ykA5tU7.jpg","gif":"videos/1272-ykA5tU7.gif","h":"Sit on the stability ball with your feet flat on the ground and your to the starting position. Repeat for the desired number of repetitions."},{"i":"0257","n":"circles knee stretch","b":"lower legs","q":"body weight","t":"calves","s":["hamstrings","quadriceps"],"img":"images/0257-X7jbxra.jpg","gif":"videos/0257-X7jbxra.gif","h":"Stand with your feet shoulder-width apart and your hands on your hips. Bend your knees slightly and lift your heels off the ground, balancing on the balls of your feet. Keeping your knees bent, rotate your knees in a circular motion, first clockwise and then counterclockwise. Perform the movement for the desired number of repetitions."},{"i":"1273","n":"clap push up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/1273-wigSg76.jpg","gif":"videos/1273-wigSg76.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart. Lower your body towards the ground by bending your elbows, keeping your core engaged. Push through your palms explosively to propel your body off the ground. While in mid-air, clap your hands together before landing back in the starting position. Repeat for the desired number of repetitions."},{"i":"0258","n":"clock push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0258-CMAxnsG.jpg","gif":"videos/0258-CMAxnsG.gif","h":"Start in a high plank position with your hands directly under your shoulders and your body in a straight line. Lower your body towards the ground by bending your elbows, keeping them close to your sides. As you lower, rotate your body to the left, extending your left arm straight out to the side. Push back up to the starting position, while rotating your body to the center. Repeat the push-up, this time rotating your body to the right and extending your right arm out to the side. Continue alternating sides with each repetition."},{"i":"1327","n":"close grip chin-up","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/1327-VnfUNW7.jpg","gif":"videos/1327-VnfUNW7.gif","h":"Grab the pull-up bar with your palms facing towards you and your hands shoulder-width apart. Hang from the bar with your arms fully extended and your feet off the ground. Engage your back muscles and pull your body up towards the bar, keeping your elbows close to your body. Continue pulling until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0259","n":"close-grip push-up","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0259-x6KpKpq.jpg","gif":"videos/0259-x6KpKpq.gif","h":"Start in a high plank position with your hands placed close together, directly under your shoulders. Engage your core and lower your body towards the ground, keeping your elbows close to your sides. Push through your palms to extend your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"2398","n":"close-grip push-up (on knees)","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/2398-v3vLFW0.jpg","gif":"videos/2398-v3vLFW0.gif","h":"Start by getting on your hands and knees, with your hands shoulder-width apart and your knees hip-width apart. Lower your upper body towards the ground by bending your elbows, keeping them close to your sides. Pause for a moment when your chest is just above the ground. Push through your palms to straighten your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0260","n":"cocoons","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/0260-SLKj2pX.jpg","gif":"videos/0260-SLKj2pX.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1468","n":"crab twist toe touch","b":"waist","q":"body weight","t":"abs","s":["obliques","hip flexors"],"img":"images/1468-xgsGFVM.jpg","gif":"videos/1468-xgsGFVM.gif","h":"Start by sitting on the ground with your knees bent and feet flat on the floor. Place your hands behind you, fingers pointing towards your feet, and lift your hips off the ground. Extend one leg straight out in front of you while simultaneously reaching your opposite hand towards your toes. Return to the starting position and repeat on the other side. Continue alternating sides for the desired number of repetitions."},{"i":"0262","n":"cross body crunch","b":"waist","q":"body weight","t":"abs","s":["obliques"],"img":"images/0262-rbu5UUb.jpg","gif":"videos/0262-rbu5UUb.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, lift your upper body off the ground and twist to bring your right elbow towards your left knee. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat on the other side, bringing your left elbow towards your right knee. Repeat for the desired number of repetitions."},{"i":"0267","n":"crunch (hands overhead)","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0267-kjJ3VoQ.jpg","gif":"videos/0267-kjJ3VoQ.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Extend your arms straight above your head. Engaging your abs, lift your upper body off the ground, curling forward towards your knees. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0271","n":"crunch (on stability ball)","b":"waist","q":"stability ball","t":"abs","s":["hip flexors"],"img":"images/0271-MCUhf1F.jpg","gif":"videos/0271-MCUhf1F.gif","h":"Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle. Lie back on the ball until your lower back is supported and your upper body is parallel to the floor. Place your hands behind your head or across your chest. Engage your abs and lift your upper body towards your knees, curling your torso forward. Pause for a moment at the top of the movement, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0272","n":"crunch (on stability ball, arms straight)","b":"waist","q":"stability ball","t":"abs","s":["hip flexors"],"img":"images/0272-Sn8wxAI.jpg","gif":"videos/0272-Sn8wxAI.gif","h":"Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle. Lie back on the ball until your lower back is supported and your upper body is parallel to the floor. Place your hands behind your head or cross them over your chest. Engage your abs and lift your upper body off the ball, curling your shoulders towards your hips. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0274","n":"crunch floor","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0274-TFqbd8t.jpg","gif":"videos/0274-TFqbd8t.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engage your abs and lift your shoulders off the ground, curling forward towards your knees. Pause for a moment at the top, then slowly lower your shoulders back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3016","n":"curl-up","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/3016-g2oKspu.jpg","gif":"videos/3016-g2oKspu.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3769","n":"curtsey squat","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3769-gUjqdei.jpg","gif":"videos/3769-gUjqdei.gif","h":"Stand with your feet shoulder-width apart. Take a step diagonally behind and across your body with your right foot, crossing it behind your left leg. Bend both knees as if you were curtsying, lowering your body towards the ground. Keep your torso upright and your weight on your front foot. Push through your front foot to return to the starting position. Repeat on the other side, stepping diagonally behind and across your body with your left foot."},{"i":"2331","n":"cycle cross trainer","b":"cardio","q":"leverage machine","t":"cardiovascular system","s":["quadriceps","hamstrings","glutes"],"img":"images/2331-XSCHmiI.jpg","gif":"videos/2331-XSCHmiI.gif","h":"Adjust the seat height and position yourself on the cycle cross trainer. Place your feet on the pedals and grip the handlebars. Start pedaling in a smooth and controlled motion. Maintain a steady pace and increase the resistance if desired. Continue pedaling for the desired duration of your cardio workout."},{"i":"0276","n":"dead bug","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/0276-iny3m5y.jpg","gif":"videos/0276-iny3m5y.gif","h":"Lie flat on your back with your arms extended towards the ceiling. Bend your knees and lift your legs off the ground, creating a 90-degree angle at your hips and knees. Engage your core and lower back to press your lower back into the ground. Slowly lower your right arm and left leg towards the ground, keeping them straight and hovering just above the floor. Pause for a moment, then return to the starting position. Repeat the movement with your left arm and right leg. Continue alternating sides for the desired number of repetitions."},{"i":"0277","n":"decline crunch","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0277-9Ap7miY.jpg","gif":"videos/0277-9Ap7miY.gif","h":"Lie on a decline bench with your feet secured and your knees bent at a 90-degree angle. Place your hands behind your head or across your chest. Engage your abs and lift your upper body towards your knees, curling your torso. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0279","n":"decline push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/0279-i5cEhka.jpg","gif":"videos/0279-i5cEhka.gif","h":"Place your hands on the ground slightly wider than shoulder-width apart, with your feet elevated on a stable surface. Keep your body in a straight line from head to toe, engaging your core muscles. Lower your chest towards the ground by bending your elbows, keeping them close to your body. Push through your palms to extend your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0282","n":"decline sit-up","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/0282-QLL2gdc.jpg","gif":"videos/0282-QLL2gdc.gif","h":"Lie on a decline bench with your feet secured and your knees bent. Place your hands behind your head or across your chest. Engage your abs and lift your upper body off the bench, curling forward towards your knees. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1274","n":"deep push up","b":"chest","q":"dumbbell","t":"pectorals","s":["triceps","shoulders"],"img":"images/1274-vptOQ4N.jpg","gif":"videos/1274-vptOQ4N.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart and your body in a straight line. Lower your chest towards the ground by bending your elbows, keeping them close to your body. Push through your palms to extend your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0283","n":"diamond push-up","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0283-soIB2rj.jpg","gif":"videos/0283-soIB2rj.gif","h":"Start in a high plank position with your hands close together, forming a diamond shape with your thumbs and index fingers. Keep your body in a straight line from head to toe, engaging your core and glutes. Lower your chest towards the diamond shape formed by your hands, keeping your elbows close to your body. Pause for a moment at the bottom, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0284","n":"donkey calf raise","b":"lower legs","q":"body weight","t":"calves","s":["hamstrings","glutes"],"img":"images/0284-u5ESqzH.jpg","gif":"videos/0284-u5ESqzH.gif","h":"Stand with your toes on an elevated surface, such as a step or block. Place your hands on a stable support, such as a wall or railing, for balance. Raise your heels as high as possible, lifting your body weight onto the balls of your feet. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1275","n":"drop push up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/1275-Q497lAE.jpg","gif":"videos/1275-Q497lAE.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart. Lower your chest towards the ground, keeping your elbows close to your body. Once your chest is just above the ground, quickly drop your knees to the ground. Push yourself back up to the starting position by extending your arms. Repeat for the desired number of repetitions."},{"i":"0285","n":"dumbbell alternate biceps curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/0285-BU15nH4.jpg","gif":"videos/0285-BU15nH4.gif","h":"Stand up straight with a dumbbell in each hand, palms facing forward and arms fully extended. Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the desired number of repetitions, alternating arms."},{"i":"2403","n":"dumbbell alternate biceps curl (with arm blaster)","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/2403-CfKsRbG.jpg","gif":"videos/2403-CfKsRbG.gif","h":"Stand up straight with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing forward. Place the arm blaster on your upper arms, ensuring a secure fit. Keeping your upper arms stationary, exhale and curl one dumbbell up towards your shoulder while contracting your biceps. Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly lower the dumbbell back to the starting position. Repeat the movement with the opposite arm. Continue alternating arms for the desired number of repetitions."},{"i":"1646","n":"dumbbell alternate hammer preacher curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/1646-fy7Tgy4.jpg","gif":"videos/1646-fy7Tgy4.gif","h":"Sit on a preacher bench with a dumbbell in each hand, palms facing your torso and arms fully extended. Keep your upper arms stationary and exhale as you curl the weights while contracting your biceps. Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the recommended amount of repetitions."},{"i":"1647","n":"dumbbell alternate preacher curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/1647-NlfIbzq.jpg","gif":"videos/1647-NlfIbzq.gif","h":"Sit on a preacher bench with a dumbbell in each hand, palms facing up. Rest your upper arms on the pad of the preacher bench, allowing your arms to fully extend. Keeping your upper arms stationary, exhale and curl the dumbbell in your right hand as you contract your biceps. Continue to curl the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level. Pause for a moment, then inhale and slowly lower the dumbbell back to the starting position. Repeat the movement with your left arm. Continue alternating arms for the desired number of repetitions."},{"i":"1648","n":"dumbbell alternate seated hammer curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/1648-6em2Dxj.jpg","gif":"videos/1648-6em2Dxj.gif","h":"Sit on a bench with a dumbbell in each hand, palms facing your torso and arms extended down. Keep your back straight and your elbows close to your torso. Exhale and curl the dumbbell in your right hand towards your shoulder, keeping your upper arm stationary. Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level. Pause for a brief moment, then inhale and slowly lower the dumbbell back to the starting position. Repeat the movement with your left arm. Continue alternating arms for the desired number of repetitions."},{"i":"0286","n":"dumbbell alternate side press","b":"shoulders","q":"dumbbell","t":"delts","s":["triceps","core"],"img":"images/0286-izMnLqz.jpg","gif":"videos/0286-izMnLqz.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder height. Press one dumbbell overhead while keeping the other dumbbell at shoulder height. Lower the pressed dumbbell back to shoulder height while pressing the other dumbbell overhead. Continue alternating sides for the desired number of repetitions."},{"i":"1649","n":"dumbbell alternating bicep curl with leg raised on exercise ball","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms","shoulders"],"img":"images/1649-Zwiw7XR.jpg","gif":"videos/1649-Zwiw7XR.gif","h":"Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing forward. Place an exercise ball behind you and position one foot on top of it, keeping your balance. With your arms fully extended and elbows close to your sides, curl one dumbbell towards your shoulder while keeping your upper arm stationary. Lower the dumbbell back down to the starting position and repeat with the other arm. Continue alternating arms for the desired number of repetitions."},{"i":"1650","n":"dumbbell alternating seated bicep curl on exercise ball","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/1650-J74XlNf.jpg","gif":"videos/1650-J74XlNf.gif","h":"Sit on an exercise ball with your feet flat on the ground and your back straight. Hold a dumbbell in each hand with your palms facing forward and your arms fully extended. Keeping your upper arms stationary, exhale and curl one dumbbell while rotating your forearm until your palm is facing your shoulder. Inhale and slowly lower the dumbbell back to the starting position. Repeat the curl with the other arm. Continue alternating curls for the desired number of repetitions."},{"i":"2137","n":"dumbbell arnold press","b":"shoulders","q":"dumbbell","t":"delts","s":["triceps","upper chest"],"img":"images/2137-Xy4jlWA.jpg","gif":"videos/2137-Xy4jlWA.gif","h":"Sit on a bench with back support and hold a dumbbell in each hand at shoulder level, palms facing your body and elbows bent. Press the dumbbells upward until your arms are fully extended and your palms are facing forward. Rotate your wrists as you lift, so that your palms are facing forward at the top of the movement. Pause for a moment at the top, then slowly lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"0287","n":"dumbbell arnold press v. 2","b":"shoulders","q":"dumbbell","t":"delts","s":["triceps","upper chest"],"img":"images/0287-eOrFCnx.jpg","gif":"videos/0287-eOrFCnx.gif","h":"Sit on a bench with back support and hold a dumbbell in each hand at shoulder level, palms facing your body and elbows bent. Press the dumbbells upward until your arms are fully extended and your palms are facing forward. Rotate your wrists as you lift, so that your palms end up facing forward at the top of the movement. Pause for a moment at the top, then slowly lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"0288","n":"dumbbell around pullover","b":"chest","q":"dumbbell","t":"pectorals","s":["triceps","latissimus dorsi"],"img":"images/0288-vi8EhoE.jpg","gif":"videos/0288-vi8EhoE.gif","h":"Lie flat on a bench with your head at one end and your feet firmly on the ground. Hold a dumbbell with both hands and extend your arms straight above your chest. Keeping your arms straight, slowly lower the dumbbell behind your head in an arc motion. Pause for a moment at the bottom, then raise the dumbbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0289","n":"dumbbell bench press","b":"chest","q":"dumbbell","t":"pectorals","s":["triceps","shoulders"],"img":"images/0289-SpYC0Kp.jpg","gif":"videos/0289-SpYC0Kp.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Hold a dumbbell in each hand, with your palms facing forward and your arms extended above your chest. Lower the dumbbells slowly to the sides of your chest, keeping your elbows at a 90-degree angle. Pause for a moment, then push the dumbbells back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0290","n":"dumbbell bench seated press","b":"shoulders","q":"dumbbell","t":"delts","s":["triceps","chest"],"img":"images/0290-3d7wHyd.jpg","gif":"videos/0290-3d7wHyd.gif","h":"Sit on a bench with a dumbbell in each hand, resting on your thighs. Lean back and position the dumbbells to the sides of your chest, palms facing forward. Press the dumbbells upward until your arms are fully extended. Pause for a moment at the top, then slowly lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"0291","n":"dumbbell bench squat","b":"upper legs","q":"dumbbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0291-mnzcrIB.jpg","gif":"videos/0291-mnzcrIB.gif","h":"Place a dumbbell on the ground in front of a bench. Stand facing away from the bench with your feet shoulder-width apart. Bend at the knees and hips to lower yourself down towards the bench, keeping your chest up and back straight. Once your glutes touch the bench, push through your heels to stand back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0293","n":"dumbbell bent over row","b":"back","q":"dumbbell","t":"upper back","s":["biceps","forearms"],"img":"images/0293-BJ0Hz5L.jpg","gif":"videos/0293-BJ0Hz5L.gif","h":"Stand with your feet shoulder-width apart, knees slightly bent, and hold a dumbbell in each hand with your palms facing your body. Bend forward at the hips, keeping your back straight and your core engaged. Let your arms hang straight down towards the floor, with your elbows slightly bent. Pull the dumbbells up towards your chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the dumbbells back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1651","n":"dumbbell bicep curl lunge with bowling motion","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms","shoulders"],"img":"images/1651-1VpF8db.jpg","gif":"videos/1651-1VpF8db.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing forward. Take a step forward with your right foot, bending your right knee and lowering your body into a lunge position. As you lunge forward, curl the dumbbells up towards your shoulders, keeping your elbows close to your body. At the bottom of the lunge, rotate your torso to the right, as if you were bowling a ball. Reverse the motion, stepping back with your right foot and returning to the starting position while lowering the dumbbells back down. Repeat the lunge and curl motion, this time rotating your torso to the left. Continue alternating sides for the desired number of repetitions."},{"i":"1652","n":"dumbbell bicep curl on exercise ball with leg raised","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms","shoulders"],"img":"images/1652-2NImIAG.jpg","gif":"videos/1652-2NImIAG.gif","h":"Sit on an exercise ball with your feet flat on the ground and your back straight. Hold a dumbbell in each hand with your palms facing forward and your arms fully extended. Slowly curl the dumbbells towards your shoulders, keeping your elbows close to your sides. Pause for a moment at the top of the movement, then slowly lower the dumbbells back to the starting position. While performing the bicep curl, raise one leg off the ground and hold it in the air for the duration of the exercise. Repeat for the desired number of repetitions, then switch legs and repeat."},{"i":"1653","n":"dumbbell bicep curl with stork stance","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/1653-uSkDMYl.jpg","gif":"videos/1653-uSkDMYl.gif","h":"Stand with your feet shoulder-width apart and hold a dumbbell in each hand, palms facing forward. Extend one leg behind you, balancing on the toes of that foot. Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the desired number of repetitions, then switch legs and repeat."},{"i":"0294","n":"dumbbell biceps curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/0294-NbVPDMW.jpg","gif":"videos/0294-NbVPDMW.gif","h":"Stand up straight with a dumbbell in each hand, palms facing forward and arms fully extended. Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"2401","n":"dumbbell biceps curl (with arm blaster)","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/2401-nlJsbkW.jpg","gif":"videos/2401-nlJsbkW.gif","h":"Stand up straight with a dumbbell in each hand, palms facing forward. Keep your elbows close to your torso and your upper arms stationary. Exhale and curl the weights while contracting your biceps. Continue to raise the weights until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"1654","n":"dumbbell biceps curl reverse","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/1654-nFc4FyV.jpg","gif":"videos/1654-nFc4FyV.gif","h":"Stand up straight with a dumbbell in each hand, palms facing down and arms fully extended. Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"1655","n":"dumbbell biceps curl squat","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/1655-niXESDw.jpg","gif":"videos/1655-niXESDw.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with your palms facing forward. Keeping your back straight and your elbows close to your sides, exhale and curl the dumbbells up towards your shoulders. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the dumbbells back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1656","n":"dumbbell biceps curl v sit on bosu ball","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms","shoulders"],"img":"images/1656-H1XAdpk.jpg","gif":"videos/1656-H1XAdpk.gif","h":"Sit on a bosu ball with your feet flat on the ground and your knees bent at a 90-degree angle. Hold a dumbbell in each hand with your palms facing forward and your arms fully extended down by your sides. Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"1201","n":"dumbbell burpee","b":"cardio","q":"dumbbell","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/1201-0JtKWum.jpg","gif":"videos/1201-0JtKWum.gif","h":"Start in a standing position with your feet shoulder-width apart and a dumbbell in each hand. Lower your body into a squat position, placing the dumbbells on the ground in front of you. Kick your feet back into a push-up position, keeping your body in a straight line. Perform a push-up, bending your elbows and lowering your chest towards the ground. Jump your feet back towards your hands, landing in a squat position. Stand up explosively, lifting the dumbbells off the ground and bringing them to your shoulders. Press the dumbbells overhead, fully extending your arms. Lower the dumbbells back to your shoulders and repeat the entire sequence for the desired number of repetitions."},{"i":"0295","n":"dumbbell clean","b":"upper legs","q":"dumbbell","t":"glutes","s":["hamstrings","quadriceps","calves"],"img":"images/0295-7Hg55JG.jpg","gif":"videos/0295-7Hg55JG.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip. Bend your knees and lower your hips into a squat position, keeping your back straight and chest up. Explosively extend your hips and knees, driving through your heels to jump off the ground. As you jump, shrug your shoulders and pull the dumbbells up towards your shoulders, keeping them close to your body. Catch the dumbbells at shoulder height, with your elbows pointing forward and your palms facing up. Lower the dumbbells back down to the starting position by reversing the movement. Repeat for the desired number of repetitions."},{"i":"1731","n":"dumbbell close grip press","b":"upper arms","q":"dumbbell","t":"triceps","s":["chest","shoulders"],"img":"images/1731-7jGOBF3.jpg","gif":"videos/1731-7jGOBF3.gif","h":"Sit on a flat bench with a dumbbell in each hand, resting on your thighs. Using your thighs to help raise the dumbbells, lift the dumbbells one at a time so that you can hold them in front of you at shoulder width. Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position. As you breathe in, slowly lower the dumbbells to your side until they are about level with your chest. As you exhale, use your triceps to lift the dumbbells back to the starting position. Make sure to use only your triceps and do not use your forearms or biceps to help lift the dumbbells. After a second pause at the contracted position, repeat the movement for the prescribed amount of repetitions."},{"i":"0296","n":"dumbbell close-grip press","b":"upper arms","q":"dumbbell","t":"triceps","s":["chest","shoulders"],"img":"images/0296-RxayqAZ.jpg","gif":"videos/0296-RxayqAZ.gif","h":"Sit on a flat bench with a dumbbell in each hand, resting on your thighs. Using your thighs to help raise the dumbbells, lift the dumbbells one at a time so that you can hold them in front of you at shoulder width. Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position. As you breathe in, slowly lower the dumbbells to your side until they are about level with your chest. As you exhale, use your triceps to lift the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"0297","n":"dumbbell concentration curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/0297-gvsWLQw.jpg","gif":"videos/0297-gvsWLQw.gif","h":"Sit on a bench with your legs spread apart and a dumbbell in one hand, resting your elbow on the inside of your thigh. Fully extend your arm and hold the dumbbell with an underhand grip. Keeping your upper arm stationary, exhale and curl the weight up towards your shoulder while contracting your biceps. Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly lower the dumbbell back to the starting position. Repeat for the desired number of repetitions, then switch arms."},{"i":"3635","n":"dumbbell contralateral forward lunge","b":"upper legs","q":"dumbbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3635-ecl28tP.jpg","gif":"videos/3635-ecl28tP.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand. Take a step forward with your right foot, keeping your back straight and core engaged. Lower your body by bending both knees until your right thigh is parallel to the ground. Push through your right heel to return to the starting position. Repeat with your left leg. Alternate legs for the desired number of repetitions."},{"i":"0298","n":"dumbbell cross body hammer curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/0298-Qyk5J3p.jpg","gif":"videos/0298-Qyk5J3p.gif","h":"Stand up straight with a dumbbell in each hand, palms facing your body. Keep your elbows close to your torso and your upper arms stationary. Exhale and curl the weights while contracting your biceps, bringing the dumbbells across your body towards your opposite shoulder. Continue to raise the dumbbells until your biceps are fully contracted and the dumbbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"1657","n":"dumbbell cross body hammer curl v. 2","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/1657-HDYiZcY.jpg","gif":"videos/1657-HDYiZcY ."},{"i":"0304","n":"dumbbell decline shrug v. 2","b":"back","q":"dumbbell","t":"traps","s":["shoulders","rhomboids"],"img":"images/0304-bRlbdjK.jpg","gif":"videos/0304-bRlbdjK.gif","h":"Set up a decline bench at a 45-degree angle. Lie face down on the bench with your chest and stomach resting on it. Hold a dumbbell in each hand with your palms facing each other and your arms fully extended. Keeping your arms straight, raise your shoulders as high as possible while squeezing your shoulder blades together. Hold the contraction for a brief pause, then lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"0306","n":"dumbbell decline triceps extension","b":"upper arms","q":"dumbbell","t":"triceps","s":["shoulders"],"img":"images/0306-OTgkHwR.jpg","gif":"videos/0306-OTgkHwR.gif","h":"Lie on a decline bench with your head lower than your feet and hold a dumbbell in each hand, palms facing each other. Extend your arms fully, keeping your elbows close to your head. Lower the dumbbells slowly behind your head, bending your elbows. Pause for a moment, then raise the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"0307","n":"dumbbell decline twist fly","b":"chest","q":"dumbbell","t":"pectorals","s":["shoulders","triceps"],"img":"images/0307-reFHapa.jpg","gif":"videos/0307-reFHapa.gif","h":"Lie down on a decline bench with your head lower than your hips. Hold a dumbbell in each hand with your palms facing each other and your arms extended straight up over your chest. Lower the dumbbells out to the sides in a wide arc until you feel a stretch in your chest. As you lower the dumbbells, twist your wrists so that your palms face forward at the bottom of the movement. Reverse the motion and bring the dumbbells back up to the starting position, squeezing your chest muscles at the top. Repeat for the desired number of repetitions."},{"i":"1437","n":"dumbbell finger curls","b":"lower arms" tarting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"3548","n":"dumbbell single arm overhead carry","b":"shoulders","q":"dumbbell","t":"delts","s":["traps","core"],"img":"images/3548-mWBtgmb.jpg","gif":"videos/3548-mWBtgmb.gif","h":"Stand tall with your feet shoulder-width apart, holding a dumbbell in one hand. Raise the dumbbell overhead, fully extending your arm. Engage your core and keep your back straight as you walk forward, maintaining the dumbbell overhead. Continue walking for the desired distance or time. Switch hands and repeat the exercise."},{"i":"0409","n":"dumbbell single leg calf raise","b":"lower legs","q":"dumbbell","t":"calves","s":["ankles"],"img":"images/0409-1kB3Wmk.jpg","gif":"videos/0409-1kB3Wmk.gif","h":"Stand on the edge of a step or platform with your heels hanging off and your toes on the step. Hold a dumbbell in one hand and place your other hand on a wall or railing for support. Raise your heel as high as possible, lifting your body up onto your toes. Pause for a moment at the top, then slowly lower your heel back down below the step. Repeat for the desired number of repetitions, then switch to the other leg."},{"i":"1757","n":"dumbbell single leg deadlift","b":"upper legs","q":"dumbbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/1757-gKozT8X.jpg","gif":"videos/1757-gKozT8X.gif","h":"Stand with your feet hip-width apart, holding a dumbbell in your right hand. Shift your weight onto your left leg and lift your right foot slightly off the ground. Keeping your back straight, hinge forward at the hips and lower the dumbbell towards the ground. At the same time, extend your right leg straight behind you, maintaining a slight bend in your left knee. Lower the dumbbell until your torso and right leg are parallel to the ground. Pause for a moment, then engage your glutes and hamstrings to return to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"2805","n":"dumbbell single leg deadlift with stepbox support","b":"upper legs","q":"dumbbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/2805-daBmy1Y.jpg","gif":"videos/2805-daBmy1Y.gif","h":"Stand with your feet hip-width apart, holding a dumbbell in your right hand. Place your left foot on a stepbox or elevated surface behind you. Keeping your back straight and core engaged, hinge forward at the hips, lowering the dumbbell towards the ground. As you lower the dumbbell, simultaneously lift your left leg behind you, maintaining a straight line from head to heel. Lower the dumbbell until you feel a stretch in your right hamstring, then return to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0410","n":"dumbbell single leg split squat","b":"upper legs","q":"dumbbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0410-qx4fgX7.jpg","gif":"videos/0410-qx4fgX7.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand. Take a step forward with one foot and position your feet so that your front foot is flat on the ground and your back foot is elevated on a bench or step. Lower your body by bending your front knee and hip, keeping your back knee slightly bent and your back heel off the ground. Continue lowering until your front thigh is parallel to the ground, then push through your front heel to return to the starting position. Repeat for the desired number of repetitions, then switch legs and repeat."},{"i":"0411","n":"dumbbell single leg squat","b":"upper legs","q":"dumbbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0411-H6ybluc.jpg","gif":"videos/0411-H6ybluc.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand. Extend one leg forward and keep it off the ground throughout the exercise. Bend your standing leg and lower your body down as if sitting back into a chair. Keep your chest up and your back straight. Pause for a moment at the bottom, then push through your heel to return to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"0413","n":"dumbbell squat","b":"upper legs","q":"dumbbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0413-HsvHqgf.jpg","gif":"videos/0413-HsvHqgf.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand at your sides. Keeping your chest up and core engaged, lower your body down by bending at the knees and hips, as if sitting back into a chair. Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"3560","n":"dumbbell standing alternate hammer curl and press","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms","shoulders"],"img":"images/3560-LeaZOIz.jpg","gif":"videos/3560-LeaZOIz.gif","h":"Stand up straight with a dumbbell in each hand, palms facing your body. Keep your elbows close to your torso and your back straight. Exhale and curl the dumbbell in your right hand towards your shoulder, keeping your upper arm stationary. Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level. Inhale and slowly lower the dumbbell back to the starting position. Repeat the curl with your left hand. After completing the curl with your left hand, exhale and press the dumbbell in your right hand overhead. Extend your arm fully and hold for a moment at the top. Inhale and slowly lower the dumbbell back to the starting position. Repeat the press with your left hand. Continue alternating between curls and presses for the desired number of repetitions."},{"i":"0414","n":"dumbbell standing alternate overhead press","b":"shoulders","q":"dumbbell","t":"delts","s":["triceps","core"],"img":"images/0414-bBi35y3.jpg" r the desired number of repetitions."},{"i":"0417","n":"dumbbell standing calf raise","b":"lower legs","q":"dumbbell","t":"calves","s":["ankles"],"img":"images/0417-dPmaUaU.jpg","gif":"videos/0417-dPmaUaU.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand. Raise your heels off the ground as high as possible, using your calves. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0418","n":"dumbbell standing concentration curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/0418-7inpWch.jpg","gif":"videos/0418-7inpWch.gif","h":"Stand with your feet shoulder-width apart and hold a dumbbell in one hand, with your arm fully extended and palm facing inwards. Place your opposite hand on your thigh for support. Keeping your upper arm stationary, exhale and curl the dumbbell towards your shoulder by contracting your biceps. Continue to raise the dumbbell until your biceps are fully contracted and the dumbbell is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly lower the dumbbell back to the starting position. Repeat for the desired number of repetitions, then switch arms."},{"i":"0419","n":"dumbbell standing front raise above head","b":"shoulders","q":"dumbbell","t":"delts","s":["trapezius","biceps"],"img":"images/0419-laVRfDf.jpg","gif":"videos/0419-laVRfDf.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip. Keep your arms straight and lift the dumbbells in front of you, raising them above your head. Pause for a moment at the top, then slowly lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"2321","n":"dumbbell standing inner biceps curl v. 2","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/2321-vKilzz3.jpg","gif":"vi
