nd your knees slightly bent, hinge at the hips and lower the band towards the ground. Feel the stretch in your hamstrings as you lower the band. Engage your glutes and hamstrings to lift your body back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1010","n":"band straight leg deadlift","b":"back","q":"band","t":"spine","s":["hamstrings","glutes"],"img":"images/1010-KUaoUV8.jpg","gif":"videos/1010-KUaoUV8.gif","h":"Stand with your feet shoulder-width apart and place the band around your feet. Hold the band with both hands, palms facing your body, and keep your arms straight. Engage your core and maintain a slight bend in your knees. Slowly hinge forward at your hips, keeping your back straight and chest lifted. Lower the band towards the ground while keeping your legs straight. Pause for a moment at the bottom, then squeeze your glutes and hamstrings to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1012","n":"band twisting overhead press","b":"shoulders","q":"band","t":"delts","s":["triceps","upper back"],"img":"images/1012-u4bAmKp.jpg","gif":"videos/1012-u4bAmKp.gif","h":"Stand with your feet shoulder-width apart and place the band under your feet. Hold the band handles at shoulder height with your palms facing forward. Engage your core and press the band overhead, fully extending your arms. As you press, twist your torso to one side, keeping your hips stable. Pause for a moment at the top, then return to the starting position. Repeat the press and twist on the opposite side. Continue alternating sides for the desired number of repetitions."},{"i":"1369","n":"band two legs calf raise - (band under both legs) v. 2","b":"lower legs","q":"band","t":"calves","s":["ankles","feet"],"img":"images/1369-jl6uxZV.jpg","gif":"videos/1369-jl6uxZV.gif","h":"Stand with your feet shoulder-width apart and place a resistance band under both feet. Hold the ends of the band with your hands for stability. Raise your heels off the ground as high as possible, using your calves. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1013","n":"band underhand pulldown","b":"back","q":"band","t":"lats","s":["biceps","forearms"],"img":"images/1013-k6tUeqS.jpg","gif":"videos/1013-k6tUeqS.gif","h":"Attach the band to a high anchor point, such as a pull-up bar or sturdy beam. Stand facing the anchor point with your feet shoulder-width apart. Grasp the band with an underhand grip, hands slightly wider than shoulder-width apart. Extend your arms fully overhead, keeping your elbows slightly bent. Engage your lats and pull the band down towards your chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly release the tension and return to the starting position. Repeat for the desired number of repetitions."},{"i":"1014","n":"band v-up","b":"waist","q":"band","t":"abs","s":["hip flexors"],"img":"images/1014-H6ETwO9.jpg","gif":"videos/1014-H6ETwO9.gif","h":"Lie flat on your back with your legs straight and your arms extended overhead, holding the band. Engaging your abs, lift your legs and upper body off the ground simultaneously, reaching your hands towards your toes. Pause for a moment at the top, then slowly lower your legs and upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1015","n":"band vertical pallof press","b":"waist","q":"band","t":"abs","s":["obliques","glutes"],"img":"images/1015-G7PXMlT.jpg","gif":"videos/1015-G7PXMlT.gif","h":"Stand with your feet shoulder-width apart and wrap the band around a sturdy object at chest height. Hold the band with both hands and step away from the anchor point, creating tension in the band. Position yourself perpendicular to the anchor point, with your side facing the band. Extend your arms straight out in front of you, keeping your hands at chest height. Engage your core and press the band away from your chest, fully extending your arms. Hold the position for a few seconds, then slowly bring the band back towards your chest. Repeat for the desired number of repetitions, then switch sides."},{"i":"1016","n":"band wrist curl","b":"lower arms","q":"band","t":"forearms","s":["biceps","triceps"],"img":"images/1016-vUTfFHw.jpg","gif":"videos/1016-vUTfFHw.gif","h":"Sit on a bench or chair with your feet flat on the ground. Hold the band with both hands, palms facing up, and rest your forearms on your thighs. Slowly curl your wrists upward, squeezing your forearms. Pause for a moment at the top, then slowly lower your wrists back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1017","n":"band y-raise","b":"shoulders","q":"band","t":"delts","s":["traps","rhomboids"],"img":"images/1017-aHDy5O5.jpg","gif":"videos/1017-aHDy5O5.gif","h":"Stand with your feet shoulder-width apart and hold the band in front of your thighs with your palms facing inwards. Keep your arms straight and lift them up and out to the sides, forming a 'Y' shape with your body. Squeeze your shoulder blades together at the top of the movement. Slowly lower your arms back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0023","n":"barbell alternate biceps curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/0023-Yza7XrQ.jpg","gif":"videos/0023-Yza7XrQ.gif","h":"Stand up straight with your feet shoulder-width apart and hold a barbell in each hand, palms facing forward. Keep your upper arms stationary and exhale as you curl the weights while contracting your biceps. Continue to raise the barbells until your biceps are fully contracted and the barbells are at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale as you slowly begin to lower the barbells back to the starting position. Repeat for the desired number of repetitions, alternating arms."},{"i":"0024","n":"barbell bench front squat","b":"upper legs","q":"barbell","t":"quads","s":["hamstrings","glutes","calves"],"img":"images/0024-Y7YcmIJ.jpg","gif":"videos/0024-Y7YcmIJ.gif","h":"Start by standing with your feet shoulder-width apart and the barbell resting on your upper chest, just below your collarbone. Hold the barbell with an overhand grip, keeping your elbows up and your upper arms parallel to the ground. Lower your body down into a squat position by bending at the knees and hips, keeping your back straight and your chest up. Pause for a moment at the bottom of the squat, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0025","n":"barbell bench press","b":"chest","q":"barbell","t":"pectorals","s":["triceps","shoulders"],"img":"images/0025-EIeI8Vf.jpg","gif":"videos/0025-EIeI8Vf.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the barbell with an overhand grip slightly wider than shoulder-width apart. Lift the barbell off the rack and hold it directly above your chest with your arms fully extended. Lower the barbell slowly towards your chest, keeping your elbows tucked in. Pause for a moment when the barbell touches your chest. Push the barbell back up to the starting position by extending your arms. Repeat for the desired number of repetitions."},{"i":"0026","n":"barbell bench squat","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0026-W9pFVv1.jpg","gif":"videos/0026-W9pFVv1.gif","h":"Set up a barbell on a squat rack at chest height. Stand facing away from the rack, with your feet shoulder-width apart. Bend your knees and lower your body down into a squat position, keeping your back straight and chest up. Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart. Lift the barbell off the rack and step back, ensuring your feet are still shoulder-width apart. Lower your body down into a squat, keeping your knees in line with your toes. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1316","n":"barbell bent arm pullover","b":"back","q":"barbell","t":"lats","s":["triceps","chest"],"img":"images/1316-cA9FuWG.jpg","gif":"videos/1316-cA9FuWG.gif","h":"Lie flat on a bench with your head at one end and your feet on the floor. Hold a barbell with a shoulder-width grip and extend your arms straight above your chest. Lower the barbell behind your head while keeping your arms slightly bent. Pause for a moment, then raise the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0027","n":"barbell bent over row","b":"back","q":"barbell","t":"upper back","s":["biceps","forearms"],"img":"images/0027-eZyBC3j.jpg","gif":"videos/0027-eZyBC3j.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Bend forward at the hips while keeping your back straight and chest up. Grasp the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Pull the barbell towards your lower chest by retracting your shoulder blades and squeezing your back muscles. Pause for a moment at the top, then slowly lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"2407","n":"barbell biceps curl (with arm blaster)","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/2407-aee2Fcj.jpg","gif":"videos/2407-aee2Fcj.gif","h":"Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing up. Place your upper arms against the arm blaster, keeping your elbows close to your torso. Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the barbell until your biceps are fully contracted and the bar is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0028","n":"barbell clean and press","b":"upper legs","q":"barbell","t":"quads","s":["hamstrings","glutes","shoulders"],"img":"images/0028-SGY8Zui.jpg","gif":"videos/0028-SGY8Zui.gif","h":"Stand with your feet shoulder-width apart and the barbell on the floor in front of you. Bend your knees and hinge at the hips to lower down and grip the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Drive through your heels and extend your hips and knees to lift the barbell off the floor, keeping it close to your body. As the barbell reaches your thighs, explosively extend your hips, shrug your shoulders, and pull the barbell up towards your chest. As the barbell reaches chest height, quickly drop under it and catch it at shoulder level, with your elbows pointing forward and your palms facing up. From the catch position, press the barbell overhead by extending your arms and pushing the barbell straight up. Lower the barbell back down to the starting position and repeat for the desired number of repetitions."},{"i":"0029","n":"barbell clean-grip front squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0029-qi996YS.jpg","gif":"videos/0029-qi996YS.gif","h":"Start by standing with your feet shoulder-width apart and the barbell resting on your upper chest, with your elbows pointing forward. Lower your body by bending your knees and pushing your hips back, as if you are sitting back into a chair. Keep your chest up and your back straight as you lower down, making sure your knees do not go past your toes. Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to stand back up, extending your hips and knees. Repeat for the desired number of repetitions."},{"i":"0030","n":"barbell close-grip bench press","b":"upper arms","q":"barbell","t":"triceps","s":["chest","shoulders"],"img":"images/0030-J6Dx1Mu.jpg","gif":"videos/0030-J6Dx1Mu.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the barbell with a close grip, slightly narrower than shoulder-width apart. Unrack the barbell and lower it slowly towards your chest, keeping your elbows close to your body. Pause for a moment when the barbell touches your chest. Push the barbell back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0031","n":"barbell curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/0031-25GPyDY.jpg","gif":"videos/0031-25GPyDY.gif","h":"Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing forward. Keep your elbows close to your torso and exhale as you curl the weights while contracting your biceps. Continue to raise the bar until your biceps are fully contracted and the bar is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale as you slowly begin to lower the bar back to the starting position. Repeat for the desired number of repetitions."},{"i":"0032","n":"barbell deadlift","b":"upper legs","q":"barbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/0032-ila4NZS.jpg","gif":"videos/0032-ila4NZS.gif","h":"Stand with your feet shoulder-width apart and the barbell on the ground in front of you. Bend your knees and hinge at the hips to lower your torso and grip the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Keep your back straight and chest lifted as you drive through your heels to lift the barbell off the ground, extending your hips and knees. As  an underhand grip, palms facing up. Let the barbell hang at arm's length in front of your thighs. Keeping your upper arms stationary, curl the barbell up towards your chest by contracting your biceps. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1370","n":"barbell floor calf raise","b":"lower legs","q":"barbell","t":"calves","s":["hamstrings"],"img":"images/1370-2IHEa2T.jpg","gif":"videos/1370-2IHEa2T.gif","h":"Place a barbell on the floor in front of you. Stand with the balls of your feet on the edge of the barbell, with your heels hanging off. Hold onto a stable object for balance if needed. Raise your heels as high as possible, using your calves to lift your body. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0039","n":"barbell front chest squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0039-IeTIEqg.jpg","gif":"videos/0039-IeTIEqg.gif","h":"Start by standing with your feet shoulder-width apart, toes slightly turned out. Hold the barbell in front of your chest with your hands shoulder-width apart, elbows pointing forward. Engage your core and keep your chest up as you lower your body down into a squat position, pushing your hips back and bending your knees. Lower until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0041","n":"barbell front raise","b":"shoulders","q":"barbell","t":"delts","s":["biceps","triceps"],"img":"images/0041-b2Uoz54.jpg","gif":"videos/0041-b2Uoz54.gif","h":"Stand with your feet shoulder-width apart and hold a barbell in front of your thighs with an overhand grip. Keep your arms straight and lift the barbell forward and upward until it reaches shoulder level. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0040","n":"barbell front raise and pullover","b":"chest","q":"barbell","t":"pectorals","s":["deltoids","triceps"],"img":"images/0040-33AzZeV.jpg","gif":"videos/0040-33AzZeV.gif","h":"Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, palms facing down. Keep your arms straight and raise the barbell in front of you until it reaches shoulder height. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Next, lower the barbell behind your head, keeping your arms straight. Pause for a moment at the bottom, then raise the barbell back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0042","n":"barbell front squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0042-zG0zs85.jpg","gif":"videos/0042-zG0zs85.gif","h":"Start by standing with your feet shoulder-width apart, toes slightly turned out. Hold the barbell in front of your shoulders, resting it on your collarbone and shoulders. Engage your core and keep your chest up as you lower your body down into a squat position, pushing your hips back and bending your knees. Lower until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0043","n":"barbell full squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0043-qXTaZnJ.jpg","gif":"videos/0043-qXTaZnJ.gif","h":"Stand with your feet shoulder-width apart, toes slightly turned out. Hold the barbell across your upper back, resting it on your traps or rear delts. Engage your core and r a moment at the top, squeezing your glutes. Slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0044","n":"barbell good morning","b":"upper legs","q":"barbell","t":"hamstrings","s":["lower back"],"img":"images/0044-XlZ4lAC.jpg","gif":"videos/0044-XlZ4lAC.gif","h":"Start by standing with your feet shoulder-width apart and the barbell resting on your upper back. Keeping your back straight and your core engaged, hinge forward at the hips, pushing your buttocks back as if you were trying to touch the wall behind you with your glutes. Lower your torso until it is parallel to the ground, feeling a stretch in your hamstrings. Pause for a moment, then return to the starting position by squeezing your glutes and pushing your hips forward. Repeat for the desired number of repetitions."},{"i":"0045","n":"barbell guillotine bench press","b":"chest","q":"barbell","t":"pectorals","s":["shoulders","triceps"],"img":"images/0045-GXoaSgn.jpg","gif":"videos/0045-GXoaSgn.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart. Lower the barbell slowly towards your neck, keeping your elbows pointed outwards. Pause for a moment when the barbell is just above your neck. Push the barbell back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0046","n":"barbell hack squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0046-5VCj6iH.jpg","gif":"videos/0046-5VCj6iH.gif","h":"Start by standing with your feet shoulder-width apart and your toes slightly turned out. Hold the barbell behind your legs, resting it on your upper thighs. Lower your body by bending at the knees and hips, keeping your back straight and your chest up. Continue lowering until your thighs are parallel to the ground, or as
