/* ---------- DECK ---------- */
function steps(ex){const t=ex.h||'';return t.split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(s=>s.length>1);}
function buildList(){return (workout[curDay]||[]).filter(id=>DB[id]).map(id=>{const p=getPres(curDay,id);return {id,sets:p.sets,reps:p.reps,inPlan:PLANSET[curDay].has(id)};});}
function openDeck(key,start){
  curDay=key;setSection(HUES[key]);
  document.getElementById('deckTitle').textContent=DAYS.find(d=>d.key===key).name;
  renderDeck();document.getElementById('deck').style.display='flex';
  requestAnimationFrame(()=>{scrollToCard(start||0,false);onScrollSettle();});
  if(!load('rack_hint_seen')&&deckList.length>1){const h=document.getElementById('hint');h.style.display='flex';setTimeout(()=>h.style.display='none',3600);save('rack_hint_seen',1);}
}
function closeDeck(){document.getElementById('deck').style.display='none';renderTodayView();}
function cardHTML(it,i,total){
  const ex=DB[it.id],cardio=it.sets==null;
  const pb=cardio?`<div><div class="big">${it.reps}</div><div class="lbl">Cardio</div></div>`:`<div><div class="big">${it.sets} × ${it.reps}</div><div class="lbl">Sets × reps</div></div>`;
  const sec=(ex.s||[]).slice(0,2).map(m=>`<span class="tag">${m}</span>`).join('');
  const sh=steps(ex).map(s=>`<li>${s}</li>`).join('');
  return `<div class="media"><img loading="lazy" data-jpg="${imgURL(ex)}" data-gif="${gifURL(ex)}" src="${imgURL(ex)}" onerror="this.style.display='none';this.parentNode.querySelector('.ph').style.display='flex'"><div class="ph" style="display:none">image offline</div><span class="idx mono">${i+1}/${total}</span><span class="stamp done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>Done</span><span class="stamp doing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Doing</span></div>
    <div class="ex-name">${ex.n}</div><div class="ex-tags">${it.inPlan?'<span class="tag plan">★ In plan</span>':''}<span class="tag tgt">${ex.t}</span><span class="tag">${ex.q}</span>${sec}</div>
    <div class="pres ${cardio?'cardio':''}">${pb}<button class="edit" data-edit="${it.id}">Edit</button></div>
    <details class="how"><summary>How to perform <span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg></span></summary><ol>${sh}</ol></details>
    <button class="remove" data-remove="${it.id}">Remove from ${DAYS.find(d=>d.key===curDay).name}</button>`;
}
function renderDeck(){
  deckList=buildList();hydrated=new Set();activeGifIdx=-1;
  const track=document.getElementById('track'),empty=document.getElementById('emptyDeck');
  if(!deckList.length){track.innerHTML='';track.style.display='none';empty.style.display='flex';document.getElementById('navrow').style.display='none';document.getElementById('actions').style.display='none';return;}
  track.style.display='flex';empty.style.display='none';document.getElementById('navrow').style.display='flex';document.getElementById('actions').style.display='flex';
  track.innerHTML=deckList.map((it,i)=>`<div class="card skel" data-i="${i}" data-id="${it.id}"></div>`).join('');
  slots=[...track.querySelectorAll('.card')];buildDots();updateSub();
}
function buildDots(){const n=deckList.length,dots=document.getElementById('dots'),bar=document.getElementById('navbar2');if(n<=12){dots.style.display='flex';bar.style.display='none';dots.innerHTML=deckList.map((it,i)=>`<i data-d="${i}"></i>`).join('');}else{dots.style.display='none';bar.style.display='block';}}
function updateDots(){const st=session[curDay]||{},idx=currentIndex();document.querySelectorAll('#dots i').forEach((el,i)=>{el.classList.toggle('done',st[deckList[i]?.id]==='done');el.classList.toggle('cur',i===idx);});if(document.getElementById('navbar2').style.display!=='none'){const done=deckList.filter(x=>st[x.id]==='done').length;document.querySelector('#navbar2 i').style.width=(done/deckList.length*100)+'%';}document.getElementById('counter').textContent=`${Math.min(idx+1,deckList.length)} / ${deckList.length}`;document.getElementById('arrPrev').disabled=idx<=0;document.getElementById('arrNext').disabled=idx>=deckList.length-1;}
function updateSub(){const ids=workout[curDay]||[],st=session[curDay]||{},done=ids.filter(id=>st[id]==='done').length;document.getElementById('deckSub').textContent=`${done} done · ${ids.length} exercises`;}
function hydrate(i){if(i<0||i>=slots.length||hydrated.has(i))return;const slot=slots[i],it=deckList[i];slot.classList.remove('skel');slot.innerHTML=cardHTML(it,i,deckList.length);const st=session[curDay]||{};slot.classList.toggle('s-done',st[it.id]==='done');slot.classList.toggle('s-doing',st[it.id]==='doing');slot.querySelector('[data-edit]').onclick=()=>openEdit(curDay,it.id);slot.querySelector('[data-remove]').onclick=()=>removeFromWorkout(it.id);hydrated.add(i);}
function dehydrate(i){if(!hydrated.has(i))return;const slot=slots[i];slot.innerHTML='';slot.classList.remove('s-done','s-doing');slot.classList.add('skel');if(activeGifIdx===i)activeGifIdx=-1;hydrated.delete(i);}
function hydrateAround(idx){const W=2;for(let i=idx-W;i<=idx+W;i++)hydrate(i);[...hydrated].forEach(i=>{if(i<idx-W-1||i>idx+W+1)dehydrate(i);});}
function setActiveGif(idx){if(activeGifIdx===idx)return;if(activeGifIdx>=0&&hydrated.has(activeGifIdx)){const im=slots[activeGifIdx]?.querySelector('img');if(im)im.src=im.dataset.jpg;}if(idx>=0&&idx<slots.length&&hydrated.has(idx)){const im=slots[idx]?.querySelector('img');if(im&&im.dataset.gif){im.style.display='block';im.src=im.dataset.gif;}activeGifIdx=idx;}else activeGifIdx=-1;}
function cardWidth(){const c=slots[0];return c?c.getBoundingClientRect().width:window.innerWidth;}
function currentIndex(){return Math.max(0,Math.round(document.getElementById('track').scrollLeft/cardWidth()));}
function currentItem(){const i=currentIndex();return (i>=0&&i<deckList.length)?deckList[i]:null;}
function scrollToCard(i,smooth){i=Math.max(0,Math.min(i,deckList.length-1));document.getElementById('track').scrollTo({left:i*cardWidth(),behavior:smooth===false?'auto':'smooth'});}
function onScrollSettle(){const idx=currentIndex();hydrateAround(idx);setActiveGif(idx);updateActions();updateDots();}
function updateActions(){const it=currentItem(),st=session[curDay]||{},acts=document.getElementById('actions');if(!it){acts.style.visibility='hidden';return;}acts.style.visibility='visible';document.getElementById('btnDoing').classList.toggle('on',st[it.id]==='doing');const done=document.getElementById('btnDone');done.classList.toggle('is-done',st[it.id]==='done');done.querySelector('span').textContent=st[it.id]==='done'?'Done ✓':'Mark done';}
function setStatus(kind){
  const it=currentItem();if(!it)return;if(!session[curDay])session[curDay]={};
  const s=session[curDay],cur=s[it.id];
  if(kind==='doing'){Object.keys(s).forEach(k=>{if(s[k]==='doing')delete s[k];});if(cur!=='doing')s[it.id]='doing';}else{if(cur==='done')delete s[it.id];else s[it.id]='done';}
  persistS();const i=currentIndex(),slot=slots[i];if(slot&&hydrated.has(i)){slot.classList.toggle('s-done',s[it.id]==='done');slot.classList.toggle('s-doing',s[it.id]==='doing');}
  updateActions();updateDots();updateSub();syncHistToday();
  if(kind==='done'&&s[it.id]==='done'){const t=todayStr();if(rest[t]){delete rest[t];persistR();}todayPlan[t]=curDay;persistTP();checkCelebrate();}
}
function checkCelebrate(){const ids=workout[curDay]||[],st=session[curDay]||{};if(ids.length&&ids.every(id=>st[id]==='done')){confetti();toast(DAYS.find(d=>d.key===curDay).name+' complete! 🔥');}}
function confetti(){const c=document.getElementById('confetti');const cols=['#FF6A4D','#7C5CFC','#17B890','#FF5DA2','#F59E0B','#10B981'];for(let i=0;i<28;i++){const s=document.createElement('i');s.style.left=Math.random()*100+'%';s.style.background=cols[i%cols.length];s.style.animationDuration=(0.9+Math.random()*0.8)+'s';s.style.animationDelay=(Math.random()*0.2)+'s';s.style.transform='rotate('+Math.random()*360+'deg)';c.appendChild(s);}setTimeout(()=>{c.innerHTML='';},2300);}
function openEdit(dayKey,id){editCtx={dayKey,id};const p=getPres(dayKey,id),cardio=p.sets==null;document.getElementById('modalName').textContent=DB[id].n;document.getElementById('setsField').style.display=cardio?'none':'block';document.getElementById('repsLabel').textContent=cardio?'Duration / note':'Reps';document.getElementById('setsVal').textContent=p.sets??3;document.getElementById('repsInput').value=p.reps??'';document.getElementById('modal').classList.add('show');}
function closeEdit(){document.getElementById('modal').classList.remove('show');editCtx=null;}
function saveEdit(){if(!editCtx)return;const {dayKey,id}=editCtx,cur=getPres(dayKey,id),cardio=cur.sets==null;if(!pres[dayKey])pres[dayKey]={};pres[dayKey][id]={sets:cardio?null:(parseInt(document.getElementById('setsVal').textContent)||1),reps:document.getElementById('repsInput').value.trim()||cur.reps};persistP();const i=currentIndex();closeEdit();renderDeck();requestAnimationFrame(()=>{scrollToCard(i,false);onScrollSettle();});}
function removeFromWorkout(id){workout[curDay]=(workout[curDay]||[]).filter(x=>x!==id);if(session[curDay])delete session[curDay][id];persistW();persistS();const i=Math.max(0,currentIndex()-1);renderDeck();requestAnimationFrame(()=>{if(deckList.length){scrollToCard(i,false);onScrollSettle();}});}

function wire(){
  let t;document.getElementById('track').addEventListener('scroll',()=>{clearTimeout(t);t=setTimeout(onScrollSettle,90);},{passive:true});
  document.getElementById('navToday').onclick=()=>showTab('today');
  document.getElementById('navLibrary').onclick=()=>showTab('library');
  document.getElementById('navProgress').onclick=()=>showTab('progress');
  document.getElementById('streakStrip').onclick=()=>showTab('progress');
  document.getElementById('scopeRel').onclick=()=>{catScope='rel';catEquip='all';document.getElementById('scopeRel').classList.add('on');document.getElementById('scopeAll').classList.remove('on');document.getElementById('searchInput').placeholder='Search '+DAYS.find(d=>d.key===libSection).name+' exercises…';buildChips();renderCatalog();};
  document.getElementById('scopeAll').onclick=()=>{catScope='all';catEquip='all';document.getElementById('scopeAll').classList.add('on');document.getElementById('scopeRel').classList.remove('on');document.getElementById('searchInput').placeholder='Search all 1,324 exercises…';buildChips();renderCatalog();};
  document.getElementById('searchInput').oninput=e=>{catQuery=e.target.value;renderCatalog();};
  document.getElementById('deckBack').onclick=closeDeck;
  document.getElementById('deckAdd').onclick=()=>{libSection=curDay;closeDeck();showTab('library');};
  document.getElementById('emptyAdd').onclick=()=>{libSection=curDay;closeDeck();showTab('library');};
  document.getElementById('arrPrev').onclick=()=>scrollToCard(currentIndex()-1);
  document.getElementById('arrNext').onclick=()=>scrollToCard(currentIndex()+1);
  document.getElementById('btnDoing').onclick=()=>setStatus('doing');
  document.getElementById('btnDone').onclick=()=>setStatus('done');
  document.getElementById('setsMinus').onclick=()=>{const v=document.getElementById('setsVal');v.textContent=Math.max(1,(parseInt(v.textContent)||1)-1);};
  document.getElementById('setsPlus').onclick=()=>{const v=document.getElementById('setsVal');v.textContent=Math.min(12,(parseInt(v.textContent)||1)+1);};
  document.getElementById('modalCancel').onclick=closeEdit;document.getElementById('modalSave').onclick=saveEdit;
  document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeEdit();};
  document.addEventListener('keydown',e=>{const deckOpen=document.getElementById('deck').style.display==='flex',modalOpen=document.getElementById('modal').classList.contains('show');if(deckOpen&&!modalOpen){if(e.key==='ArrowRight')scrollToCard(currentIndex()+1);if(e.key==='ArrowLeft')scrollToCard(currentIndex()-1);if(e.key==='Enter')setStatus('done');if(e.key==='Escape')closeDeck();}});
  window.addEventListener('resize',()=>{if(document.getElementById('deck').style.display==='flex'&&deckList.length){const i=currentIndex();scrollToCard(i,false);}});
}
init();
</script>
</body>
</html>
