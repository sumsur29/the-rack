-Bn6TXyO.jpg","gif":"videos/0735-Bn6TXyO.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3679","n":"sit-up with arms on chest","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/3679-6ZCiYWQ.jpg","gif":"videos/3679-6ZCiYWQ.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Cross your arms over your chest. Engaging your abs, lift your upper body off the ground towards your knees. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3361","n":"skater hops","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","glutes"],"img":"images/3361-zfNHMN9.jpg","gif":"videos/3361-zfNHMN9.gif","h":"Stand with your feet shoulder-width apart. Bend your knees slightly and jump to the right, landing on your right foot. As you land, swing your left leg behind your right leg and tap the ground with your left toes. Immediately jump to the left, landing on your left foot. As you land, swing your right leg behind your left leg and tap the ground with your right toes. Continue alternating sides, jumping and tapping the ground with each leg. Repeat for the desired number of repetitions."},{"i":"2142","n":"ski ergometer","b":"upper arms","q":"skierg machine","t":"triceps","s":["shoulders","forearms"],"img":"images/2142-vpQaQkH.jpg","gif":"videos/2142-vpQaQkH.gif","h":"Adjust the seat height and footrests to a comfortable position. Grasp the handles with an overhand grip, palms facing down. Sit up straight with your feet flat on the footrests. Extend your arms straight out in front of you, keeping your elbows slightly bent. Engage your triceps and push the handles down towards your thighs. Pause for a moment at the bottom, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"3671","n":"ski step","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","glutes"],"img":"images/3671-5MRH8H2.jpg","gif":"videos/3671-5MRH8H2.gif","h":"Stand with your feet shoulder-width apart. Bend your knees slightly and keep your back straight. Jump to the right, landing on your right foot while swinging your left leg behind your right leg. Immediately jump to the left, landing on your left foot while swinging your right leg behind your left leg. Continue alternating jumps from side to side, mimicking a skiing motion. Repeat for the desired number of repetitions."},{"i":"3304","n":"skin the cat","b":"back","q":"body weight","t":"upper back","s":["shoulders","core"],"img":"images/3304-MSfvriJ.jpg","gif":"videos/3304-MSfvriJ.gif","h":"Start by hanging from a bar with your arms fully extended and your body relaxed. Engage your core and lift your legs up, bringing your knees towards your chest. Continue to lift your legs up and over your head, allowing your body to pass through the arms. Once your legs are fully extended over your head, begin to lower them back down towards the starting position. As you lower your legs, allow your body to pass back through the arms until you are hanging with your arms fully extended again. Repeat for the desired number of repetitions."},{"i":"1425","n":"sled 45 degrees one leg press","b":"upper legs","q":"sled machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1425-WWD6FzI.jpg","gif":"videos/1425-WWD6FzI.gif","h":"Adjust the sled machine to a 45-degree angle. Sit on the sled machine with your back against the pad and your feet on the footplate. Place one foot on the footplate and extend your leg, pushing the sled away from you. Slowly bend your knee and lower the sled back to the starting position. Repeat with the other leg. Continue alternating legs for the desired number of repetitions."},{"i":"0738","n":"sled 45в° calf press","b":"lower legs","q":"sled machine","t":"calves","s":["hamstrings"],"img":"images/0738-qCNVnaU.jpg","gif":"videos/0738-qCNVnaU.gif","h":"Adjust the sled machine to a 45-degree angle. Place your feet on the sled platform with your toes pointing forward. Push the sled platform away from you by extending your ankles and calves. Pause for a moment at the top, then slowly lower the sled platform back to the starting position. Repeat for the desired number of repetitions."},{"i":"0739","n":"sled 45в° leg press","b":"upper legs","q":"sled machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0739-10Z2DXU.jpg","gif":"videos/0739-10Z2DXU.gif","h":"Adjust the seat and footplate of the sled machine to a comfortable position. Sit on the sled machine with your back against the backrest and your feet shoulder-width apart on the footplate. Grip the handles on the sides of the seat for stability. Push the footplate away from your body by extending your legs, keeping your heels on the footplate. Continue pushing until your legs are almost fully extended, but without locking your knees. Pause for a moment at the top of the movement, then slowly lower the footplate back towards your body by bending your knees. Repeat for the desired number of repetitions."},{"i":"1464","n":"sled 45в° leg press (back pov)","b":"upper legs","q":"sled machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1464-yn2lLSI.jpg","gif":"videos/1464-yn2lLSI.gif","h":"Adjust the seat of the sled machine so that your knees are at a 45-degree angle. Sit on the sled machine with your back against the backrest and your feet shoulder-width apart on the footplate. Grip the handles on the sides of the seat for stability. Push the footplate away from your body by extending your legs, keeping your heels on the footplate. Pause for a moment at the fully extended position. Slowly bend your knees and lower the footplate back towards your body, controlling the movement. Repeat for the desired number of repetitions."},{"i":"1463","n":"sled 45° leg press (side pov)","b":"upper legs","q":"sled machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1463-2Qh2J1e.jpg","gif":"videos/1463-2Qh2J1e.gif","h":"Adjust the seat of the sled machine so that your knees are at a 90-degree angle when your feet are on the footplate. Sit on the sled machine with your back flat against the backrest and your feet shoulder-width apart on the footplate. Grip the handles on the sides of the seat for stability. Push against the footplate to extend your legs, straightening them completely. Pause for a moment at the top, then slowly bend your knees to lower the footplate back to the starting position. Repeat for the desired number of repetitions."},{"i":"0740","n":"sled 45в° leg wide press","b":"upper legs","q":"sled machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0740-tj41Nu6.jpg","gif":"videos/0740-tj41Nu6.gif","h":"Adjust the sled machine to a 45-degree angle. Sit on the sled machine with your back against the pad and your feet on the foot platform. Position your feet wider than shoulder-width apart. Push against the foot platform to extend your legs and straighten your knees. Pause for a moment at the end of the movement, then slowly bend your knees to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1391","n":"sled calf press on leg press","b":"lower legs","q":"sled machine","t":"calves","s":["hamstrings","quadriceps"],"img":"images/1391-ykHcWme.jpg","gif":"videos/1391-ykHcWme.gif","h":"Adjust the seat of the leg press machine so that your knees are slightly bent when your feet are on the sled. Place your feet shoulder-width apart on the sled, with your toes pointing forward. Release the safety handles and push the sled away from you by extending your knees and ankles. Pause for a moment at the top of the movement, then slowly lower the sled back down by bending your knees and ankles. Repeat for the desired number of repetitions."},{"i":"0741","n":"sled closer hack squat","b":"upper legs","q":"sled machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0741-gf3ZjB9.jpg","gif":"videos/0741-gf3ZjB9.gif","h":"Adjust the sled machine to a comfortable weight and position yourself with your back against the pad. Place your feet shoulder-width apart on the platform, toes slightly pointed outwards. Grip the handles on the sides of the machine for stability. Engage your core and slowly lower your body by bending your knees and hips, keeping your back straight. Continue lowering until your thighs are parallel to the ground or slightly below. Pause for a moment at the bottom, then push through your heels to extend your legs and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0742","n":"sled forward angled calf raise","b":"lower legs","q":"sled machine","t":"calves","s":["hamstrings","glutes"],"img":"images/0742-XDOiFns.jpg","gif":"videos/0742-XDOiFns.gif","h":"Adjust the sled machine to a comfortable weight and position yourself on the machine with your toes on the platform and your heels hanging off. Place your hands on the handles or the sides of the machine for support. Engage your calves and slowly raise your heels as high as possible, pushing against the resistance of the sled. Pause for a moment at the top of the movement, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0743","n":"sled hack squat","b":"upper legs","q":"sled machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0743-Qa55kX1.jpg","gif":"videos/0743-Qa55kX1.gif","h":"Adjust the sled machine to a comfortable position for your height. Stand with your feet shoulder-width apart on the platform, toes slightly pointed outwards. Hold onto the handles or bars for stability. Lower your body by bending your knees and hips, keeping your back straight and chest up. Continue lowering until your thighs are parallel to the ground or slightly below. Pause for a moment, then push through your heels to raise your body back up to the starting position. Repeat for the desired number of repetitions."},{"i":"2334","n":"sled lying calf press","b":"lower legs","q":"sled machine","t":"calves","s":["hamstrings","glutes"],"img":"images/2334-g376LuL.jpg","gif":"videos/2334-g376LuL.gif","h":"Adjust the sled machine to a comfortable weight. Sit on the sled machine with your back against the pad and your feet on the platform. Place your toes and the balls of your feet on the edge of the platform, with your heels hanging off. Push the platform away from you by extending your ankles, keeping your knees slightly bent. Continue pushing until your calves are fully contracted. Hold the contraction for a moment, then slowly lower the platform back to the starting position. Repeat for the desired number of repetitions."},{"i":"0744","n":"sled lying squat","b":"upper legs","q":"sled machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0744-9n2149Z.jpg","gif":"videos/0744-9n2149Z.gif","h":"Adjust the sled machine to a comfortable weight. Lie on your back on the sled machine with your feet on the footplate. Position your feet shoulder-width apart and slightly angled outwards. Grip the handles of the sled machine for stability. Engage your glutes and core muscles. Push through your heels and extend your legs to lift the sled. Lower the sled back down by bending your knees and hips. Repeat for the desired number of repetitions."},{"i":"1392","n":"sled one leg calf press on leg press","b":"lower legs","q":"sled machine","t":"calves","s":["hamstrings","glutes"],"img":"images/1392-u0pLNgz.jpg","gif":"videos/1392-u0pLNgz.gif","h":"Adjust the seat of the leg press machine so that your knees are slightly bent when your feet are on the sled. Sit on the machine with your back against the backrest and your feet on the sled, shoulder-width apart. Place your toes and the balls of your feet on the sled, keeping your heels off. Push the sled forward by extending your ankles, keeping your knees slightly bent. Pause for a moment at the top, then slowly lower the sled back down by flexing your ankles. Repeat for the desired number of repetitions."},{"i":"1496","n":"sledge hammer","b":"waist","q":"hammer","t":"abs","s":["forearms","shoulders"],"img":"images/1496-REXmfVC.jpg","gif":"videos/1496-REXmfVC.gif","h":"Stand with your feet shoulder-width apart and hold the sledge hammer with both hands. Engage your core and keep your back straight. Swing the sledge hammer down towards the ground, using your core and upper body strength. As you swing down, pivot your hips and transfer the force to the hammer. Repeat for the desired number of repetitions."},{"i":"0746","n":"smith back shrug","b":"back","q":"smith machine","t":"traps","s":["shoulders"],"img":"images/0746-MzNnwx9.jpg","gif":"videos/0746-MzNnwx9.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Grasp the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Keep your arms straight and allow the barbell to hang in front of your thighs. Lift your shoulders straight up towards your ears, squeezing your traps at the top. Hold for a moment, then lower your shoulders back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0747","n":"smith behind neck press","b":"shoulders","q":"smith machine","t":"delts","s":["triceps","upper back"],"img":"images/0747-Gpn4ADc.jpg","gif":"videos/0747-Gpn4ADc.gif","h":"Adjust the seat height of the smith machine so that the bar is at shoulder level. Stand with your feet shoulder-width apart and your knees slightly bent. Grasp the bar with an overhand grip, slightly wider than shoulder-width apart. Lift the bar off the rack and step back, maintaining a stable stance. Lower the bar down to the back of your neck, keeping your elbows pointing forward. Press the bar up overhead until your arms are fully extended. Pause for a moment at the top, then slowly lower the bar back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0748","n":"smith bench press","b":"chest","q":"smith machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/0748-trqKQv2.jpg","gif":"videos/0748-trqKQv2.gif","h":"Adjust the height of the smith machine bar to chest level. Lie flat on the bench with your feet firmly planted on the ground. Grip the bar with an overhand grip slightly wider than shoulder-width apart. Unrack the bar and lower it towards your chest, keeping your elbows tucked in. Pause for a moment when the bar touches your chest. Push the bar back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0749","n":"smith bent knee good morning","b":"upper legs","q":"smith machine","t":"glutes","s":["hamstrings","lower back"],"img":"images/0749-1bQkKZK.jpg","gif":"videos/0749-1bQkKZK.gif","h":"Start by standing with your feet shoulder-width apart, toes pointing forward. Place the barbell across your upper back, resting it on your traps. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Lower your torso until it is parallel to the ground, feeling a stretch in your hamstrings. Engage your glutes and hamstrings to raise your torso back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1359","n":"smith bent over row","b":"back","q":"smith machine","t":"upper back","s":["biceps","forearms"],"img":"images/1359-ZX9UZmj.jpg","gif":"videos/1359-ZX9UZmj.gif","h":"Set up the smith machine with the bar at hip height. Stand facing the bar with your feet shoulder-width apart. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Grasp the bar with an overhand grip, hands slightly wider than shoulder-width apart. Pull the bar towards your lower chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the bar back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0750","n":"smith chair squat","b":"upper legs","q":"smith machine","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0750-Gu2rNJd.jpg","gif":"videos/0750-Gu2rNJd.gif","h":"Adjust the height of the smith machine bar to a comfortable position. Stand with your feet shoulder-width apart, toes slightly turned out. Place the barbell across your upper back, resting it on your traps. Engage your core and keep your chest up as you slowly lower your body by bending your knees and hips. Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0751","n":"smith close-grip bench press","b":"upper arms","q":"smith machine","t":"triceps","s":["chest","shoulders"],"img":"images/0751-WcHl7ru.jpg","gif":"videos/0751-WcHl7ru.gif","h":"Adjust the seat height and position yourself on the bench with your feet flat on the ground. Grasp the barbell with a close grip, slightly narrower than shoulder-width apart. Lower the barbell towards your chest, keeping your elbows close to your body. Pause for a moment at the bottom, then push the barbell back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0752","n":"smith deadlift","b":"upper legs","q":"smith machine","t":"glutes","s":["hamstrings","quadriceps","lower back"],"img":"images/0752-UfePqpx.jpg","gif":"videos/0752-UfePqpx.gif","h":"Set up the smith machine with the bar at hip height. Stand with your feet shoulder-width apart, toes pointing slightly outward. Bend at the hips and knees, keeping your back straight and chest up, and grip the bar with an overhand grip slightly wider than shoulder-width apart. Engage your core and lift the bar by extending your hips and knees, keeping the bar close to your body. Stand up straight, fully extending your hips and knees. Lower the bar back down by bending at the hips and knees, maintaining control and keeping your back straight. Repeat for the desired number of repetitions."},{"i":"0753","n":"smith decline bench press","b":"chest","q":"smith machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/0753-ETZfAbZ.jpg","gif":"videos/0753-ETZfAbZ.gif","h":"Adjust the decline bench to the desired angle. Lie down on the bench with your feet secured under the foot pads. Grasp the barbell with an overhand grip slightly wider than shoulder-width apart. Unrack the barbell and lower it slowly towards your chest, keeping your elbows tucked in. Pause for a moment at the bottom, then push the barbell back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0754","n":"smith decline reverse-grip press","b":"chest","q":"smith machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/0754-MY9P1WA.jpg","gif":"videos/0754-MY9P1WA.gif","h":"Adjust the smith machine to a decline position. Lie down on the bench with your feet secured under the foot pads. Grasp the barbell with a reverse grip, hands slightly wider than shoulder-width apart. Unrack the barbell and lower it towards your chest, keeping your elbows tucked in. Pause for a moment at the bottom, then push the barbell back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1433","n":"smith front squat (clean grip)","b":"upper legs","q":"smith machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1433-lFhb2Rw.jpg","gif":"videos/1433-lFhb2Rw.gif","h":"Set up the smith machine with the barbell at shoulder height. Stand facing the barbell with your feet shoulder-width apart. Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart. Step back and position the barbell on your front shoulders, resting it on your collarbone and deltoids. Keep your chest up, back straight, and core engaged. Lower your body by bending at the knees and hips, as if sitting back into a chair. Continue lowering until your thighs are parallel to the ground or slightly below. Pause for a moment, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"3281","n":"smith full squat","b":"upper legs","q":"smith machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3281-NNoHCEA.jpg","gif":"videos/3281-NNoHCEA.gif","h":"Set up the smith machine with the barbell at shoulder height. Stand with your feet shoulder-width apart, toes slightly turned out. Step under the bar and position it across your upper back, resting on your traps. Grip the bar with your hands slightly wider than shoulder-width apart. Unrack the bar and take a step back, maintaining a stable stance. Keeping your chest up and core engaged, initiate the squat by pushing your hips back and bending your knees. Lower your body until your thighs are parallel to the ground, or as low as your flexibility allows. Pause for a moment at the bottom, then drive through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0755","n":"smith hack squat","b":"upper legs","q":"smith machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0755-ZuPXtCK.jpg","gif":"videos/0755-ZuPXtCK.gif","h":"Adjust the barbell on the smith machine to an appropriate height for your body. Stand with your feet shoulder-width apart, toes slightly pointed outwards. Position yourself under the barbell, resting it on your upper traps and shoulders. Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart. Engage your core and keep your chest up as you unrack the barbell. Take a step back and position your feet slightly wider than shoulder-width apart. Bend your knees and lower your body down, keeping your chest up and back straight. Continue descending until your thighs are parallel to the ground or slightly below. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0756","n":"smith hip raise","b":"waist","q":"smith machine","t":"abs","s":["glutes","hamstrings"],"img":"images/0756-CqhoytW.jpg","gif":"videos/0756-CqhoytW.gif","h":"Position yourself on the smith machine with your back against the pad and your feet shoulder-width apart. Place your hands on the barbell, slightly wider than shoulder-width apart. Engage your core and glutes, then push through your heels to raise your hips off the ground. Continue lifting until your body forms a straight line from your knees to your shoulders. Hold for a moment at the top, then slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0757","n":"smith incline bench press","b":"chest","q":"smith machine","t":"pectorals","s":["shoulders","triceps"],"img":"images/0757-5v7KYld.jpg","gif":"videos/0757-5v7KYld.gif","h":"Adjust the bench to a 30-45 degree incline. Sit on the bench with your back flat against the pad and feet firmly on the ground. Grasp the barbell with an overhand grip slightly wider than shoulder-width apart. Unrack the barbell and lower it slowly towards your upper chest, keeping your elbows slightly tucked in. Pause for a moment at the bottom, then push the barbell back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0758","n":"smith incline reverse-grip press","b":"chest","q":"smith machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/0758-78VqWQK.jpg","gif":"videos/0758-78VqWQK.gif","h":"Adjust the seat of the smith machine to a comfortable incline angle. Sit on the machine with your back against the pad and your feet flat on the ground. Grasp the bar with an overhand grip that is slightly wider than shoulder-width apart. Unrack the bar and lower it slowly towards your chest, keeping your elbows tucked in. Pause for a moment when the bar is just above your chest. Push the bar back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0759","n":"smith incline shoulder raises","b":"chest","q":"smith machine","t":"serratus anterior","s":["deltoids","trapezius"],"img":"images/0759-ayAHcEm.jpg","gif":"videos/0759-ayAHcEm.gif","h":"Adjust the smith machine to an incline position. Stand facing the machine with your feet shoulder-width apart. Grasp the bar with an overhand grip, slightly wider than shoulder-width apart. Keep your back straight and core engaged. Raise the barbell up towards the ceiling, leading with your elbows. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0760","n":"smith leg press","b":"upper legs","q":"smith machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0760-7zdxRTl.jpg","gif":"videos/0760-7zdxRTl.gif","h":"Adjust the seat and footplate of the smith machine to a comfortable position. Sit on the machine with your back against the backrest and your feet shoulder-width apart on the footplate. Grasp the handles or sides of the machine for stability. Push the footplate away from you by extending your legs, keeping your back against the backrest. Pause for a moment at the fully extended position. Slowly bend your knees and lower the footplate back towards you, returning to the starting position. Repeat for the desired number of repetitions."},{"i":"1434","n":"smith low bar squat","b":"upper legs","q":"smith machine","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1434-RGLscZM.jpg","gif":"videos/1434-RGLscZM.gif","h":"Set up the smith machine with the barbell at a height that allows you to comfortably rest it on your upper back. Stand with your feet shoulder-width apart, toes slightly turned outwards. Step under the bar and position it across your upper back, resting it on your traps. Grip the bar with your hands slightly wider than shoulder-width apart. Unrack the bar by straightening your legs and stepping back from the rack. Take a deep breath and brace your core. Initiate the squat by pushing your hips back and bending your knees. Lower your body until your thighs are parallel to the ground or slightly below. Keep your chest up and your back straight throughout the movement. Drive through your heels to stand back up, extending your hips and knees. Repeat for the desired number of repetitions."},{"i":"1683","n":"smith machine bicep curl","b":"upper arms","q":"smith machine","t":"biceps","s":["forearms"],"img":"images/1683-zILLZ98.jpg","gif":"videos/1683-zILLZ98.gif","h":"Adjust the height of the smith machine bar to be at waist level. Stand facing the smith machine with your feet shoulder-width apart. Grasp the bar with an underhand grip, hands slightly wider than shoulder-width apart. Keep your elbows close to your sides and your upper arms stationary. Exhale and curl the bar up towards your shoulders, contracting your biceps. Pause for a moment at the top of the movement, squeezing your biceps. Inhale and slowly lower the bar back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1625","n":"smith machine decline close grip bench press","b":"upper arms","q":"smith machine","t":"triceps","s":["chest","shoulders"],"img":"images/1625-yB9SvIF.jpg","gif":"videos/1625-yB9SvIF.gif","h":"Adjust the bench on the smith machine to a decline position. Lie down on the bench with your feet firmly planted on the ground. Grasp the barbell with a close grip, slightly narrower than shoulder-width apart. Unrack the barbell and lower it slowly towards your chest, keeping your elbows close to your body. Pause for a moment when the barbell is just above your chest. Push the barbell back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"1752","n":"smith machine incline tricep extension","b":"upper arms","q":"smith machine","t":"triceps","s":["shoulders"],"img":"images/1752-o8aOcrz.jpg","gif":"videos/1752-o8aOcrz.gif","h":"Adjust the seat of the smith machine so that the bar is at shoulder height. Sit on the bench with your back against the pad and your feet flat on the ground. Grasp the bar with an overhand grip, slightly wider than shoulder-width apart. Extend your arms fully, lifting the bar off the rack and holding it directly above your chest. Lower the bar slowly towards your forehead, keeping your elbows close to your head. Pause for a moment at the bottom, then push the bar back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1626","n":"smith machine reverse decline close grip bench press","b":"chest","q":"smith machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/1626-QyO6Uma.jpg","gif":"videos/1626-QyO6Uma.gif","h":"Adjust the smith machine to a decline position. Lie down on the bench with your feet secured under the foot pads. Grasp the barbell with a close grip, slightly narrower than shoulder-width apart. Unrack the barbell and lower it slowly towards your chest, keeping your elbows tucked in. Pause for a moment at the bottom, then push the barbell back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0761","n":"smith narrow row","b":"back","q":"smith machine","t":"upper back","s":["biceps","rear deltoids"],"img":"images/0761-JGKowMS.jpg","gif":"videos/0761-JGKowMS.gif","h":"Adjust the seat height and position yourself on the machine with your feet flat on the floor. Grasp the handles with an overhand grip, slightly narrower than shoulder-width apart. Keep your back straight and your chest up as you pull the handles towards your body, squeezing your shoulder blades together. Pause for a moment at the peak of the movement, then slowly release the handles back to the starting position. Repeat for the desired number of repetitions."},{"i":"1360","n":"smith one arm row","b":"back","q":"smith machine","t":"upper back","s":["biceps","forearms"],"img":"images/1360-Q4DSJPC.jpg","gif":"videos/1360-Q4DSJPC.gif","h":"Adjust the height of the smith machine bar to waist level. Stand facing the smith machine with your feet shoulder-width apart. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Grasp the bar with one hand using an overhand grip, with your palm facing down. Keep your elbow close to your body and pull the bar towards your waist, squeezing your shoulder blades together. Pause for a moment at the top of the movement, then slowly lower the bar back to the starting position. Repeat for the desired number of repetitions, then switch to the other arm."},{"i":"1393","n":"smith one leg floor calf raise","b":"lower legs","q":"smith machine","t":"calves","s":["hamstrings","glutes"],"img":"images/1393-9GXrTE6.jpg","gif":"videos/1393-9GXrTE6.gif","h":"Position yourself on the floor under the smith machine bar, facing away from the machine. Place the balls of your feet on a raised surface, such as a weight plate or block. Position the smith machine bar across your lower legs, just above your ankles. Hold onto the bar with your hands for stability. Raise your heels off the ground by extending your ankles, lifting your body up. Pause at the top of the movement, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0762","n":"smith rear delt row","b":"shoulders","q":"smith machine","t":"delts","s":["trapezius","rhomboids","biceps"],"img":"images/0762-nFUwqG6.jpg","gif":"videos/0762-nFUwqG6.gif","h":"Adjust the seat height and position yourself on the machine with your chest against the pad and your feet flat on the ground. Grasp the handles with an overhand grip, slightly wider than shoulder-width apart. Keep your back straight and your core engaged as you pull the handles towards your chest, squeezing your shoulder blades together. Pause for a moment at the top of the movement, then slowly release the handles back to the starting position. Repeat for the desired number of repetitions."},{"i":"0763","n":"smith reverse calf raises","b":"lower legs","q":"smith machine","t":"calves","s":["hamstrings"],"img":"images/0763-ywaNfuh.jpg","gif":"videos/0763-ywaNfuh.gif","h":"Adjust the smith machine bar to a height just below your shoulders. Stand facing the bar with your feet hip-width apart and toes pointing forward. Place the balls of your feet on the edge of a step or platform, with your heels hanging off. Hold onto the bar for support, keeping your back straight and core engaged. Raise your heels as high as possible, lifting your body weight onto the balls of your feet. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1394","n":"smith reverse calf raises","b":"lower legs","q":"smith machine","t":"calves","s":["hamstrings"],"img":"images/1394-Lsqrgh4.jpg","gif":"videos/1394-Lsqrgh4.gif","h":"Adjust the smith machine bar to a height just below your shoulders. Stand facing the bar with your feet hip-width apart and toes pointing forward. Place the balls of your feet on the edge of a step or platform, with your heels hanging off. Hold onto the bar for support. Raise your heels as high as possible, lifting your body up onto your toes. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1361","n":"smith reverse grip bent over row","b":"back","q":"smith machine","t":"upper back","s":["biceps","forearms"],"img":"images/1361-aaxA3cm.jpg","gif":"videos/1361-aaxA3cm.gif","h":"Set up the smith machine with the bar at hip height. Stand facing the bar with your feet shoulder-width apart. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Grasp the bar with an underhand grip, hands shoulder-width apart. Pull the bar towards your lower chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the bar back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0764","n":"smith reverse-grip press","b":"chest","q":"smith machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/0764-zK8Fu1W.jpg","gif":"videos/0764-zK8Fu1W.gif","h":"Adjust the height of the smith machine bar to chest level. Stand facing the bar with your feet shoulder-width apart. Grasp the bar with an overhand grip, hands slightly wider than shoulder-width apart. Step back and position yourself with a slight bend in your knees. Keep your chest up and core engaged throughout the exercise. Lower the bar towards your chest, keeping your elbows tucked in. Pause for a moment at the bottom, then push the bar back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1395","n":"smith seated one leg calf raise","b":"lower legs","q":"smith machine","t":"calves","s":["hamstrings"],"img":"images/1395-0S75mYG.jpg","gif":"videos/1395-0S75mYG.gif","h":"Sit on the machine with your back against the pad and your feet on the footrest. Place one leg on the footrest and keep the other leg off the footrest. Using your calf muscles, raise your heel as high as possible. Pause for a moment at the top, then slowly lower your heel back down to the starting position. Repeat for the desired number of repetitions, then switch legs and repeat."},
