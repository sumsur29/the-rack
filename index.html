ists straight. Slowly lower the barbell towards your forehead by bending your elbows, keeping your upper arms stationary. Pause for a moment at the bottom, then extend your arms back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0081","n":"barbell reverse preacher curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/0081-4LIG9xr.jpg","gif":"videos/0081-4LIG9xr.gif","h":"Sit on a preacher bench with your chest against the pad and your arms extended straight down, holding a barbell with an overhand grip. Keeping your upper arms stationary, exhale and curl the barbell upward while contracting your biceps. Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0082","n":"barbell reverse wrist curl","b":"lower arms","q":"barbell","t":"forearms","s":["biceps","brachialis"],"img":"images/0082-LsZkfU6.jpg","gif":"videos/0082-LsZkfU6.gif","h":"Sit on a bench with your feet flat on the ground and hold a barbell with an overhand grip, palms facing down. Rest your forearms on your thighs, allowing your wrists to hang off the edge. Slowly curl your wrists upward, bringing the barbell towards your body. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0084","n":"barbell rollerout","b":"waist","q":"barbell","t":"abs","s":["lower back"],"img":"images/0084-7M66AVi.jpg","gif":"videos/0084-7M66AVi.gif","h":"Kneel on the floor and hold a barbell with both hands, shoulder-width apart. Roll the barbell forward, extending your arms and keeping your core engaged. Continue rolling forward until your body is fully extended and your arms are overhead. Pause for a moment, then slowly roll the barbell back towards your knees, maintaining control. Repeat for the desired number of repetitions."},{"i":"0083","n":"barbell rollerout from bench","b":"waist","q":"barbell","t":"abs","s":["shoulders","triceps"],"img":"images/0083-Gxg9lDc.jpg","gif":"videos/0083-Gxg9lDc.gif","h":"Start by kneeling on the floor with a barbell placed on a bench in front of you. Grasp the barbell with an overhand grip, slightly wider than shoulder-width apart. Keeping your core engaged and your back straight, slowly roll the barbell forward, extending your arms in front of you. Continue rolling the barbell forward until your body is fully extended and your arms are overhead. Pause for a moment at the fully extended position, then slowly roll the barbell back towards your body, returning to the starting position. Repeat for the desired number of repetitions."},{"i":"0085","n":"barbell romanian deadlift","b":"upper legs","q":"barbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/0085-wQ2c4XD.jpg","gif":"videos/0085-wQ2c4XD.gif","h":"Stand with your feet shoulder-width apart and your toes pointing forward. Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Bend at the hips, keeping your back straight and your knees slightly bent. Lower the barbell towards the ground, keeping it close to your body. Feel the stretch in your hamstrings as you lower the barbell. Once you feel a stretch in your hamstrings, push your hips forward and stand up straight. Squeeze your glutes at the top of the movement. Lower the barbell back down to the starting position and repeat for the desired number of repetitions."},{"i":"0086","n":"barbell seated behind head military press","b":"shoulders","q":"barbell","t":"delts","s":["triceps","upper back"],"img":"images/0086-ngPpyRS.jpg","gif":"videos/0086-ngPpyRS.gif","h":"Sit on a bench with your back straight and feet flat on the ground. Hold the barbell with an overhand grip, slightly wider than shoulder-width apart. Lift the barbell off the rack and bring it down to shoulder level, behind your head. Press the barbell upward until your arms are fully extended. Lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0087","n":"barbell seated bradford rocky press","b":"shoulders","q":"barbell","t":"delts","s":["triceps","upper back"],"img":"images/0087-0dCyly0.jpg","gif":"videos/0087-0dCyly0.gif","h":"Sit on a bench with your back straight and feet flat on the ground. Hold the barbell with an overhand grip, slightly wider than shoulder-width apart. Lift the barbell to shoulder height, keeping your elbows slightly bent and pointing forward. Press the barbell overhead, fully extending your arms. Lower the barbell back to shoulder height and repeat for the desired number of repetitions."},{"i":"0088","n":"barbell seated calf raise","b":"lower legs","q":"barbell","t":"calves","s":["hamstrings","quadriceps"],"img":"images/0088-ktsFQAZ.jpg","gif":"videos/0088-ktsFQAZ.gif","h":"Sit on a bench with your feet flat on the floor and a barbell resting on your thighs. Place the balls of your feet on a raised platform, such as a block or step. Position the barbell across your thighs and hold it securely with your hands. Keeping your back straight and your core engaged, lift your heels off the ground by extending your ankles. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1371","n":"barbell seated calf raise","b":"lower legs","q":"barbell","t":"calves","s":["hamstrings"],"img":"images/1371-ipvgBnC.jpg","gif":"videos/1371-ipvgBnC.gif","h":"Sit on a bench with your feet flat on the floor and a barbell resting on your thighs. Place the balls of your feet on a raised platform, such as a block or step. Lower your heels as far as possible, feeling a stretch in your calves. Raise your heels as high as possible, contracting your calves. Repeat for the desired number of repetitions."},{"i":"1718","n":"barbell seated close grip behind neck triceps extension","b":"upper arms","q":"barbell","t":"triceps","s":["shoulders"],"img":"images/1718-4CBIBOM.jpg","gif":"videos/1718-4CBIBOM.gif","h":"Sit on a bench with your back straight and feet flat on the ground. Hold the barbell with a close grip behind your neck, palms facing forward. Keep your elbows close to your head and slowly lower the barbell towards the back of your head. Pause for a moment, then extend your arms back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0089","n":"barbell seated close-grip concentration curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/0089-1V1gj1u.jpg","gif":"videos/0089-1V1gj1u.gif","h":"Sit on a bench with your feet flat on the floor and hold a barbell with an underhand grip, hands shoulder-width apart. Rest your upper arms against your inner thighs, just above your knees, and let the barbell hang down in front of you. Keeping your upper arms stationary, exhale and curl the barbell up towards your shoulders, contracting your biceps. Hold the contracted position for a brief pause, then inhale and slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0090","n":"barbell seated good morning","b":"upper legs","q":"barbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/0090-d960PgE.jpg","gif":"videos/0090-d960PgE.gif","h":"Sit on a bench with your feet flat on the ground and a barbell resting on your upper back. Keep your back straight and your chest up. Slowly hinge forward at the hips, lowering your torso towards the ground. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0091","n":"barbell seated overhead press","b":"shoulders","q":"barbell","t":"delts","s":["triceps","upper back"],"img":"images/0091-kTbSH9h.jpg","gif":"videos/0091-kTbSH9h.gif","h":"Sit on a bench with your back straight and feet flat on the ground. Hold the barbell with an overhand grip, slightly wider than shoulder-width apart. Lift the barbell off the rack and bring it to shoulder level, with your elbows bent and palms facing forward. Press the barbell overhead by extending your arms fully. Pause for a moment at the top, then slowly lower the barbell back to shoulder level. Repeat for the desired number of repetitions."},{"i":"0092","n":"barbell seated overhead triceps extension","b":"upper arms","q":"barbell","t":"triceps","s":["shoulders"],"img":"images/0092-5uFK1xr.jpg","gif":"videos/0092-5uFK1xr.gif","h":"Sit on a bench with your back straight and feet flat on the ground. Hold a barbell with an overhand grip, hands shoulder-width apart, and raise it overhead. Lower the barbell behind your head by bending your elbows, keeping your upper arms close to your head. Pause for a moment, then extend your arms to raise the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0094","n":"barbell seated twist","b":"waist","q":"barbell","t":"abs","s":["obliques","lower back"],"img":"images/0094-dFSNDOA.jpg","gif":"videos/0094-dFSNDOA.gif","h":"Sit on a flat bench with your feet flat on the ground and your knees bent. Hold a barbell with both hands in front of your chest, keeping your elbows slightly bent. Engage your core and slowly twist your torso to one side, keeping your back straight. Pause for a moment at the end of the twist, then slowly rotate back to the starting position. Repeat the twist to the other side. Continue alternating sides for the desired number of repetitions."},{"i":"0095","n":"barbell shrug","b":"back","q":"barbell","t":"traps","s":["shoulders"],"img":"images/0095-dG7tG5y.jpg","gif":"videos/0095-dG7tG5y.gif","h":"Stand with your feet shoulder-width apart and hold a barbell in front of you with an overhand grip. Keep your arms straight and your back straight throughout the exercise. Lift your shoulders up towards your ears as high as possible, squeezing your traps at the top. Hold for a moment, then slowly lower your shoulders back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0096","n":"barbell side bent v. 2","b":"waist","q":"barbell","t":"abs","s":["obliques","lower back"],"img":"images/0096-i4JkUaL.jpg","gif":"videos/0096-i4JkUaL.gif","h":"Stand with your feet shoulder-width apart and hold a barbell with both hands, palms facing down. Keep your back straight and core engaged throughout the exercise. Slowly bend your torso to the right side, lowering the barbell towards your right knee. Pause for a moment, then return to the starting position. Repeat the movement on the left side. Continue alternating sides for the desired number of repetitions."},{"i":"0098","n":"barbell side split squat","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0098-W31mMjd.jpg","gif":"videos/0098-W31mMjd.gif","h":"Stand with your feet wider than shoulder-width apart, toes pointing slightly outward. Hold a barbell across your upper back, resting it on your traps. Engage your core and keep your chest up as you lower your body down into a squat position, bending at the knees and hips. As you lower, push your knees out to the sides and keep your weight on your heels. Lower until your thighs are parallel to the ground, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0097","n":"barbell side split squat v. 2","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0097-HUEqZ1y.jpg","gif":"videos/0097-HUEqZ1y.gif","h":"Stand with your feet wider than shoulder-width apart, toes pointing slightly outwards. Hold a barbell across your upper back, resting it on your shoulders. Take a big step to the side with your right foot, keeping your left foot planted. Bend your right knee and lower your body down into a squat position, keeping your chest up and your back straight. Push through your right heel to return to the starting position. Repeat on the other side, stepping out with your left foot. Continue alternating sides for the desired number of repetitions."},{"i":"1756","n":"barbell single leg deadlift","b":"upper legs","q":"barbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/1756-gEyURal.jpg","gif":"videos/1756-gEyURal.gif","h":"Stand with your feet hip-width apart, holding a barbell in front of your thighs with an overhand grip. Shift your weight onto your left foot and lift your right foot slightly off the ground. Hinge forward at the hips, keeping your back straight and your right leg extended behind you for balance. Lower the barbell towards the ground, keeping it close to your body and your left leg slightly bent. Pause for a moment at the bottom, then engage your glutes and hamstrings to lift your torso back up to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0099","n":"barbell single leg split squat","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0099-gGNQmVt.jpg","gif":"videos/0099-gGNQmVt.gif","h":"Stand with your feet shoulder-width apart, holding a barbell across your upper back. Take a large step forward with one leg, keeping your torso upright. Lower your body by bending your front knee and hip, while keeping your back leg straight. Continue lowering until your front thigh is parallel to the ground. Pause for a moment, then push through your front heel to return to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"2799","n":"barbell sitted alternate leg raise","b":"waist","q":"barbell","t":"abs","s":["hip flexors"],"img":"images/2799-G7xoEzr.jpg","gif":"videos/2799-G7xoEzr.gif","h":"Sit on a bench with your back straight and hold a barbell across your thighs. Keeping your legs straight, lift one leg up as high as possible while keeping the other leg on the ground. Lower the raised leg back down and repeat with the other leg. Continue alternating legs for the desired number of repetitions."},{"i":"2800","n":"barbell sitted alternate leg raise (female)","b":"waist","q":"barbell","t":"abs","s":["hip flexors","quadriceps"],"img":"images/2800-BCs0G2F.jpg","gif":"videos/2800-BCs0G2F.gif","h":"Sit on a bench with your back straight and hold a barbell across your thighs. Place your hands on the sides of the bench for support. Keeping your legs straight, lift one leg up as high as possible while keeping it parallel to the ground. Lower the leg back down and repeat with the other leg. Continue alternating legs for the desired number of repetitions."},{"i":"0100","n":"barbell skier","b":"shoulders","q":"barbell","t":"delts","s":["triceps","core"],"img":"images/0100-4Leypho.jpg","gif":"videos/0100-4Leypho.gif","h":"Stand with your feet shoulder-width apart and hold a barbell in front of your thighs with an overhand grip. Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up. Simultaneously lift the barbell up towards your shoulders while jumping slightly off the ground. As you reach the top of the movement, quickly reverse the motion and lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0101","n":"barbell speed squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0101-euI1BwR.jpg","gif":"videos/0101-euI1BwR.gif","h":"Stand with your feet shoulder-width apart, toes slightly turned out. Hold the barbell across your upper back, resting it on your traps or rear delts. Engage your core and keep your chest up as you lower your hips back and down, as if sitting into a chair. Lower until your thighs are parallel to the ground, or as low as you can comfortably go. Drive through your heels to stand back up, squeezing your glutes at the top. Repeat for the desired number of repetitions."},{"i":"2810","n":"barbell split squat v. 2","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/2810-HBYyX94.jpg","gif":"videos/2810-HBYyX94.gif","h":"Start by standing with your feet shoulder-width apart, holding a barbell across your upper back. Take a large step forward with your right foot, keeping your torso upright. Lower your body by bending your knees and hips until your right thigh is parallel to the ground. Pause for a moment, then push through your right heel to return to the starting position. Repeat with your left leg forward for the desired number of repetitions."},{"i":"0102","n":"barbell squat (on knees)","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0102-oR7O9LW.jpg","gif":"videos/0102-oR7O9LW.gif","h":"Start by kneeling on the ground with your knees hip-width apart and your toes pointing forward. Place a barbell across your shoulders, gripping it with an overhand grip and your hands slightly wider than shoulder-width apart. Engage your core and keep your chest lifted as you slowly lower your body down by bending your knees, keeping your back straight. Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"2798","n":"barbell squat jump step rear lunge","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/2798-RYcV1kH.jpg","gif":"videos/2798-RYcV1kH.gif","h":"Start by standing with your feet shoulder-width apart, holding a barbell across your upper back. Lower your body into a squat position by bending your knees and pushing your hips back. Explode upwards, jumping off the ground as high as you can. Land softly on your feet and immediately step back with one leg into a reverse lunge. Lower your body down until your front thigh is parallel to the ground, keeping your back straight. Push through your front heel to return to the starting position. Repeat the jump and lunge sequence on the other leg. Continue alternating legs for the desired number of repetitions."},{"i":"0103","n":"barbell standing ab rollerout","b":"waist","q":"barbell","t":"abs","s":["shoulders","lower back"],"img":"images/0103-xnInPfE.jpg","gif":"videos/0103-xnInPfE.gif","h":"Stand upright with your feet shoulder-width apart and hold the barbell with both hands in front of your thighs. Engage your core and slowly roll the barbell down towards the ground, keeping your back straight and your arms extended. Continue rolling the barbell forward until your body is fully extended and your hands are directly above your head. Pause for a moment, then slowly roll the barbell back towards your thighs, maintaining control and keeping your core engaged. Repeat for the desired number of repetitions."},{"i":"0104","n":"barbell standing back wrist curl","b":"lower arms","q":"barbell","t":"forearms","s":["biceps","shoulders"],"img":"images/0104-2qTvJAZ.jpg","gif":"videos/0104-2qTvJAZ.gif","h":"Stand up straight with your feet shoulder-width apart and hold a barbell with an overhand grip. Rest the barbell on the back of your hands with your palms facing down and your fingers pointing towards your body. Keeping your upper arms stationary, exhale and curl your wrists upwards as far as possible. Hold the contracted position for a brief pause, then inhale and slowly lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0105","n":"barbell standing bradford press","b":"shoulders","q":"barbell","t":"delts","s":["triceps","upper back"],"img":"images/0105-dCPESfR.jpg","gif":"videos/0105-dCPESfR.gif","h":"Stand with your feet shoulder-width apart and hold the barbell in front of your shoulders with an overhand grip. Press the barbell overhead, fully extending your arms. Lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1372","n":"barbell standing calf raise","b":"lower legs","q":"barbell","t":"calves","s":["hamstrings","glutes"],"img":"images/1372-8ozhUIZ.jpg","gif":"videos/1372-8ozhUIZ.gif","h":"Stand with your feet shoulder-width apart and place a barbell across your upper back. Raise your heels off the ground as high as possible, using only your toes. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0106","n":"barbell standing close grip curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/0106-4dUn2iv.jpg","gif":"videos/0106-4dUn2iv.gif","h":"Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, hands close together. Keep your elbows close to your torso and your upper arms stationary throughout the movement. Exhale as you curl the weights while contracting your biceps. Continue to raise the bar until your biceps are fully contracted and the bar is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale as you slowly begin to bring the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"1456","n":"barbell standing close grip military press","b":"shoulders","q":"barbell","t":"delts","s":["triceps","upper back"],"img":"images/1456-wdRZISl.jpg","gif":"videos/1456-wdRZISl.gif","h":"Stand with your feet shoulder-width apart and hold the barbell with an overhand grip, hands slightly closer than shoulder-width apart. Lift the barbell to shoulder height, keeping your elbows close to your body. Press the barbell overhead, extending your arms fully. Lower the barbell back to shoulder height. Repeat for the desired number of repetitions."},{"i":"2414","n":"barbell standing concentration curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/2414-vsMcDi9.jpg","gif":"videos/2414-vsMcDi9.gif","h":"Stand with your feet shoulder-width apart and hold a barbell in one hand, palm facing up. Rest your opposite hand on your thigh for support. Keeping your upper arm stationary, exhale and curl the weight up towards your shoulder. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the weight back down to the starting position. Repeat for the desired number of repetitions, then switch arms."},{"i":"0107","n":"barbell standing front raise over head","b":"shoulders","q":"barbell","t":"delts","s":["triceps","upper back"],"img":"images/0107-S8mo30S.jpg","gif":"videos/0107-S8mo30S.gif","h":"Stand with your feet shoulder-width apart, holding a barbell in front of your thighs with an overhand grip. Keep your back straight and engage your core. Slowly raise the barbell in front of you, keeping your arms straight and your palms facing down. Continue lifting until the barbell is slightly above shoulder level. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0108","n":"barbell standing leg calf raise","b":"lower legs","q":"barbell","t":"calves","s":["hamstrings","glutes"],"img":"images/0108-rGwhJ5o.jpg","gif":"videos/0108-rGwhJ5o.gif","h":"Stand with your feet shoulder-width apart and place a barbell across your upper back. Raise your heels off the ground as high as possible, using your calves. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0109","n":"barbell standing overhead triceps extension","b":"upper arms","q":"barbell","t":"triceps","s":["shoulders"],"img":"images/0109-dZl9Q27.jpg","gif":"videos/0109-dZl9Q27.gif","h":"Stand with your feet shoulder-width apart and hold a barbell with an overhand grip. Raise the barbell overhead, fully extending your arms. Keeping your upper arms close to your head, slowly lower the barbell behind your head by bending your elbows. Pause for a moment, then raise the barbell back to the starting position by extending your arms. Repeat for the desired number of repetitions."},{"i":"0110","n":"barbell standing reverse grip curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/0110-LWuA3aZ.jpg","gif":"videos/0110-LWuA3aZ.gif","h":"Stand up straight with your feet shoulder-width apart and hold a barbell with an underhand grip, palms facing up. Keep your elbows close to your torso and your upper arms stationary. Exhale and curl the weights while contracting your biceps, bringing the barbell as close to your shoulders as possible. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0111","n":"barbell standing rocking leg calf raise","b":"lower legs","q":"barbell","t":"calves","s":["hamstrings","quadriceps"],"img":"images/0111-6HiHHe0.jpg","gif":"videos/0111-6HiHHe0.gif","h":"Stand with your feet shoulder-width apart and hold a barbell across your upper back. Raise your heels off the ground as high as possible, balancing on the balls of your feet. Slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0112","n":"barbell standing twist","b":"waist","q":"barbell","t":"abs","s":["obliques","lower back"],"img":"images/0112-yQe5HpE.jpg","gif":"videos/0112-yQe5HpE.gif","h":"Stand with your feet shoulder-width apart and hold a barbell in front of your chest with both hands, palms facing down. Engage your core and keep your back straight throughout the exercise. Slowly twist your torso to the right, pivoting on your feet and hips, while keeping your lower body stable. Pause for a moment at the end of the twist, then slowly return to the starting position. Repeat the twist to the left side. Continue alternating twists for the desired number of repetitions."},{"i":"1629","n":"barbell standing wide grip biceps curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms"],"img":"images/1629-faHKVkK.jpg","gif":"videos/1629-faHKVkK.gif","h":"Stand with your feet shoulder-width apart and hold a barbell with an underhand grip, hands wider than shoulder-width apart. Keep your back straight and your elbows close to your torso. Exhale and curl the barbell up towards your shoulders, keeping your upper arms stationary. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the barbell back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"1457","n":"barbell standing wide military press","b":"shoulders","q":"barbell","t":"delts","s":["triceps","upper back"],"img":"images/1457-Kyd9Rz5.jpg","gif":"videos/1457-Kyd9Rz5.gif","h":"Stand with your feet shoulder-width apart and hold the barbell with an overhand grip, slightly wider than shoulder-width. Lift the barbell to shoulder height, keeping your elbows slightly in front of the bar. Press the barbell overhead, extending your arms fully. Lower the barbell back to shoulder height and repeat for the desired number of repetitions."},{"i":"0113","n":"barbell standing wide-grip curl","b":"upper arms","q":"barbell","t":"biceps","s":["forearms","shoulders"],"img":"images/0113-NdIb5Z1.jpg","gif":"videos/0113-NdIb5Z1.gif","h":"Stand up straight with your feet shoulder-width apart and hold a barbell with an overhand grip, hands wider than shoulder-width apart. Let the barbell hang at arm's length in front of your thighs, with your palms facing away from your body. Keeping your upper arms stationary, exhale and curl the barbell upward by contracting your biceps. Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0114","n":"barbell step-up","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0114-Kxquu2E.jpg","gif":"videos/0114-Kxquu2E.gif","h":"Stand in front of a bench or step with a barbell resting on your upper back. Place one foot on the bench or step, ensuring your entire foot is in contact with the surface. Push through your heel and step up onto the bench or step, fully extending your hip and knee. Pause briefly at the top, then lower yourself back down to the starting position. Repeat with the opposite leg. Continue alternating legs for the desired number of repetitions."},{"i":"0115","n":"barbell stiff leg good morning","b":"upper legs","q":"barbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/0115-JrOHAZc.jpg","gif":"videos/0115-JrOHAZc.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Hold the barbell across your upper back, resting it on your traps. Keeping your back straight, hinge forward at the hips, pushing your glutes back. Lower your torso until it is parallel to the ground, feeling a stretch in your hamstrings. Engage your glutes and hamstrings to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0116","n":"barbell straight leg deadlift","b":"upper legs","q":"barbell","t":"hamstrings","s":["glutes","lower back"],"img":"images/0116-hrVQWvE.jpg","gif":"videos/0116-hrVQWvE.gif","h":"Stand with your feet shoulder-width apart and your toes pointing forward. Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Bend at your hips and lower the barbell towards the ground, keeping your back straight and your knees slightly bent. Lower the barbell until you feel a stretch in your hamstrings. Engage your hamstrings and glutes to lift the barbell back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0117","n":"barbell sumo deadlift","b":"upper legs","q":"barbell","t":"glutes","s":["hamstrings","quadriceps","lower back"],"img":"images/0117-KgI0tqW.jpg","gif":"videos/0117-KgI0tqW.gif","h":"Stand with your feet wider than shoulder-width apart, toes pointing outwards. Place a barbell on the ground in front of you, centered between your feet. Bend your knees and lower your hips, keeping your back straight and chest up, to grip the barbell with an overhand grip. Engage your core and drive through your heels to lift the barbell off the ground, extending your hips and knees simultaneously. As you lift, keep your chest up and back straight, and push your hips forward to fully engage your glutes. Pause for a moment at the top, then slowly lower the barbell back down to the starting position, maintaining control throughout the movement. Repeat for the desired number of repetitions."},{"i":"3305","n":"barbell thruster","b":"shoulders","q":"barbell","t":"delts","s":["quadriceps","glutes","hamstrings"],"img":"images/3305-f7Y9eDZ.jpg","gif":"videos/3305-f7Y9eDZ.gif","h":"Start by standing with your feet shoulder-width apart, holding a barbell at shoulder height with an overhand grip. Lower into a squat position by bending your knees and pushing your hips back. As you reach the bottom of the squat, explosively drive through your heels to stand up, simultaneously pressing the barbell overhead. Lower the barbell back to shoulder height as you lower back into the squat position. Repeat for the desired number of repetitions."},{"i":"0120","n":"barbell upright row","b":"shoulders","q":"barbell","t":"delts","s":["traps","biceps"],"img":"images/0120-UDlhcO8.jpg","gif":"videos/0120-UDlhcO8.gif","h":"Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, hands slightly wider than shoulder-width apart. Let the barbell hang in front of your thighs, arms fully extended. Keeping your back straight and core engaged, exhale and lift the barbell straight up towards your chin, leading with your elbows. Pause for a moment at the top, then inhale and slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0119","n":"barbell upright row v. 2","b":"shoulders","q":"barbell","t":"delts","s":["traps","biceps"],"img":"images/0119-83HoW9X.jpg","gif":"videos/0119-83HoW9X.gif","h":"Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, hands slightly wider than shoulder-width apart. Let the barbell hang in front of your thighs, arms fully extended. Keeping your back straight, exhale and lift the barbell straight up towards your chin, leading with your elbows. Pause for a moment at the top, then inhale and slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0121","n":"barbell upright row v. 3","b":"shoulders","q":"barbell","t":"delts","s":["traps","biceps"],"img":"images/0121-fI18Rbc.jpg","gif":"videos/0121-fI18Rbc.gif","h":"Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, hands slightly wider than shoulder-width apart. Let the barbell hang in front of your thighs, arms fully extended. Keeping your core engaged and back straight, exhale as you lift the barbell straight up towards your chin, leading with your elbows. Pause for a moment at the top, then inhale as you slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0122","n":"barbell wide bench press","b":"chest","q":"barbell","t":"pectorals","s":["shoulders","triceps"],"img":"images/0122-JsKq9so.jpg","gif":"videos/0122-JsKq9so.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the barbell with a wide grip, slightly wider than shoulder-width apart. Lift the barbell off the rack and hold it directly above your chest with your arms fully extended. Lower the barbell slowly towards your chest, keeping your elbows slightly flared out. Pause for a moment when the barbell touches your chest, then push it back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1258","n":"barbell wide reverse grip bench press","b":"chest","q":"barbell","t":"pectorals","s":["triceps","shoulders"],"img":"images/1258-945zpRg.jpg","gif":"videos/1258-945zpRg.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the barbell with a wide reverse grip, slightly wider than shoulder-width apart. Lift the barbell off the rack and hold it directly above your chest with your arms fully extended. Lower the barbell slowly towards your chest, keeping your elbows tucked in and your wrists straight. Pause for a moment when the barbell touches your chest, then push it back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0124","n":"barbell wide squat","b":"upper legs","q":"barbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/0124-s7HX1BY.jpg","gif":"videos/0124-s7HX1BY.gif","h":"Stand with your feet wider than shoulder-width apart, toes pointing slightly outward. Hold the barbell across your upper back, resting it on your traps or rear delts. Engage your core and keep your chest up as you lower your body down into a squat, pushing your hips back and bending your knees. Lower until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0123","n":"barbell wide-grip upright row","b":"shoulders","q":"barbell","t":"delts","s":["traps","biceps"],"img":"images/0123-RgJDRR1.jpg","gif":"videos/0123-RgJDRR1.gif","h":"Stand with your feet shoulder-width apart and hold a barbell with an overhand grip, hands wider than shoulder-width apart. Let the barbell hang in front of your thighs, arms fully extended. Keeping your back straight, exhale and lift the barbell straight up towards your chin, leading with your elbows. Pause for a moment at the top, then inhale and slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0126","n":"barbell wrist curl","b":"lower arms","q":"barbell","t":"forearms","s":["biceps","brachialis"],"img":"images/0126-82LxxkW.jpg","gif":"videos/0126-82LxxkW.gif","h":"Sit on a bench with your feet flat on the ground and your forearms resting on your thighs, holding a barbell with an underhand grip. Allow the barbell to roll down to your fingertips, keeping your wrists straight. Slowly curl the barbell up towards your forearms by flexing your wrists. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0125","n":"barbell wrist curl v. 2","b":"lower arms","q":"barbell","t":"forearms","s":["biceps","brachialis"],"img":"images/0125-6kSxYnw.jpg","gif":"videos/0125-6kSxYnw.gif","h":"Sit on a bench with your feet flat on the ground and your knees bent. Hold a barbell with an underhand grip, palms facing up, and your hands shoulder-width apart. Rest your forearms on your thighs, allowing your wrists to hang off the edge. Slowly curl your wrists upward, bringing the barbell towards your forearms. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0127","n":"barbell zercher squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0127-LSTChY9.jpg","gif":"videos/0127-LSTChY9.gif","h":"Stand with your feet shoulder-width apart and toes slightly turned out. Hold the barbell in the crooks of your elbows, with your hands gripping the bar for stability. Engage your core and keep your chest lifted as you lower your hips back and down into a squat position. Keep your knees in line with your toes and your weight in your heels. Pause for a moment at the bottom of the squat, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"3212","n":"basic toe touch (male)","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","calves"],"img":"images/3212-BbfB8Gb.jpg","gif":"videos/3212-BbfB8Gb.gif","h":"Stand with your feet shoulder-width apart and your arms by your sides. Bend forward at the waist, keeping your back straight and your knees slightly bent. Reach down towards your toes with your hands, keeping your legs as straight as possible. Pause for a moment at the bottom, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"0128","n":"battling ropes","b":"shoulders","q":"rope","t":"delts","s":["forearms","core"],"img":"images/0128-RJa4tCo.jpg","gif":"videos/0128-RJa4tCo.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Hold one end of the rope in each hand, with your palms facing each other. Raise your arms to shoulder height, keeping your elbows slightly bent. Begin making alternating waves with the ropes by rapidly raising and lowering each arm. Continue for the desired duration or number of repetitions."},{"i":"3360","n":"bear crawl","b":"cardio","q":"body weight","t":"cardiovascular system","s":["core","shoulders","triceps"],"img":"images/3360-0Yz8WdV.jpg","gif":"videos/3360-0Yz8WdV.gif","h":"Start on all fours with your hands directly under your shoulders and your knees directly under your hips. Lift your knees slightly off the ground, keeping your back flat and your core engaged. Move your right hand and left foot forward simultaneously, followed by your left hand and right foot. Continue crawling forward, alternating your hand and foot movements. Maintain a steady pace and keep your core tight throughout the exercise. Continue for the desired distance or time."},{"i":"1259","n":"behind head chest stretch","b":"chest","q":"assisted","t":"pectorals","s":["shoulders","triceps"],"img":"images/1259-QoHIhPl.jpg","gif":"videos/1259-QoHIhPl.gif","h":"Stand tall with your feet shoulder-width apart. Interlace your fingers behind your head with your elbows pointing outwards. Slowly squeeze your shoulder blades together and push your chest forward. Hold the stretch for 15-30 seconds. Release the stretch and repeat as desired."},{"i":"0129","n":"bench dip (knees bent)","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0129-RrLske5.jpg","gif":"videos/0129-RrLske5.gif","h":"Sit on the edge of a bench or chair with your hands gripping the edge next to your hips. Slide your butt off the bench and straighten your legs in front of you, keeping your heels on the ground. Bend your elbows and lower your body towards the ground, keeping your back close to the bench. Pause for a moment at the bottom, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1399","n":"bench dip on floor","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/1399-9RT8oQW.jpg","gif":"videos/1399-9RT8oQW.gif","h":"Sit on the edge of a bench or chair with your hands gripping the edge, fingers pointing forward. Slide your butt off the bench, supporting your weight with your hands. Lower your body by bending your elbows until your upper arms are parallel to the floor. Push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"0130","n":"bench hip extension","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings"],"img":"images/0130-u27Kcdz.jpg","gif":"videos/0130-u27Kcdz.gif","h":"Sit on a bench with your back against the bench and your feet flat on the ground. Place your hands on the bench for support. Engage your glutes and hamstrings, then lift your hips off the bench until your body forms a straight line from your knees to your shoulders. Pause for a moment at the top, then slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3019","n":"bench pull-ups","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/3019-mExgrF9.jpg","gif":"videos/3019-mExgrF9.gif","h":"Position yourself under a bar or a sturdy horizontal surface that is at chest height. Grab the bar or surface with an overhand grip, slightly wider than shoulder-width apart. Hang with your arms fully extended and your body straight. Pull your chest towards the bar or surface by squeezing your shoulder blades together and bending your elbows. Continue pulling until your chin is above the bar or surface. Lower yourself back down to the starting position with control. Repeat for the desired number of repetitions."},{"i":"3639","n":"bent knee lying twist (male)","b":"upper legs","q":"body weight","t":"glutes","s":["obliques","hip flexors"],"img":"images/3639-6sYyrRX.jpg","gif":"videos/3639-6sYyrRX.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Extend your arms out to the sides, perpendicular to your body. Keeping your knees together, slowly lower them to one side, aiming to touch the ground with your knees. Pause for a moment, then engage your core and slowly lift your knees back to the starting position. Repeat the movement to the other side. Continue alternating sides for the desired number of repetitions."},{"i":"1770","n":"biceps leg concentration curl","b":"upper arms","q":"body weight","t":"biceps","s":["forearms"],"img":"images/1770-sJFIDIp.jpg","gif":"videos/1770-sJFIDIp.gif","h":"Sit on a bench with your legs spread apart and your feet flat on the ground. Hold a dumbbell in one hand and place your elbow on the inside of your thigh, just above the knee. With your palm facing up, curl the dumbbell towards your shoulder while keeping your upper arm stationary. Squeeze your biceps at the top of the movement, then slowly lower the dumbbell back to the starting position. Repeat for the desired number of repetitions, then switch arms."},{"i":"0139","n":"biceps narrow pull-ups","b":"upper arms","q":"body weight","t":"biceps","s":["forearms","shoulders"],"img":"images/0139-50BETrz.jpg","gif":"videos/0139-50BETrz.gif","h":"Hang from a pull-up bar with your palms facing towards you and your hands shoulder-width apart. Engage your core and pull yourself up towards the bar, focusing on using your biceps to lift your body. Pause for a moment at the top, then slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0140","n":"biceps pull-up","b":"upper arms","q":"body weight","t":"biceps","s":["forearms","shoulders"],"img":"images/0140-guT8YnS.jpg","gif":"videos/0140-guT8YnS.gif","h":"Hang from a pull-up bar with your palms facing away from you and your hands shoulder-width apart. Engage your core and pull yourself up by bending your elbows, bringing your chest towards the bar. Pause at the top of the movement, then slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0137","n":"body-up","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0137-U6G2gk9.jpg","gif":"videos/0137-U6G2gk9.gif","h":"Start by placing your hands on a raised surface, such as a bench or parallel bars, with your palms facing down and fingers pointing forward. Extend your legs out in front of you, keeping your heels on the ground and your body straight. Lower your body by bending your elbows, keeping them close to your sides, until your upper arms are parallel to the ground. Pause for a moment, then push through your palms to straighten your arms and lift your body back up to the starting position. Repeat for the desired number of repetitions."},{"i":"3543","n":"bodyweight drop jump squat","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3543-wfotm7S.jpg","gif":"videos/3543-wfotm7S.gif","h":"Stand with your feet shoulder-width apart. Lower your body into a squat position by bending your knees and pushing your hips back. Jump up explosively, extending your hips, knees, and ankles. While in mid-air, quickly bring your feet together. Land softly on the balls of your feet and immediately drop back into a squat position. Repeat for the desired number of repetitions."},{"i":"3544","n":"bodyweight incline side plank","b":"waist","q":"body weight","t":"abs","s":["obliques","shoulders"],"img":"images/3544-5VXmnV5.jpg","gif":"videos/3544-5VXmnV5.gif","h":"Start by lying on your side with your legs extended and stacked on top of each other. Place your forearm on the ground directly below your shoulder, with your elbow bent at a 90-degree angle. Engage your core and lift your hips off the ground, creating a straight line from your head to your feet. Hold this position for the desired amount of time. Lower your hips back down to the ground and repeat on the other side."},{"i":"1771","n":"bodyweight kneeling triceps extension","b":"upper arms","q":"body weight","t":"triceps","s":["shoulders","chest"],"img":"images/1771-s0HKO2I.jpg","gif":"videos/1771-s0HKO2I.gif","h":"Kneel down on the ground with your knees hip-width apart. Place your hands on the ground in front of you, shoulder-width apart, fingers pointing forward. Extend your legs straight behind you, balancing on your toes and hands, forming a straight line from head to heels. Bend your elbows and lower your upper body towards the ground, keeping your elbows close to your sides. Pause for a moment at the bottom, then push through your hands to straighten your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"1769","n":"bodyweight side lying biceps curl","b":"upper arms","q":"body weight","t":"biceps","s":["forearms"],"img":"images/1769-gscGLOU.jpg","gif":"videos/1769-gscGLOU.gif","h":"Lie on your side with your legs extended and your head supported by your arm. Hold your upper arm against your side and bend your elbow to curl your forearm towards your shoulder. Pause for a moment at the top, then slowly lower your forearm back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3168","n":"bodyweight squatting row","b":"back","q":"body weight","t":"upper back","s":["biceps","shoulders"],"img":"images/3168-3xK09Sk.jpg","gif":"videos/3168-3xK09Sk.gif","h":"Stand with your feet shoulder-width apart, holding onto a sturdy object or suspension trainer with your arms extended. Lower your body into a squat position, keeping your back straight and your knees behind your toes. From the squat position, pull your body up towards the object or suspension trainer, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3167","n":"bodyweight squatting row (with towel)","b":"back","q":"body weight","t":"upper back","s":["biceps","shoulders"],"img":"images/3167-BReCuOn.jpg","gif":"videos/3167-BReCuOn.gif","h":"Stand with your feet shoulder-width apart, holding a towel in front of you with your palms facing down. Bend your knees and lower your body into a squat position, keeping your back straight and your chest up. As you lower into the squat, simultaneously pull the towel towards your chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the squat, then slowly return to the starting position while extending your arms. Repeat for the desired number of repetitions."},{"i":"1373","n":"bodyweight standing calf raise","b":"lower legs","q":"body weight","t":"calves","s":["ankles","feet"],"img":"images/1373-bJYHBIN.jpg","gif":"videos/1373-bJYHBIN.gif","h":"Stand with your feet shoulder-width apart, toes pointing forward. Place your hands on a wall or stable surface for balance. Slowly raise your heels off the ground, lifting your body weight onto the balls of your feet. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3156","n":"bodyweight standing close-grip one arm row","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/3156-v2DfH14.jpg","gif":"videos/3156-v2DfH14.gif","h":"Stand with your feet shoulder-width apart, knees slightly bent, and hold a dumbbell in one hand with a neutral grip. Bend forward at the hips, keeping your back straight and your core engaged. Pull the dumbbell up towards your chest, keeping your elbow close to your body and squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"3158","n":"bodyweight standing close-grip row","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/3158-tig3PXb.jpg","gif":"videos/3158-tig3PXb.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Bend forward at the waist, keeping your back straight and your core engaged. Extend your arms straight in front of you, gripping the bar or handles with a close grip. Pull the bar or handles towards your body, squeezing your shoulder blades together. Pause for a moment at the top of the movement, then slowly release and return to the starting position. Repeat for the desired number of repetitions."},{"i":"3162","n":"bodyweight standing one arm row","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/3162-xbkPfaw.jpg","gif":"videos/3162-xbkPfaw.gif","h":"Stand with your feet shoulder-width apart, knees slightly bent, and hold a dumbbell in one hand. Bend forward at the hips, keeping your back straight and your core engaged. Let the dumbbell hang straight down in front of you, with your arm fully extended. Pull the dumbbell up towards your chest, keeping your elbow close to your body. Squeeze your shoulder blades together at the top of the movement. Lower the dumbbell back down to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"3161","n":"bodyweight standing one arm row (with towel)","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/3161-O4oIqQD.jpg","gif":"videos/3161-O4oIqQD.gif","h":"Stand with your feet shoulder-width apart, knees slightly bent, and hold a towel with one hand. Bend forward at the hips, keeping your back straight and your core engaged. Pull the towel towards your chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the towel back to the starting position. Repeat for the desired number of repetitions, then switch to the other arm."},{"i":"3166","n":"bodyweight standing row","b":"back","q":"body weight","t":"upper back","s":["biceps","shoulders"],"img":"images/3166-wd4ds3s.jpg","gif":"videos/3166-wd4ds3s.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Grasp a bar or handles with an overhand grip, palms facing down. Keep your back straight and core engaged. Pull the bar or handles towards your body, squeezing your shoulder blades together. Pause for a moment at the top of the movement. Slowly release and extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"3165","n":"bodyweight standing row (with towel)","b":"back","q":"body weight","t":"upper back","s":["biceps","shoulders"],"img":"images/3165-uTv34oq.jpg","gif":"videos/3165-uTv34oq.gif","h":"Stand with your feet shoulder-width apart and hold a towel in front of you with both hands. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Pull the towel towards your chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly release the tension and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0138","n":"bottoms-up","b":"waist","q":"body weight","t":"abs","s":["obliques","hip flexors"],"img":"images/0138-CI6baTY.jpg","gif":"videos/0138-CI6baTY.gif","h":"Lie flat on your back with your legs extended and your arms by your sides. Bend your knees and bring them towards your chest, keeping your feet off the ground. Engaging your abs, lift your hips off the ground, bringing your knees towards your head. Pause for a moment at the top, then slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1374","n":"box jump down with one leg stabilization","b":"lower legs","q":"body weight","t":"calves","s":["quadriceps","hamstrings","glutes"],"img":"images/1374-iPm26QU.jpg","gif":"videos/1374-iPm26QU.gif","h":"Stand in front of a box or platform with your feet shoulder-width apart. Bend your knees and jump onto the box, landing softly with one foot on the box and the other foot hanging off the edge. Stabilize yourself on the box with the foot that is on it, while keeping the other foot off the ground. Hold this position for a few seconds, engaging your calf muscles to maintain balance. Slowly step down with the foot that is on the box, returning to the starting position. Repeat the exercise with the other leg."},{"i":"2466","n":"bridge - mountain climber (cross body)","b":"waist","q":"body weight","t":"abs","s":["glutes","quadriceps","hamstrings"],"img":"images/2466-9c6T1YX.jpg","gif":"videos/2466-9c6T1YX.gif","h":"Start in a high plank position with your hands directly under your shoulders and your body in a straight line. Engage your core and lift your right foot off the ground, bringing your right knee towards your left elbow. Return your right foot to the starting position and repeat the movement with your left foot towards your right elbow. Continue alternating sides, moving at a controlled pace. Keep your hips level and avoid lifting your hips too high or sagging them too low. Maintain a steady breathing pattern throughout the exercise. Repeat for the desired number of repetitions."},{"i":"1160","n":"burpee","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/1160-dK9394r.jpg","gif":"videos/1160-dK9394r.gif","h":"Start in a standing position with your feet shoulder-width apart. Lower your body into a squat position by bending your knees and placing your hands on the floor in front of you. Kick your feet back into a push-up position. Perform a push-up, keeping your body in a straight line. Jump your feet back into the squat position. Jump up explosively, reaching your arms overhead. Land softly and immediately lower back into a squat position to begin the next repetition."},{"i":"0870","n":"butt-ups","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/0870-qcNN2FN.jpg","gif":"videos/0870-qcNN2FN.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands by your sides, palms facing down. Engaging your abs, lift your legs off the ground, bringing your knees towards your chest. At the top of the movement, squeeze your abs and pause for a moment. Slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1494","n":"butterfly yoga pose","b":"upper legs","q":"body weight","t":"adductors","s":["hamstrings","groin"],"img":"images/1494-bWlZvXh.jpg","gif":"videos/1494-bWlZvXh.gif","h":"Sit on the floor with your legs extended in front of you. Bend your knees and bring the soles of your feet together, allowing your knees to fall out to the sides. Hold onto your ankles or feet with your hands. Sit up tall and lengthen your spine. Gently press your knees down towards the floor, feeling a stretch in your inner thighs. Hold this position for a few breaths. To release, slowly bring your knees back up and extend your legs."},{"i":"0148","n":"cable alternate shoulder press","b":"shoulders","q":"cable","t":"delts","s":["triceps","upper back"],"img":"images/0148-KHPZL0b.jpg","gif":"videos/0148-KHPZL0b.gif","h":"Stand with your feet shoulder-width apart and grasp the handles of the cable machine with an overhand grip. Position your hands at shoulder height, with your palms facing forward. Keep your core engaged and your back straight. Press one handle up and forward until your arm is fully extended. Pause for a moment at the top, then slowly lower the handle back to the starting position. Repeat with the other arm. Alternate between arms for the desired number of repetitions."},{"i":"0149","n":"cable alternate triceps extension","b":"upper arms","q":"cable","t":"triceps","s":["shoulders"],"img":"images/0149-Gchi5Tr.jpg","gif":"videos/0149-Gchi5Tr.gif","h":"Stand facing the cable machine with your feet shoulder-width apart. Hold the cable handle with your right hand and bring your arm up so that your upper arm is parallel to the ground and your elbow is bent at a 90-degree angle. Keep your upper arm stationary and extend your forearm backward, fully straightening your arm. Pause for a moment, then slowly return to the starting position. Repeat with your left arm. Continue alternating arms for the desired number of repetitions."},{"i":"3235","n":"cable assisted inverse leg curl","b":"upper legs","q":"cable","t":"hamstrings","s":["glutes","calves"],"img":"images/3235-zHEpuuc.jpg","gif":"videos/3235-zHEpuuc.gif","h":"Adjust the cable machine so that the ankle attachment is at the lowest setting. Lie face down on the bench with your legs straight and the ankle attachment secured to your ankles. Hold onto the handles of the bench for stability. Keeping your upper body stationary, exhale and curl your legs up towards your glutes by flexing your knees. Pause for a moment at the top of the movement, squeezing your hamstrings. Inhale and slowly lower your legs back to the starting position. Repeat for the desired number of repetitions."},{"i":"0150","n":"cable bar lateral pulldown","b":"back","q":"cable","t":"lats","s":["biceps","rhomboids","rear deltoids"],"img":"images/0150-eYnzaCm.jpg","gif":"videos/0150-eYnzaCm.gif","h":"Adjust the cable pulley to a high position and attach a straight bar. Sit facing the cable machine with your feet flat on the ground and your knees slightly bent. Grasp the bar with an overhand grip, slightly wider than shoulder-width apart. Lean back slightly and keep your chest up, maintaining a slight arch in your lower back. Pull the bar down towards your chest, leading with your elbows and squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly return the bar to the starting position. Repeat for the desired number of repetitions."},{"i":"0151","n":"cable bench press","b":"chest","q":"cable","t":"pectorals","s":["triceps","shoulders"],"img":"images/0151-7xI5MXA.jpg","gif":"videos/0151-7xI5MXA.gif","h":"Adjust the cable machine to chest height and attach the handles. Stand facing away from the machine with your feet shoulder-width apart. Grasp the handles with an overhand grip and step forward to create tension in the cables. Position your feet firmly on the ground and engage your core. Bend your elbows and bring your hands to shoulder level, keeping your elbows at a 90-degree angle. Push the handles forward, extending your arms fully in front of you. Pause for a moment, then slowly reverse the movement, bringing your hands back to shoulder level. Repeat for the desired number of repetitions."},{"i":"1630","n":"cable close grip curl","b":"upper arms","q":"cable","t":"biceps","s":["forearms"],"img":"images/1630-BCGQ6J5.jpg","gif":"videos/1630-BCGQ6J5.gif","h":"Attach a straight bar to a low pulley cable machine. Stand facing the machine with your feet shoulder-width apart and your knees slightly bent. Grasp the bar with an underhand grip, hands shoulder-width apart. Keep your elbows close to your sides and your upper arms stationary throughout the exercise. Exhale and curl the bar up towards your shoulders, contracting your biceps. Pause for a moment at the top of the movement, squeezing your biceps. Inhale and slowly lower the bar back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"1631","n":"cable concentration curl","b":"upper arms","q":"cable","t":"biceps","s":["forearms"],"img":"images/1631-NvfE43H.jpg","gif":"videos/1631-NvfE43H.gif","h":"Sit on a bench or chair with your feet flat on the floor and your knees slightly bent. Hold the cable handle with an underhand grip and rest your elbow against the inside of your thigh. Keeping your upper arm stationary, exhale and curl the cable handle towards your shoulder while contracting your biceps. Pause for a moment at the top of the movement, then inhale and slowly lower the cable handle back to the starting position. Repeat for the desired number of repetitions, then switch arms."},{"i":"0152","n":"cable concentration extension (on knee)","b":"upper arms","q":"cable","t":"triceps","s":["forearms"],"img":"images/0152-Db7eEgw.jpg","gif":"videos/0152-Db7eEgw.gif","h":"Sit on a bench or chair with your knees bent and feet flat on the ground. Hold the cable handle with your right hand and place your elbow on the inside of your right knee. Extend your arm fully, keeping your elbow stationary and close to your knee. Pause for a moment at the top, then slowly lower your arm back to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0153","n":"cable cross-over lateral pulldown","b":"back","q":"cable","t":"lats","s":["biceps","rhomboids","rear deltoids"],"img":"images/0153-OQ1otBN.jpg","gif":"videos/0153-OQ1otBN.gif","h":"Attach a cable handle to each side of a cable machine at shoulder height. Stand in the middle of the machine with your feet shoulder-width apart. Grasp the handles with an overhand grip and step back to create tension in the cables. Lean forward slightly from the hips, keeping your back straight and your chest up. Pull the handles down and across your body, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"0154","n":"cable cross-over revers fly","b":"shoulders","q":"cable","t":"delts","s":["rhomboids","trapezius"],"img":"images/0154-aqvSOQE.jpg","gif":"videos/0154-aqvSOQE.gif","h":"Attach a D-handle to each low pulley cable and stand in the middle of the cable crossover machine. Grasp the handles with a pronated grip (palms facing down) and take a step forward, positioning your feet shoulder-width apart. Bend your knees slightly and lean forward at the waist, keeping your back straight and your abs engaged. With your arms extended out to the sides and slightly bent at the elbows, exhale and squeeze your shoulder blades together as you pull the cables back and upward in a reverse fly motion. Pause for a moment at the peak contraction, then inhale and slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"0155","n":"cable cross-over variation","b":"chest","q":"cable","t":"pectorals","s":["deltoids","triceps"],"img":"images/0155-0CXGHya.jpg","gif":"videos/0155-0CXGHya.gif","h":"Adjust the cable pulleys to chest height. Stand in the center of the cable machine with one foot in front of the other. Grasp the handles with your palms facing down and your arms extended out to the sides. Take a step forward, keeping your arms slightly bent. With a slight bend in your elbows, bring your hands together in front of your chest. Pause for a moment, then slowly return your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0868","n":"cable curl","b":"upper arms","q":"cable","t":"biceps","s":["forearms"],"img":"images/0868-G08RZcQ.jpg","gif":"videos/0868-G08RZcQ.gif","h":"Stand facing the cable machine with your feet shoulder-width apart. Grasp the cable attachment with an underhand grip, palms facing up. Keep your elbows close to your sides and your upper arms stationary. Exhale and curl the cable attachment towards your shoulders, contracting your biceps. Pause for a moment at the top of the movement, squeezing your biceps. Inhale and slowly lower the cable attachment back to the starting position. Repeat for the desired number of repetitions."},{"i":"0157","n":"cable deadlift","b":"upper legs","q":"cable","t":"glutes","s":["hamstrings","quadriceps","lower back"],"img":"images/0157-eGDudUV.jpg","gif":"videos/0157-eGDudUV.gif","h":"Stand facing the cable machine with your feet shoulder-width apart. Bend at the hips and knees, lowering your torso until your back is parallel to the ground. Grasp the cable handles with an overhand grip, keeping your arms straight and your shoulders back. Engage your glutes and hamstrings to lift the cable handles, extending your hips and standing up straight. Pause for a moment at the top, then slowly lower the cable handles back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0158","n":"cable decline fly","b":"chest","q":"cable","t":"pectorals","s":["shoulders","triceps"],"img":"images/0158-7saC5zz.jpg","gif":"videos/0158-7saC5zz.gif","h":"Adjust the cable machine to a decline position. Stand facing away from the machine with your feet shoulder-width apart. Hold the handles with your palms facing forward and your arms extended straight out in front of you. Keeping a slight bend in your elbows, open your arms out to the sides in a controlled motion. Pause for a moment at the fully extended position, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"1260","n":"cable decline one arm press","b":"chest","q":"cable","t":"pectorals","s":["triceps","shoulders"],"img":"images/1260-KHGNa16.jpg","gif":"videos/1260-KHGNa16.gif","h":"Adjust the cable machine to a decline position. Stand facing away from the machine and grab the handle with one hand. Position yourself with your back against the decline bench and your arm extended straight in front of you. Bend your elbow and lower the handle towards your chest while keeping your upper arm stationary. Pause for a moment at the bottom, then push the handle back up to the starting position. Repeat for the desired number of repetitions, then switch arms."},{"i":"1261","n":"cable decline press","b":"chest","q":"cable","t":"pectorals","s":["triceps","shoulders"],"img":"images/1261-2Pya1cP.jpg","gif":"videos/1261-2Pya1cP.gif","h":"Adjust the cable machine to a decline position. Sit on the decline bench facing the cable machine. Grasp the handles with an overhand grip and position them at chest level. Keep your feet flat on the ground and your back firmly against the bench. Exhale and push the handles away from your body, extending your arms fully. Pause for a moment at the end of the movement, squeezing your chest muscles. Inhale and slowly return the handles back to the starting position. Repeat for the desired number of repetitions."},{"i":"0159","n":"cable decline seated wide-grip row","b":"back","q":"cable","t":"upper back","s":["biceps","forearms"],"img":"images/0159-kesXOpB.jpg","gif":"videos/0159-kesXOpB.gif","h":"Sit on the decline bench facing the cable machine with your feet securely placed on the footrests. Grasp the cable attachment with a wide overhand grip, palms facing down. Lean back slightly, keeping your back straight and your core engaged. Pull the cable towards your lower chest, squeezing your shoulder blades together. Pause for a moment at the peak of the contraction, then slowly release the cable back to the starting position. Repeat for the desired number of repetitions."},{"i":"1632","n":"cable drag curl","b":"upper arms","q":"cable","t":"biceps","s":["forearms"],"img":"images/1632-dXz8zjF.jpg","gif":"videos/1632-dXz8zjF.gif","h":"Stand facing a cable machine with your feet shoulder-width apart. Grasp the cable attachment with an underhand grip, palms facing up, and arms fully extended. Keeping your upper arms stationary, exhale and curl the cable attachment towards your shoulders by contracting your biceps. Pause for a moment at the top of the movement, squeezing your biceps. Inhale and slowly lower the cable attachment back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0160","n":"cable floor seated wide-grip row","b":"back","q":"cable","t":"upper back","s":["biceps","forearms"],"img":"images/0160-veXwo0D.jpg","gif":"videos/0160-veXwo0D.gif","h":"Sit on the floor with your legs extended and your back straight. Attach a cable handle to a low pulley and position the cable machine behind you. Grasp the handle with a wide overhand grip, palms facing down. Lean back slightly, keeping your back straight and your chest lifted. Pull the handle towards your waist, squeezing your shoulder blades together. Pause for a moment at the top of the movement, then slowly release the handle back to the starting position. Repeat for the desired number of repetitions."},{"i":"0161","n":"cable forward raise","b":"shoulders","q":"cable","t":"delts","s":["triceps","forearms"],"img":"images/0161-hvHhCv8.jpg","gif":"videos/0161-hvHhCv8.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Hold the cable handle with an overhand grip, palms facing down, and your arms fully extended in front of you. Keeping your arms straight, raise the cable handle up to shoulder level. Pause for a moment at the top, then slowly lower the
