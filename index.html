rvaszz.jpg","gif":"videos/1421-arvaszz.gif","h":"Start in a push-up position with your hands directly under your shoulders and your body in a straight line. Lower your body down towards the ground by bending your elbows, keeping them close to your sides. Once your elbows are at a 90-degree angle, lower your forearms to the ground, keeping your elbows directly under your shoulders. Pause for a moment, then push through your palms to lift your forearms back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0628","n":"monster walk","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/0628-O95afRA.jpg","gif":"videos/0628-O95afRA.gif","h":"Place a resistance band around your ankles. Stand with your feet shoulder-width apart and slightly bend your knees. Take a step to the side with your right foot, maintaining tension on the resistance band. Follow with your left foot, stepping to the side to return to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0630","n":"mountain climber","b":"cardio","q":"body weight","t":"cardiovascular system","s":["core","shoulders","triceps"],"img":"images/0630-RJgzwny.jpg","gif":"videos/0630-RJgzwny.gif","h":"Start in a high plank position with your hands directly under your shoulders and your body in a straight line. Engage your core and bring your right knee towards your chest, then quickly switch and bring your left knee towards your chest. Continue alternating legs in a running motion, keeping your hips low and your core engaged. Maintain a steady pace and breathe evenly throughout the exercise. Repeat for the desired number of repetitions."},{"i":"0631","n":"muscle up","b":"back","q":"body weight","t":"lats","s":["biceps","triceps","shoulders"],"img":"images/0631-yJUHKTn.jpg","gif":"videos/0631-yJUHKTn.gif","h":"Start by hanging from a pull-up bar with your palms facing away from you and your arms fully extended. Engage your core and pull your body up towards the bar, leading with your chest. As you reach the top of the movement, transition your grip so that your palms are facing towards you. Continue pulling yourself up until your chest is above the bar and your arms are fully flexed. Reverse the movement by slowly lowering yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1401","n":"muscle-up (on vertical bar)","b":"back","q":"body weight","t":"lats","s":["biceps","triceps","forearms"],"img":"images/1401-Af0EW2I.jpg","gif":"videos/1401-Af0EW2I.gif","h":"Start by hanging from a vertical bar with your palms facing away from you and your arms fully extended. Engage your core and pull your body up towards the bar, leading with your chest. As you pull yourself up, lean back slightly and bring your elbows towards your sides. Continue pulling until your chest reaches the bar and your elbows are fully bent. Pause for a moment at the top, then slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"2328","n":"narrow push-up on exercise ball","b":"upper arms","q":"stability ball","t":"triceps","s":["chest","shoulders"],"img":"images/2328-4cWjYEN.jpg","gif":"videos/2328-4cWjYEN.gif","h":"Place the stability ball on the ground and position yourself in a push-up position with your hands on the ball, slightly narrower than shoulder-width apart. Engage your core and keep your body in a straight line from head to toe. Lower your chest towards the ball by bending your elbows, keeping them close to your body. Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"1403","n":"neck side stretch","b":"neck","q":"body weight","t":"levator scapulae","s":["trapezius","sternocleidomastoid"],"img":"images/1403-x2chWLO.jpg","gif":"videos/1403-x2chWLO.gif","h":"Stand or sit up straight with your shoulders relaxed. Tilt your head to one side, bringing your ear towards your shoulder. Hold the stretch for 15-30 seconds. Repeat on the other side. Perform 2-4 sets on each side."},{"i":"0634","n":"negative crunch","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0634-szIn2UK.jpg","gif":"videos/0634-szIn2UK.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1495","n":"oblique crunch v. 2","b":"waist","q":"body weight","t":"abs","s":["obliques"],"img":"images/1495-cJgSTmh.jpg","gif":"videos/1495-cJgSTmh.gif","h":"Lie on your back with your knees bent and feet flat on the ground. Place your hands behind your head or cross them over your chest. Engage your abs and lift your shoulder blades off the ground, rotating your torso to one side. Pause for a moment, then lower your shoulder blades back down to the starting position. Repeat on the other side. Continue alternating sides for the desired number of repetitions."},{"i":"0635","n":"oblique crunches floor","b":"waist","q":"body weight","t":"abs","s":["obliques"],"img":"images/0635-QUDd8WS.jpg","gif":"videos/0635-QUDd8WS.gif","h":"Lie on your back with your knees bent and feet flat on the floor. Place your hands behind your head or cross them over your chest. Engage your abs and lift your shoulder blades off the floor, rotating your torso to one side. Pause for a moment, then lower your shoulder blades back down to the floor. Repeat on the other side, alternating sides with each repetition."},{"i":"0636","n":"olympic barbell hammer curl","b":"upper arms","q":"olympic barbell","t":"biceps","s":["forearms"],"img":"images/0636-o1ntciW.jpg","gif":"videos/0636-o1ntciW.gif","h":"Stand up straight with your feet shoulder-width apart and hold an Olympic barbell with an overhand grip. Let the barbell hang at arm's length in front of your thighs, with your palms facing your body. Keeping your upper arms stationary, exhale and curl the weights while contracting your biceps. Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Inhale and slowly begin to lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0637","n":"olympic barbell triceps extension","b":"upper arms","q":"olympic barbell","t":"triceps","s":["shoulders"],"img":"images/0637-wu5LXwz.jpg","gif":"videos/0637-wu5LXwz.gif","h":"Start by standing with your feet shoulder-width apart and holding the barbell with an overhand grip. Raise the barbell above your head, fully extending your arms. Keeping your upper arms close to your head, slowly lower the barbell behind your head by bending your elbows. Pause for a moment, then extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"1355","n":"one arm against wall","b":"back","q":"body weight","t":"lats","s":["shoulders","triceps"],"img":"images/1355-ZZTGMKh.jpg","gif":"videos/1355-ZZTGMKh.gif","h":"Stand facing a wall with your feet shoulder-width apart. Extend one arm straight out in front of you and place your palm against the wall. Engage your core and lean your body forward, keeping your arm straight and your back flat. Slowly push against the wall with your palm, activating your lat muscles. Hold the position for a few seconds, then release and repeat with the other arm."},{"i":"0638","n":"one arm chin-up","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/0638-HjdqmZa.jpg","gif":"videos/0638-HjdqmZa.gif","h":"Stand facing a pull-up bar with your feet shoulder-width apart. Reach up and grab the bar with an underhand grip, with one hand gripping the bar and the other hand holding your wrist for support. Hang from the bar with your arm fully extended, keeping your body straight and your core engaged. Pull yourself up towards the bar by bending your elbow and squeezing your back muscles. Continue pulling until your chin is above the bar, then slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions, then switch arms and repeat."},{"i":"0639","n":"one arm dip","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0639-FAoIFMw.jpg","gif":"videos/0639-FAoIFMw.gif","h":"Stand facing away from a bench or chair, with your feet shoulder-width apart. Place one hand on the bench or chair behind you, fingers pointing towards your body. Extend your legs out in front of you, keeping your heels on the ground. Bend your elbows and lower your body towards the ground, keeping your back close to the bench or chair. Pause for a moment at the bottom, then push through your palms to straighten your arms and return to the starting position. Repeat for the desired number of repetitions, then switch sides and repeat with the other arm."},{"i":"0640","n":"one arm slam (with medicine ball)","b":"waist","q":"medicine ball","t":"abs","s":["shoulders","back"],"img":"images/0640-jCrtE9b.jpg","gif":"videos/0640-jCrtE9b.gif","h":"Stand with your feet shoulder-width apart, holding the medicine ball with one hand in front of your waist. Bend your knees slightly and engage your core. Raise the medicine ball above your head, fully extending your arm. Forcefully slam the medicine ball down to the ground, using your core and shoulders to generate power. Catch the medicine ball on the bounce and repeat for the desired number of repetitions."},{"i":"1773","n":"one arm towel row","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/1773-bKWbrTA.jpg","gif":"videos/1773-bKWbrTA.gif","h":"Stand with your feet shoulder-width apart, knees slightly bent, and hold a towel with one hand. Bend forward at the waist, keeping your back straight and your core engaged. Extend your arm fully, allowing the towel to hang in front of you. Pull the towel towards your chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the towel back to the starting position. Repeat for the desired number of repetitions, then switch arms."},{"i":"1386","n":"one leg donkey calf raise","b":"lower legs","q":"body weight","t":"calves","s":["hamstrings","glutes"],"img":"images/1386-A2upspL.jpg","gif":"videos/1386-A2upspL.gif","h":"Stand with your feet shoulder-width apart, toes pointing forward. Place your hands on a stable surface for support, such as a wall or a bar. Lift one leg off the ground, keeping your knee slightly bent. Raise your heel as high as possible, using your calf muscles. Pause for a moment at the top, then slowly lower your heel back down. Repeat for the desired number of repetitions, then switch legs."},{"i":"1387","n":"one leg floor calf raise","b":"lower legs","q":"body weight","t":"calves","s":["ankles","feet"],"img":"images/1387-0jp9Rlz.jpg","gif":"videos/1387-0jp9Rlz.gif","h":"Stand with your feet hip-width apart and place your hands on a wall or sturdy object for balance. Lift one foot off the ground and balance on the other foot. Slowly raise your heel off the ground, lifting your body up onto the ball of your foot. Pause for a moment at the top, then slowly lower your heel back down to the starting position. Repeat for the desired number of repetitions, then switch legs and repeat."},{"i":"1476","n":"one leg squat","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1476-C31LMnP.jpg","gif":"videos/1476-C31LMnP.gif","h":"Stand with your feet shoulder-width apart. Extend one leg forward, keeping it off the ground. Bend your standing leg and lower your body down as if sitting back into a chair. Keep your chest up and your back straight. Push through your heel to return to the starting position. Repeat with the other leg."},{"i":"0641","n":"otis up","b":"waist","q":"weighted","t":"abs","s":["hip flexors","lower back"],"img":"images/0641-UVL20oz.jpg","gif":"videos/0641-UVL20oz.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0642","n":"outside leg kick push-up","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0642-jNU1gFQ.jpg","gif":"videos/0642-jNU1gFQ.gif","h":"Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together. Lower your body towards the ground by bending your elbows, keeping your back straight and core engaged. As you push back up, kick one leg out to the side, extending it fully and engaging your glutes. Return your leg to the starting position and repeat the push-up, alternating legs with each repetition. Continue alternating leg kicks and push-ups for the desired number of repetitions."},{"i":"0643","n":"overhead triceps stretch","b":"upper arms","q":"body weight","t":"triceps","s":["shoulders"],"img":"images/0643-Z5YStHW.jpg","gif":"videos/0643-Z5YStHW.gif","h":"Stand or sit upright with your feet shoulder-width apart. Extend one arm overhead, bending at the elbow so that your hand reaches towards the opposite shoulder blade. With your other hand, gently pull the elbow of the extended arm towards the opposite side of your head, feeling a stretch in your triceps. Hold the stretch for 15-30 seconds, then release. Repeat on the other side."},{"i":"3147","n":"pelvic tilt","b":"waist","q":"body weight","t":"abs","s":["lower back"],"img":"images/3147-NKJ8o6x.jpg","gif":"videos/3147-NKJ8o6x.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands by your sides. Engage your abs and tilt your pelvis upward, pressing your lower back into the ground. Hold this position for a few seconds, focusing on contracting your abs. Release the tilt and return to the starting position. Repeat for the desired number of repetitions."},{"i":"1422","n":"pelvic tilt into bridge","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","core"],"img":"images/1422-D9qe7CM.jpg","gif":"videos/1422-D9qe7CM.gif","h":"Lie on your back with your knees bent and feet flat on the ground. Place your arms by your sides with your palms facing down. Engage your glutes and core muscles. Tilt your pelvis upward, lifting your hips off the ground. Hold the bridge position for a few seconds. Slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1388","n":"peroneals stretch","b":"lower legs","q":"rope","t":"calves","s":["ankles","feet"],"img":"images/1388-XhfS1DZ.jpg","gif":"videos/1388-XhfS1DZ.gif","h":"Sit on the ground with your legs extended in front of you. Loop the rope around the ball of your foot and hold the ends of the rope with your hands. Gently pull the rope towards you, flexing your foot and stretching your calf muscles. Hold the stretch for 15-30 seconds. Release the tension on the rope and repeat the stretch on the other leg. Repeat for the desired number of repetitions."},{"i":"3662","n":"pike-to-cobra push-up","b":"upper legs","q":"body weight","t":"glutes","s":["core","shoulders","triceps"],"img":"images/3662-XPUDTt7.jpg","gif":"videos/3662-XPUDTt7.gif","h":"Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together. Engage your core and lift your hips up towards the ceiling, forming an inverted V shape with your body. Lower your upper body towards the ground by bending your elbows, keeping them close to your body. As you lower down, shift your weight forward and transition into a cobra pose by straightening your arms and lifting your chest up. Reverse the movement by bending your elbows and lowering your chest back down towards the ground. Push through your hands to return to the inverted V position. Continue the movement by lowering your hips back down towards the ground, returning to the starting push-up position. Repeat for the desired number of repetitions."},{"i":"1306","n":"plyo push up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/1306-Snj1wSv.jpg","gif":"videos/1306-Snj1wSv.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart. Lower your chest towards the ground by bending your elbows, keeping your body in a straight line. Push explosively off the ground, using your chest muscles to propel your upper body off the ground. Land softly with your hands back in the starting position. Repeat for the desired number of repetitions."},{"i":"1687","n":"posterior step to overhead reach","b":"waist","q":"body weight","t":"abs","s":["glutes","hamstrings","quadriceps"],"img":"images/1687-ErqK3UL.jpg","gif":"videos/1687-ErqK3UL.gif","h":"Stand with your feet hip-width apart and your arms by your sides. Take a step back with your right foot, landing on the ball of your foot. Bend your left knee and lower your body into a lunge position. As you lower into the lunge, simultaneously reach your arms overhead. Pause for a moment at the bottom of the lunge, then return to the starting position by pushing through your left heel and bringing your right foot forward. Repeat the movement on the other side, stepping back with your left foot and bending your right knee. Continue alternating sides for the desired number of repetitions."},{"i":"1389","n":"posterior tibialis stretch","b":"lower legs","q":"rope","t":"calves","s":["hamstrings","quadriceps"],"img":"images/1389-DEEqoI2.jpg","gif":"videos/1389-DEEqoI2.gif","h":"Sit on the ground with your legs extended in front of you. Loop the rope around the ball of your foot and hold the ends of the rope with your hands. Gently pull the rope towards you, flexing your foot and stretching your calf muscles. Hold the stretch for 20-30 seconds. Release the tension on the rope and relax your foot. Repeat the stretch on the other leg."},{"i":"3119","n":"potty squat","b":"waist","q":"body weight","t":"abs","s":["quadriceps","glutes"],"img":"images/3119-75Bgtjy.jpg","gif":"videos/3119-75Bgtjy.gif","h":"Stand with your feet shoulder-width apart, toes pointing slightly outward. Lower your body down by bending your knees and pushing your hips back as if you were sitting on a chair. Keep your chest up and your back straight throughout the movement. Lower yourself until your thighs are parallel to the ground or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"3132","n":"potty squat with support","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3132-b63ZzGe.jpg","gif":"videos/3132-b63ZzGe.gif","h":"Stand with your feet shoulder-width apart, toes pointing slightly outward. Hold onto a stable support, such as a chair or wall, for balance. Lower your body down into a squat position by bending your knees and pushing your hips back. Keep your chest up and your back straight throughout the movement. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0648","n":"power clean","b":"upper legs","q":"barbell","t":"hamstrings","s":["glutes","quadriceps","calves"],"img":"images/0648-SiWCcTN.jpg","gif":"videos/0648-SiWCcTN.gif","h":"Start with the barbell on the ground in front of you, with your feet shoulder-width apart. Bend down and grip the barbell with an overhand grip, slightly wider than shoulder-width apart. Keep your back straight and chest up as you lift the barbell off the ground, extending your hips and knees. As the barbell reaches your mid-thigh, explosively pull it upwards, shrugging your shoulders and pulling your elbows high and to the sides. As the barbell reaches its highest point, quickly drop underneath it, rotating your elbows around and catching the barbell on your shoulders in a front squat position. Stand up with the barbell, fully extending your hips and knees. Lower the barbell back down to the starting position, keeping control of the weight throughout the movement. Repeat for the desired number of repetitions."},{"i":"3665","n":"power point plank","b":"waist","q":"body weight","t":"abs","s":["shoulders","triceps","glutes"],"img":"images/3665-hCjGsRQ.jpg","gif":"videos/3665-hCjGsRQ.gif","h":"Start in a high plank position with your hands directly under your shoulders and your body in a straight line from head to toe. Engage your core and squeeze your glutes to maintain a stable position. Lower your body down onto your forearms, one arm at a time, maintaining a straight line from head to toe. Hold this position for the desired amount of time, keeping your core and glutes engaged. To return to the starting position, push through your forearms and lift your body back up into a high plank position. Repeat for the desired number of repetitions."},{"i":"3203","n":"prisoner half sit-up (male)","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/3203-mgejmGP.jpg","gif":"videos/3203-mgejmGP.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1707","n":"prone twist on stability ball","b":"waist","q":"stability ball","t":"abs","s":["obliques","lower back"],"img":"images/1707-1IG6gVF.jpg","gif":"videos/1707-1IG6gVF.gif","h":"Start by lying face down on a stability ball with your feet shoulder-width apart and your toes touching the ground. Place your hands behind your head or cross them over your chest. Engage your core muscles and slowly lift your upper body off the ball, keeping your back straight. Rotate your torso to one side, bringing your shoulder towards your hip. Keep your hips and legs stable throughout the movement. Pause for a moment, then return to the starting position. Repeat the rotation to the other side. Continue alternating sides for the desired number of repetitions."},{"i":"0651","n":"pull up (neutral grip)","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/0651-0V2YQjW.jpg","gif":"videos/0651-0V2YQjW.gif","h":"Hang from a pull-up bar with a neutral grip (palms facing each other) and your arms fully extended. Engage your core and squeeze your shoulder blades together. Pull your body up towards the bar by bending your elbows and driving your elbows down towards your hips. Continue pulling until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position with control. Repeat for the desired number of repetitions."},{"i":"0650","n":"pull-in (on stability ball)","b":"waist","q":"stability ball","t":"abs","s":["hip flexors"],"img":"images/0650-UQr48Oi.jpg","gif":"videos/0650-UQr48Oi.gif","h":"Start by sitting on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle. Place your hands on the sides of the stability ball for support. Engage your abs and slowly roll your hips forward, bringing your knees towards your chest. Pause for a moment at the top of the movement, then slowly extend your legs back to the starting position. Repeat for the desired number of repetitions."},{"i":"0652","n":"pull-up","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/0652-lBDjFxJ.jpg","gif":"videos/0652-lBDjFxJ.gif","h":"Hang from a pull-up bar with your palms facing away from you and your arms fully extended. Engage your core and squeeze your shoulder blades together. Pull your body up towards the bar by bending your elbows and bringing your chest towards the bar. Pause at the top of the movement, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1689","n":"push and pull bodyweight","b":"chest","q":"body weight","t":"pectorals","s":["triceps","deltoids"],"img":"images/1689-wXvUZC8.jpg","gif":"videos/1689-wXvUZC8.gif","h":"Start in a push-up position with your hands slightly wider than shoulder-width apart and your body in a straight line. Lower your chest towards the ground by bending your elbows, keeping your body straight. Push through your palms to extend your arms and return to the starting position. From the push-up position, pull your chest towards the ground by bending your elbows, keeping your body straight. Push through your palms to extend your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"3638","n":"push to run","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/3638-PrQbjvB.jpg","gif":"videos/3638-PrQbjvB.gif","h":"Start in a push-up position with your hands shoulder-width apart and your body in a straight line. Lower your chest towards the ground by bending your elbows, keeping your body straight. Push through your hands to extend your arms and return to the starting position. Quickly bring one knee towards your chest, then quickly switch and bring the other knee towards your chest. Continue alternating knees as fast as you can while maintaining good form. Continue for the desired duration or number of repetitions."},{"i":"1307","n":"push up on bosu ball","b":"chest","q":"bosu ball","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/1307-wVompEp.jpg","gif":"videos/1307-wVompEp.gif","h":"Place the bosu ball on the ground with the flat side facing up. Position yourself in a push-up position with your hands on the outer edges of the bosu ball. Engage your core and lower your body down towards the bosu ball by bending your elbows. Push yourself back up to the starting position by extending your arms. Repeat for the desired number of repetitions."},{"i":"0662","n":"push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","deltoids","core"],"img":"images/0662-I4hDWkc.jpg","gif":"videos/0662-I4hDWkc.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart and your feet together. Engage your core and lower your body towards the ground by bending your elbows, keeping your body in a straight line. Pause for a moment when your chest is just above the ground, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"0653","n":"push-up (bosu ball)","b":"chest","q":"bosu ball","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0653-2kr2lWy.jpg","gif":"videos/0653-2kr2lWy.gif","h":"Place the bosu ball on the ground with the flat side facing up. Position yourself in a push-up position with your hands on the outer edges of the bosu ball. Engage your core and lower your body down towards the bosu ball by bending your elbows. Push yourself back up to the starting position by extending your arms. Repeat for the desired number of repetitions."},{"i":"0655","n":"push-up (on stability ball)","b":"chest","q":"stability ball","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0655-Y4BRNQF.jpg","gif":"videos/0655-Y4BRNQF.gif","h":"Place the stability ball on the ground and position yourself facing down with your hands on the ball, shoulder-width apart. Extend your legs straight out behind you, balancing on your toes. Engage your core and lower your chest towards the ball by bending your elbows, keeping your body in a straight line. Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"0656","n":"push-up (on stability ball)","b":"chest","q":"stability ball","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0656-tgryw5Y.jpg","gif":"videos/0656-tgryw5Y.gif","h":"Place the stability ball on the ground and position yourself facing down with your hands on the ball, shoulder-width apart. Extend your legs straight out behind you, balancing on your toes. Engage your core and lower your chest towards the ball by bending your elbows, keeping your body in a straight line. Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"0659","n":"push-up (wall)","b":"chest","q":"body weight","t":"pectorals","s":["triceps","deltoids"],"img":"images/0659-LEH9jxP.jpg","gif":"videos/0659-LEH9jxP.gif","h":"Stand facing a wall, about arm's length away. Place your hands on the wall at shoulder height, slightly wider than shoulder-width apart. Step back a few feet, keeping your body straight and your feet hip-width apart. Bend your elbows and lower your chest towards the wall, keeping your body in a straight line. Push back up to the starting position, straightening your arms. Repeat for the desired number of repetitions."},{"i":"0658","n":"push-up (wall) v. 2","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/0658-NCmbLCw.jpg","gif":"videos/0658-NCmbLCw.gif","h":"Stand facing a wall, about arm's length away. Place your hands on the wall at shoulder height, slightly wider than shoulder-width apart. Step back with your feet, keeping them hip-width apart. Engage your core and keep your body in a straight line from head to heels. Bend your elbows and lower your chest towards the wall, keeping your body straight. Pause for a moment, then push yourself back to the starting position. Repeat for the desired number of repetitions."},{"i":"0660","n":"push-up close-grip off dumbbell","b":"upper arms","q":"dumbbell","t":"triceps","s":["chest","shoulders"],"img":"images/0660-KZXAtKQ.jpg","gif":"videos/0660-KZXAtKQ.gif","h":"Start in a push-up position with your hands placed close together, directly under your shoulders. Hold a dumbbell in each hand, resting them on the ground. Lower your body towards the ground by bending your elbows, keeping them close to your sides. Push through your palms to extend your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0661","n":"push-up inside leg kick","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0661-0br45wL.jpg","gif":"videos/0661-0br45wL.gif","h":"Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together. Lower your body towards the ground by bending your elbows, keeping your back straight and your core engaged. As you push back up, lift one leg off the ground and kick it out to the side, keeping it straight. Lower your leg back down and repeat the push-up, then switch to the other leg. Continue alternating leg kicks with each push-up repetition."},{"i":"0663","n":"push-up medicine ball","b":"chest","q":"medicine ball","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0663-W8KAlkI.jpg","gif":"videos/0663-W8KAlkI.gif","h":"Start in a high plank position with your hands on the medicine ball, shoulder-width apart. Engage your core and lower your body towards the ground by bending your elbows, keeping your back straight. Push through your palms to extend your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"1467","n":"push-up on lower arms","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/1467-4Jt8QsQ.jpg","gif":"videos/1467-4Jt8QsQ.gif","h":"Start in a plank position with your forearms on the ground and elbows directly below your shoulders. Engage your core and keep your body in a straight line from head to toe. Lower your chest towards the ground by bending your elbows, keeping them close to your body. Pause for a moment at the bottom, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"3145","n":"push-up plus","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/3145-pvBMLHA.jpg","gif":"videos/3145-pvBMLHA.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart and your body in a straight line from head to heels. Lower your body towards the ground by bending your elbows, keeping them close to your sides. Once your chest is just above the ground, push through your hands to extend your arms and lift your upper body up. At the top of the movement, protract your shoulder blades by pushing your upper back towards the ceiling. Pause for a moment, then reverse the movement by retracting your shoulder blades and lowering your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0664","n":"push-up to side plank","b":"waist","q":"body weight","t":"abs","s":["shoulders","chest","triceps"],"img":"images/0664-KhHJ338.jpg","gif":"videos/0664-KhHJ338.gif","h":"Start in a push-up position with your hands shoulder-width apart and your body in a straight line. Lower your body towards the ground by bending your elbows, keeping your core engaged. Push back up to the starting position. Shift your weight onto your left hand and rotate your body to the right, lifting your right arm towards the ceiling. Hold the side plank position for a few seconds, then return to the starting position. Repeat the push-up and side plank on the opposite side. Continue alternating sides for the desired number of repetitions."},{"i":"3533","n":"quads","b":"upper legs","q":"body weight","t":"quads","s":["hamstrings","glutes"],"img":"images/3533-6YUfHPL.jpg","gif":"videos/3533-6YUfHPL.gif","h":"Stand with your feet shoulder-width apart. Lower your body by bending your knees and pushing your hips back as if sitting on a chair. Keep your chest up and your back straight. Lower yourself until your thighs are parallel to the ground. Push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"3201","n":"quarter sit-up","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/3201-enxnJcM.jpg","gif":"videos/3201-enxnJcM.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3552","n":"quick feet v. 2","b":"upper legs","q":"body weight","t":"quads","s":["calves","hamstrings"],"img":"images/3552-mweqJin.jpg","gif":"videos/3552-mweqJin.gif","h":"Stand with your feet shoulder-width apart and your arms by your sides. Begin by rapidly moving your feet up and down, as if you were running in place. Keep your movements quick and light, focusing on staying on the balls of your feet. Continue for the desired duration or number of repetitions."},{"i":"0666","n":"raise single arm push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0666-13TpY4H.jpg","gif":"videos/0666-13TpY4H.gif","h":"Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet together. Extend one arm straight out to the side, parallel to the ground. Lower your body towards the ground by bending your elbows, keeping your back straight and core engaged. Push back up to the starting position, using your chest muscles to lift your body. Repeat with the other arm extended."},{"i":"0668","n":"rear decline bridge","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","lower back"],"img":"images/0668-UpAlold.jpg","gif":"videos/0668-UpAlold.gif","h":"Lie on your back with your feet flat on the ground and your knees bent. Place your arms by your sides with your palms facing down. Engage your glutes and hamstrings, and lift your hips off the ground until your body forms a straight line from your knees to your shoulders. Hold this position for a few seconds, then slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0669","n":"rear deltoid stretch","b":"shoulders","q":"body weight","t":"delts","s":["trapezius","rhomboids"],"img":"images/0669-xifhB5W.jpg","gif":"videos/0669-xifhB5W.gif","h":"Stand tall with your feet shoulder-width apart. Extend your right arm across your chest, placing your left hand on your right elbow. Gently pull your right arm towards your left shoulder, feeling a stretch in your right shoulder. Hold the stretch for 15-30 seconds, then release. Repeat on the other side."},{"i":"0670","n":"rear pull-up","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/0670-CbFSYC1.jpg","gif":"videos/0670-CbFSYC1.gif","h":"Grab the pull-up bar with an overhand grip, slightly wider than shoulder-width apart. Hang from the bar with your arms fully extended and your body straight. Engage your back muscles and pull your body up towards the bar, keeping your elbows close to your body. Continue pulling until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1582","n":"reclining big toe pose with rope","b":"upper legs","q":"rope","t":"hamstrings","s":["calves","glutes"],"img":"images/1582-K5xgdvI.jpg","gif":"videos/1582-K5xgdvI.gif","h":"Lie on your back with your legs extended and your arms by your sides. Loop the rope around the ball of your right foot and hold the ends of the rope with your hands. Slowly raise your right leg towards your chest, keeping your knee straight and your foot flexed. Hold the stretch for a few seconds, then slowly lower your leg back down to the starting position. Repeat with your left leg. Continue alternating legs for the desired number of repetitions."},{"i":"3236","n":"resistance band hip thrusts on knees (female)","b":"upper legs","q":"resistance band","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/3236-Pjbc0Kt.jpg","gif":"videos/3236-Pjbc0Kt.gif","h":"Start by kneeling on the ground with your knees hip-width apart and your feet flexed. Wrap the resistance band around your thighs, just above your knees. Place your hands on your hips or extend them out in front of you for balance. Engage your glutes and core muscles. Push your hips forward and squeeze your glutes as you lift your knees off the ground, extending your hips until your thighs are parallel to the ground. Hold the position for a moment, then slowly lower your knees back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3007","n":"resistance band leg extension","b":"upper legs","q":"resistance band","t":"quads","s":["hamstrings"],"img":"images/3007-Y1MsI1l.jpg","gif":"videos/3007-Y1MsI1l.gif","h":"Attach the resistance band to a sturdy anchor point and secure it around your ankle. Stand facing the anchor point with your feet shoulder-width apart. Keeping your core engaged and your upper body stable, extend your leg straight out in front of you. Pause for a moment at the top, then slowly return your leg to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"3123","n":"resistance band seated biceps curl","b":"upper arms","q":"resistance band","t":"biceps","s":["forearms"],"img":"images/3123-XFc3vpY.jpg","gif":"videos/3123-XFc3vpY.gif","h":"Sit on a chair or bench with your back straight and feet flat on the ground. Hold the resistance band with an underhand grip, palms facing up, and arms extended down by your sides. Keeping your upper arms stationary, exhale and curl the resistance band up towards your shoulders. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the resistance band back to the starting position. Repeat for the desired number of repetitions."},{"i":"3124","n":"resistance band seated chest press","b":"chest","q":"resistance band","t":"pectorals","s":["shoulders","triceps"],"img":"images/3124-4x5Okof.jpg","gif":"videos/3124-4x5Okof.gif","h":"Sit on a chair or bench with your back straight and feet flat on the ground. Hold the resistance band handles in each hand, with your palms facing down and elbows bent at a 90-degree angle. Extend your arms forward, pushing the resistance band away from your chest. Pause for a moment at the end of the movement, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"3006","n":"resistance band seated hip abduction","b":"upper legs","q":"resistance band","t":"abductors","s":["glutes","hamstrings"],"img":"images/3006-0xDpB4L.jpg","gif":"videos/3006-0xDpB4L.gif","h":"Sit on a chair or bench with your back straight and feet flat on the ground. Wrap the resistance band around your thighs, just above your knees. Place your hands on the sides of the chair or bench for support. Engage your abductors (outer thigh muscles) and slowly push your knees apart, against the resistance of the band. Pause for a moment at the end of the movement, then slowly bring your knees back together. Repeat for the desired number of repetitions."},{"i":"3122","n":"resistance band seated shoulder press","b":"shoulders","q":"resistance band","t":"delts","s":["triceps","upper back"],"img":"images/3122-S93zLTG.jpg","gif":"videos/3122-S93zLTG.gif","h":"Sit on a chair or bench with your back straight and feet flat on the ground. Hold the resistance band with both hands, palms facing forward, and bring it up to shoulder level. Press the band overhead, extending your arms fully. Pause for a moment at the top, then slowly lower the band back down to shoulder level. Repeat for the desired number of repetitions."},{"i":"3144","n":"resistance band seated straight back row","b":"back","q":"resistance band","t":"upper back","s":["biceps","shoulders"],"img":"images/3144-Nu7jqFE.jpg","gif":"videos/3144-Nu7jqFE.gif","h":"Sit on the floor with your legs extended and loop the resistance band around your feet. Hold the ends of the resistance band with your hands, palms facing each other. Keep your back straight and lean slightly back, engaging your core. Pull the resistance band towards your chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly release the tension and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0872","n":"reverse crunch","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0872-nCU1Ekp.jpg","gif":"videos/0872-nCU1Ekp.gif","h":"Lie flat on your back with your arms extended along your sides. Bend your knees and lift your feet off the ground, bringing your thighs perpendicular to the floor. Contract your abs and curl your hips off the floor, bringing your knees towards your chest. Pause for a moment at the top, then slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0672","n":"reverse dip","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0672-NZ5Qqkz.jpg","gif":"videos/0672-NZ5Qqkz.gif","h":"Position yourself between two parallel bars with your arms fully extended and your body straight. Lower your body by bending your elbows until your upper arms are parallel to the ground. Pause for a moment, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"0673","n":"reverse grip machine lat pulldown","b":"back","q":"leverage machine","t":"lats","s":["biceps","forearms"],"img":"images/0673-ecpY0rH.jpg","gif":"videos/0673-ecpY0rH.gif","h":"Adjust the seat height and position yourself on the machine with your knees under the pads and your feet flat on the ground. Grasp the handles with an underhand grip, slightly wider than shoulder-width apart. Sit upright with your chest out and shoulders back, maintaining a slight arch in your lower back. Pull the handles down towards your chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly release the handles back to the starting position. Repeat for the desired number of repetitions."},{"i":"0674","n":"reverse grip pull-up","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/0674-YAk5dIw.jpg","gif":"videos/0674-YAk5dIw.gif","h":"Grab the pull-up bar with an underhand grip, hands shoulder-width apart. Hang from the bar with your arms fully extended and your body straight. Engage your back muscles and pull your body up towards the bar, leading with your chest. Continue pulling until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0675","n":"reverse hyper extension (on stability ball)","b":"upper legs","q":"stability ball","t":"glutes","s":["hamstrings","lower back"],"img":"images/0675-vM5YS2g.jpg","gif":"videos/0675-vM5YS2g.gif","h":"Lie face down on a stability ball with your hips resting on the ball and your legs extended straight behind you. Place your hands on the ground in front of you for stability. Engaging your glutes and hamstrings, lift your legs up towards the ceiling as high as you can. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1423","n":"reverse hyper on flat bench","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","lower back"],"img":"images/1423-OrETs32.jpg","gif":"videos/1423-OrETs32.gif","h":"Lie face down on a flat bench with your hips at the edge and your legs hanging off the bench. Hold onto the bench for stability. Keeping your legs straight, raise them up towards the ceiling as high as you can. Squeeze your glutes at the top of the movement. Slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3663","n":"reverse plank with leg lift","b":"waist","q":"body weight","t":"abs","s":["glutes","hamstrings","shoulders"],"img":"images/3663-tFToB7l.jpg","gif":"videos/3663-tFToB7l.gif","h":"Sit on the ground with your legs extended in front of you and your hands resting on the ground behind you, fingers pointing towards your feet. Press through your hands and lift your hips off the ground, coming into a reverse plank position. Engage your core and lift one leg off the ground, extending it straight up towards the ceiling. Hold for a moment, then lower your leg back down. Repeat with the other leg. Continue alternating legs for the desired number of repetitions."},{"i":"0677","n":"ring dips","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0677-ezTvXcr.jpg","gif":"videos/0677-ezTvXcr.gif","h":"Start by hanging from the rings with your arms fully extended and your body straight. Lower your body by bending your elbows until your shoulders are below your elbows. Push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"2571","n":"rocking frog stretch","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/2571-2Dk4xQV.jpg","gif":"videos/2571-2Dk4xQV.gif","h":"Start by kneeling on the ground with your knees hip-width apart. Place your hands on the ground in front of you for support. Slowly lean forward, shifting your weight onto your hands and extending your legs behind you. Keep your back straight and engage your glutes as you push your hips back and up towards the ceiling. Hold this position for a few seconds, feeling a stretch in your glutes. Slowly return to the starting position by bending your knees and lowering your hips back down. Repeat for the desired number of repetitions."},{"i":"0678","n":"rocky pull-up pulldown","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/0678-cQ19bBP.jpg","gif":"videos/0678-cQ19bBP.gif","h":"Stand in front of a pull-up bar with your feet shoulder-width apart. Reach up and grab the bar with an overhand grip, slightly wider than shoulder-width apart. Hang from the bar with your arms fully extended and your body straight. Engage your back muscles and pull your body up towards the bar, leading with your chest. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"2208","n":"roller back stretch","b":"back","q":"roller","t":"spine","s":["hamstrings","glutes"],"img":"images/2208-isofgzg.jpg","gif":"videos/2208-isofgzg.gif","h":"Start by sitting on the ground with your legs extended in front of you. Place the roller perpendicular to your body, just below your glutes. Slowly roll your body backwards, allowing the roller to move up your back. Continue rolling until the roller reaches your upper back. Pause for a moment, then slowly roll back to the starting position. Repeat for the desired number of repetitions."},{"i":"2204","n":"roller body saw","b":"waist","q":"roller","t":"abs","s":["shoulders","triceps","core"],"img":"images/2204-XeMvLgE.jpg","gif":"videos/2204-XeMvLgE.gif","h":"Start in a plank position with your forearms on the roller and your body in a straight line. Engage your core and slowly roll the roller forward, extending your body as far as you can while maintaining control. Pause for a moment at the furthest point, then slowly roll the roller back towards your starting position. Repeat for the desired number of repetitions."},{"i":"2205","n":"roller hip lat stretch","b":"upper legs","q":"roller","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/2205-0L2KwtI.jpg","gif":"videos/2205-0L2KwtI.gif","h":"Start by kneeling on the ground with the roller positioned under your hips. Place your hands on the roller for support. Slowly roll the roller forward, extending your hips and stretching your glutes. Hold the stretch for a few seconds, then roll back to the starting position. Repeat for the desired number of repetitions."},{"i":"2202","n":"roller hip stretch","b":"upper legs","q":"roller","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/2202-oMypNrz.jpg","gif":"videos/2202-oMypNrz.gif","h":"Start by sitting on the ground with your legs extended in front of you. Place the roller under your glutes, just above your knees. Lean back and place your hands on the ground behind you for support. Engage your glutes and slowly roll the roller forward, bending your knees and bringing them towards your chest. Pause for a moment at the end of the movement, feeling a stretch in your glutes. Slowly roll the roller back to the starting position, extending your legs. Repeat for the desired number of repetitions."},{"i":"2206","n":"roller reverse crunch","b":"waist","q":"roller","t":"abs","s":["hip flexors"],"img":"images/2206-SKXQAx3.jpg","gif":"videos/2206-SKXQAx3.gif","h":"Lie flat on your back with your arms extended straight above your head and your legs straight out in front of you. Place the roller between your feet and grip it with your toes. Engaging your abs, lift your legs off the ground and curl your knees towards your chest, rolling the roller towards your body. Pause for a moment at the top, then slowly lower your legs back down to the starting position, rolling the roller away from your body. Repeat for the desired number of repetitions."},{"i":"2203","n":"roller seated shoulder flexor depresor retractor","b":"chest","q":"roller","t":"pectorals","s":["deltoids","triceps"],"img":"images/2203-8coXSYU.jpg","gif":"videos/2203-8coXSYU.gif","h":"Sit on a flat surface with your legs extended in front of you. Hold the roller with both hands, palms facing down, and place it on your thighs. Lean forward slightly and roll the roller away from your body, extending your arms straight in front of you. Pause for a moment, then slowly roll the roller back towards your body, bending your arms and bringing the roller back to your thighs. Repeat for the desired number of repetitions."},{"i":"2209","n":"roller seated single leg shoulder flexor depresor retractor","b":"chest","q":"roller","t":"pectorals","s":["deltoids","triceps"],"img":"images/2209-CjETvlw.jpg","gif":"videos/2209-CjETvlw.gif","h":"Sit on a flat surface with your legs extended in front of you. Hold the roller with both hands, palms facing down, and place it on your thighs. Lean back slightly and engage your core muscles. Raise the roller up to shoulder level, keeping your arms straight. Slowly lower the roller back down to your thighs. Repeat for the desired number of repetitions."},{"i":"2207","n":"roller side lat stretch","b":"back","q":"roller","t":"lats","s":["shoulders","triceps"],"img":"images/2207-c3Pfhti.jpg","gif":"videos/2207-c3Pfhti.gif","h":"Stand with your feet shoulder-width apart and hold the roller with both hands in front of your body. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Extend your arms forward and roll the roller down towards your feet, feeling a stretch in your lats. Hold the stretch for a few seconds, then slowly roll the roller back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0680","n":"rope climb","b":"back","q":"rope","t":"upper back","s":["forearms","biceps","shoulders"],"img":"images/0680-yaAxcQr.jpg","gif":"videos/0680-yaAxcQr.gif","h":"Stand facing the rope with your feet shoulder-width apart. Grab the rope with both hands, palms facing towards you. Bend your knees slightly and engage your core. Begin pulling yourself up the rope by alternating hand-over-hand movements. Use your legs to assist in the upward movement. Continue climbing until you reach the desired height or the top of the rope. To descend, reverse the hand-over-hand movement while controlling your descent. Repeat for the desired number of repetitions."},{"i":"0685","n":"run","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/0685-oLrKqDH.jpg","gif":"videos/0685-oLrKqDH.gif","h":"Start by standing upright with your feet hip-width apart. Engage your core and keep your upper body relaxed. Begin jogging in place, lifting your knees up towards your chest and landing softly on the balls of your feet. Maintain a steady pace and continue jogging for the desired duration or distance. Remember to breathe deeply and maintain good posture throughout the exercise."},{"i":"0684","n":"run (equipment)","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/0684-y5p0H8a.jpg","gif":"videos/0684-y5p0H8a.gif","h":"Start by standing upright with your feet hip-width apart. Engage your core and keep your upper body relaxed. Begin jogging in place, lifting your knees up towards your chest and landing softly on the balls of your feet. Maintain a steady pace and continue jogging for the desired duration or distance. Remember to breathe deeply and maintain good posture throughout the exercise."},{"i":"1585","n":"runners stretch","b":"upper legs","q":"body weight","t":"hamstrings","s":["calves","quadriceps"],"img":"images/1585-0mB6wHO.jpg","gif":"videos/1585-0mB6wHO.gif","h":"Stand with your feet hip-width apart. Take a step forward with your right foot, keeping your left foot planted. Bend your right knee and lower your body down, keeping your left leg straight. Place your hands on your right thigh for support. Hold the stretch for 20-30 seconds, then switch sides and repeat."},{"i":"0687","n":"russian twist","b":"waist","q":"body weight","t":"abs","s":["obliques"],"img":"images/0687-XVDdcoj.jpg","gif":"videos/0687-XVDdcoj.gif","h":"Sit on the ground with your knees bent and feet flat on the floor. Lean back slightly while keeping your back straight and your core engaged. Hold your hands together in front of your chest or hold a weight if desired. Lift your feet off the ground, balancing on your sit bones. Twist your torso to the right, bringing your hands or weight towards the right side of your body. Pause for a moment, then twist your torso to the left, bringing your hands or weight towards the left side of your body. Continue alternating sides for the desired number of repetitions."},{"i":"3012","n":"scapula dips","b":"back","q":"body weight","t":"traps","s":["rhomboids","deltoids"],"img":"images/3012-7xeukSt.jpg","gif":"videos/3012-7xeukSt.gif","h":"Start by standing with your feet shoulder-width apart and your arms extended in front of you. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Lower your body by bending your elbows and retracting your shoulder blades, as if you are trying to squeeze a pencil between them. Pause for a moment at the bottom, then push through your hands to extend your elbows and return to the starting position. Repeat for the desired number of repetitions."},{"i":"3021","n":"scapula push-up","b":"chest","q":"body weight","t":"serratus anterior","s":["triceps","shoulders"],"img":"images/3021-jV65tKx.jpg","gif":"videos/3021-jV65tKx.gif","h":"Start in a high plank position with your hands directly under your shoulders and your body in a straight line. Lower your chest towards the ground, keeping your elbows close to your body. As you lower, squeeze your shoulder blades together and push your chest forward. Pause for a moment at the bottom, then push back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0688","n":"scapular pull-up","b":"back","q":"body weight","t":"traps","s":["biceps","rhomboids","rear deltoids"],"img":"images/0688-uTBt1HV.jpg","gif":"videos/0688-uTBt1HV.gif","h":"Start by hanging from a pull-up bar with your palms facing away from you and your arms fully extended. Retract your shoulder blades by pulling them down and back. Engage your back muscles and pull your body up towards the bar, focusing on squeezing your shoulder blades together. Pause for a moment at the top of the movement, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3219","n":"scissor jumps (male)","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/3219-Eh2v5Iu.jpg","gif":"videos/3219-Eh2v5Iu.gif","h":"Stand with your feet shoulder-width apart. Jump off the ground and simultaneously cross your right leg in front of your left leg. As you land, quickly switch legs, crossing your left leg in front of your right leg. Continue alternating legs and jumping as quickly as possible. Repeat for the desired number of repetitions."},{"i":"1390","n":"seated calf stretch (male)","b":"lower legs","q":"body weight","t":"calves","s":["hamstrings"],"img":"images/1390-17bqEXD.jpg","gif":"videos/1390-17bqEXD.gif","h":"Sit on the edge of a chair or bench with your feet flat on the ground. Extend one leg straight out in front of you, keeping your heel on the ground. Lean forward slightly, feeling a stretch in your calf muscle. Hold the stretch for 20-30 seconds. Switch legs and repeat the stretch."},{"i":"1424","n":"seated glute stretch","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings"],"img":"images/1424-DeDThfG.jpg","gif":"videos/1424-DeDThfG.gif","h":"Sit on the ground with your legs extended in front of you. Bend your right knee and cross your right ankle over your left thigh. Place your right hand on the ground behind you for support. With your left hand, gently press down on your right knee to deepen the stretch. Hold the stretch for 30 seconds to 1 minute. Switch sides and repeat."},{"i":"0689","n":"seated leg raise","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0689-Hgs6Nl1.jpg","gif":"videos/0689-Hgs6Nl1.gif","h":"Sit on a flat bench with your back straight and your feet flat on the ground. Place your hands on the sides of the bench for support. Keeping your legs straight, slowly raise them up in front of you until they are parallel to the ground. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0690","n":"seated lower back stretch","b":"back","q":"body weight","t":"lats","s":["glutes","hamstrings"],"img":"images/0690-QFmz6ch.jpg","gif":"videos/0690-QFmz6ch.gif","h":"Sit on the edge of a chair with your feet flat on the ground. Place your hands on your thighs or on the sides of the chair for support. Slowly lean forward from your hips, keeping your back straight. Feel the stretch in your lower back and hold for 20-30 seconds. Slowly return to the starting position and repeat for the desired number of repetitions."},{"i":"2567","n":"seated piriformis stretch","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings"],"img":"images/2567-QY39eBr.jpg","gif":"videos/2567-QY39eBr.gif","h":"Sit on the ground with your legs extended in front of you. Bend your right knee and place your right foot on the outside of your left knee. Place your left elbow on the outside of your right knee and gently twist your torso to the right. Hold the stretch for 20-30 seconds, then switch sides and repeat."},{"i":"0691","n":"seated side crunch (wall)","b":"waist","q":"body weight","t":"abs","s":["obliques"],"img":"images/0691-Y9hNPcN.jpg","gif":"videos/0691-Y9hNPcN.gif","h":"Sit on the floor with your back against a wall and your legs extended in front of you. Bend your knees and place your feet flat on the floor, hip-width apart. Place your hands behind your head with your elbows pointing outwards. Engage your abs and lean to one side, bringing your elbow towards your hip. Pause for a moment, then return to the starting position. Repeat on the other side. Continue alternating sides for the desired number of repetitions."},{"i":"1587","n":"seated wide angle pose sequence","b":"upper legs","q":"body weight","t":"hamstrings","s":["quadriceps","calves"],"img":"images/1587-HIgYKAB.jpg","gif":"videos/1587-HIgYKAB.gif","h":"Sit on the ground with your legs extended in a wide angle. Flex your feet and engage your quadriceps. Place your hands on the ground behind you for support. Keeping your back straight, lean forward from your hips. Continue leaning forward until you feel a stretch in your hamstrings. Hold this position for a few breaths. Slowly release the stretch and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0697","n":"self assisted inverse leg curl","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes","calves"],"img":"images/0697-GwYwElT.jpg","gif":"videos/0697-GwYwElT.gif","h":"Lie flat on your back on a mat or bench with your legs extended. Place your hands by your sides or under your glutes for support. Bend your knees and lift your feet off the ground, bringing your thighs towards your chest. Pause for a moment at the top, then slowly lower your legs back to the starting position. Repeat for the desired number of repetitions."},{"i":"1766","n":"self assisted inverse leg curl","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes","calves"],"img":"images/1766-ZSY3MsL.jpg","gif":"videos/1766-ZSY3MsL.gif","h":"Lie face down on a leg curl machine with your legs extended and your ankles hooked under the padded lever. Place your hands on the side handles of the machine for support. Keeping your upper body stationary, exhale and curl your legs upward as far as possible. Hold the contracted position for a brief pause as you squeeze your hamstrings. Slowly lower your legs back to the starting position while inhaling. Repeat for the desired number of repetitions."},{"i":"0696","n":"self assisted inverse leg curl (on floor)","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes","calves"],"img":"images/0696-E4PwJqI.jpg","gif":"videos/0696-E4PwJqI.gif","h":"Lie flat on your back with your legs extended and your arms by your sides. Bend your knees and place your feet flat on the ground, hip-width apart. Lift your hips off the ground, engaging your glutes and hamstrings. Slowly curl your legs towards your glutes, keeping your hips lifted. Pause for a moment at the top, then slowly extend your legs back to the starting position. Lower your hips back down to the ground. Repeat for the desired number of repetitions."},{"i":"3222","n":"semi squat jump (male)","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/3222-6FMU51h.jpg","gif":"videos/3222-6FMU51h.gif","h":"Stand with your feet shoulder-width apart. Bend your knees and lower your body into a squat position. Jump explosively, extending your hips and knees while swinging your arms for momentum. Land softly on the balls of your feet and immediately go into the next repetition. Repeat for the desired number of repetitions."},{"i":"3656","n":"short stride run","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/3656-CcWEoWV.jpg","gif":"videos/3656-CcWEoWV.gif","h":"Find an open space or a treadmill to perform the exercise. Stand tall with your feet hip-width apart. Start jogging in place, lifting your knees high and pumping your arms. After a few seconds, start taking short strides forward, maintaining a quick pace. Continue running with short strides for the desired duration or distance."},{"i":"1763","n":"shoulder grip pull-up","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/1763-YtgD7Xq.jpg","gif":"videos/1763-YtgD7Xq.gif","h":"Grab the pull-up bar with a shoulder-width grip, palms facing away from you. Hang freely with your arms fully extended. Engage your back muscles and pull your body up towards the bar until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3699","n":"shoulder tap","b":"waist","q":"body weight","t":"abs","s":["shoulders","triceps"],"img":"images/3699-yRpV5TC.jpg","gif":"videos/3699-yRpV5TC.gif","h":"Start in a high plank position with your hands directly under your shoulders and your body in a straight line. Engage your core and lift your right hand off the ground, reaching across to tap your left shoulder. Place your right hand back on the ground and repeat with your left hand tapping your right shoulder. Continue alternating shoulder taps while keeping your hips and torso stable. Repeat for the desired number of repetitions."},{"i":"0699","n":"shoulder tap push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","core"],"img":"images/0699-qEse6fe.jpg","gif":"videos/0699-qEse6fe.gif","h":"Start in a high plank position with your hands slightly wider than shoulder-width apart and your body in a straight line from head to heels. Lower your body towards the ground by bending your elbows, keeping them close to your sides. As you push back up, lift your right hand off the ground and tap your left shoulder. Return your right hand to the ground and repeat the push-up, this time lifting your left hand and tapping your right shoulder. Continue alternating shoulder taps with each push-up repetition. Maintain a stable core and avoid excessive hip rotation throughout the exercise. Repeat for the desired number of repetitions."},{"i":"1774","n":"side bridge hip abduction","b":"upper legs","q":"body weight","t":"abductors","s":["glutes","obliques"],"img":"images/1774-WL4EmxJ.jpg","gif":"videos/1774-WL4EmxJ.gif","h":"Lie on your side with your legs extended and stacked on top of each other. Prop yourself up on your forearm, keeping your elbow directly below your shoulder. Engage your core and lift your hips off the ground, creating a straight line from your head to your feet. While keeping your core engaged, lift your top leg as high as possible without rotating your hips. Pause for a moment at the top, then lower your leg back down. Repeat for the desired number of repetitions, then switch sides."},{"i":"0705","n":"side bridge v. 2","b":"waist","q":"body weight","t":"abs","s":["obliques","glutes"],"img":"images/0705-RKjH6Lt.jpg","gif":"videos/0705-RKjH6Lt.gif","h":"Lie on your side with your legs extended and stacked on top of each other. Place your forearm on the ground directly below your shoulder, with your elbow bent at a 90-degree angle. Engage your core and lift your hips off the ground, creating a straight line from your head to your feet. Hold this position for the desired amount of time. Lower your hips back down to the starting position. Repeat on the other side."},{"i":"0709","n":"side hip (on parallel bars)","b":"waist","q":"body weight","t":"abs","s":["obliques","hip flexors"],"img":"images/0709-jTkSc6o.jpg","gif":"videos/0709-jTkSc6o.gif","h":"Stand between two parallel bars with your feet shoulder-width apart. Place your hands on the bars and lift your body off the ground, supporting your weight on your arms. Engage your abs and slowly lift your legs to the side, keeping them straight. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0710","n":"side hip abduction","b":"upper legs","q":"body weight","t":"abductors","s":["glutes","quadriceps"],"img":"images/0710-7WaDzyL.jpg","gif":"videos/0710-7WaDzyL.gif","h":"Stand with your feet shoulder-width apart and your hands on your hips. Shift your weight to one leg and lift the opposite leg out to the side, keeping it straight. Pause for a moment at the top, then slowly lower your leg back down to the starting position. Repeat on the other side. Continue alternating sides for the desired number of repetitions."},{"i":"1358","n":"side lying floor stretch","b":"back","q":"body weight","t":"lats","s":["obliques","glutes"],"img":"images/1358-jDOKRM5.jpg","gif":"videos/1358-jDOKRM5.gif","h":"Lie on your side with your legs straight and your bottom arm extended straight overhead. Bend your top knee and place your foot on the ground in front of your bottom leg. Reach your top arm over your head and grab onto something stable, like a wall or a piece of furniture. Slowly lift your bottom leg off the ground, keeping it straight, until you feel a stretch in your side. Hold the stretch for 20-30 seconds, then slowly lower your leg back down. Repeat on the other side."},{"i":"3667","n":"side lying hip adduction (male)","b":"upper legs","q":"body weight","t":"adductors","s":["glutes","hamstrings"],"img":"images/3667-c8f5cSY.jpg","gif":"videos/3667-c8f5cSY.gif","h":"Lie on your side with your legs straight and stacked on top of each other. Place your bottom arm under your head for support. Engage your adductors and lift your top leg as high as possible without rotating your hips or leaning backward. Pause for a moment at the top, then slowly lower your leg back down to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"1775","n":"side plank hip adduction","b":"upper legs","q":"body weight","t":"adductors","s":["obliques","glutes"],"img":"images/1775-VO2qeJg.jpg","gif":"videos/1775-VO2qeJg.gif","h":"Start by lying on your side with your legs extended and stacked on top of each other. Prop yourself up on your forearm, keeping your elbow directly below your shoulder. Engage your core and lift your hips off the ground, creating a straight line from your head to your feet. While maintaining the side plank position, lift your top leg towards the ceiling, keeping it straight. Slowly lower your leg back down to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0716","n":"side push neck stretch","b":"neck","q":"body weight","t":"levator scapulae","s":["trapezius","sternocleidomastoid"],"img":"images/0716-oQRJYkC.jpg","gif":"videos/0716-oQRJYkC.gif","h":"Stand or sit up straight with your shoulders relaxed. Tilt your head to the right, bringing your right ear towards your right shoulder. Place your right hand on the left side of your head and gently apply pressure to increase the stretch. Hold the stretch for 15-30 seconds. Repeat on the other side, tilting your head to the left and applying pressure with your left hand. Repeat the stretch 2-3 times on each side."},{"i":"0717","n":"side push-up","b":"upper arms","q":"body weight","t":"triceps","s":["shoulders","chest","core"],"img":"images/0717-wpbD28t.jpg","gif":"videos/0717-wpbD28t.gif","h":"Start by lying on your side with your legs extended and stacked on top of each other. Place your bottom hand on the ground directly under your shoulder, fingers pointing forward. Press through your bottom hand to lift your body off the ground, keeping your legs straight and your core engaged. Extend your top arm straight up towards the ceiling, creating a straight line from your head to your heels. Lower your body back down to the starting position with control. Repeat for the desired number of repetitions, then switch sides."},{"i":"0721","n":"side wrist pull stretch","b":"lower arms","q":"body weight","t":"forearms","s":["wrists","hands"],"img":"images/0721-UtmIqcI.jpg","gif":"videos/0721-UtmIqcI.gif","h":"Stand with your feet shoulder-width apart and your arms extended in front of you. Extend your right arm out to the side, parallel to the ground, with your palm facing down. With your left hand, grab your right hand and gently pull it towards your body, feeling a stretch in your right forearm. Hold the stretch for 15-30 seconds, then release. Repeat on the other side."},{"i":"0720","n":"side-to-side chin","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/0720-isAAZWA.jpg","gif":"videos/0720-isAAZWA.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Grasp a pull-up bar with an overhand grip, hands slightly wider than shoulder-width apart. Hang from the bar with your arms fully extended and your body relaxed. Pull yourself up by bending your elbows and bringing your chin towards the bar, while keeping your body straight. Once your chin is above the bar, lower yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3213","n":"side-to-side toe touch (male)","b":"waist","q":"body weight","t":"abs","s":["obliques","hip flexors"],"img":"images/3213-WCAvOfC.jpg","gif":"videos/3213-WCAvOfC.gif","h":"Stand with your feet shoulder-width apart and your arms extended to the sides. Bend at the waist to the right, reaching your right hand towards your right foot while keeping your left hand extended to the side. Return to the starting position and then bend at the waist to the left, reaching your left hand towards your left foot while keeping your right hand extended to the side. Repeat the side-to-side bending motion for the desired number of repetitions."},{"i":"0725","n":"single arm push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0725-MUic5zN.jpg","gif":"videos/0725-MUic5zN.gif","h":"Start in a push-up position with your hands shoulder-width apart and one hand placed slightly wider than the other. Engage your core and lower your body towards the ground by bending your elbows, keeping your back straight. As you lower yourself, shift your weight to one side and lift the opposite arm off the ground, extending it straight out to the side. Push through your chest and triceps to raise your body back up to the starting position, while simultaneously lowering your extended arm back to the ground. Repeat the movement, alternating the arm you extend with each repetition."},{"i":"3645","n":"single leg bridge with outstretched leg","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/3645-rmEukuS.jpg","gif":"videos/3645-rmEukuS.gif","h":"Lie on your back with your knees bent and feet flat on the ground. Extend one leg straight out in front of you. Engage your glutes and lift your hips off the ground, forming a straight line from your knees to your shoulders. Hold for a moment at the top, then slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"0727","n":"single leg calf raise (on a dumbbell)","b":"lower legs","q":"dumbbell","t":"calves","s":["ankles","feet"],"img":"images/0727-fKZgDEO.jpg","gif":"videos/0727-fKZgDEO.gif","h":"Stand with your feet hip-width apart and hold a dumbbell in one hand. Lift one foot off the ground and balance on the other foot. Slowly raise your heel as high as possible, using your calf muscles. Pause for a moment at the top, then slowly lower your heel back down. Repeat for the desired number of repetitions, then switch to the other leg."},{"i":"0730","n":"single leg platform slide","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes","quadriceps"],"img":"images/0730-LNE3wfo.jpg","gif":"videos/0730-LNE3wfo.gif","h":"Start by standing with one foot on a platform or slide board. Bend your knee slightly and slide the foot on the platform backward, extending your leg. Keep your core engaged and maintain a straight posture throughout the movement. Slowly return to the starting position by sliding your foot back to the initial position. Repeat the movement for the desired number of repetitions, then switch legs."},{"i":"1759","n":"single leg squat (pistol) male","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1759-nqs5HGV.jpg","gif":"videos/1759-nqs5HGV.gif","h":"Stand with your feet shoulder-width apart and arms extended in front of you. Lift your right foot off the ground and extend it forward. Slowly lower your body down by bending your left knee and pushing your hips back. Keep your chest up and your back straight as you lower yourself down. Lower until your left thigh is parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your left heel to return to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"1489","n":"sissy squat","b":"upper legs","q":"body weight","t":"quads","s":["calves","glutes"],"img":"images/1489-xdYPUtE.jpg","gif":"videos/1489-xdYPUtE.gif","h":"Stand with your feet shoulder-width apart and your toes pointing slightly outward. Hold onto a stable object for balance if needed. Slowly lower your body by bending your knees and leaning back, keeping your torso upright. Continue lowering until your thighs are parallel to the ground or as far as you can comfortably go. Pause for a moment, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0735","n":"sit-up v. 2","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0735
