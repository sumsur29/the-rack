g a dumbbell in one hand at shoulder height with your palm facing inwards. Engage your core and keep your back straight. Press the dumbbell upwards until your arm is fully extended. Pause for a moment at the top, then slowly lower the dumbbell back to the starting position. Repeat for the desired number of repetitions, then switch to the other arm."},{"i":"0425","n":"dumbbell standing one arm reverse curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/0425-DU5Kkj2.jpg","gif":"videos/0425-DU5Kkj2.gif","h":"Stand up straight with your feet shoulder-width apart and hold a dumbbell in one hand with an overhand grip. Keep your arm fully extended and close to your body, with your palm facing down. Slowly curl the dumbbell up towards your shoulder, keeping your upper arm stationary. Pause for a moment at the top, then slowly lower the dumbbell back down to the starting position. Repeat for the desired number of repetitions, then switch to the other arm."},{"i":"0426","n":"dumbbell standing overhead press","b":"shoulders","q":"dumbbell","t":"delts","s":["triceps","upper back"],"img":"images/0426-A6wtbuL.jpg","gif":"videos/0426-A6wtbuL.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder level with your palms facing forward. Press the dumbbells upward until your arms are fully extended overhead. Pause for a moment at the top, then slowly lower the dumbbells back down to shoulder level. Repeat for the desired number of repetitions."},{"i":"0427","n":"dumbbell standing palms in press","b":"shoulders","q":"dumbbell","t":"delts","s":["triceps","chest"],"img":"images/0427-UilDHSs.jpg","gif":"videos/0427-UilDHSs.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand at shoulder level with your palms facing inwards. Keeping your core engaged and your back straight, press the dumbbells upwards until your arms are fully extended overhead. Pause for a moment at the top, then slowly rm stationary. Extend your arm back up to the starting position. Repeat for the desired number of repetitions."},{"i":"2293","n":"dumbbell standing zottman preacher curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms"],"img":"images/2293-P2nRiUa.jpg","gif":"videos/2293-P2nRiUa.gif","h":"Stand up straight with a dumbbell in each hand, palms facing forward. Place your upper arms against the preacher bench and keep your elbows slightly bent. Curl the dumbbells up towards your shoulders while keeping your upper arms stationary. At the top of the movement, rotate your wrists so that your palms are facing downward. Slowly lower the dumbbells back to the starting position, rotating your wrists back to the starting position as well. Repeat for the desired number of repetitions."},{"i":"1684","n":"dumbbell step up single leg balance with bicep curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["quadriceps","glutes","hamstrings"],"img":"images/1684-76vfTdU.jpg","gif":"videos/1684-76vfTdU.gif","h":"Stand in front of a step or platform with a dumbbell in each hand, palms facing your body. Place your right foot on the step, ensuring your entire foot is in contact with the surface. Engage your core and push through your right heel to lift your body up onto the step, bringing your left knee up towards your chest. At the top of the movement, perform a bicep curl by bending your elbows and bringing the dumbbells towards your shoulders. Lower the dumbbells back down and simultaneously lower your left foot back to the ground. Repeat the movement on the opposite side, stepping up with your left foot and curling the dumbbells. Continue alternating sides for the desired number of repetitions."},{"i":"0431","n":"dumbbell step-up","b":"upper legs","q":"dumbbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0431-aXtJhlg.jpg","gif":"videos/0431-aXtJhlg.gif","h":"Stand in front of a bench or step with a dumbbell in each hand, palms facing your body. Place your right foot on the bench or step, ensuring your entire foot is in contact with the surface. Push through your right heel and lift your body up onto the bench or step, straightening your right leg. Bring your left foot up onto the bench or step, standing fully upright. Step back down with your left foot, followed by your right foot, returning to the starting position. Repeat for the desired number of repetitions, then switch legs."},{"i":"2796","n":"dumbbell step-up lunge","b":"upper legs","q":"dumbbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/2796-gFyFj9z.jpg","gif":"videos/2796-gFyFj9z.gif","h":"Stand in front of a step or platform with a dumbbell in each hand, palms facing your sides. Place your right foot on the step, ensuring your entire foot is on the surface. Push through your right heel and lift your body up onto the step, bringing your left foot up as well. Once both feet are on the step, lower your left foot back down to the starting position, keeping your right foot on the step. Repeat the movement, alternating which foot you step up with each time. Continue for the desired number of repetitions."},{"i":"2812","n":"dumbbell step-up split squat","b":"upper legs","q":"dumbbell","t":"quads","s":["glutes","hamstrings","calves"],"img":"images/2812-QjE2DcA.jpg","gif":"videos/2812-QjE2DcA.gif","h":"Stand in front of a bench or step with a dumbbell in each hand, palms facing your body. Place your right foot on the bench or step, ensuring your entire foot is in contact with the surface. Step up onto the bench or step with your right foot, pushing through your heel to lift your body up. As you step up, simultaneously lift your left knee towards your chest. Pause at the top of the movement, then slowly lower your left foot back to the ground while keeping your right foot on the bench or step. Repeat the movement with your left foot on the bench or step. Continue alternating between your right and left foot for the desired number of repetitions."},{"i":"0432","n":"dumbbell stiff leg deadlift","b":"upper legs","q":"dumbbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/0432-5eLRITT.jpg","gif":"videos/0432-5eLRITT.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip. Keeping your back straight and your core engaged, hinge at the hips and lower the dumbbells towards the ground, allowing a slight bend in your knees. Lower the dumbbells until you feel a stretch in your hamstrings, then squeeze your glutes and push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0433","n":"dumbbell straight arm pullover","b":"chest","q":"dumbbell","t":"pectorals","s":["latissimus dorsi","triceps"],"img":"images/0433-i8BdLTK.jpg","gif":"videos/0433-i8BdLTK.gif","h":"Lie flat on a bench with your head at one end and your feet planted firmly on the ground. Hold a dumbbell with both hands and extend your arms straight above your chest. Keeping your arms straight, slowly lower the dumbbell behind your head in an arc-like motion. Pause for a moment, then raise the dumbbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0434","n":"dumbbell straight leg deadlift","b":"upper legs","q":"dumbbell","t":"glutes","s":["hamstrings","lower back"],"img":"images/0434-oom75KC.jpg","gif":"videos/0434-oom75KC.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip. Keeping your back straight and your core engaged, hinge at the hips and lower the dumbbells towards the ground, allowing your torso to lean forward. Continue lowering the dumbbells until you feel a stretch in your hamstrings, keeping your knees slightly bent. Pause for a moment at the bottom, then engage your glutes and hamstrings to lift your torso back up to the starting position. Repeat for the desired number of repetitions."},{"i":"2808","n":"dumbbell sumo pull ":"upper arms","q":"dumbbell","t":"triceps","s":["shoulders"],"img":"images/1742-wOLmCXc.jpg","gif":"videos/1742-wOLmCXc.gif","h":"Stand with your feet shoulder-width apart and hold a dumbbell in your right hand. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Bring your right elbow up to your side, keeping it bent at a 90-degree angle. Extend your right arm straight back, squeezing your triceps. Pause for a moment, then slowly lower the dumbbell back to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"1743","n":"dumbbell twisting bench press","b":"upper arms","q":"dumbbell","t":"triceps","s":["chest","shoulders"],"img":"images/1743-z6TAHoT.jpg","gif":"videos/1743-z6TAHoT.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Hold a dumbbell in each hand with an overhand grip, palms facing away from you. Extend your arms straight up over your chest, keeping a slight bend in your elbows. Lower the dumbbells down towards your chest, keeping your elbows close to your body. As you lower the dumbbells, twist your wrists so that your palms face towards you at the bottom of the movement. Pause for a moment at the bottom, then reverse the movement by pressing the dumbbells back up to the starting position. As you press the dumbbells up, twist your wrists back to the starting position with palms facing away from you. Repeat for the desired number of repetitions."},{"i":"0437","n":"dumbbell upright row","b":"shoulders","q":"dumbbell","t":"delts","s":["traps","biceps"],"img":"images/0437-ainizkb.jpg","gif":"videos/0437-ainizkb.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip. Let the dumbbells hang in front of your thighs, with your arms fully extended. Keeping your back straight and your core engaged, exhale and lift the dumbbells straight up towards your chin, leading with your elbows. Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1765","n":"dumbbell upright row (back pov)","b":"shoulders","q":"dumbbell","t":"delts","s":["traps","biceps"],"img":"images/1765-Iptlv6x.jpg","gif":"videos/1765-Iptlv6x.gif","h":"Stand with your feet shoulder-width apart, holding a dumbbell in each hand with an overhand grip. Let the dumbbells hang in front of your thighs, with your arms fully extended and your palms facing your body. Keeping your back straight and your core engaged, exhale and lift the dumbbells straight up towards your chin, leading with your elbows. Continue lifting until the dumbbells are at shoulder height, with your elbows pointing out to the sides. Pause for a moment at the top, then inhale and slowly lower the dumbbells back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0864","n":"dumbbell upright shoulder external rotation","b":"shoulders","q":"dumbbell","t":"delts","s":["rotator cuff","trapezius"],"img":"images/0864-x306lCW.jpg","gif":"videos/0864-x306lCW.gif","h":"Stand with your feet shoulder-width apart and hold a dumbbell in each hand with your palms facing your body. Raise your arms out to the sides until they are parallel to the ground, keeping your elbows slightly bent. Rotate your arms externally, bringing the dumbbells up towards your head while keeping your elbows in the same position. Pause for a moment at the top, then slowly lower the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"5201","n":"dumbbell waiter biceps curl","b":"upper arms","q":"dumbbell","t":"biceps","s":["forearms","shoulders"],"img":"images/5201-KOpzGBL.jpg","gif":"videos/5201-KOpzGBL.gif","h":"Stand up straight with a dumbbell in each hand, palms facing forward. Keep your upper arms close to your body and your elbows tucked in. Slowly curl the dumbbells up towards houlders. Engage your core and press through your palms to lift your upper body off the ground, keeping your elbows close to your sides. Pause at the top for a moment, squeezing your upper back muscles. Slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0443","n":"elbow-to-knee","b":"waist","q":"body weight","t":"abs","s":["obliques"],"img":"images/0443-jvp6DiD.jpg","gif":"videos/0443-jvp6DiD.gif","h":"Start by lying flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engage your abs and lift your upper body off the ground, bringing your right elbow towards your left knee. At the same time, bring your left knee towards your right elbow, creating a twisting motion. Pause for a moment at the top, then slowly lower your upper body and extend your legs back to the starting position. Repeat the movement, this time bringing your left elbow towards your right knee and your right knee towards your left elbow. Continue alternating sides for the desired number of repetitions."},{"i":"3292","n":"elevator","b":"back","q":"body weight","t":"upper back","s":["shoulders","trapezius"],"img":"images/3292-zYmNaoY.jpg","gif":"videos/3292-zYmNaoY.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Place your hands on your hips or cross them in front of your chest. Keeping your back straight, slowly bend forward at the waist, lowering your upper body towards the ground. Pause for a moment at the bottom, then slowly raise your upper body back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1332","n":"exercise ball alternating arm ups","b":"back","q":"stability ball","t":"lats","s":["shoulders","core"],"img":"images/1332-EyLrNC2.jpg","gif":"videos/1332-EyLrNC2.gif","h":"Sit on the stability ball with your feet flat on the ground and your back straight. Hold a dumbbell in each hand with your palms facing inwards and your arms extended down by your sides. Engage your core and slowly lift one arm up towards your shoulder, keeping your elbow slightly bent. Pause for a moment at the top, then slowly lower your arm back down to the starting position. Repeat the movement with the other arm. Continue alternating arms for the desired number of repetitions."},{"i":"1333","n":"exercise ball back extension with arms extended","b":"back","q":"stability ball","t":"spine","s":["glutes","hamstrings"],"img":"images/1333-PERjVm8.jpg","gif":"videos/1333-PERjVm8.gif","h":"Place the stability ball on the ground and lie face down on top of it, with your hips resting on the ball and your feet against a wall for stability. Extend your arms straight out in front of you, with your palms facing down. Engage your core and slowly lift your upper body off the ball, keeping your back straight and your neck in line with your spine. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1334","n":"exercise ball back extension with hands behind head","b":"back","q":"stability ball","t":"spine","s":["glutes","hamstrings"],"img":"images/1334-o1HGDSq.jpg","gif":"videos/1334-o1HGDSq.gif","h":"Place the stability ball on the ground and lie face down on top of it with your hips resting on the ball. Position your feet against a wall or other stable surface for support. Cross your arms behind your head, with your hands touching the back of your head. Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line from your head to your hips. Pause for a moment at the top of the movement, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1335","n":"exercise ball back extension with knees off ground","b":"back","q":"stability ball","t":"spine","s":["glutes","hamstrings"],"img":"images/1335-WME869U.jpg","gif":"videos/1335-WME869U.gif","h":"Place the stability ball on the ground and lie face down on top of it, with your hips resting on the ball and your feet against a wall for stability. Position your hands behind your head or crossed over your chest. Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line from your head to your heels. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1336","n":"exercise ball back extension with rotation","b":"back","q":"stability ball","t":"spine","s":["glutes","hamstrings"],"img":"images/1336-WVD66ff.jpg","gif":"videos/1336-WVD66ff.gif","h":"Start by lying face down on the stability ball with your hips resting on the ball and your feet firmly planted on the ground. Place your hands behind your head or cross them over your chest. Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line from your head to your heels. Pause for a moment at the top, then slowly rotate your torso to one side, keeping your hips and legs stable. Return to the center and repeat the rotation to the other side. Lower your upper body back down to the starting position and repeat for the desired number of repetitions."},{"i":"1744","n":"exercise ball dip","b":"upper arms","q":"stability ball","t":"triceps","s":["chest","shoulders"],"img":"images/1744-kprile3.jpg","gif":"videos/1744-kprile3.gif","h":"Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle. Place your hands on the ball beside your hips, fingers pointing forward. Engage your triceps and push through your hands to lift your body off the ball, straightening your arms. Lower your body back down by bending your elbows, keeping them close to your sides. Repeat for the desired number of repetitions."},{"i":"1559","n":"exercise ball hip flexor stretch","b":"upper legs","q":"stability ball","t":"glutes","s":["quadriceps","hamstrings"],"img":"images/1559-2LQkNPW.jpg","gif":"videos/1559-2LQkNPW.gif","h":"Place the stability ball on the ground and kneel in front of it. Place your right foot on top of the stability ball, with your knee bent at a 90-degree angle. Extend your left leg behind you, keeping it straight. Lean forward, pushing your hips towards the stability ball, until you feel a stretch in your right hip flexor. Hold the stretch for 20-30 seconds, then switch sides and repeat."},{"i":"1338","n":"exercise ball hug","b":"back","q":"stability ball","t":"spine","s":["shoulders","chest"],"img":"images/1338-d7z1Y7V.jpg","gif":"videos/1338-d7z1Y7V.gif","h":"Sit on the stability ball with your feet flat on the ground and your back straight. Hold the stability ball with both hands, hugging it close to your chest. Engage your core muscles and slowly lean back, keeping your back straight and your feet planted on the ground. Continue leaning back until you feel a stretch in your back muscles. Hold the position for a few seconds, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"1339","n":"exercise ball lat stretch","b":"back","q":"stability ball","t":"lats","s":["shoulders","triceps"],"img":"images/1339-sM84pE4.jpg","gif":"videos/1339-sM84pE4.gif","h":"Sit on a stability ball with your feet flat on the ground and your back straight. Hold a dumbbell in one hand and extend your arm straight up overhead. Slowly lean to the opposite side, feeling a stretch in your lat muscle. Hold the stretch for 20-30 seconds, then return to the starting position. Repeat on the other side."},{"i":"1341","n":"exercise ball lower back stretch (pyramid)","b":"back","q":"stability ball","t":"lats","s":["glutes","hamstrings"],"img":"images/1341-yU7w7CA.jpg","gif":"videos/1341-yU7w7CA.gif","h":"Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle. Slowly walk your feet forward, rolling the ball down your back until your lower back is resting on the ball. Place your hands behind your head or cross them over your chest. Engage your core and slowly lower your upper body towards the ground, allowing your lower back to stretch over the ball. Hold the stretch for a few seconds, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"1342","n":"exercise ball lying side lat stretch","b":"back","q":"stability ball","t":"lats","s":["shoulders","triceps"],"img":"images/1342-rTbyBYV.jpg","gif":"videos/1342-rTbyBYV.gif","h":"Lie on your side with your legs extended and your head supported by the stability ball. Place your top arm on the ball for stability. Reach your top arm overhead and allow your torso to rotate slightly. Feel the stretch in your lat muscles on the side of your body. Hold the stretch for 20-30 seconds, then switch sides and repeat."},{"i":"1382","n":"exercise ball on the wall calf raise","b":"lower legs","q":"dumbbell","t":"calves","s":["hamstrings","quadriceps"],"img":"images/1382-xo6sENf.jpg","gif":"videos/1382-xo6sENf.gif","h":"Stand with your back against a wall and place an exercise ball between your lower back and the wall. Position your feet shoulder-width apart, with your toes pointing forward. Hold a dumbbell in each hand, with your arms extended by your sides. Raise your heels off the ground, lifting your body weight onto the balls of your feet. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3241","n":"exercise ball on the wall calf raise (tennis ball between ankles)","b":"lower legs","q":"dumbbell","t":"calves","s":["hamstrings","quadriceps"],"img":"images/3241-FY3UdNT.jpg","gif":"videos/3241-FY3UdNT.gif","h":"Stand facing a wall with your feet shoulder-width apart. Place an exercise ball between the wall and your lower back. Hold a dumbbell in each hand, with your arms extended by your sides. Place a tennis ball between your ankles. Raise your heels off the ground, lifting your body up onto your toes. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3240","n":"exercise ball on the wall calf raise (tennis ball between knees)","b":"lower legs","q":"dumbbell","t":"calves","s":["quadriceps","hamstrings"],"img":"images/3240-j74M6Zn.jpg","gif":"videos/3240-j74M6Zn.gif","h":"Stand with your back against a wall and place an exercise ball between your lower back and the wall. Position your feet shoulder-width apart and slightly in front of you. Hold a dumbbell in each hand, with your arms extended by your sides. Place a tennis ball between your knees. Raise your heels off the ground, lifting your body up onto your toes. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1416","n":"exercise ball one leg prone lower body rotation","b":"upper legs","q":"stability ball","t":"glutes","s":["hamstrings","quadriceps","core"],"img":"images/1416-M72BExt.jpg","gif":"videos/1416-M72BExt.gif","h":"Lie face down on the stability ball with your hips resting on the ball and your legs extended straight behind you. Place your hands on the ground in front of you for support. Engage your glutes and core muscles to stabilize your body. Slowly lift one leg off the ground, keeping it straight and parallel to the floor. Rotate your leg outward, away from your body, while keeping your hips and upper body stable. Pause for a moment at the end of the rotation, then slowly return your leg to the starting position. Repeat the rotation with the other leg. Continue alternating legs for the desired number of repetitions."},{"i":"1417","n":"exercise ball one legged diagonal kick hamstring curl","b":"upper legs","q":"stability ball","t":"glutes","s":["hamstrings","calves"],"img":"images/1417-GOJKFfO.jpg","gif":"videos/1417-GOJKFfO.gif","h":"Start by lying on your back with your legs extended and your heels resting on top of the stability ball. Place your arms by your sides for stability. Engage your glutes and core muscles to lift your hips off the ground, creating a straight line from your shoulders to your heels. Bend your right knee and bring it towards your chest, keeping your left leg extended and your foot flexed. Kick your right leg diagonally across your body, extending it fully and engaging your hamstrings. Slowly return your right leg to the starting position, maintaining control and stability. Repeat the movement with your left leg, alternating sides for the desired number of repetitions."},{"i":"1296","n":"exercise ball pike push up","b":"chest","q":"stability ball","t":"pectorals","s":["shoulders","triceps","core"],"img":"images/1296-sVvXT5J.jpg","gif":"videos/1296-sVvXT5J.gif","h":"Start in a push-up position with your hands on the floor and your shins resting on the stability ball. Engage your core and lift your hips up towards the ceiling, rolling the ball towards your hands. Keep your legs straight and your body in a pike position, forming an inverted V shape. Bend your elbows and lower your upper body towards the floor, keeping your head in line with your hands. Push through your hands and extend your arms to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1343","n":"exercise ball prone leg raise","b":"back","q":"stability ball","t":"spine","s":["abdominals","glutes"],"img":"images/1343-lCKm4Rs.jpg","gif":"videos/1343-lCKm4Rs.gif","h":"Lie face down on a mat with your legs extended and your toes resting on top of the stability ball. Place your hands on the ground, shoulder-width apart, and engage your core muscles. Keeping your legs straight, slowly lift them off the ground, using your lower back and glutes to raise them as high as possible. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1560","n":"exercise ball seated hamstring stretch","b":"upper legs","q":"stability ball","t":"hamstrings","s":["glutes","lower back"],"img":"images/1560-yRYyfdA.jpg","gif":"videos/1560-yRYyfdA.gif","h":"Sit on the stability ball with your feet flat on the ground and your knees bent at a 90-degree angle. Slowly roll the ball forward, walking your feet out until your upper back is resting on the ball and your legs are extended straight in front of you. Place your hands on your hips for support. Engage your core and slowly lower your upper body towards the ground, keeping your back straight and your chest lifted. Stop when you feel a stretch in your hamstrings, and hold the position for 20-30 seconds. Slowly return to the starting position by pushing through your heels and using your hamstrings to pull yourself back up. Repeat for the desired number of repetitions."},{"i":"1745","n":"exercise ball seated triceps stretch","b":"upper arms","q":"stability ball","t":"triceps","s":["shoulders"],"img":"images/1745-7ePTw4B.jpg","gif":"videos/1745-7ePTw4B.gif","h":"Sit on a stability ball with your feet flat on the ground and your back straight. Hold a dumbbell in one hand and extend your arm straight up above your head. Bend your elbow and lower the dumbbell behind your head, keeping your upper arm close to your ear. Hold the stretch for a few seconds, then return to the starting position. Repeat with the other arm."},{"i":"1746","n":"exercise ball supine triceps extension","b":"upper arms","q":"dumbbell","t":"triceps","s":["shoulders"],"img":"images/1746-Gm2Uv1z.jpg","gif":"videos/1746-Gm2Uv1z.gif","h":"Sit on an exercise ball with your feet flat on the ground and your knees bent at a 90-degree angle. Hold a dumbbell with both hands and extend your arms straight up towards the ceiling. Slowly lower the dumbbell behind your head, keeping your elbows close to your ears. Pause for a moment, then raise the dumbbell back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1747","n":"ez bar french press on exercise ball","b":"upper arms","q":"ez barbell","t":"triceps","s":["shoulders"],"img":"images/1747-CFN9P8G.jpg","gif":"videos/1747-CFN9P8G.gif","h":"Sit on an exercise ball and hold an EZ barbell with an overhand grip. Extend your arms straight up, keeping your elbows close to your head. Slowly lower the barbell behind your head by bending your elbows. Pause for a moment, then extend your arms back up to the starting position. Repeat for the desired number of repetitions."},{"i":"3010","n":"ez bar lying bent arms pullover","b":"back","q":"ez barbell","t":"lats","s":["triceps","chest"],"img":"images/3010-nDK1HJ0.jpg","gif":"videos/3010-nDK1HJ0.gif","h":"Lie flat on a bench with your head at one end and your feet on the floor. Hold the EZ barbell with a pronated grip (palms facing away from you) and your hands shoulder-width apart. Extend your arms straight above your chest, keeping a slight bend in your elbows. Lower the barbell in an arc motion behind your head, maintaining the slight bend in your elbows. Pause for a moment, then return the barbell to the starting position by reversing the arc motion. Repeat for the desired number of repetitions."},{"i":"1748","n":"ez bar lying close grip triceps extension behind head","b":"upper arms","q":"ez barbell","t":"triceps","s":["shoulders"],"img":"images/1748-6CKUx7o.jpg","gif":"videos/1748-6CKUx7o.gif","h":"Lie flat on a bench with your feet flat on the ground and your head at the end of the bench. Hold the ez barbell with a close grip, palms facing up, and extend your arms straight up over your chest. Keeping your upper arms stationary, slowly lower the barbell behind your head by bending your elbows. Pause for a moment, then extend your arms back up to the starting position. Repeat for the desired number of repetitions."},{"i":"1344","n":"ez bar reverse grip bent over row","b":"back","q":"ez barbell","t":"upper back","s":["biceps","forearms"],"img":"images/1344-G8dXpNG.jpg","gif":"videos/1344-G8dXpNG.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Hold the ez barbell with an underhand grip, palms facing up, and hands shoulder-width apart. Bend forward at the hips, keeping your back straight and chest up, until your torso is almost parallel to the floor. Pull the ez barbell towards your lower chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the ez barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"1682","n":"ez bar seated close grip concentration curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/1682-Dsfz0Id.jpg","gif":"videos/1682-Dsfz0Id.gif","h":"Sit on a bench with your feet flat on the ground and hold an EZ barbell with an underhand grip. Rest your elbow on the inside of your thigh, just above the knee. Curl the barbell up towards your shoulder while keeping your upper arm stationary. Squeeze your biceps at the top of the movement, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1749","n":"ez bar standing french press","b":"upper arms","q":"ez barbell","t":"triceps","s":["shoulders"],"img":"images/1749-1cTf2Ux.jpg","gif":"videos/1749-1cTf2Ux.gif","h":"Stand with your feet shoulder-width apart and hold the ez barbell with an overhand grip. Raise the barbell above your head, fully extending your arms. Keeping your upper arms close to your head, slowly lower the barbell behind your head by bending your elbows. Pause for a moment, then extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0445","n":"ez barbell anti gravity press","b":"shoulders","q":"ez barbell","t":"delts","s":["triceps","chest"],"img":"images/0445-fprd84i.jpg","gif":"videos/0445-fprd84i.gif","h":"Start by standing with your feet shoulder-width apart and holding the ez barbell with an overhand grip. Raise the barbell to shoulder height, keeping your elbows slightly bent and your palms facing forward. Press the barbell overhead, extending your arms fully. Lower the barbell back to shoulder height and repeat for the desired number of repetitions."},{"i":"1627","n":"ez barbell close grip preacher curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/1627-hacCyUv.jpg","gif":"videos/1627-hacCyUv.gif","h":"Sit on a preacher curl bench and place your upper arms on the pad, gripping the ez barbell with an underhand grip. Rest your triceps on the pad and fully extend your arms, keeping your back straight. Slowly curl the barbell towards your shoulders, contracting your biceps. Pause for a moment at the top, squeezing your biceps. Lower the barbell back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0446","n":"ez barbell close-grip curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/0446-V4ryaZa.jpg","gif":"videos/0446-V4ryaZa.gif","h":"Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip, hands shoulder-width apart. Keep your elbows close to your torso and your upper arms stationary throughout the movement. Curl the barbell up towards your shoulders, contracting your biceps. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0447","n":"ez barbell curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/0447-6TG6x2w.jpg","gif":"videos/0447-6TG6x2w.gif","h":"Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip, palms facing up. Keep your elbows close to your torso and your upper arms stationary throughout the movement. Exhale as you curl the barbell up towards your shoulders, contracting your biceps. Pause for a moment at the top, then inhale as you slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0448","n":"ez barbell decline close grip face press","b":"upper arms","q":"ez barbell","t":"triceps","s":["chest","shoulders"],"img":"images/0448-DgZQ11d.jpg","gif":"videos/0448-DgZQ11d.gif","h":"Lie on a decline bench with your head lower than your feet. Grasp the ez barbell with a close grip, palms facing each other. Extend your arms straight up above your chest, keeping your elbows close to your body. Lower the barbell towards your forehead by bending your elbows. Pause for a moment, then press the barbell back up to the starting position. Repeat for the desired number of repetitions."},{"i":"2186","n":"ez barbell decline triceps extension","b":"upper arms","q":"ez barbell","t":"triceps","s":["shoulders"],"img":"images/2186-CQHoDm0.jpg","gif":"videos/2186-CQHoDm0.gif","h":"Lie on a decline bench with your head lower than your feet and your feet secured. Hold the ez barbell with an overhand grip, hands shoulder-width apart. Extend your arms fully, keeping your elbows close to your head. Lower the barbell slowly towards your forehead, bending your elbows. Pause for a moment, then extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0449","n":"ez barbell incline triceps extension","b":"upper arms","q":"ez barbell","t":"triceps","s":["shoulders"],"img":"images/0449-KyLtiLT.jpg","gif":"videos/0449-KyLtiLT.gif","h":"Set up an incline bench at a 45-degree angle. Sit on the bench with your back against the pad and hold the ez barbell with an overhand grip. Extend your arms fully overhead, keeping your elbows close to your head. Lower the barbell behind your head by bending your elbows, keeping your upper arms stationary. Pause for a moment, then extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0450","n":"ez barbell jm bench press","b":"upper arms","q":"ez barbell","t":"triceps","s":["chest","shoulders"],"img":"images/0450-hnOYgH3.jpg","gif":"videos/0450-hnOYgH3.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the ez barbell with an overhand grip, slightly wider than shoulder-width apart. Lower the barbell to your chest, keeping your elbows tucked in close to your body. Push the barbell back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"0451","n":"ez barbell reverse grip curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/0451-Y5X65IB.jpg","gif":"videos/0451-Y5X65IB.gif","h":"Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip. Keep your elbows close to your torso and your upper arms stationary throughout the exercise. Curl the barbell upwards by contracting your biceps, while exhaling. Continue to raise the barbell until your biceps are fully contracted and the barbell is at shoulder level. Hold the contracted position for a brief pause as you squeeze your biceps. Slowly begin to bring the barbell back to the starting position as you inhale. Repeat for the desired number of repetitions."},{"i":"0452","n":"ez barbell reverse grip preacher curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/0452-vBNyir7.jpg","gif":"videos/0452-vBNyir7.gif","h":"Sit on a preacher bench with your chest against the pad and your feet flat on the floor. Grasp the ez barbell with an underhand grip, hands shoulder-width apart. Rest your upper arms on the pad, allowing your forearms to hang down. Keeping your upper arms stationary, exhale and curl the barbell up towards your shoulders. Pause for a moment at the top, then inhale and slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1458","n":"ez barbell seated curls","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/1458-jtFKbt5.jpg","gif":"videos/1458-jtFKbt5.gif","h":"Sit on a bench with your feet flat on the ground and your back straight. Hold the ez barbell with an underhand grip, palms facing up, and your hands shoulder-width apart. Rest your upper arms on your thighs, allowing the ez barbell to hang down in front of you. Keeping your upper arms stationary, exhale and curl the ez barbell upwards towards your shoulders. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the ez barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0453","n":"ez barbell seated triceps extension","b":"upper arms","q":"ez barbell","t":"triceps","s":["shoulders"],"img":"images/0453-iaapw0g.jpg","gif":"videos/0453-iaapw0g.gif","h":"Sit on a bench with your back straight and feet flat on the ground. Hold the ez barbell with an overhand grip, hands shoulder-width apart. Raise the barbell overhead, fully extending your arms. Keeping your upper arms stationary, lower the barbell behind your head by bending your elbows. Pause for a moment, then raise the barbell back to the starting position by extending your arms. Repeat for the desired number of repetitions."},{"i":"0454","n":"ez barbell spider curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/0454-Ye5Qxb0.jpg","gif":"videos/0454-Ye5Qxb0.gif","h":"Stand with your feet shoulder-width apart and hold the ez barbell with an underhand grip, palms facing up. Rest your upper arms on a preacher bench or stability ball, allowing your elbows to hang down. Keeping your upper arms stationary, exhale and curl the barbell up towards your shoulders. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"1628","n":"ez barbell spider curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/1628-2kattbR.jpg","gif":"videos/1628-2kattbR.gif","h":"Stand with your feet shoulder-width apart and hold the ez barbell with an underhand grip, palms facing up. Rest your upper arms on a preacher bench or stability ball, allowing your elbows to hang down. Keeping your upper arms stationary, exhale and curl the barbell up towards your shoulders. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"2404","n":"ez-bar biceps curl (with arm blaster)","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/2404-tJ5nYqo.jpg","gif":"videos/2404-tJ5nYqo.gif","h":"Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip, palms facing up. Place your upper arms against the arm blaster, keeping them stationary throughout the exercise. Keeping your elbows close to your body, exhale and curl the barbell up towards your shoulders. Pause for a moment at the top, squeezing your biceps. Inhale and slowly lower the barbell back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"2432","n":"ez-bar close-grip bench press","b":"upper arms","q":"ez barbell","t":"triceps","s":["chest","shoulders"],"img":"images/2432-da4cXST.jpg","gif":"videos/2432-da4cXST.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the ez barbell with a close grip, hands shoulder-width apart, palms facing forward. Lift the barbell off the rack and hold it directly above your chest with your arms fully extended. Slowly lower the barbell towards your chest, keeping your elbows close to your body. Pause for a moment when the barbell touches your chest. Push the barbell back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"2741","n":"ez-barbell standing wide grip biceps curl","b":"upper arms","q":"ez barbell","t":"biceps","s":["forearms"],"img":"images/2741-OVTZ65k.jpg","gif":"videos/2741-OVTZ65k.gif","h":"Stand up straight with your feet shoulder-width apart and hold the ez barbell with an underhand grip, hands wider than shoulder-width apart. Keep your elbows close to your torso and your upper arms stationary throughout the movement. Curl the barbell up towards your shoulders by contracting your biceps. Pause for a moment at the top, then slowly lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"2133","n":"farmers walk","b":"upper legs","q":"dumbbell","t":"quads","s":["calves","forearms","core"],"img":"images/2133-qPEzJjA.jpg","gif":"videos/2133-qPEzJjA.gif","h":"Stand up straight with a dumbbell in each hand, palms facing your sides. Keep your back straight and your shoulders back. Take small, controlled steps forward, maintaining an upright posture. Continue walking for the desired distance or time. To finish, stop walking and carefully lower the dumbbells to your sides."},{"i":"0455","n":"finger curls","b":"lower arms","q":"barbell","t":"forearms","s":["wrist flexors","grip muscles"],"img":"images/0455-awG04cF.jpg","gif":"videos/0455-awG04cF.gif","h":"Sit on a bench with your feet flat on the ground and hold a barbell with an underhand grip, palms facing up. Rest your forearms on your thighs, allowing your wrists to hang off the edge. Slowly curl your fingers towards your palms, squeezing the barbell tightly. Hold the contraction for a moment, then slowly release your fingers back to the starting position. Repeat for the desired number of repetitions."},{"i":"3303","n":"flag","b":"waist","q":"body weight","t":"abs","s":["obliques","shoulders"],"img":"images/3303-pQ0Mx1Z.jpg","gif":"videos/3303-pQ0Mx1Z.gif","h":"Start by gripping a vertical pole with both hands, palms facing each other, and arms fully extended. Engage your core and lift your legs off the ground, keeping them straight. Using your core and upper body strength, raise your legs until they are parallel to the ground. Hold this position for as long as you can, maintaining a straight body line. Slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0456","n":"flexion leg sit up (bent knee)","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0456-AR0ig3o.jpg","gif":"videos/0456-AR0ig3o.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. At the same time, lift your legs off the ground, bending your knees and bringing them towards your chest. Pause for a moment at the top, then slowly lower your upper body and legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0457","n":"flexion leg sit up (straight arm)","b":"waist","q":"body weight","t":"abs","s":["hip flexors","quadriceps"],"img":"images/0457-KZn52RC.jpg","gif":"videos/0457-KZn52RC.gif","h":"Lie flat on your back with your legs extended and arms straight above your head. Engaging your abs, lift your upper body off the ground while simultaneously lifting your legs towards your chest. Reach your hands towards your toes as you lift your upper body and legs. Pause for a moment at the top, then slowly lower your upper body and legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0458","n":"floor fly (with barbell)","b":"chest","q":"barbell","t":"pectorals","s":["deltoids","triceps"],"img":"images/0458-neonEDL.jpg","gif":"videos/0458-neonEDL.gif","h":"Lie flat on your back on the floor with your knees bent and feet flat on the ground. Hold a barbell with an overhand grip, arms extended straight up over your chest. Slowly lower the barbell out to the sides, keeping a slight bend in your elbows. Lower the barbell until your arms are parallel to the floor, feeling a stretch in your chest. Pause for a moment, then squeeze your chest muscles to bring the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"0459","n":"flutter kicks","b":"upper legs","q":"body weight","t":"glutes","s":["hip flexors","lower abs"],"img":"images/0459-UVo2Qs2.jpg","gif":"videos/0459-UVo2Qs2.gif","h":"Lie flat on your back with your legs extended and your hands by your sides. Engage your core and lift your legs off the ground about 6 inches. Keeping your legs straight, alternate lifting one leg slightly higher than the other. Continue this fluttering motion for the desired number of repetitions."},{"i":"1472","n":"forward jump","b":"upper legs","q":"body weight","t":"quads","s":["calves","hamstrings","glutes"],"img":"images/1472-uZKq7lo.jpg","gif":"videos/1472-uZKq7lo.gif","h":"Stand with your feet shoulder-width apart. Bend your knees and lower your body into a squat position. Swing your arms back for momentum. Jump forward explosively, extending your hips, knees, and ankles. Land softly on the balls of your feet and immediately go into the next jump. Repeat for the desired number of repetitions."},{"i":"3470","n":"forward lunge (male)","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3470-kMzUs9Y.jpg","gif":"videos/3470-kMzUs9Y.gif","h":"Stand with your feet hip-width apart and hands on your hips. Take a big step forward with your right foot, lowering your body into a lunge position. Bend your right knee to about 90 degrees, keeping your knee aligned with your ankle. Push off with your right foot and return to the starting position. Repeat with your left leg, alternating sides for the desired number of repetitions."},{"i":"3194","n":"frankenstein squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3194-bdWcbaU.jpg","gif":"videos/3194-bdWcbaU.gif","h":"Stand with your feet shoulder-width apart and hold the barbell in front of your body with straight arms. Keeping your back straight, lower your body by bending at the knees and hips, as if sitting back into a chair. Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"2429","n":"frog crunch","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/2429-FFRP97T.jpg","gif":"videos/2429-FFRP97T.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3301","n":"frog planche","b":"waist","q":"body weight","t":"abs","s":["shoulders","chest","triceps"],"img":"images/3301-rQhGcin.jpg","gif":"videos/3301-rQhGcin.gif","h":"Start in a push-up position with your hands shoulder-width apart and your feet together. Bend your elbows and lower your body towards the ground, keeping your back straight. As you lower your body, lift your feet off the ground and bring your knees towards your chest. Hold this position for a few seconds, then extend your legs back out and push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"3296","n":"front lever","b":"waist","q":"body weight","t":"abs","s":["lats","shoulders","forearms"],"img":"images/3296-PkCN2lv.jpg","gif":"videos/3296-PkCN2lv.gif","h":"Start by hanging from a pull-up bar with an overhand grip, hands shoulder-width apart. Engage your core and pull your shoulder blades down and back. Bend your knees and tuck them towards your chest. Simultaneously, lift your legs up and extend them straight out in front of you, keeping your body parallel to the ground. Hold this position for as long as you can, aiming for a full front lever position. To release, slowly lower your legs back down and return to the starting position. Repeat for the desired number of repetitions."},{"i":"3295","n":"front lever reps","b":"back","q":"body weight","t":"upper back","s":["core","shoulders"],"img":"images/3295-hbY9wqG.jpg","gif":"videos/3295-hbY9wqG.gif","h":"Hang from a pull-up bar with an overhand grip, palms facing away from you. Engage your core and pull your shoulder blades down and back. Keeping your body straight, lift your legs up until they are parallel to the ground. Hold this position for as long as you can, aiming for 10-20 seconds. Slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0464","n":"front plank with twist","b":"waist","q":"body weight","t":"abs","s":["obliques","shoulders"],"img":"images/0464-CosupLu.jpg","gif":"videos/0464-CosupLu.gif","h":"Start in a high plank position with your hands directly under your shoulders and your body in a straight line from head to toe. Engage your core and glutes to maintain a stable position. Rotate your torso to the right, lifting your right arm and extending it towards the ceiling. Keep your hips and legs stable as you twist. Hold for a moment, then return to the starting position. Repeat the twist on the left side. Continue alternating sides for the desired number of repetitions."},{"i":"3315","n":"full maltese","b":"waist","q":"body weight","t":"abs","s":["shoulders","chest"],"img":"images/3315-YRaCa5Y.jpg","gif":"videos/3315-YRaCa5Y.gif","h":"Start by standing with your feet shoulder-width apart and your arms extended straight out to the sides. Slowly lean forward, keeping your arms straight, until your upper body is parallel to the ground. Engage your core and hold this position for a few seconds. Return to the starting position by pushing through your feet and standing back up. Repeat for the desired number of repetitions."},{"i":"3299","n":"full planche","b":"waist","q":"body weight","t":"abs","s":["shoulders","chest","triceps"],"img":"images/3299-YZ4961r.jpg","gif":"videos/3299-YZ4961r.gif","h":"Start in a push-up position with your hands shoulder-width apart and your fingers pointing forward. Engage your core and slowly shift your weight forward, lifting your feet off the ground. Continue shifting your weight forward until your body is parallel to the ground, balancing on your hands. Hold this position for as long as you can, maintaining a straight body line. Slowly lower your feet back to the ground and return to the starting position. Repeat for the desired number of repetitions."},{"i":"3327","n":"full planche push-up","b":"chest","q":"body weight","t":"pectorals","s":["shoulders","triceps","core"],"img":"images/3327-gw9PqGk.jpg","gif":"videos/3327-gw9PqGk.gif","h":"Start in a push-up position with your hands placed slightly wider than shoulder-width apart. Engage your core and lower your body down towards the ground, keeping your elbows close to your sides. As you lower yourself, lean your body forward and lift your feet off the ground, balancing on your hands. Continue to lower your body until your chest is just above the ground. Push through your hands and extend your arms to lift your body back up to the starting position. Maintain a straight line from your head to your heels throughout the movement. Repeat for the desired number of repetitions."},{"i":"0466","n":"gironda sternum chin","b":"back","q":"body weight","t":"lats","s":["biceps","rhomboids","rear deltoids"],"img":"images/0466-IL0JUxR.jpg","gif":"videos/0466-IL0JUxR.gif","h":"Stand facing a high bar with your feet shoulder-width apart. Reach up and grab the bar with an overhand grip, slightly wider than shoulder-width apart. Hang from the bar with your arms fully extended and your body straight. Engage your lats and biceps to pull your chest up towards the bar, leading with your sternum. Pause for a moment at the top, then slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3561","n":"glute bridge march","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/3561-GibBPPg.jpg","gif":"videos/3561-GibBPPg.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Engage your glutes and lift your hips off the ground, forming a straight line from your knees to your shoulders. While keeping your hips lifted, lift one foot off the ground and bring your knee towards your chest. Lower your foot back to the ground and repeat the movement with the other leg. Continue alternating legs in a marching motion while maintaining the bridge position. Repeat for the desired number of repetitions."},{"i":"3523","n":"glute bridge two legs on bench (male)","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","core"],"img":"images/3523-aWedzZX.jpg","gif":"videos/3523-aWedzZX.gif","h":"Sit on the edge of a bench with your back against it and your feet flat on the ground. Place your hands on the bench beside your hips for support. Engage your glutes and hamstrings, then lift your hips off the bench until your body forms a straight line from your knees to your shoulders. Pause for a moment at the top, then slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3193","n":"glute-ham raise","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes","lower back"],"img":"images/3193-Vvwjz6N.jpg","gif":"videos/3193-Vvwjz6N.gif","h":"Adjust the glute-ham raise machine to fit your body. Position yourself face down on the machine with your ankles secured. Place your hands on your chest or cross them over your chest. Engage your hamstrings and glutes to lift your upper body up towards the ceiling. Continue lifting until your body is in a straight line from your head to your heels. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0467","n":"gorilla chin","b":"waist","q":"body weight","t":"abs","s":["forearms","biceps"],"img":"images/0467-bmwlYvD.jpg","gif":"videos/0467-bmwlYvD.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Grasp a pull-up bar with an overhand grip, slightly wider than shoulder-width apart. Hang from the bar with your arms fully extended and your palms facing away from you. Engage your core and pull your body up towards the bar, bringing your chin above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0469","n":"groin crunch","b":"waist","q":"body weight","t":"abs","s":["hip flexors","inner thighs"],"img":"images/0469-mWppALS.jpg","gif":"videos/0469-mWppALS.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, lift your legs off the ground, bringing your knees towards your chest. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1383","n":"hack calf raise","b":"lower legs","q":"sled machine","t":"calves","s":["hamstrings","glutes"],"img":"images/1383-2ORFMoR.jpg","gif":"videos/1383-2ORFMoR.gif","h":"Adjust the sled machine to a comfortable weight. Stand on the sled machine with your toes on the platform and your heels hanging off. Hold onto the handles for stability. Raise your heels as high as possible by pushing through the balls of your feet. Pause for a moment at the top, then slowly lower your heels back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1384","n":"hack one leg calf raise","b":"lower legs","q":"sled machine","t":"calves","s":["hamstrings","glutes"],"img":"images/1384-AxFoqAD.jpg","gif":"videos/1384-AxFoqAD.gif","h":"Adjust the sled machine to an appropriate weight. Stand on the sled machine with one foot, keeping the other foot off the ground. Hold onto the handles for stability. Raise your heel as high as possible, lifting your body up on the ball of your foot. Pause for a moment at the top, then slowly lower your heel back down to the starting position. Repeat for the desired number of repetitions. Switch legs and repeat the exercise."},{"i":"3221","n":"half knee bends (male)","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","glutes"],"img":"images/3221-ia6kIIl.jpg","gif":"videos/3221-ia6kIIl.gif","h":"Stand with your feet shoulder-width apart. Bend your knees and lower your body down as if you were sitting back into a chair. Keep your chest up and your weight in your heels. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"3202","n":"half sit-up (male)","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/3202-iQ241UP.jpg","gif":"videos/3202-iQ241UP.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1511","n":"hamstring stretch","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes"],"img":"images/1511-99rWm7w.jpg","gif":"videos/1511-99rWm7w.gif","h":"Stand with your feet shoulder-width apart. Step forward with your right foot and shift your weight onto your right leg. Keeping your back straight, slowly bend forward at the hips, reaching towards your right foot with both hands. Hold the stretch for 20-30 seconds, then return to the starting position. Repeat on the other side."},{"i":"2139","n":"hands bike","b":"chest","q":"upper body ergometer","t":"pectorals","s":["triceps","shoulders"],"img":"images/2139-pAIWRGu.jpg","gif":"videos/2139-pAIWRGu.gif","h":"Adjust the seat height and handlebar position to a comfortable level. Sit on the ergometer with your back straight and feet on the pedals. Grasp the handles with your hands and position your arms at a 90-degree angle. Start pedaling with your hands, pushing and pulling the handles in a controlled motion. Continue pedaling for the desired duration or number of repetitions."},{"i":"3218","n":"hands clasped circular toe touch (male)","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps","calves"],"img":"images/3218-B5xca8s.jpg","gif":"videos/3218-B5xca8s.gif","h":"Stand with your feet shoulder-width apart and your hands clasped together in front of your chest. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Lower your hands towards your toes in a circular motion, reaching as far as you can without straining. Pause for a moment at the bottom, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"3215","n":"hands reversed clasped circular toe touch (male)","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps","calves"],"img":"images/3215-yq3GAJX.jpg","gif":"videos/3215-yq3GAJX.gif","h":"Stand with your feet shoulder-width apart and your arms extended to the sides. Bend forward at the waist, keeping your back straight and your knees slightly bent. Reach down with your hands and clasp them together behind your legs. Slowly raise your hands up and over your head in a circular motion, keeping your legs straight. Continue the circular motion until your hands touch your toes. Reverse the motion and bring your hands back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3302","n":"handstand","b":"upper arms","q":"body weight","t":"triceps","s":["shoulders","core"],"img":"images/3302-XooAdhl.jpg","gif":"videos/3302-XooAdhl.gif","h":"Find an open space with enough room to perform a handstand. Place your hands on the ground shoulder-width apart, fingers pointing forward. Kick your legs up towards the wall, using your core and shoulders to maintain balance. Once in a handstand position, engage your triceps to support your body weight. Hold the handstand for as long as you can maintain balance. To come down, slowly lower your legs back to the ground. Repeat for the desired number of repetitions."},{"i":"0471","n":"handstand push-up","b":"upper arms","q":"body weight","t":"triceps","s":["shoulders","chest","core"],"img":"images/0471-rQxwMxO.jpg","gif":"videos/0471-rQxwMxO.gif","h":"Find a wall and face away from it, standing a few feet away. Place your hands on the ground shoulder-width apart and kick your feet up against the wall, coming into a handstand position. Bend your elbows and lower your head towards the ground, keeping your body in a straight line. Push through your hands and extend your arms to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1764","n":"hanging leg hip raise","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/1764-VEcJRo2.jpg","gif":"videos/1764-VEcJRo2.gif","h":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core and lift your legs up by flexing your hips and knees until your thighs are parallel to the ground. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0472","n":"hanging leg raise","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0472-I3tsCnC.jpg","gif":"videos/0472-I3tsCnC.gif","h":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core and lift your legs up in front of you, keeping them straight. Continue lifting until your legs are parallel to the ground or as high as you can comfortably go. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1761","n":"hanging oblique knee raise","b":"waist","q":"body weight","t":"abs","s":["obliques"],"img":"images/1761-BaE7O6U.jpg","gif":"videos/1761-BaE7O6U.gif","h":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core and lift your knees towards your chest, twisting your torso to the side as you do so. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat on the other side, twisting your torso in the opposite direction. Continue alternating sides for the desired number of repetitions."},{"i":"0473","n":"hanging pike","b":"waist","q":"body weight","t":"abs","s":["hip flexors","shoulders"],"img":"images/0473-nuBF9MO.jpg","gif":"videos/0473-nuBF9MO.gif","h":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core and lift your legs up towards the bar, keeping them straight. Continue lifting until your body forms a 'V' shape, with your legs parallel to the ground. Hold the position for a moment, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{
