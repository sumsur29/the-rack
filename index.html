s in a wide arc until you feel a stretch in your chest. Pause for a moment, then reverse the movement and bring the dumbbells back to the starting position. Repeat for the desired number of repetitions."},{"i":"0489","n":"hyperextension","b":"back","q":"body weight","t":"spine","s":["glutes","hamstrings"],"img":"images/0489-zhMwOwE.jpg","gif":"videos/0489-zhMwOwE.gif","h":"Adjust the hyperextension bench so that your upper thighs are resting on the pad and your feet are secured. Cross your arms over your chest or place your hands behind your head. Lower your upper body towards the ground while keeping your back straight. Pause for a moment at the bottom, then raise your upper body back up until it is in line with your legs. Repeat for the desired number of repetitions."},{"i":"0488","n":"hyperextension (on bench)","b":"back","q":"body weight","t":"spine","s":["glutes","hamstrings"],"img":"images/0488-zkgRrbK.jpg","gif":"videos/0488-zkgRrbK.gif","h":"Adjust the hyperextension bench so that your hips are resting comfortably on the pad and your feet are secured. Cross your arms over your chest or place your hands behind your head. Slowly lower your upper body towards the ground while keeping your back straight. Pause for a moment at the bottom, then raise your upper body back up until it is in line with your legs. Repeat for the desired number of repetitions."},{"i":"3289","n":"impossible dips","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/3289-05Cf2v8.jpg","gif":"videos/3289-05Cf2v8.gif","h":"Position yourself between two parallel bars with your arms fully extended and your body suspended in the air. Bend your knees and cross your ankles. Lower your body by bending your elbows until your upper arms are parallel to the ground. Pause for a moment, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"1471","n":"inchworm","b":"waist","q":"body weight","t":"abs","s":["shoulders","hamstrings"],"img":"images/1471-ZgsNQ6d.jpg","gif":"videos/1471-ZgsNQ6d.gif","h":"Start in a standing position with your feet hip-width apart. Bend forward at the waist and place your hands on the ground in front of you. Walk your hands forward until you are in a high plank position, with your body in a straight line from head to toe. Pause for a moment, then walk your hands back towards your feet, keeping your legs as straight as possible. Once your hands reach your feet, stand back up to the starting position. Repeat for the desired number of repetitions."},{"i":"3698","n":"inchworm v. 2","b":"waist","q":"body weight","t":"abs","s":["shoulders","hamstrings"],"img":"images/3698-TV87DNB.jpg","gif":"videos/3698-TV87DNB.gif","h":"Start in a standing position with your feet hip-width apart. Bend forward at the waist and place your hands on the ground in front of you. Walk your hands forward until you are in a high plank position, with your body in a straight line from head to toe. Keeping your legs straight, walk your feet towards your hands, bringing your hips up towards the ceiling. Continue walking your hands forward, repeating the movement for the desired number of repetitions."},{"i":"0490","n":"incline close-grip push-up","b":"upper arms","q":"body weight","t":"triceps","s":["chest","shoulders"],"img":"images/0490-1YB40kg.jpg","gif":"videos/0490-1YB40kg.gif","h":"Place your hands on an elevated surface, such as a bench or step, slightly wider than shoulder-width apart. Extend your legs behind you, resting on the balls of your feet, with your body forming a straight line from head to heels. Lower your chest towards the elevated surface by bending your elbows, keeping them close to your sides. Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"0491","n":"incline leg hip raise (leg straight)","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0491-eVxAzgz.jpg","gif":"videos/0491-eVxAzgz.gif","h":"Lie on an incline bench with your back flat against the bench and your legs extended straight out in front of you. Place your hands on the sides of the bench for support. Engaging your abs, lift your legs off the bench, raising them as high as you can while keeping them straight. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0492","n":"incline push up depth jump","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/0492-CB8WET1.jpg","gif":"videos/0492-CB8WET1.gif","h":"Find an elevated surface, such as a bench or step, and place your hands shoulder-width apart on the edge. Step your feet back, keeping your body in a straight line from head to heels. Lower your chest towards the edge of the surface, bending your elbows and keeping your body aligned. Push through your palms to extend your arms and return to the starting position. Jump off the edge of the surface, landing softly with your knees slightly bent. Repeat the push-up and depth jump for the desired number of repetitions."},{"i":"0493","n":"incline push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/0493-B1EVP9F.jpg","gif":"videos/0493-B1EVP9F.gif","h":"Place your hands on an elevated surface, such as a bench or step, slightly wider than shoulder-width apart. Extend your legs behind you, resting on the balls of your feet, creating a straight line from your head to your heels. Lower your chest towards the elevated surface by bending your elbows, keeping your body in a straight line. Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"3785","n":"incline push-up (on box)","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/3785-F7vjXqT.jpg","gif":"videos/3785-F7vjXqT.gif","h":"Place your hands on the edge of a box or elevated surface, slightly wider than shoulder-width apart. Extend your legs behind you, resting on the balls of your feet, creating a straight line from your head to your heels. Lower your chest towards the box by bending your elbows, keeping your body in a straight line. Pause for a moment at the bottom, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"0494","n":"incline reverse grip push-up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/0494-XaaRnRn.jpg","gif":"videos/0494-XaaRnRn.gif","h":"Place your hands on the edge of a bench or elevated surface, slightly wider than shoulder-width apart. Extend your legs behind you, resting on the balls of your feet, creating a straight line from your head to your heels. Lower your chest towards the bench by bending your elbows, keeping them close to your sides. Pause for a moment at the bottom, then push yourself back up to the starting position by extending your arms. Repeat for the desired number of repetitions."},{"i":"3011","n":"incline scapula push up","b":"chest","q":"body weight","t":"serratus anterior","s":["triceps","shoulders"],"img":"images/3011-GdMa1ET.jpg","gif":"videos/3011-GdMa1ET.gif","h":"Set up an incline bench at a 45-degree angle. Place your hands on the bench slightly wider than shoulder-width apart. Position your feet on the ground, hip-width apart. Lower your chest towards the bench, keeping your elbows tucked in. As you lower, retract your shoulder blades, squeezing your scapulae together. Push through your palms to extend your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0495","n":"incline twisting sit-up","b":"waist","q":"body weight","t":"abs","s":["obliques"],"img":"images/0495-9ZGZuOD.jpg","gif":"videos/0495-9ZGZuOD.gif","h":"Set up an incline bench at a 45-degree angle. Lie down on the bench with your feet secured under the foot pads. Place your hands behind your head or across your chest. Engage your abs and lift your upper body off the bench, curling forward. As you curl up, twist your torso to one side, bringing your elbow towards the opposite knee. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat the movement, this time twisting your torso to the other side. Continue alternating sides for the desired number of repetitions."},{"i":"1564","n":"intermediate hip flexor and quad stretch","b":"upper legs","q":"rope","t":"quads","s":["hamstrings","glutes"],"img":"images/1564-tFGKm99.jpg","gif":"videos/1564-tFGKm99.gif","h":"Stand upright with your feet shoulder-width apart. Hold onto a stable object for support. Bend your right knee and bring your right foot towards your glutes, grabbing the rope with your right hand. Slowly pull your right foot towards your glutes, feeling a stretch in your right quad. Hold the stretch for 20-30 seconds. Release the stretch and repeat on the left side."},{"i":"0496","n":"inverse leg curl (bench support)","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes","calves"],"img":"images/0496-ms7tjSG.jpg","gif":"videos/0496-ms7tjSG.gif","h":"Lie face down on a bench with your hips at the edge and your legs extended straight behind you. Hold onto the bench for support. Keeping your upper body still, bend your knees and curl your legs towards your glutes. Pause for a moment at the top, then slowly extend your legs back to the starting position. Repeat for the desired number of repetitions."},{"i":"2400","n":"inverse leg curl (on pull-up cable machine)","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes","calves"],"img":"images/2400-0rHfvy9.jpg","gif":"videos/2400-0rHfvy9.gif","h":"Adjust the cable machine so that the ankle straps are at the lowest setting. Lie face down on the bench with your legs extended and the ankle straps attached to your feet. Hold onto the handles of the bench for stability. Bend your knees and curl your legs towards your glutes, squeezing your hamstrings. Pause for a moment at the top of the movement, then slowly lower your legs back to the starting position. Repeat for the desired number of repetitions."},{"i":"0499","n":"inverted row","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/0499-bZGHsAZ.jpg","gif":"videos/0499-bZGHsAZ.gif","h":"Set up a bar at waist height or use a suspension trainer. Stand facing the bar or suspension trainer, with your feet shoulder-width apart. Grab the bar or handles with an overhand grip, slightly wider than shoulder-width apart. Lean back, keeping your body straight and your heels on the ground. Pull your chest towards the bar or handles, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower yourself back to the starting position. Repeat for the desired number of repetitions."},{"i":"2300","n":"inverted row bent knees","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/2300-VPPtusI.jpg","gif":"videos/2300-VPPtusI.gif","h":"Set up a bar at waist height and lie underneath it. Grab the bar with an overhand grip, slightly wider than shoulder-width apart. Position your body so that your heels are on the ground and your body is straight. Pull your chest up towards the bar by squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"2298","n":"inverted row on bench","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/2298-Mxa7Cr8.jpg","gif":"videos/2298-Mxa7Cr8.gif","h":"Set up a bench at a height that allows your body to hang freely underneath it. Lie face up on the ground with your head towards the bench. Reach up and grab the bench with an overhand grip, slightly wider than shoulder-width apart. Position your body so that your heels are on the ground and your arms are fully extended. Engage your core and squeeze your shoulder blades together as you pull your chest up towards the bench. Pause for a moment at the top of the movement, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0497","n":"inverted row v. 2","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/0497-uX3sUBz.jpg","gif":"videos/0497-uX3sUBz.gif","h":"Set up a bar at waist height on a Smith machine or use a suspension trainer. Stand facing the bar or suspension trainer and grab it with an overhand grip, hands shoulder-width apart. Walk your feet forward, leaning back until your body is at a slight angle. Keep your body straight and pull your chest up towards the bar or handles, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0498","n":"inverted row with straps","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms"],"img":"images/0498-jdiExfW.jpg","gif":"videos/0498-jdiExfW.gif","h":"Set up a suspension trainer or straps at chest height. Stand facing the anchor point and grab the handles with an overhand grip. Walk your feet forward, leaning back until your body is at an angle. Keep your body straight and engage your core. Pull your chest towards the handles, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower yourself back to the starting position. Repeat for the desired number of repetitions."},{"i":"1419","n":"iron cross stretch","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/1419-pZwUsKB.jpg","gif":"videos/1419-pZwUsKB.gif","h":"Lie flat on your back with your arms extended out to the sides. Raise your legs up towards the ceiling, keeping them straight. Slowly lower your legs to one side, aiming to touch the floor with your feet. Hold the stretch for a few seconds, then return your legs to the starting position. Repeat the stretch on the other side. Continue alternating sides for the desired number of repetitions."},{"i":"1297","n":"isometric chest squeeze","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/1297-HbSG1Pw.jpg","gif":"videos/1297-HbSG1Pw.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Extend your arms straight out in front of you, parallel to the ground, with your palms facing each other. Squeeze your chest muscles together as hard as you can, while keeping your arms straight. Hold this position for a few seconds, focusing on contracting your chest muscles. Release the squeeze and relax your chest muscles. Repeat for the desired number of repetitions."},{"i":"0500","n":"isometric wipers","b":"chest","q":"body weight","t":"pectorals","s":["shoulders","triceps","core"],"img":"images/0500-11wrviz.jpg","gif":"videos/0500-11wrviz.gif","h":"Start by lying flat on your back on a mat or bench. Extend your arms straight out to the sides, perpendicular to your body. Engage your core and lift both legs off the ground, keeping them together and straight. Slowly lower your legs to one side, aiming to touch the ground with your feet while maintaining control. Pause for a moment, then use your core to lift your legs back to the starting position. Repeat the movement, this time lowering your legs to the opposite side. Continue alternating sides for the desired number of repetitions."},{"i":"0501","n":"jack burpee","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/0501-mr7pkqP.jpg","gif":"videos/0501-mr7pkqP.gif","h":"Start in a standing position with your feet shoulder-width apart. Lower your body into a squat position, placing your hands on the ground in front of you. Kick your feet back, landing in a push-up position. Perform a push-up, lowering your chest to the ground and then pushing back up. Jump your feet forward, landing in a squat position. Jump up explosively, reaching your arms overhead. Land softly and immediately lower back into the squat position to begin the next repetition."},{"i":"3224","n":"jack jump (male)","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","calves"],"img":"images/3224-1g5bPpA.jpg","gif":"videos/3224-1g5bPpA.gif","h":"Stand with your feet together and your arms by your sides. Jump up, spreading your feet apart and raising your arms above your head. As you land, quickly jump back to the starting position. Repeat for the desired number of repetitions."},{"i":"0507","n":"jackknife sit-up","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0507-mbkgB44.jpg","gif":"videos/0507-mbkgB44.gif","h":"Lie flat on your back with your legs extended and your arms overhead. Engage your core and lift your legs and upper body simultaneously, reaching your hands towards your toes. Pause for a moment at the top, then slowly lower your legs and upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0508","n":"janda sit-up","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/0508-1GPHRyK.jpg","gif":"videos/0508-1GPHRyK.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"2612","n":"jump rope","b":"cardio","q":"rope","t":"cardiovascular system","s":["calves","quadriceps","hamstrings"],"img":"images/2612-e1e76I2.jpg","gif":"videos/2612-e1e76I2.gif","h":"Hold the handles of the jump rope with your hands, palms facing inward. Stand with your feet shoulder-width apart and knees slightly bent. Swing the rope over your head and jump over it as it comes towards your feet. Land softly on the balls of your feet and repeat the jump as the rope comes around again. Continue jumping for the desired duration or number of repetitions."},{"i":"0514","n":"jump squat","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0514-LIlE5Tn.jpg","gif":"videos/0514-LIlE5Tn.gif","h":"Stand with your feet shoulder-width apart. Lower your body into a squat position by bending your knees and pushing your hips back. Jump explosively off the ground, extending your hips, knees, and ankles. While in mid-air, quickly bring your arms forward for balance. Land softly on the balls of your feet and immediately go into the next repetition. Repeat for the desired number of repetitions."},{"i":"0513","n":"jump squat v. 2","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0513-TDYiji6.jpg","gif":"videos/0513-TDYiji6.gif","h":"Stand with your feet shoulder-width apart. Lower your body into a squat position by bending your knees and pushing your hips back. Jump explosively, extending your hips and knees fully. Land softly on the balls of your feet and immediately lower your body back into a squat position. Repeat for the desired number of repetitions."},{"i":"0517","n":"kettlebell advanced windmill","b":"waist","q":"kettlebell","t":"abs","s":["obliques","shoulders"],"img":"images/0517-Kal9cQQ.jpg","gif":"videos/0517-Kal9cQQ.gif","h":"Stand with your feet wider than shoulder-width apart, toes pointing slightly outward. Hold a kettlebell in your right hand, with your arm extended overhead and your palm facing forward. Rotate your left foot slightly to the right, and shift your weight onto your left leg. Bend your left knee and hinge at the hip, lowering your torso towards the left side. Keep your right arm extended overhead and your eyes on the kettlebell. As you lower your torso, allow your right leg to straighten and your right foot to pivot slightly. Lower your torso until you feel a stretch in your left hamstring and your right arm is pointing towards the ground. Pause for a moment, then engage your core and push through your left heel to return to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0518","n":"kettlebell alternating hang clean","b":"lower arms","q":"kettlebell","t":"forearms","s":["shoulders","traps","core"],"img":"images/0518-I4tibZG.jpg","gif":"videos/0518-I4tibZG.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in each hand with an overhand grip. Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up. Allow the kettlebells to hang in front of your body with your arms fully extended. In one fluid motion, explosively extend your hips, shrug your shoulders, and pull the kettlebells up towards your shoulders. As the kettlebells reach shoulder height, rotate your wrists and catch the kettlebells in the rack position, with your palms facing inward and the kettlebells resting on the outside of your forearms. Lower the kettlebells back down to the starting position and repeat the movement with the opposite arm. Continue alternating arms for the desired number of repetitions."},{"i":"0520","n":"kettlebell alternating press","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","core"],"img":"images/0520-5KLbZWx.jpg","gif":"videos/0520-5KLbZWx.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height. Press one kettlebell overhead, fully extending your arm. Lower the kettlebell back to shoulder height. Repeat with the other arm. Continue alternating arms for the desired number of repetitions."},{"i":"0519","n":"kettlebell alternating press on floor","b":"chest","q":"kettlebell","t":"pectorals","s":["shoulders","triceps"],"img":"images/0519-7w6i0vE.jpg","gif":"videos/0519-7w6i0vE.gif","h":"Start by lying on your back on the floor with your knees bent and feet flat on the ground. Hold a kettlebell in each hand, with your palms facing towards your feet and your arms extended straight up towards the ceiling. Lower one kettlebell down towards your shoulder while keeping the other kettlebell extended straight up. Press the lowered kettlebell back up to the starting position while simultaneously lowering the other kettlebell down towards your shoulder. Continue alternating the press motion with each kettlebell for the desired number of repetitions."},{"i":"0521","n":"kettlebell alternating renegade row","b":"back","q":"kettlebell","t":"upper back","s":["core","shoulders"],"img":"images/0521-b9kqlBy.jpg","gif":"videos/0521-b9kqlBy.gif","h":"Start in a high plank position with your hands gripping the kettlebells and your feet hip-width apart. Engage your core and keep your body in a straight line from head to heels. Pull one kettlebell up towards your chest, keeping your elbow close to your body. Lower the kettlebell back down to the starting position and repeat with the other arm. Continue alternating arms for the desired number of repetitions."},{"i":"0522","n":"kettlebell alternating row","b":"back","q":"kettlebell","t":"upper back","s":["biceps","forearms"],"img":"images/0522-Ca76jUE.jpg","gif":"videos/0522-Ca76jUE.gif","h":"Stand with your feet shoulder-width apart, knees slightly bent, and hold a kettlebell in each hand with your palms facing your body. Bend forward at the hips, keeping your back straight and your core engaged. Pull one kettlebell up towards your chest, keeping your elbow close to your body and squeezing your shoulder blades together. Lower the kettlebell back down to the starting position and repeat with the other arm. Continue alternating arms for the desired number of repetitions."},{"i":"0523","n":"kettlebell arnold press","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","upper back"],"img":"images/0523-UM8mgyG.jpg","gif":"videos/0523-UM8mgyG.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height with your palms facing towards you. Engage your core and press the kettlebells overhead, rotating your palms to face forward as you extend your arms. Pause at the top of the movement, then slowly lower the kettlebells back to the starting position. Repeat for the desired number of repetitions."},{"i":"0524","n":"kettlebell bent press","b":"waist","q":"kettlebell","t":"abs","s":["shoulders","triceps","obliques"],"img":"images/0524-kjE55n5.jpg","gif":"videos/0524-kjE55n5.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in your right hand. Bend your knees slightly and press the kettlebell overhead with your right arm, keeping your elbow locked. Rotate your torso to the left, shifting your weight onto your left foot. Bend your left knee and lower your torso towards the ground, keeping your right arm extended overhead. As you lower, keep your eyes on the kettlebell and your chest lifted. Once your left hand touches the ground, push through your left foot and straighten your left leg, driving your hips forward. As you drive your hips forward, use your core and right arm to press the kettlebell back up to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0525","n":"kettlebell bottoms up clean from the hang position","b":"upper arms","q":"kettlebell","t":"biceps","s":["forearms","shoulders"],"img":"images/0525-4KJEpzb.jpg","gif":"videos/0525-4KJEpzb.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in one hand with an overhand grip. Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up. Allow the kettlebell to hang down between your legs, with your arm fully extended. In one fluid motion, explosively extend your hips and knees while pulling the kettlebell up towards your shoulder. As the kettlebell reaches shoulder height, rotate your wrist so that the bottom of the kettlebell is facing up. Catch the kettlebell at shoulder height with your elbow bent and your palm facing up. Lower the kettlebell back down to the starting position by reversing the movement. Repeat for the desired number of repetitions, then switch sides."},{"i":"0526","n":"kettlebell double alternating hang clean","b":"upper arms","q":"kettlebell","t":"biceps","s":["forearms","shoulders"],"img":"images/0526-a4F9Oyc.jpg","gif":"videos/0526-a4F9Oyc.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in each hand with an overhand grip. Bend your knees slightly and hinge forward at the hips, keeping your back straight and chest up. Allow the kettlebells to hang straight down in front of your body. In one fluid motion, explosively extend your hips and knees while shrugging your shoulders. As the kettlebells rise, pull them up towards your shoulders, keeping your elbows high and out to the sides. Catch the kettlebells at shoulder height, with your palms facing inward and your elbows pointing forward. Lower the kettlebells back down to the starting position and repeat for the desired number of repetitions."},{"i":"0527","n":"kettlebell double jerk","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","core"],"img":"images/0527-tznL2Ad.jpg","gif":"videos/0527-tznL2Ad.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height. Bend your knees slightly and engage your core. Press the kettlebells overhead, fully extending your arms. Bend your knees and quickly drop into a partial squat. Explosively extend your hips and knees, driving the kettlebells overhead. Lock out your arms and catch the kettlebells overhead with your knees slightly bent. Stand up straight and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0528","n":"kettlebell double push press","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","core"],"img":"images/0528-I4KkPdl.jpg","gif":"videos/0528-I4KkPdl.gif","h":"Start by standing with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height. Bend your knees slightly and engage your core. Initiate the movement by explosively extending your hips, knees, and ankles, driving the kettlebells overhead. As the kettlebells reach the top, press them fully overhead, locking out your arms. Lower the kettlebells back to the starting position by bending your elbows and bringing them back down to shoulder height. Repeat for the desired number of repetitions."},{"i":"0529","n":"kettlebell double snatch","b":"shoulders","q":"kettlebell","t":"delts","s":["trapezius","forearms","core"],"img":"images/0529-M74kdvm.jpg","gif":"videos/0529-M74kdvm.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in each hand at arm's length in front of your thighs. Bend your knees slightly and hinge forward at the hips, keeping your back flat and chest up. In one explosive motion, extend your hips, knees, and ankles, and simultaneously pull the kettlebells up towards your shoulders. As the kettlebells reach shoulder level, rotate your wrists and punch the kettlebells overhead, fully extending your arms. Lower the kettlebells back down to the starting position and repeat for the desired number of repetitions."},{"i":"0530","n":"kettlebell double windmill","b":"waist","q":"kettlebell","t":"abs","s":["shoulders","hamstrings"],"img":"images/0530-OaE7CpD.jpg","gif":"videos/0530-OaE7CpD.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in your right hand. Extend your right arm overhead, keeping your eyes on the kettlebell. Rotate your left foot 45 degrees to the left and your right foot 90 degrees to the right. Bend at the waist to the left, keeping your right arm extended overhead. Lower the kettlebell towards the ground, reaching towards your left foot. Pause for a moment, then engage your core and push through your right foot to return to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0531","n":"kettlebell extended range one arm press on floor","b":"chest","q":"kettlebell","t":"pectorals","s":["triceps","shoulders"],"img":"images/0531-rseLfH3.jpg","gif":"videos/0531-rseLfH3.gif","h":"Start by lying on your back on the floor with your knees bent and feet flat on the ground. Hold a kettlebell in one hand, with your palm facing towards your feet. Extend your arm straight up towards the ceiling, keeping your elbow locked and your wrist straight. Slowly lower the kettlebell back down to the starting position, maintaining control throughout the movement. Repeat for the desired number of repetitions, then switch to the other arm."},{"i":"0532","n":"kettlebell figure 8","b":"waist","q":"kettlebell","t":"abs","s":["shoulders","forearms"],"img":"images/0532-L4ay0PW.jpg","gif":"videos/0532-L4ay0PW.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in one hand. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Pass the kettlebell between your legs, switching hands as it reaches the back of your legs. As the kettlebell comes forward, pass it to the other hand between your legs. Continue passing the kettlebell between your legs in a figure 8 motion. Maintain a steady pace and engage your core throughout the exercise. Repeat for the desired number of repetitions."},{"i":"0533","n":"kettlebell front squat","b":"upper legs","q":"kettlebell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0533-DB0n8AG.jpg","gif":"videos/0533-DB0n8AG.gif","h":"Stand with your feet shoulder-width apart, toes slightly turned out. Hold the kettlebell with both hands in front of your chest, close to your body. Engage your core and keep your chest up as you lower your hips down and back, as if sitting into a chair. Lower until your thighs are parallel to the ground, or as low as you can comfortably go. Drive through your heels to stand back up, squeezing your glutes at the top. Repeat for the desired number of repetitions."},{"i":"0534","n":"kettlebell goblet squat","b":"upper legs","q":"kettlebell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0534-ZA8b5hc.jpg","gif":"videos/0534-ZA8b5hc.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell close to your chest with both hands. Keeping your chest up and core engaged, lower your body down into a squat position by bending at the knees and hips. Continue lowering until your thighs are parallel to the ground, or as low as you can comfortably go. Pause for a moment at the bottom, then push through your heels to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0535","n":"kettlebell hang clean","b":"upper legs","q":"kettlebell","t":"hamstrings","s":["glutes","quadriceps","calves"],"img":"images/0535-LHWF7us.jpg","gif":"videos/0535-LHWF7us.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in front of your thighs. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Lower the kettlebell towards the ground, allowing it to swing between your legs. Quickly extend your hips and knees, using the momentum to swing the kettlebell up to shoulder height. As the kettlebell reaches shoulder height, rotate your wrists and catch the kettlebell in the rack position, with your elbow tucked in and the kettlebell resting on your forearm. Lower the kettlebell back down to the starting position between your legs, and repeat for the desired number of repetitions."},{"i":"0536","n":"kettlebell lunge pass through","b":"upper legs","q":"kettlebell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0536-WKMQzCD.jpg","gif":"videos/0536-WKMQzCD.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in front of your chest with both hands. Take a step forward with your right foot, lowering your body into a lunge position. As you lunge forward, pass the kettlebell under your right thigh and transfer it to your left hand. Push off with your right foot to return to the starting position, while simultaneously passing the kettlebell back to your right hand. Repeat the lunge on the opposite side, passing the kettlebell under your left thigh. Continue alternating lunges and passing the kettlebell between hands for the desired number of repetitions."},{"i":"0537","n":"kettlebell one arm clean and jerk","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","core"],"img":"images/0537-vzAxBtt.jpg","gif":"videos/0537-vzAxBtt.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in one hand with an overhand grip. Bend your knees slightly and hinge at the hips, lowering the kettlebell between your legs. Explosively extend your hips, knees, and ankles, using the momentum to swing the kettlebell up to shoulder height. As the kettlebell reaches shoulder height, rotate your wrist and punch your hand straight up, locking out your arm overhead. Lower the kettlebell back down to the starting position and repeat for the desired number of repetitions."},{"i":"1298","n":"kettlebell one arm floor press","b":"chest","q":"kettlebell","t":"pectorals","s":["triceps","shoulders"],"img":"images/1298-rg59QCH.jpg","gif":"videos/1298-rg59QCH.gif","h":"Lie flat on your back on the floor with your knees bent and feet flat on the ground. Hold the kettlebell in one hand with your palm facing towards your feet and your arm extended straight up towards the ceiling. Slowly lower the kettlebell towards your chest by bending your elbow, keeping your upper arm close to your body. Pause for a moment when the kettlebell is just above your chest, then push it back up to the starting position by extending your elbow. Repeat for the desired number of repetitions, then switch to the other arm."},{"i":"0538","n":"kettlebell one arm jerk","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","core"],"img":"images/0538-S37C94C.jpg","gif":"videos/0538-S37C94C.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in one hand at shoulder height. Bend your knees slightly and engage your core. Press the kettlebell overhead in a straight line, fully extending your arm. As you press the kettlebell overhead, simultaneously dip your knees and quickly straighten them to generate momentum. As the kettlebell reaches its highest point, quickly drop underneath it by bending your knees and hips. Catch the kettlebell with a slight bend in your knees and hips, and your arm fully extended overhead. Stand up straight, fully extending your knees and hips, and stabilize the kettlebell overhead. Lower the kettlebell back to the starting position by bending your knees and hips, and repeat for the desired number of repetitions."},{"i":"0539","n":"kettlebell one arm military press to the side","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","core"],"img":"images/0539-yCvYdi7.jpg","gif":"videos/0539-yCvYdi7.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in one hand at shoulder height. Engage your core and keep your back straight. Press the kettlebell overhead, extending your arm fully. Pause for a moment at the top, then slowly lower the kettlebell back to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0540","n":"kettlebell one arm push press","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","core"],"img":"images/0540-osdXT3K.jpg","gif":"videos/0540-osdXT3K.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in one hand at shoulder level. Bend your knees slightly and engage your core. Press the kettlebell overhead by extending your arm and fully extending your legs. Lower the kettlebell back to the starting position by bending your knees and bringing the kettlebell back to your shoulder. Repeat for the desired number of repetitions, then switch sides."},{"i":"0541","n":"kettlebell one arm row","b":"back","q":"kettlebell","t":"upper back","s":["biceps","forearms"],"img":"images/0541-g9AsZ8P.jpg","gif":"videos/0541-g9AsZ8P.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in one hand with an overhand grip. Bend your knees slightly and hinge forward at the hips, keeping your back straight and your core engaged. Pull the kettlebell up towards your chest, keeping your elbow close to your body and squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the kettlebell back down to the starting position. Repeat for the desired number of repetitions, then switch sides and repeat with the other arm."},{"i":"0542","n":"kettlebell one arm snatch","b":"shoulders","q":"kettlebell","t":"delts","s":["trapezius","forearms","core"],"img":"images/0542-aXcUyKb.jpg","gif":"videos/0542-aXcUyKb.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in one hand between your legs. Bend your knees slightly and hinge at the hips, lowering the kettlebell towards the ground. Explosively extend your hips and knees, using the momentum to swing the kettlebell up towards your shoulder. As the kettlebell reaches shoulder height, rotate your hand and punch it straight up overhead, fully extending your arm. Lower the kettlebell back down between your legs and repeat for the desired number of repetitions."},{"i":"0543","n":"kettlebell pirate supper legs","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","forearms"],"img":"images/0543-kuXhl0o.jpg","gif":"videos/0543-kuXhl0o.gif","h":"Stand with your feet shoulder-width apart, each hand at shoulder height, palms facing forward. Press the kettlebells overhead, fully extending your arms. Lower the kettlebells back to shoulder height. Repeat for the desired number of repetitions."},{"i":"1438","n":"kettlebell seated two arm military press","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","upper back"],"img":"images/1438-ZEkjZDi.jpg","gif":"videos/1438-ZEkjZDi.gif","h":"Sit on a bench with your back straight and feet flat on the ground. Hold a kettlebell in each hand at shoulder level with your palms facing forward. Press the kettlebells overhead by extending your arms fully. Pause for a moment at the top, then slowly lower the kettlebells back to shoulder level. Repeat for the desired number of repetitions."},{"i":"0547","n":"kettlebell seesaw press","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","core"],"img":"images/0547-UDm6cGl.jpg","gif":"videos/0547-UDm6cGl.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder height. Press one kettlebell overhead while keeping the other kettlebell at shoulder height. Lower the pressed kettlebell back to shoulder height while simultaneously pressing the other kettlebell overhead. Continue alternating the pressing motion, creating a seesaw-like movement. Repeat for the desired number of repetitions."},{"i":"0548","n":"kettlebell sumo high pull","b":"back","q":"kettlebell","t":"traps","s":["shoulders","glutes","hamstrings"],"img":"images/0548-8ARQ9Hw.jpg","gif":"videos/0548-8ARQ9Hw.gif","h":"Stand with your feet wider than shoulder-width apart, toes pointing outwards. Hold a kettlebell with both hands in front of your body, arms extended downwards. Bend your knees and lower your hips into a squat position, keeping your back straight. Drive through your heels and explosively extend your hips and knees, pulling the kettlebell up towards your chin. As you pull the kettlebell up, keep your elbows high and wide, and squeeze your shoulder blades together. Lower the kettlebell back down to the starting position and repeat for the desired number of repetitions."},{"i":"0549","n":"kettlebell swing","b":"upper legs","q":"kettlebell","t":"glutes","s":["hamstrings","core"],"img":"images/0549-UHJlbu3.jpg","gif":"videos/0549-UHJlbu3.gif","h":"Stand with your feet shoulder-width apart, toes pointed slightly outward. Hold the kettlebell with both hands in front of your body, arms extended. Bend your knees slightly and hinge at the hips, pushing your butt back. Swing the kettlebell back between your legs, keeping your arms straight and maintaining a flat back. Drive your hips forward and swing the kettlebell up to shoulder height, using the momentum generated by your hips. Allow the kettlebell to swing back down between your legs and repeat the movement for the desired number of repetitions."},{"i":"0550","n":"kettlebell thruster","b":"shoulders","q":"kettlebell","t":"delts","s":["quadriceps","glutes","core"],"img":"images/0550-yWxMvB5.jpg","gif":"videos/0550-yWxMvB5.gif","h":"Start by standing with your feet shoulder-width apart, holding a kettlebell in front of your chest with both hands, palms facing each other. Lower into a squat position by bending your knees and pushing your hips back, keeping your chest up and your back straight. As you reach the bottom of the squat, explosively drive through your heels to stand up, simultaneously pressing the kettlebell overhead. Lock out your arms at the top of the movement, fully extending your elbows. Lower the kettlebell back to the starting position by reversing the movement, bending your elbows and lowering the weight back to your chest. Repeat for the desired number of repetitions."},{"i":"0551","n":"kettlebell turkish get up (squat style)","b":"upper legs","q":"kettlebell","t":"glutes","s":["quadriceps","hamstrings","core"],"img":"images/0551-Ha7SZ3y.jpg","gif":"videos/0551-Ha7SZ3y.gif","h":"Start by lying on your back with your legs extended and the kettlebell held in your right hand, arm fully extended above your shoulder. Bend your right knee and place your right foot flat on the ground, keeping your left leg extended. Pressing through your right foot, lift your hips off the ground, coming into a bridge position. Slide your left leg underneath your body, bending your left knee and placing your left foot flat on the ground. Rotate your torso to the left, bringing your left hand to the ground for support. Pressing through your right foot and left hand, lift your torso off the ground, coming into a kneeling position. From the kneeling position, stand up, keeping the kettlebell extended overhead. Reverse the movement to return to the starting position. Repeat the exercise on the other side, starting with the kettlebell in your left hand."},{"i":"0552","n":"kettlebell two arm clean","b":"shoulders","q":"kettlebell","t":"delts","s":["traps","forearms"],"img":"images/0552-7Ba7bQ2.jpg","gif":"videos/0552-7Ba7bQ2.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in front of your thighs with both hands, palms facing towards you. Bend your knees slightly and hinge at the hips, lowering the kettlebell towards the ground. Explosively extend your hips and knees, using the momentum to pull the kettlebell up towards your shoulders. As the kettlebell reaches shoulder height, rotate your wrists and catch the kettlebell in the rack position, with your elbows tucked in and the kettlebell resting on the back of your forearm. Lower the kettlebell back down to the starting position and repeat for the desired number of repetitions."},{"i":"0553","n":"kettlebell two arm military press","b":"shoulders","q":"kettlebell","t":"delts","s":["triceps","upper back"],"img":"images/0553-blBXysN.jpg","gif":"videos/0553-blBXysN.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in each hand at shoulder level with your palms facing forward. Engage your core and press the kettlebells overhead, fully extending your arms. Pause for a moment at the top, then slowly lower the kettlebells back to the starting position. Repeat for the desired number of repetitions."},{"i":"1345","n":"kettlebell two arm row","b":"back","q":"kettlebell","t":"upper back","s":["biceps","forearms"],"img":"images/1345-wf24o8S.jpg","gif":"videos/1345-wf24o8S.gif","h":"Stand with your feet shoulder-width apart, knees slightly bent, and hold a kettlebell in each hand with your palms facing your body. Bend forward at the hips, keeping your back straight and your core engaged. Pull the kettlebells up towards your chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the kettlebells back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0554","n":"kettlebell windmill","b":"waist","q":"kettlebell","t":"abs","s":["obliques","shoulders"],"img":"images/0554-9Tkqa9O.jpg","gif":"videos/0554-9Tkqa9O.gif","h":"Stand with your feet shoulder-width apart, holding a kettlebell in your right hand overhead. Rotate your left foot outwards about 45 degrees and keep your right foot pointing forward. Bend your torso to the left side, keeping your right arm extended overhead and your eyes on the kettlebell. Lower your torso as far as you can while keeping your right arm straight and your left arm extended to the side. Pause for a moment, then return to the starting position by pushing through your right foot and engaging your obliques. Repeat for the desired number of repetitions, then switch sides."},{"i":"0555","n":"kick out sit","b":"upper legs","q":"body weight","t":"hamstrings","s":["quadriceps","glutes"],"img":"images/0555-v7p5bYl.jpg","gif":"videos/0555-v7p5bYl.gif","h":"Sit on the edge of a bench or chair with your feet flat on the ground and your knees bent at a 90-degree angle. Lean back slightly and place your hands on the edge of the bench or chair for support. Engaging your hamstrings, lift your feet off the ground and extend your legs straight out in front of you. Pause for a moment at the top, then slowly bend your knees and bring your feet back towards your body. Repeat for the desired number of repetitions."},{"i":"0558","n":"kipping muscle up","b":"back","q":"body weight","t":"lats","s":["biceps","triceps","shoulders"],"img":"images/0558-pM07UxU.jpg","gif":"videos/0558-pM07UxU.gif","h":"Start by hanging from a pull-up bar with an overhand grip, hands slightly wider than shoulder-width apart. Engage your core and use a swinging motion to generate momentum. As you swing forward, pull your chest towards the bar, using your lats and biceps to initiate the movement. Continue the upward motion until your chest reaches the bar, then transition into a dip position by pushing down on the bar and extending your arms. Lower yourself back down to the starting position by bending your arms and controlling the descent. Repeat for the desired number of repetitions."},{"i":"3640","n":"knee touch crunch","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/3640-dTg95eZ.jpg","gif":"videos/3640-dTg95eZ.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, lift your shoulder blades off the ground and reach your right hand towards your left knee. Return to the starting position and repeat, this time reaching your left hand towards your right knee. Continue alternating sides for the desired number of repetitions."},{"i":"1420","n":"kneeling jump squat","b":"upper legs","q":"barbell","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/1420-UgDm3oy.jpg","gif":"videos/1420-UgDm3oy.gif","h":"Start by kneeling on the ground with your feet hip-width apart and your toes pointing forward. Hold a barbell across your upper back, resting it on your shoulders. Engage your core and glutes, then explosively jump up into the air, extending your hips and knees. As you jump, push through your toes and fully extend your ankles, knees, and hips. Land softly back on the ground, bending your knees to absorb the impact. Immediately go into the next repetition, repeating the jump squat motion."},{"i":"1346","n":"kneeling lat stretch","b":"back","q":"body weight","t":"lats","s":["shoulders","triceps"],"img":"images/1346-f38OEuO.jpg","gif":"videos/1346-f38OEuO.gif","h":"Kneel on the ground with your knees hip-width apart and your toes pointing back. Extend your arms overhead and interlace your fingers. Keeping your back straight, slowly lean to the right side, feeling a stretch in your left lat muscle. Hold the stretch for 20-30 seconds, then return to the starting position. Repeat the stretch on the left side, leaning to the left and feeling a stretch in your right lat muscle. Continue alternating sides for the desired number of repetitions."},{"i":"3239","n":"kneeling plank tap shoulder (male)","b":"waist","q":"body weight","t":"abs","s":["shoulders","triceps"],"img":"images/3239-h1ezqSu.jpg","gif":"videos/3239-h1ezqSu.gif","h":"Start in a kneeling position with your hands on the ground, shoulder-width apart. Extend your legs behind you, resting on your toes, and lift your body into a plank position. Keeping your core engaged and your hips stable, lift one hand off the ground and tap the opposite shoulder. Return the hand to the ground and repeat with the other hand. Continue alternating sides for the desired number of repetitions."},{"i":"3211","n":"kneeling push-up (male)","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/3211-ZOuKWir.jpg","gif":"videos/3211-ZOuKWir.gif","h":"Start by kneeling on the ground with your hands shoulder-width apart, fingers pointing forward. Extend your legs behind you, resting on the balls of your feet, so that your body forms a straight line from head to heels. Engage your core and lower your body towards the ground by bending your elbows, keeping them close to your sides. Continue lowering until your chest is just above the ground, then push back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"3288","n":"korean dips","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders"],"img":"images/3288-rWoBmi5.jpg","gif":"videos/3288-rWoBmi5.gif","h":"Position yourself between two parallel bars with your arms extended and supporting your body weight. Lower your body by bending your elbows until your upper arms are parallel to the ground. Pause for a moment, then push yourself back up to the starting position by straightening your arms. Repeat for the desired number of repetitions."},{"i":"3418","n":"l-pull-up","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/3418-d1GgzTU.jpg","gif":"videos/3418-d1GgzTU.gif","h":"Grab the pull-up bar with an overhand grip, slightly wider than shoulder-width apart. Hang with your arms fully extended and your body straight. Engage your lats and biceps to pull your body up towards the bar, keeping your elbows close to your body. Continue pulling until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3419","n":"l-sit on floor","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/3419-UpWmA5E.jpg","gif":"videos/3419-UpWmA5E.gif","h":"Sit on the floor with your legs extended in front of you. Place your hands on the floor beside your hips, fingers pointing forward. Engage your core and lift your legs off the ground, keeping them straight. Try to bring your legs parallel to the floor, forming an 'L' shape with your body. Hold this position for as long as you can. Slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0562","n":"landmine 180","b":"waist","q":"barbell","t":"abs","s":["obliques","quadriceps"],"img":"images/0562-QYysSLV.jpg","gif":"videos/0562-QYysSLV.gif","h":"Stand with your feet shoulder-width apart and hold the barbell with both hands in front of your chest. Bend your knees slightly and rotate your torso to the right, swinging the barbell down towards your right hip. As you reach the bottom of the movement, quickly reverse the motion and rotate your torso to the left, swinging the barbell up and across your body towards your left shoulder. Continue this twisting motion, alternating sides, for the desired number of repetitions."},{"i":"3237","n":"landmine lateral raise","b":"shoulders","q":"barbell","t":"delts","s":["traps","upper back"],"img":"images/3237-eXMFHww.jpg","gif":"videos/3237-eXMFHww.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Hold the barbell with an overhand grip, resting it on the front of your shoulders. Keeping your core engaged and back straight, lift the barbell up and away from your body, raising it to shoulder height. Pause for a moment at the top, then slowly lower the barbell back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3300","n":"lean planche","b":"waist","q":"body weight","t":"abs","s":["shoulders","chest","triceps"],"img":"images/3300-LYJodFS.jpg","gif":"videos/3300-LYJodFS.gif","h":"Start in a push-up position with your hands shoulder-width apart and your body straight. Engage your core and slowly shift your weight forward, bringing your shoulders past your hands. Keep your elbows slightly bent and your body straight as you lean forward. Hold this position for a few seconds, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"2271","n":"left hook. boxing","b":"shoulders","q":"body weight","t":"delts","s":["biceps","triceps","forearms"],"img":"images/2271-hoXt6wv.jpg","gif":"videos/2271-hoXt6wv.gif","h":"Stand with your feet shoulder-width apart and your knees slightly bent. Keep your left hand up to protect your face and your right hand by your chin. Rotate your hips and pivot on your left foot as you extend your left arm forward in a punching motion. Twist your torso and engage your core muscles to generate power in the punch. Snap your arm back to the starting position and repeat for the desired number of repetitions."},{"i":"0570","n":"leg pull in flat bench","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/0570-OyoZ3Pu.jpg","gif":"videos/0570-OyoZ3Pu.gif","h":"Sit on a flat bench with your legs extended straight out in front of you. Place your hands on the bench beside your hips for support. Engage your abs and lift your legs off the ground, bringing your knees towards your chest. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1576","n":"leg up hamstring stretch","b":"upper legs","q":"body weight","t":"hamstrings","s":["glutes"],"img":"images/1576-sU5BrfP.jpg","gif":"videos/1576-sU5BrfP.gif","h":"Lie flat on your back with your legs extended. Bend one knee and bring it towards your chest, holding onto your thigh or shin. Straighten your leg as much as possible while keeping it elevated. Hold the stretch for 20-30 seconds. Repeat with the other leg."},{"i":"2287","n":"lever alternate leg press","b":"upper legs","q":"leverage machine","t":"quads","s":["hamstrings","glutes"],"img":"images/2287-V07qpXy.jpg","gif":"videos/2287-V07qpXy.gif","h":"Adjust the seat and foot platform of the leverage machine to your desired position. Sit on the machine with your back against the backrest and your feet on the foot platform. Place your hands on the handles or sides of the machine for stability. Push one foot against the foot platform, extending your leg until it is almost fully straight. Pause for a moment, then slowly bend your leg and return to the starting position. Repeat with the other leg. Continue alternating legs for the desired number of repetitions."},{"i":"0571","n":"lever alternating narrow grip seated row","b":"back","q":"leverage machine","t":"upper back","s":["biceps","forearms"],"img":"images/0571-w2oRpuH.jpg","gif":"videos/0571-w2oRpuH.gif","h":"Adjust the seat height and footplate position to ensure proper alignment. Sit on the machine with your back straight and feet flat on the footplate. Grasp the handles with a narrow grip, palms facing each other. Keep your chest up and shoulders back throughout the exercise. Pull one handle towards your torso while keeping the other handle stationary. Squeeze your shoulder blades together at the end of the movement. Slowly return the handle to the starting position and repeat with the other side. Continue alternating sides for the desired number of repetitions."},{"i":"0572","n":"lever assisted chin-up","b":"back","q":"leverage machine","t":"lats","s":["biceps","forearms"],"img":"images/0572-MaMuGH6.jpg","gif":"videos/0572-MaMuGH6.gif","h":"Adjust the leverage machine to your desired resistance level. Stand on the foot platform and grip the handles with an overhand grip, slightly wider than shoulder-width apart. Hang with your arms fully extended, keeping your body straight. Engage your back muscles and pull your body up towards the handles, leading with your chest. Continue pulling until your chin is above the handles. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0573","n":"lever back extension","b":"back","q":"leverage machine","t":"spine","s":["glutes","hamstrings"],"img":"images/0573-rUXfn3R.jpg","gif":"videos/0573-rUXfn3R.gif","h":"Adjust the machine to fit your body size and range of motion. Sit on the machine with your back against the pad and your feet secured. Place your hands on the handles or grip bars. Engage your core and slowly lean forward, allowing your back to round slightly. Pause for a moment at the bottom position, feeling a stretch in your lower back. Using your back muscles, slowly raise your torso back to the starting position. Repeat for the desired number of repetitions."},{"i":"0574","n":"lever bent over row","b":"back","q":"barbell","t":"upper back","s":["biceps","forearms"],"img":"images/0574-X3cqyXz.jpg","gif":"videos/0574-X3cqyXz.gif","h":"Stand with your feet shoulder-width apart and knees slightly bent. Hold the barbell with an overhand grip, hands slightly wider than shoulder-width apart. Bend forward at the hips, keeping your back straight and chest up. Pull the barbell towards your lower chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly lower the barbell back to the starting position. Repeat for the desired number of repetitions."},{"i":"3200","n":"lever bent-over row with v-bar","b":"back","q":"leverage machine","t":"upper back","s":["biceps","forearms"],"img":"images/3200-LuBEORI.jpg","gif":"videos/3200-LuBEORI.gif","h":"Adjust the seat height and position yourself facing the machine. Grasp the v-bar with an overhand grip, keeping your back straight and your knees slightly bent. Pull the v-bar towards your abdomen, squeezing your shoulder blades together. Pause for a moment at the top of the movement, then slowly release the weight back to the starting position. Repeat for the desired number of repetitions."},{"i":"0575","n":"lever bicep curl","b":"upper arms","q":"leverage machine","t":"biceps","s":["forearms"],"img":"images/0575-q6y3OhV.jpg","gif":"videos/0575-q6y3OhV.gif","h":"Adjust the seat height and position yourself on the machine with your back against the pad. Grasp the handles with an underhand grip, palms facing up, and keep your elbows close to your sides. Exhale and curl the handles upward, contracting your biceps. Pause for a moment at the top of the movement, squeezing your biceps. Inhale and slowly lower the handles back to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"2289","n":"lever calf press","b":"lower legs","q":"leverage machine","t":"calves","s":["hamstrings"],"img":"images/2289-7B4F5nZ.jpg","gif":"videos/2289-7B4F5nZ.gif","h":"Adjust the seat of the leverage machine so that your shoulders are aligned with the lever pad. Place your toes on the lever pad, with your heels hanging off the edge. Grasp the handles or side supports for stability. Push the lever pad down by extending your ankles, contracting your calf muscles. Pause for a moment at the bottom of the movement. Slowly return to the starting position by allowing your heels to rise back up. Repeat for the desired number of repetitions."},{"i":"0577","n":"lever chest press","b":"chest","q":"leverage machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/0577-T0yTjgW.jpg","gif":"videos/0577-T0yTjgW.gif","h":"Adjust the seat height and position yourself on the machine with your back flat against the pad. Grasp the handles with an overhand grip and position your elbows at a 90-degree angle. Push the handles forward until your arms are fully extended, exhaling during the movement. Pause briefly at the end of the movement, then slowly return to the starting position, inhaling as you do so. Repeat for the desired number of repetitions."},{"i":"0576","n":"lever chest press","b":"chest","q":"leverage machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/0576-DOoWcnA.jpg","gif":"videos/0576-DOoWcnA.gif","h":"Adjust the seat height and position yourself on the machine with your back flat against the pad. Grasp the handles with an overhand grip and position your elbows at a 90-degree angle. Push the handles forward until your arms are fully extended, exhaling during the movement. Pause briefly at the end of the movement, then slowly return to the starting position, inhaling as you do so. Repeat for the desired number of repetitions."},{"i":"0578","n":"lever deadlift","b":"upper legs","q":"leverage machine","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/0578-GUT8I22.jpg","gif":"videos/0578-GUT8I22.gif","h":"Adjust the seat height and foot platform to your desired position. Sit on the machine with your back against the pad and your feet flat on the foot platform. Grasp the handles or the sides of the seat for stability. Engage your glutes and hamstrings, and push through your heels to lift the weight up. Keep your back straight and avoid rounding your shoulders. Extend your hips fully at the top of the movement, squeezing your glutes. Lower the weight back down in a controlled manner, keeping tension on your glutes and hamstrings. Repeat for the desired number of repetitions."},{"i":"1300","n":"lever decline chest press","b":"chest","q":"leverage machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/1300-vsVoPHt.jpg","gif":"videos/1300-vsVoPHt.gif","h":"Adjust the seat height and backrest of the leverage machine to a comfortable position. Sit on the machine with your back against the backrest and your feet flat on the floor. Grasp the handles with an overhand grip and position your hands slightly wider than shoulder-width apart. Push the handles forward and away from your body until your arms are fully extended. Slowly lower the handles back towards your chest, keeping your elbows slightly bent. Pause for a moment at the bottom, then push the handles back to the starting position. Repeat for the desired number of repetitions."},{"i":"1253","n":"lever donkey calf raise","b":"lower legs","q":"leverage machine","t":"calves","s":["hamstrings","glutes"],"img":"images/1253-C9LuR4A.jpg","gif":"videos/1253-C9LuR4A.gif","h":"Adjust the leverage machine to the appropriate height for your body. Position yourself facing the machine, with your toes on the foot platform and your heels hanging off the edge. Place your hands on the handles or the support bars for stability. Engage your calves and lift your heels as high as possible, using the balls of your feet. Pause for a moment at the top, the verage machine","t":"upper back","s":["biceps","forearms"],"img":"images/1313-oROuvrX.jpg","gif":"videos/1313-oROuvrX.gif","h":"Adjust the seat height and position yourself facing the machine. Grasp the handles with an overhand grip and keep your back straight. Pull the handles towards your body, squeezing your shoulder blades together. Pause for a moment at the peak of the movement, then slowly release and extend your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0609","n":"london bridge","b":"back","q":"rope","t":"upper back","s":["shoulders","biceps","forearms"],"img":"images/0609-bLyQokI.jpg","gif":"videos/0609-bLyQokI.gif","h":"Attach the rope to a high anchor point. Stand facing away from the anchor point with your feet shoulder-width apart. Grasp the rope with an overhand grip, palms facing down. Lean forward slightly, keeping your back straight and core engaged. Pull the rope towards your body, squeezing your shoulder blades together. Pause for a moment at the peak of the movement, then slowly release the tension and return to the starting position. Repeat for the desired number of repetitions."},{"i":"3013","n":"low glute bridge on floor","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","core"],"img":"images/3013-u0cNiij.jpg","gif":"videos/3013-u0cNiij.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your arms by your sides, palms facing down. Engage your glutes and core, then lift your hips off the ground until your body forms a straight line from your knees to your shoulders. Pause for a moment at the top, squeezing your glutes. Slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1352","n":"lower back curl","b":"back","q":"body weight","t":"spine","s":["glutes","hamstrings"],"img":"images/1352-ANbbry2.jpg","gif":"videos/1352-ANbbry2.gif","h":"Lie flat on your stomach with your legs extended and your arms by your sides. Engage your glutes and hamstrings, and slowly lift your upper body off the ground, curling your back upwards. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3582","n":"lunge with jump","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/3582-PM1PZjg.jpg","gif":"videos/3582-PM1PZjg.gif","h":"Start by standing with your feet shoulder-width apart. Take a step forward with your right foot, lowering your body into a lunge position. Push off with your right foot and jump into the air, switching the position of your feet mid-air. Land softly with your left foot forward and immediately lower your body into a lunge position. Continue alternating between lunges and jumps for the desired number of repetitions."},{"i":"1688","n":"lunge with twist","b":"waist","q":"body weight","t":"abs","s":["quadriceps","glutes","hamstrings"],"img":"images/1688-K9VL0Jq.jpg","gif":"videos/1688-K9VL0Jq.gif","h":"Start by standing with your feet shoulder-width apart. Take a step forward with your right foot, lowering your body into a lunge position. As you lunge, twist your torso to the right, bringing your left elbow towards your right knee. Pause for a moment, then return to the starting position. Repeat on the other side, stepping forward with your left foot and twisting your torso to the left. Continue alternating sides for the desired number of repetitions."},{"i":"0613","n":"lying (side) quads stretch","b":"upper legs","q":"body weight","t":"quads","s":["hamstrings"],"img":"images/0613-BWnJR72.jpg","gif":"videos/0613-BWnJR72.gif","h":"Lie on your side with your legs straight. Bend your top leg and grab your ankle or foot with your hand. Gently pull your ankle or foot towards your glutes until you feel a stretch in your quads. Hold the stretch for 20-30 seconds. Release the stretch and repeat on the other side."},{"i":"2312","n":"lying elbow to knee","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/2312-AQIhRjM.jpg","gif":"videos/2312-AQIhRjM.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engage your abs and lift your upper body off the ground, bringing your right elbow towards your left knee. At the same time, extend your right leg straight out and lift it off the ground. Pause for a moment, then return to the starting position. Repeat the movement, this time bringing your left elbow towards your right knee and extending your left leg. Continue alternating sides for the desired number of repetitions."},{"i":"0620","n":"lying leg raise flat bench","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0620-WhuFnR7.jpg","gif":"videos/0620-WhuFnR7.gif","h":"Lie flat on a flat bench with your back pressed against it. Place your hands under your glutes for support. Keep your legs straight and together, and lift them up towards the ceiling. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0865","n":"lying leg-hip raise","b":"waist","q":"body weight","t":"abs","s":["hip flexors"],"img":"images/0865-9IxJdtC.jpg","gif":"videos/0865-9IxJdtC.gif","h":"Lie flat on your back with your legs extended and your arms by your sides. Place your hands under your glutes for support. Engage your core and lift your legs off the ground, raising them towards the ceiling. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1301","n":"machine inner chest press","b":"chest","q":"leverage machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/1301-wDN97Ca.jpg","gif":"videos/1301-wDN97Ca.gif","h":"Adjust the seat height and position yourself on the machine with your back flat against the pad. Grasp the handles with an overhand grip and position your elbows at a 90-degree angle. Push the handles forward until your arms are fully extended, exhaling during the movement. Pause for a moment at the end of the movement, then slowly return to the starting position, inhaling as you do so. Repeat for the desired number of repetitions."},{"i":"0624","n":"march sit (wall)","b":"upper legs","q":"body weight","t":"glutes","s":["quadriceps","hamstrings","calves"],"img":"images/0624-sVQCCeG.jpg","gif":"videos/0624-sVQCCeG.gif","h":"Stand with your back against a wall and your feet hip-width apart. Slowly slide your back down the wall until your knees are bent at a 90-degree angle. Lift your right foot off the ground and bring your knee towards your chest. Lower your right foot back down and lift your left foot off the ground, bringing your knee towards your chest. Continue alternating between lifting your right and left foot for the desired number of repetitions."},{"i":"1353","n":"medicine ball catch and overhead throw","b":"back","q":"medicine ball","t":"lats","s":["shoulders","core"],"img":"images/1353-PsVS1QP.jpg","gif":"videos/1353-PsVS1QP.gif","h":"Stand with your feet shoulder-width apart, holding a medicine ball in both hands at chest level. Bend your knees slightly and engage your core. Lower your body into a squat position, keeping your back straight and chest up. Explosively extend your hips and legs, while simultaneously throwing the medicine ball overhead. Release the ball at the top of the movement and catch it on the way down. Lower your body back into the squat position and repeat for the desired number of repetitions."},{"i":"1302","n":"medicine ball chest pass","b":"chest","q":"medicine ball","t":"pectorals","s":["shoulders","triceps"],"img":"images/1302-aDoFKrE.jpg","gif":"videos/1302-aDoFKrE.gif","h":"Stand with your feet shoulder-width apart, holding the medicine ball at chest level. Extend your arms forward, pushing the medicine ball away from your chest with force. As you release the ball, follow through with your arms and torso, transferring your weight from your back foot to your front foot. Catch the ball as it rebounds off the wall or partner, and immediately repeat the movement. Continue for the desired number of repetitions."},{"i":"1303","n":"medicine ball chest push from 3 point stance","b":"chest","q":"medicine ball","t":"pectorals","s":["shoulders","triceps"],"img":"images/1303-dCJnuVq.jpg","gif":"videos/1303-dCJnuVq.gif","h":"Start in a 3 point stance with one hand on the medicine ball and the other hand on the ground. Extend your legs and position your body in a straight line. Lower your chest towards the ground while keeping your back straight. Push the medicine ball away from your body, extending your arm fully. Return to the starting position and repeat for the desired number of repetitions."},{"i":"1304","n":"medicine ball chest push multiple response","b":"chest","q":"medicine ball","t":"pectorals","s":["triceps","shoulders"],"img":"images/1304-7aolH9D.jpg","gif":"videos/1304-7aolH9D.gif","h":"Stand with your feet shoulder-width apart, holding a medicine ball at chest level. Extend your arms forward, pushing the medicine ball away from your chest. Pause for a moment, then slowly bring the medicine ball back to your chest. Repeat for the desired number of repetitions."},{"i":"1305","n":"medicine ball chest push single response","b":"chest","q":"medicine ball","t":"pectorals","s":["triceps","shoulders"],"img":"images/1305-jeHtrlO.jpg","gif":"videos/1305-jeHtrlO.gif","h":"Stand with your feet shoulder-width apart, holding the medicine ball at chest level. Extend your arms forward, pushing the medicine ball away from your chest. Pause for a moment, then slowly bring the medicine ball back to your chest. Repeat for the desired number of repetitions."},{"i":"1312","n":"medicine ball chest push with run release","b":"chest","q":"medicine ball","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/1312-pX9Elbe.jpg","gif":"videos/1312-pX9Elbe.gif","h":"Stand with your feet shoulder-width apart, holding a medicine ball at chest level. Step forward with your right foot and simultaneously push the medicine ball forward, extending your arms fully. As you push the ball forward, release it and let it roll forward. Quickly run forward and catch the ball before it hits the ground. Once you catch the ball, bring it back to your chest and repeat the movement with your left foot forward. Continue alternating legs and repeating the exercise for the desired number of repetitions."},{"i":"1701","n":"medicine ball close grip push up","b":"upper arms","q":"medicine ball","t":"triceps","s":["chest","shoulders"],"img":"images/1701-8K7m2SS.jpg","gif":"videos/1701-8K7m2SS.gif","h":"Start in a high plank position with your hands on the medicine ball, shoulder-width apart. Lower your body towards the ground by bending your elbows, keeping them close to your sides. Push back up to the starting position, fully extending your arms. Repeat for the desired number of repetitions."},{"i":"1354","n":"medicine ball overhead slam","b":"back","q":"medicine ball","t":"upper back","s":["shoulders","core"],"img":"images/1354-oHg8eop.jpg","gif":"videos/1354-oHg8eop.gif","h":"Stand with your feet shoulder-width apart, holding a medicine ball with both hands above your head. Engage your core and keep your back straight. Bend your knees slightly and forcefully slam the medicine ball down to the ground in front of you. As you slam the ball down, use your entire body to generate power, including your shoulders and core. Catch the ball on the bounce and repeat for the desired number of repetitions."},{"i":"1750","n":"medicine ball supine chest throw","b":"upper arms","q":"medicine ball","t":"triceps","s":["chest","shoulders"],"img":"images/1750-Al3tP0D.jpg","gif":"videos/1750-Al3tP0D.gif","h":"Lie flat on your back on a bench with your knees bent and feet flat on the ground. Hold the medicine ball with both hands, extending your arms straight up above your chest. Lower the medicine ball towards your chest, keeping your elbows close to your body. Explosively push the medicine ball upwards, extending your arms fully and throwing the ball as high as possible. Catch the medicine ball and repeat for the desired number of repetitions."},{"i":"0627","n":"mixed grip chin-up","b":"back","q":"body weight","t":"lats","s":["biceps","forearms"],"img":"images/0627-T8UpLkb.jpg","gif":"videos/0627-T8UpLkb.gif","h":"Grab the pull-up bar with an underhand grip (palms facing towards you) and your hands slightly wider than shoulder-width apart. Hang from the bar with your arms fully extended and your feet off the ground. Engage your back muscles and pull your body up towards the bar, leading with your chest. Continue pulling until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position with control. Repeat for the desired number of repetitions."},{"i":"3217","n":"modified hindu push-up (male)","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/3217-epOSYUZ.jpg","gif":"videos/3217-epOSYUZ.gif","h":"Start in a push-up position with your hands slightly wider than shoulder-width apart and your feet hip-width apart. Lower your body towards the ground, bending your elbows and keeping your core engaged. As you lower your body, shift your weight back and lift your hips up towards the ceiling, creating an inverted V shape with your body. Continue to lower your body until your chest is just above the ground, then reverse the movement, pushing your hips back down and extending your arms to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1421","n":"modified push up to lower arms","b":"lower arms","q":"body weight","t":"forearms","s":["triceps","chest","shoulders"],"img":"images/1421-a
