<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#EDEDF4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Rack">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>The Rack</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23FF6A4D'/><stop offset='1' stop-color='%237C5CFC'/></linearGradient></defs><rect width='100' height='100' rx='23' fill='url(%23g)'/><rect x='30' y='45' width='40' height='9' rx='4' fill='white'/><rect x='25' y='34' width='9' height='32' rx='4' fill='white'/><rect x='66' y='34' width='9' height='32' rx='4' fill='white'/><rect x='16' y='38' width='9' height='24' rx='4' fill='white'/><rect x='75' y='38' width='9' height='24' rx='4' fill='white'/></svg>">
<style>
  :root{--base:#ECECF4;--text:#191926;--muted:#6E6E80;--faint:#A2A2B4;--section:#FF6A4D;--done:#10B981;--gold:#E6A100;--card:#FFFFFF;--card-brd:rgba(20,20,55,.06);--glass-brd:rgba(255,255,255,.75);--blur:saturate(170%) blur(20px);--shadow:0 12px 32px -12px rgba(30,28,70,.22);--shadow-sm:0 4px 16px -6px rgba(30,28,70,.16);--radius:26px;--brand1:#FF6A4D;--brand2:#7C5CFC;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--base);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;padding-top:env(safe-area-inset-top);}
  .bgfx{position:fixed;inset:-25%;z-index:0;pointer-events:none;background:radial-gradient(38% 38% at 12% 8%,rgba(124,92,252,.26),transparent 70%),radial-gradient(40% 40% at 90% 10%,rgba(255,93,162,.22),transparent 70%),radial-gradient(46% 46% at 86% 90%,rgba(47,224,196,.24),transparent 70%),radial-gradient(44% 44% at 10% 94%,rgba(255,176,92,.26),transparent 70%);filter:blur(30px);animation:drift 28s ease-in-out infinite alternate;}
  @keyframes drift{0%{transform:translate(-2%,-1%) scale(1.05)}100%{transform:translate(3%,2%) scale(1.14)}}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  ::selection{background:var(--section);color:#fff;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .app{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100dvh;}
  #loader{position:fixed;inset:0;background:var(--base);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;z-index:200;}
  .bar-load{display:flex;gap:6px;align-items:flex-end;height:34px;}
  .bar-load span{width:7px;background:linear-gradient(var(--brand1),var(--brand2));border-radius:3px;animation:bounce 1s infinite ease-in-out;}
  .bar-load span:nth-child(2){animation-delay:.12s}.bar-load span:nth-child(3){animation-delay:.24s}.bar-load span:nth-child(4){animation-delay:.36s}
  @keyframes bounce{0%,100%{height:12px;opacity:.5}50%{height:34px;opacity:1}}
  #loader p{color:var(--muted);font-size:13px;}

  .view{display:none;flex-direction:column;padding:26px 20px 110px;min-height:100dvh;animation:fade .35s ease;}
  .view.on{display:flex;}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .vhead{margin-bottom:18px;}
  .vdate{font-size:12px;letter-spacing:.04em;color:var(--muted);font-weight:600;text-transform:uppercase;}
  .vtitle{font-family:'Bricolage Grotesque';font-weight:800;font-size:34px;line-height:1.02;letter-spacing:-.02em;margin-top:6px;}

  /* streak strip */
  .streak-strip{display:flex;align-items:center;gap:14px;width:100%;border-radius:20px;padding:15px 18px;margin-bottom:18px;color:#fff;background:linear-gradient(135deg,var(--brand2),#9E8BFF 60%,#C0A8FF);box-shadow:0 14px 32px -14px rgba(124,92,252,.6);position:relative;overflow:hidden;text-align:left;}
  .streak-strip::after{content:'';position:absolute;right:-18px;top:-26px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.16);}
  .ss-flame{font-size:24px;position:relative;z-index:1;}
  .ss-main{position:relative;z-index:1;}
  .ss-num{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;line-height:1;}
  .ss-lbl{font-size:12px;opacity:.9;}
  .ss-spark{margin-left:auto;display:flex;align-items:flex-end;gap:4px;height:30px;position:relative;z-index:1;}
  .ss-spark span{width:6px;display:flex;align-items:flex-end;height:100%;}
  .ss-spark i{width:100%;border-radius:3px;background:rgba(255,255,255,.5);}
  .ss-spark i.t{background:#fff;}

  /* picker */
  .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .pick-tile{position:relative;border-radius:22px;padding:18px;text-align:left;color:#fff;overflow:hidden;min-height:120px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(155deg,var(--h),color-mix(in srgb,var(--h) 62%,#fff));box-shadow:0 14px 30px -14px color-mix(in srgb,var(--h) 70%,transparent);transition:transform .15s;}
  .pick-tile:active{transform:scale(.97);}
  .pick-tile .pn{font-family:'Bricolage Grotesque';font-weight:700;font-size:19px;line-height:1.05;}
  .pick-tile .pf{font-size:11px;opacity:.9;margin-top:4px;}
  .pick-tile .pc{font-size:12px;font-weight:600;opacity:.95;}
  .pick-tile .pdot{position:absolute;right:-14px;top:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.18);}
  .pick-rest{grid-column:1/-1;border-radius:22px;padding:16px 20px;display:flex;align-items:center;gap:12px;background:#fff;border:1.5px dashed var(--card-brd);color:var(--muted);font-weight:600;font-size:14px;box-shadow:var(--shadow-sm);}
  .pick-rest:active{transform:scale(.99);}
  .pick-rest .moon{font-size:22px;}

  /* session hero */
  .sess{border-radius:var(--radius);padding:22px;color:#fff;position:relative;overflow:hidden;background:linear-gradient(150deg,var(--section),color-mix(in srgb,var(--section) 60%,#ff9a3d));box-shadow:0 20px 44px -18px color-mix(in srgb,var(--section) 75%,transparent);margin-bottom:16px;}
  .sess::after{content:'';position:absolute;right:-30px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.14);}
  .sess-top{display:flex;align-items:flex-start;gap:14px;position:relative;z-index:1;}
  .sess-info{flex:1;min-width:0;}
  .sess-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.85;font-weight:600;}
  .sess-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;line-height:1;margin:5px 0 6px;letter-spacing:-.01em;}
  .sess-meta{font-size:12.5px;opacity:.92;}
  .ring{width:64px;height:64px;flex-shrink:0;}
  .ring circle{fill:none;stroke-width:4;}
  .ring .bg{stroke:rgba(255,255,255,.28);}
  .ring .fg{stroke:#fff;stroke-linecap:round;transition:stroke-dashoffset .5s;transform:rotate(-90deg);transform-origin:50% 50%;}
  .ring-txt{font-family:'JetBrains Mono';font-weight:700;font-size:13px;fill:#fff;}
  .sess-start{margin-top:18px;width:100%;height:54px;border-radius:16px;background:#fff;color:var(--section);font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;z-index:1;box-shadow:0 8px 20px -6px rgba(0,0,0,.2);}
  .sess-start svg{width:20px;height:20px;}
  .sess-sub{display:flex;gap:10px;margin-top:10px;position:relative;z-index:1;}
  .sess-sub button{flex:1;height:42px;border-radius:13px;background:rgba(255,255,255,.18);color:#fff;font-weight:600;font-size:13px;border:1px solid rgba(255,255,255,.25);}
  .mini-list{background:var(--card);border-radius:20px;padding:6px;box-shadow:var(--shadow-sm);}
  .mli{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:14px;text-align:left;width:100%;}
  .mli:active{background:#F5F5F9;}
  .mli .mthumb{width:46px;height:46px;border-radius:12px;background:#F4F4F8;flex-shrink:0;overflow:hidden;}
  .mli .mthumb img{width:100%;height:100%;object-fit:contain;}
  .mli .mname{flex:1;min-width:0;font-size:13.5px;font-weight:600;text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mli .mreps{font-family:'JetBrains Mono';font-size:11.5px;color:var(--muted);}
  .mli .mchk{width:24px;height:24px;border-radius:50%;border:2px solid #E0E0EA;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .mli .mchk.done{background:var(--done);border-color:var(--done);color:#fff;}
  .mli .mchk svg{width:13px;height:13px;}
  .mli-more{text-align:center;padding:11px;font-size:12.5px;color:var(--muted);font-weight:600;}

  .rest-card{border-radius:var(--radius);padding:30px 24px;text-align:center;background:linear-gradient(150deg,#6C5CE7,#9E8BFF);color:#fff;box-shadow:0 20px 44px -18px rgba(108,92,231,.6);position:relative;overflow:hidden;}
  .rest-card .rm{font-size:50px;}
  .rest-card h3{font-family:'Bricolage Grotesque';font-weight:800;font-size:26px;margin:10px 0 6px;}
  .rest-card p{font-size:13.5px;opacity:.9;margin:0 0 18px;line-height:1.5;}
  .rest-card button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-weight:600;font-size:13px;padding:11px 22px;border-radius:13px;}

  /* tabbar */
  .tabbar{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:5px;padding:7px;border-radius:24px;background:rgba(255,255,255,.78);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-brd);box-shadow:0 14px 36px -10px rgba(30,28,70,.3);z-index:40;}
  .tabbar button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 22px;border-radius:18px;color:var(--muted);font-size:10.5px;font-weight:600;transition:.2s;}
  .tabbar button svg{width:22px;height:22px;}
  .tabbar button.on{color:#fff;background:linear-gradient(150deg,var(--brand1),var(--brand2));box-shadow:0 8px 18px -5px rgba(124,92,252,.5);}

  /* LIBRARY */
  .libtabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
  .libtabs::-webkit-scrollbar{display:none;}
  .libtab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:16px;font-weight:600;font-size:13px;background:#fff;border:1.5px solid var(--card-brd);box-shadow:var(--shadow-sm);color:var(--text);white-space:nowrap;}
  .libtab .d{width:9px;height:9px;border-radius:50%;background:var(--h);}
  .libtab.on{color:#fff;background:linear-gradient(150deg,var(--h),color-mix(in srgb,var(--h) 70%,#fff));border-color:transparent;}
  .libtab.on .d{background:rgba(255,255,255,.9);}
  .seg-toggle{display:flex;padding:4px;margin-bottom:12px;border-radius:15px;background:rgba(255,255,255,.6);border:1px solid var(--glass-brd);box-shadow:var(--shadow-sm);}
  .seg-toggle button{flex:1;padding:9px;border-radius:11px;font-size:13px;font-weight:600;color:var(--muted);}
  .seg-toggle button.on{color:var(--text);background:#fff;box-shadow:var(--shadow-sm);}
  .search{display:flex;align-items:center;gap:10px;border-radius:15px;padding:12px 15px;margin-bottom:12px;background:#fff;border:1px solid var(--card-brd);box-shadow:var(--shadow-sm);}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:inherit;}
  .search input::placeholder{color:var(--faint);}
  .search svg{width:18px;height:18px;color:var(--muted);}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;font-size:12px;font-weight:600;padding:8px 14px;border-radius:20px;color:var(--muted);text-transform:capitalize;white-space:nowrap;background:#fff;border:1px solid var(--card-brd);box-shadow:var(--shadow-sm);}
  .chip.on{color:#fff;background:linear-gradient(160deg,var(--section),#ff9a3d);border-color:transparent;}
  .cat-sec{margin-bottom:16px;}
  .sec-h{position:sticky;top:-1px;padding:9px 4px;font-family:'Bricolage Grotesque';font-size:13px;text-transform:capitalize;color:var(--text);font-weight:700;z-index:2;display:flex;align-items:center;gap:10px;background:linear-gradient(rgba(236,236,244,.9),rgba(236,236,244,.4));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
  .sec-h .line{flex:1;height:1px;background:linear-gradient(90deg,var(--card-brd),transparent);}
  .sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .gcard{border-radius:18px;overflow:hidden;text-align:left;position:relative;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--card-brd);box-shadow:var(--shadow-sm);transition:transform .12s;}
  .gcard:active{transform:scale(.97);}
  .gcard.gin{border-color:color-mix(in srgb,var(--done) 45%,transparent);box-shadow:0 8px 22px -8px color-mix(in srgb,var(--done) 45%,transparent);}
  .gthumb{position:relative;width:100%;padding-bottom:100%;background:#F4F4F8;}
  .gthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
  .gbody{padding:10px 11px 12px;}
  .gname{font-size:12.5px;font-weight:600;line-height:1.25;text-transform:capitalize;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:31px;}
  .gmeta{font-size:10.5px;color:var(--faint);margin-top:4px;text-transform:capitalize;}
  .gflag{position:absolute;top:9px;right:9px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;color:var(--muted);background:rgba(255,255,255,.92);box-shadow:var(--shadow-sm);}
  .gcard.gin .gflag{background:linear-gradient(160deg,var(--done),#3DDBA0);color:#fff;}
  .gflag svg{width:16px;height:16px;}
  .gstar{position:absolute;top:9px;left:9px;color:var(--gold);font-size:15px;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2));}
  .empty{grid-column:1/-1;text-align:center;color:var(--faint);padding:54px 20px;font-size:13px;}

  /* PROGRESS */
  .streak-hero{border-radius:24px;padding:24px;color:#fff;position:relative;overflow:hidden;background:linear-gradient(135deg,#FF6A4D,#FF8A3D 50%,#FFB05C);box-shadow:0 18px 40px -16px rgba(255,106,77,.6);margin-bottom:16px;}
  .streak-hero::after{content:'';position:absolute;right:-30px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.16);}
  .streak-hero .flame{font-size:38px;}
  .streak-hero .big{font-family:'Bricolage Grotesque';font-weight:800;font-size:56px;line-height:1;margin-top:4px;position:relative;z-index:1;}
  .streak-hero .lbl{font-size:14px;opacity:.92;font-weight:600;position:relative;z-index:1;}
  .streak-hero .msg{font-size:12.5px;opacity:.85;margin-top:10px;position:relative;z-index:1;max-width:82%;line-height:1.45;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .stat{border-radius:20px;padding:16px 18px;background:var(--card);border:1px solid var(--card-brd);box-shadow:var(--shadow-sm);}
  .stat .ic{font-size:18px;margin-bottom:8px;display:block;}
  .stat .v{font-family:'Bricolage Grotesque';font-weight:800;font-size:32px;line-height:1;}
  .stat .k{font-size:12px;color:var(--muted);margin-top:6px;font-weight:500;}
  .trk-card{border-radius:22px;padding:18px 20px;background:var(--card);border:1px solid var(--card-brd);box-shadow:var(--shadow-sm);margin-bottom:16px;}
  .trk-card h5{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;margin:0 0 16px;display:flex;justify-content:space-between;align-items:baseline;}
  .trk-card h5 small{font-weight:600;font-size:12px;color:var(--muted);font-family:'Inter';}
  .week-chart{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:120px;}
  .wbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;}
  .wbar .barwrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;}
  .wbar .bar{width:72%;max-width:30px;border-radius:7px;background:#EAEAF1;transition:height .4s;min-height:6px;}
  .wbar.has .bar{background:linear-gradient(var(--section),#ff9a3d);}
  .wbar.today .bar{background:linear-gradient(#6C5CE7,#9E8BFF);box-shadow:0 4px 12px -2px rgba(108,92,231,.5);}
  .wbar.rest .bar{background:linear-gradient(#6C5CE7,#9E8BFF);opacity:.55;}
  .wbar .wl{font-size:11px;color:var(--faint);font-weight:600;}.wbar.today .wl{color:#6C5CE7;}
  .wbar .wv{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);height:15px;}
  .sec-row{display:flex;align-items:center;gap:12px;padding:10px 0;}
  .sec-row .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .sec-row .nm{font-size:13px;font-weight:600;width:110px;flex-shrink:0;}
  .sec-row .bar{flex:1;height:8px;background:#EEEEF4;border-radius:5px;overflow:hidden;}
  .sec-row .bar i{display:block;height:100%;border-radius:5px;transition:width .5s;}
  .sec-row .cv{font-family:'JetBrains Mono';font-size:12px;color:var(--muted);width:30px;text-align:right;}

  /* DECK */
  .deck{position:fixed;inset:0;background:var(--base);z-index:60;display:none;flex-direction:column;max-width:520px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  .deck .bgfx2{position:absolute;inset:0;z-index:0;background:radial-gradient(50% 40% at 50% 0%,color-mix(in srgb,var(--section) 22%,transparent),transparent 70%);pointer-events:none;}
  .dtop{padding:14px 16px 8px;display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
  .icon-btn{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,.72);border:1px solid var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--shadow-sm);}
  .icon-btn:active{background:#fff;}
  .dtitle{flex:1;min-width:0;}
  .dtitle .t{font-family:'Bricolage Grotesque';font-weight:700;font-size:20px;line-height:1;}
  .dtitle .s{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .track{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scrollbar-width:none;scroll-behavior:smooth;position:relative;z-index:1;}
  .track::-webkit-scrollbar{display:none;}
  .card{flex:0 0 100%;scroll-snap-align:center;padding:6px 16px 8px;display:flex;flex-direction:column;min-width:0;overflow-y:auto;scrollbar-width:none;}
  .card::-webkit-scrollbar{display:none;}
  .card.skel{align-items:center;justify-content:center;}
  .card.skel::before{content:'';width:32px;height:32px;border-radius:50%;border:3px solid rgba(20,20,55,.1);border-top-color:var(--section);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .media{position:relative;width:100%;padding-bottom:100%;border-radius:24px;overflow:hidden;background:#fff;flex-shrink:0;border:1px solid var(--card-brd);box-shadow:var(--shadow);}
  .media img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
  .media .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px;background:#f4f4f6;}
  .stamp{position:absolute;top:14px;left:14px;font-family:'Bricolage Grotesque';font-weight:700;font-size:13px;letter-spacing:.03em;padding:7px 13px;border-radius:30px;text-transform:uppercase;display:none;align-items:center;gap:5px;z-index:2;}
  .stamp svg{width:14px;height:14px;}
  .card.s-done .stamp.done{display:flex;background:linear-gradient(160deg,var(--done),#3DDBA0);color:#fff;}
  .card.s-doing .stamp.doing{display:flex;background:linear-gradient(160deg,var(--section),#ff9a3d);color:#fff;animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.72}}
  .card.s-done .media img{opacity:.55;}
  .idx{position:absolute;top:14px;right:14px;font-family:'JetBrains Mono';font-size:12px;color:var(--muted);background:rgba(255,255,255,.9);box-shadow:var(--shadow-sm);padding:4px 9px;border-radius:20px;z-index:2;}
  .ex-name{font-family:'Bricolage Grotesque';font-weight:700;font-size:27px;line-height:1.05;letter-spacing:-.01em;text-transform:capitalize;margin:16px 2px 0;}
  .ex-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
  .tag{font-size:11px;font-weight:600;padding:6px 10px;border-radius:9px;background:#fff;color:var(--muted);border:1px solid var(--card-brd);text-transform:capitalize;box-shadow:var(--shadow-sm);}
  .tag.tgt{color:#fff;background:linear-gradient(160deg,var(--section),color-mix(in srgb,var(--section) 70%,#ff9a3d));border-color:transparent;}
  .tag.plan{color:#fff;background:linear-gradient(160deg,var(--gold),#F4B400);border-color:transparent;text-transform:none;}
  .pres{display:flex;align-items:center;gap:12px;margin:16px 2px 0;padding:15px 17px;border-radius:18px;background:var(--card);border:1px solid var(--card-brd);box-shadow:var(--shadow-sm);}
  .pres .big{font-family:'JetBrains Mono';font-weight:700;font-size:21px;}
  .pres .lbl{font-size:11px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
  .pres .edit{margin-left:auto;font-size:12px;color:var(--section);font-weight:700;padding:7px 11px;border-radius:10px;background:color-mix(in srgb,var(--section) 12%,#fff);}
  .pres.cardio .big{font-size:16px;}
  .how{margin:13px 2px 0;border-radius:18px;overflow:hidden;background:var(--card);border:1px solid var(--card-brd);box-shadow:var(--shadow-sm);}
  .how summary{list-style:none;padding:14px 17px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
  .how summary::-webkit-details-marker{display:none;}
  .how summary .chev{transition:transform .2s;color:var(--muted);}.how[open] summary .chev{transform:rotate(180deg);}
  .how ol{margin:0;padding:0 18px 16px 38px;color:var(--muted);font-size:13.5px;line-height:1.65;}
  .how li{margin-bottom:9px;}.how li::marker{color:var(--section);font-family:'JetBrains Mono';font-weight:700;}
  .remove{display:block;margin:14px auto 8px;font-size:12px;color:var(--faint);padding:8px;}.remove:active{color:var(--section);}
  .navrow{display:flex;align-items:center;gap:12px;padding:10px 16px 4px;position:relative;z-index:1;}
  .arrow{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,.72);border:1px solid var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--shadow-sm);}
  .arrow:active{background:#fff;}.arrow:disabled{opacity:.35;}.arrow svg{width:20px;height:20px;}
  .navmid{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;}
  .dots{display:flex;gap:7px;justify-content:center;align-items:center;}
  .dots i{width:7px;height:7px;border-radius:50%;background:rgba(20,20,55,.16);transition:all .2s;}
  .dots i.done{background:var(--done);}.dots i.cur{background:var(--section);transform:scale(1.4);}
  .navbar2{width:100%;height:6px;background:rgba(20,20,55,.1);border-radius:5px;overflow:hidden;display:none;}
  .navbar2 i{display:block;height:100%;background:linear-gradient(90deg,var(--done),#3DDBA0);width:0;transition:width .3s;}
  .counter{font-family:'JetBrains Mono';font-size:11px;color:var(--faint);}
  .actions{display:flex;gap:11px;padding:8px 16px calc(16px + env(safe-area-inset-bottom));position:relative;z-index:1;}
  .act{flex:1;height:56px;border-radius:18px;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s;}
  .act:active{transform:scale(.96);}.act svg{width:19px;height:19px;}
  .act.doing{background:#fff;border:1px solid var(--card-brd);color:var(--text);box-shadow:var(--shadow-sm);}
  .act.doing.on{background:color-mix(in srgb,var(--section) 14%,#fff);border-color:var(--section);color:var(--section);}
  .act.done{background:linear-gradient(160deg,var(--section),#ff9a3d);color:#fff;box-shadow:0 12px 28px -8px color-mix(in srgb,var(--section) 55%,transparent);}
  .act.done.is-done{background:linear-gradient(160deg,var(--done),#3DDBA0);color:#fff;}
  .empty-deck{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:18px;position:relative;z-index:1;}
  .empty-deck p{color:var(--muted);font-size:14.5px;line-height:1.55;max-width:260px;}
  .empty-deck .big-add{color:#fff;font-weight:700;padding:16px 28px;border-radius:16px;font-size:15px;background:linear-gradient(160deg,var(--section),#ff9a3d);}
  .hint{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);padding:20px 26px;border-radius:22px;display:flex;flex-direction:column;align-items:center;gap:12px;z-index:9;pointer-events:none;background:rgba(255,255,255,.84);border:1px solid var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--shadow);}
  .hint .sw{display:flex;gap:30px;align-items:center;color:var(--section);}
  .hint .sw .l{animation:nudgeL 1.2s infinite;}.hint .sw .r{animation:nudgeR 1.2s infinite;}
  @keyframes nudgeL{0%,100%{transform:translateX(0)}50%{transform:translateX(-7px)}}@keyframes nudgeR{0%,100%{transform:translateX(0)}50%{transform:translateX(7px)}}
  .hint .sw svg{width:28px;height:28px;}.hint span{font-size:13px;font-weight:600;color:var(--text);}

  .confetti{position:fixed;inset:0;z-index:140;pointer-events:none;overflow:hidden;}
  .confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:fall 1.2s linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9;}}
  .modal{position:fixed;inset:0;z-index:120;background:rgba(20,18,40,.28);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:24px;}
  .modal.show{display:flex;animation:fade .2s;}
  .modal-box{border-radius:24px;padding:24px;width:100%;max-width:330px;background:#fff;box-shadow:0 24px 60px -16px rgba(30,28,70,.4);}
  .modal-box h4{font-family:'Bricolage Grotesque';font-weight:700;font-size:21px;margin:0 0 20px;text-transform:capitalize;}
  .field{margin-bottom:18px;}
  .field label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;display:block;margin-bottom:9px;}
  .stepper{display:flex;align-items:center;gap:14px;}
  .stepper button{width:46px;height:46px;border-radius:14px;background:#F2F2F7;border:1px solid var(--card-brd);font-size:22px;display:flex;align-items:center;justify-content:center;}
  .stepper .val{font-family:'JetBrains Mono';font-weight:700;font-size:25px;min-width:36px;text-align:center;}
  .field input{width:100%;background:#F4F4F8;border:1px solid var(--card-brd);border-radius:14px;padding:13px 15px;color:var(--text);font-size:16px;font-family:'JetBrains Mono';outline:none;}
  .field input:focus{border-color:var(--section);}
  .modal-btns{display:flex;gap:11px;margin-top:8px;}
  .modal-btns button{flex:1;padding:14px;border-radius:14px;font-weight:700;font-size:14px;}
  .modal-btns .cancel{background:#F2F2F7;color:var(--muted);}
  .modal-btns .save{background:linear-gradient(160deg,var(--section),#ff9a3d);color:#fff;}
  .toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%);font-size:13px;font-weight:600;padding:12px 20px;border-radius:30px;z-index:150;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;color:#fff;background:rgba(25,25,38,.92);box-shadow:0 12px 30px -8px rgba(0,0,0,.4);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}
  :focus-visible{outline:2px solid var(--section);outline-offset:2px;}
</style>
</head>
<body>
<div class="bgfx"></div>
<div id="loader"><div class="bar-load"><span></span><span></span><span></span><span></span></div><p>Loading…</p></div>

<div class="app" id="app" style="display:none;">
  <!-- TODAY -->
  <div class="view on" id="v-today">
    <div class="vhead"><div class="vdate" id="tDate"></div><div class="vtitle" id="tGreet"></div></div>
    <button class="streak-strip" id="streakStrip"></button>
    <div id="todayBody"></div>
  </div>
  <!-- LIBRARY -->
  <div class="view" id="v-library">
    <div class="vhead"><div class="vdate">Build your workout</div><div class="vtitle">Library</div></div>
    <div class="libtabs" id="libTabs"></div>
    <div class="seg-toggle"><button id="scopeRel" class="on">This section</button><button id="scopeAll">All exercises</button></div>
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="searchInput" placeholder="Search exercises…" autocomplete="off"></div>
    <div class="chips" id="chips"></div>
    <div id="catGrid"></div>
  </div>
  <!-- PROGRESS -->
  <div class="view" id="v-progress">
    <div class="vhead"><div class="vdate">Keep the streak alive</div><div class="vtitle">Progress</div></div>
    <div id="progBody"></div>
  </div>

  <div class="tabbar">
    <button id="navToday" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5"/><path d="M5 9v11h14V9"/></svg>Today</button>
    <button id="navLibrary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Library</button>
    <button id="navProgress"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-5"/><path d="M13 16V8"/><path d="M18 16v-7"/></svg>Progress</button>
  </div>
</div>

<!-- DECK -->
<div class="deck" id="deck">
  <div class="bgfx2"></div>
  <div class="dtop">
    <button class="icon-btn" id="deckBack"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="dtitle"><div class="t" id="deckTitle"></div><div class="s" id="deckSub"></div></div>
    <button class="icon-btn" id="deckAdd"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>
  <div class="track" id="track"></div>
  <div class="empty-deck" id="emptyDeck" style="display:none;"><p>This workout is empty. Open the Library to add exercises.</p><button class="big-add" id="emptyAdd">Go to Library</button></div>
  <div class="navrow" id="navrow">
    <button class="arrow" id="arrPrev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="navmid"><div class="dots" id="dots"></div><div class="navbar2" id="navbar2"><i></i></div><div class="counter mono" id="counter"></div></div>
    <button class="arrow" id="arrNext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>
  <div class="actions" id="actions">
    <button class="act doing" id="btnDoing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>Doing now</span></button>
    <button class="act done" id="btnDone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span>Mark done</span></button>
  </div>
  <div class="hint" id="hint" style="display:none;"><div class="sw"><span class="l"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></span><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V5a2 2 0 1 1 4 0v6m0-1a2 2 0 1 1 4 0v3m0-1a2 2 0 1 1 4 0v4a6 6 0 0 1-6 6h-2a6 6 0 0 1-5-3l-2-3a2 2 0 0 1 3-2l2 2"/></svg><span class="r"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span></div><span>Swipe or tap ‹ › to move</span></div>
</div>

<div class="modal" id="modal"><div class="modal-box"><h4 id="modalName">Edit</h4><div class="field" id="setsField"><label>Sets</label><div class="stepper"><button id="setsMinus">−</button><span class="val mono" id="setsVal">3</span><button id="setsPlus">+</button></div></div><div class="field"><label id="repsLabel">Reps</label><input id="repsInput" inputmode="text" placeholder="e.g. 8–10"></div><div class="modal-btns"><button class="cancel" id="modalCancel">Cancel</button><button class="save" id="modalSave">Save</button></div></div></div>
<div class="toast" id="toast"></div>
<div class="confetti" id="confetti"></div>

:"lats","s":["biceps","forearms"],"img":"images/3293-72BC5Za.jpg","gif":"videos/3293-72BC5Za.gif","h":"Start by hanging from a pull-up bar with an overhand grip, slightly wider than shoulder-width apart. Engage your core and pull your shoulder blades down and back. As you pull yourself up, bend one arm and bring your elbow towards your side, while keeping the other arm straight. Continue pulling until your chin is above the bar and your bent arm is fully flexed. Lower yourself back down with control, straightening the bent arm and repeating the movement on the other side. Alternate sides with each repetition."},{"i":"3294","n":"archer push up","b":"chest","q":"body weight","t":"pectorals","s":["triceps","shoulders","core"],"img":"images/3294-A9qxk2F.jpg","gif":"videos/3294-A9qxk2F.gif","h":"Start in a push-up position with your hands slightly wider than shoulder-width apart. Extend one arm straight out to the side, parallel to the ground. Lower your body by bending your elbows, keeping your back straight and core engaged. Push back up to the starting position. Repeat on the other side, extending the opposite arm out to the side. Continue alternating sides for the desired number of repetitions."},{"i":"2355","n":"arm slingers hanging bent knee legs","b":"waist","q":"body weight","t":"abs","s":["shoulders","back"],"img":"images/2355-uWpxD4v.jpg","gif":"videos/2355-uWpxD4v.gif","h":"Hang from a pull-up bar with your arms fully extended and your knees bent at a 90-degree angle. Engage your core and lift your knees towards your chest, bringing them as close to your elbows as possible. Slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"2333","n":"arm slingers hanging straight legs","b":"waist","q":"body weight","t":"abs","s":["shoulders","back"],"img":"images/2333-PXTIwgu.jpg","gif":"videos/2333-PXTIwgu.gif","h":"Hang from a pull-up bar with your arms fully extended and your legs straight down. Engage your core and lift your legs up in front of you until they are parallel to the ground. Hold for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3214","n":"arms apart circular toe touch (male)","b":"upper legs","q":"body weight","t":"glutes","s":["hamstrings","quadriceps","calves"],"img":"images/3214-RtyAsy1.jpg","gif":"videos/3214-RtyAsy1.gif","h":"Stand with your feet shoulder-width apart and arms extended to the sides. Keeping your legs straight, bend forward at the waist and reach down towards your toes with your right hand. As you reach down, simultaneously lift your left leg straight up behind you, maintaining balance. Return to the starting position and repeat the movement with your left hand reaching towards your toes and your right leg lifting up behind you. Continue alternating sides for the desired number of repetitions."},{"i":"3204","n":"arms overhead full sit-up (male)","b":"waist","q":"body weight","t":"abs","s":["hip flexors","lower back"],"img":"images/3204-NAkmgdx.jpg","gif":"videos/3204-NAkmgdx.gif","h":"Lie flat on your back with your knees bent and feet flat on the ground. Extend your arms overhead, keeping them straight. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is upright. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0009","n":"assisted chest dip (kneeling)","b":"chest","q":"leverage machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/0009-PAgTVaK.jpg","gif":"videos/0009-PAgTVaK.gif","h":"Adjust the machine to your desired height and secure your knees on the pad. Grasp the handles with your palms facing down and your arms fully extended. Lower your body by bending your elbows until your upper arms are parallel to the floor. Pause for a moment, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0011","n":"assisted hanging knee raise","b":"waist","q":"assisted","t":"abs","s":["hip flexors"],"img":"images/0011-03lzqwk.jpg","gif":"videos/0011-03lzqwk.gif","h":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core muscles and lift your knees towards your chest, bending at the hips and knees. Pause for a moment at the top of the movement, squeezing your abs. Slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0010","n":"assisted hanging knee raise with throw down","b":"waist","q":"assisted","t":"abs","s":["hip flexors","lower back"],"img":"images/0010-8K0w2yA.jpg","gif":"videos/0010-8K0w2yA.gif","h":"Hang from a pull-up bar with your arms fully extended and your palms facing away from you. Engage your core and lift your knees towards your chest, keeping your legs together. Once your knees are at chest level, explosively throw your legs down towards the ground, extending them fully. Allow your legs to swing back up and repeat the movement for the desired number of repetitions."},{"i":"1708","n":"assisted lying calves stretch","b":"lower legs","q":"assisted","t":"calves","s":["hamstrings"],"img":"images/1708-GxDwDX0.jpg","gif":"videos/1708-GxDwDX0.gif","h":"Lie on your back with your legs extended. Bend one knee and place your foot flat on the ground. Using your hands or a towel, gently pull your toes towards your body, feeling a stretch in your calf. Hold the stretch for 20-30 seconds. Release the stretch and repeat on the other leg."},{"i":"1709","n":"assisted lying glutes stretch","b":"upper legs","q":"assisted","t":"glutes","s":["hamstrings"],"img":"images/1709-yn0LjwL.jpg","gif":"videos/1709-yn0LjwL.gif","h":"Lie on your back with your legs extended. Bend your right knee and place your right ankle on your left thigh, just above the knee. Grasp your left thigh with both hands and gently pull it towards your chest. Hold the stretch for 20-30 seconds. Release and repeat on the other side."},{"i":"1710","n":"assisted lying gluteus and piriformis stretch","b":"upper legs","q":"assisted","t":"glutes","s":["hamstrings"],"img":"images/1710-RQNVT10.jpg","gif":"videos/1710-RQNVT10.gif","h":"Lie on your back with your legs extended. Bend your right knee and place your right ankle on your left thigh, just above the knee. Grasp your left thigh with both hands and gently pull it towards your chest. Hold the stretch for 20-30 seconds. Release the stretch and repeat on the other side."},{"i":"0012","n":"assisted lying leg raise with lateral throw down","b":"waist","q":"assisted","t":"abs","s":["hip flexors","obliques"],"img":"images/0012-UGhRD1A.jpg","gif":"videos/0012-UGhRD1A.gif","h":"Lie flat on your back with your legs extended and your arms by your sides. Place your hands under your glutes for support. Engage your abs and lift your legs off the ground, keeping them straight. While keeping your legs together, lower them to one side until they are a few inches above the ground. Pause for a moment, then lift your legs back to the starting position. Repeat the movement to the other side. Continue alternating sides for the desired number of repetitions."},{"i":"0013","n":"assisted lying leg raise with throw down","b":"waist","q":"assisted","t":"abs","s":["hip flexors","quadriceps"],"img":"images/0013-VX5YKR5.jpg","gif":"videos/0013-VX5YKR5.gif","h":"Lie flat on your back with your legs extended and your arms by your sides. Place your hands under your glutes for support. Engage your core and lift your legs off the ground, keeping them straight. Raise your legs until they are perpendicular to the ground. Lower your legs back down to the starting position. Simultaneously, throw your legs down towards the ground, keeping them straight. Raise your legs back up to the starting position. Repeat for the desired number of repetitions."},{"i":"0014","n":"assisted motion russian twist","b":"waist","q":"medicine ball","t":"abs","s":["obliques","lower back"],"img":"images/0014-r7cT9YD.jpg","gif":"videos/0014-r7cT9YD.gif","h":"Sit on the ground with your knees bent and feet flat on the floor. Hold the medicine ball with both hands in front of your chest. Lean back slightly, engaging your abs and keeping your back straight. Slowly twist your torso to the right, bringing the medicine ball towards the right side of your body. Pause for a moment, then twist your torso to the left, bringing the medicine ball towards the left side of your body. Continue alternating sides for the desired number of repetitions."},{"i":"0015","n":"assisted parallel close grip pull-up","b":"back","q":"leverage machine","t":"lats","s":["biceps","forearms"],"img":"images/0015-vrhHa6D.jpg","gif":"videos/0015-vrhHa6D.gif","h":"Adjust the machine to your desired weight and height. Place your hands on the parallel bars with a close grip, palms facing each other. Hang from the bars with your arms fully extended and your feet off the ground. Engage your back muscles and pull your body up towards the bars, keeping your elbows close to your body. Continue pulling until your chin is above the bars. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0016","n":"assisted prone hamstring","b":"upper legs","q":"assisted","t":"hamstrings","s":["glutes","lower back"],"img":"images/0016-VedGSby.jpg","gif":"videos/0016-VedGSby.gif","h":"Lie face down on a mat or bench with your legs fully extended. Have a partner or use a resistance band to secure your ankles. Engage your hamstrings and lift your legs towards your glutes, keeping your knees straight. Pause for a moment at the top, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1713","n":"assisted prone lying quads stretch","b":"upper legs","q":"assisted","t":"quads","s":["hamstrings","glutes"],"img":"images/1713-YUYAMEj.jpg","gif":"videos/1713-YUYAMEj.gif","h":"Lie face down on the ground with your legs extended. Bend your left knee and reach back with your left hand to grab your left foot or ankle. Gently pull your left foot towards your glutes, feeling a stretch in your left quad. Hold the stretch for 20-30 seconds, then release. Repeat with your right leg."},{"i":"1714","n":"assisted prone rectus femoris stretch","b":"waist","q":"assisted","t":"abs","s":["quadriceps"],"img":"images/1714-2Ryn564.jpg","gif":"videos/1714-2Ryn564.gif","h":"Lie face down on the ground with your legs straight. Bend your right knee and reach back with your right hand to grab your right foot or ankle. Gently pull your right foot or ankle towards your glutes, feeling a stretch in the front of your right thigh. Hold the stretch for 20-30 seconds. Release and repeat on the other side."},{"i":"0017","n":"assisted pull-up","b":"back","q":"leverage machine","t":"lats","s":["biceps","forearms"],"img":"images/0017-kiJ4Z2K.jpg","gif":"videos/0017-kiJ4Z2K.gif","h":"Adjust the machine to your desired weight and height settings. Grasp the handles with an overhand grip, slightly wider than shoulder-width apart. Hang with your arms fully extended and your feet off the ground. Engage your back muscles and pull your body up towards the handles, keeping your elbows close to your body. Continue pulling until your chin is above the handles. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1716","n":"assisted seated pectoralis major stretch with stability ball","b":"chest","q":"assisted","t":"pectorals","s":["shoulders","triceps"],"img":"images/1716-RoV1Rfa.jpg","gif":"videos/1716-RoV1Rfa.gif","h":"Sit on a stability ball with your feet flat on the ground and your back straight. Hold a stability ball with both hands and extend your arms straight out in front of you. Slowly lower the stability ball towards your chest, feeling a stretch in your pectoral muscles. Hold the stretch for a few seconds, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"1712","n":"assisted side lying adductor stretch","b":"upper legs","q":"assisted","t":"adductors","s":["hamstrings","glutes"],"img":"images/1712-hC6oYY5.jpg","gif":"videos/1712-hC6oYY5.gif","h":"Lie on your side with your legs straight and stacked on top of each other. Bend your bottom leg slightly for stability. Place your top foot on a stable surface, such as a bench or step. Keeping your top leg straight, slowly lower it towards the ground, feeling a stretch in your inner thigh. Hold the stretch for 20-30 seconds. Return to the starting position and repeat on the other side."},{"i":"1758","n":"assisted sit-up","b":"waist","q":"assisted","t":"abs","s":["hip flexors"],"img":"images/1758-aumB2IV.jpg","gif":"videos/1758-aumB2IV.gif","h":"Sit on the edge of a bench or have someone hold your feet down. Lie flat on your back with your knees bent and feet flat on the ground. Place your hands behind your head with your elbows pointing outwards. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1431","n":"assisted standing chin-up","b":"back","q":"leverage machine","t":"lats","s":["biceps","forearms"],"img":"images/1431-7OeHptV.jpg","gif":"videos/1431-7OeHptV.gif","h":"Adjust the machine to your desired assistance level. Stand on the foot platform and grip the handles with an overhand grip, slightly wider than shoulder-width apart. Keep your chest up and shoulders back, engage your core, and slightly bend your knees. Pull your body up by flexing your elbows and driving your elbows down towards your sides. Continue pulling until your chin is above the bar. Pause for a moment at the top, then slowly lower your body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1432","n":"assisted standing pull-up","b":"back","q":"leverage machine","t":"lats","s":["biceps","forearms"],"img":"images/1432-f4xtKBj.jpg","gif":"videos/1432-f4xtKBj.gif","h":"Adjust the machine to your desired weight and height settings. Stand facing the machine with your feet shoulder-width apart. Grasp the handles with an overhand grip, slightly wider than shoulder-width apart. Engage your lats and biceps, and pull yourself up towards the handles. Pause for a moment at the top, squeezing your back muscles. Slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0018","n":"assisted standing triceps extension (with towel)","b":"upper arms","q":"assisted","t":"triceps","s":["shoulders"],"img":"images/0018-7HcfMBP.jpg","gif":"videos/0018-7HcfMBP.gif","h":"Stand with your feet shoulder-width apart and hold a towel with both hands behind your head. Keep your elbows close to your ears and your upper arms stationary. Slowly extend your forearms upward, squeezing your triceps at the top. Pause for a moment, then slowly lower the towel back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0019","n":"assisted triceps dip (kneeling)","b":"upper arms","q":"leverage machine","t":"triceps","s":["chest","shoulders"],"img":"images/0019-J60bN17.jpg","gif":"videos/0019-J60bN17.gif","h":"Adjust the machine to your desired weight and height. Kneel down on the pad facing the machine, with your hands gripping the handles. Lower your body by bending your elbows, keeping your back straight and close to the machine. Pause for a moment at the bottom, then push yourself back up to the starting position. Repeat for the desired number of repetitions."},{"i":"2364","n":"assisted wide-grip chest dip (kneeling)","b":"chest","q":"leverage machine","t":"pectorals","s":["triceps","shoulders"],"img":"images/2364-PnZJIrk.jpg","gif":"videos/2364-PnZJIrk.gif","h":"Adjust the machine to your desired height and secure your knees on the pad. Grasp the handles with a wide grip and keep your elbows slightly bent. Lower your body by bending your elbows until your upper arms are parallel to the floor. Push yourself back up to the starting position by extending your arms. Repeat for the desired number of repetitions."},{"i":"3220","n":"astride jumps (male)","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","calves"],"img":"images/3220-f9lVSSI.jpg","gif":"videos/3220-f9lVSSI.gif","h":"Stand with your feet shoulder-width apart. Bend your knees and lower your body into a squat position. Jump explosively upwards, extending your legs and arms. While in the air, spread your legs apart and bring your arms out to the sides. Land softly with your feet shoulder-width apart, bending your knees to absorb the impact. Repeat for the desired number of repetitions."},{"i":"3672","n":"back and forth step","b":"cardio","q":"body weight","t":"cardiovascular system","s":["quadriceps","hamstrings","glutes"],"img":"images/3672-fNGumX0.jpg","gif":"videos/3672-fNGumX0.gif","h":"Stand with your feet shoulder-width apart. Step forward with your right foot, bending your knee and lowering your body into a lunge position. Push off with your right foot and step back to the starting position. Repeat the movement with your left foot, alternating legs with each step. Continue stepping back and forth, maintaining a steady pace. Repeat for the desired duration or number of repetitions."},{"i":"1314","n":"back extension on exercise ball","b":"back","q":"stability ball","t":"spine","s":["glutes","hamstrings"],"img":"images/1314-qLpO4vV.jpg","gif":"videos/1314-qLpO4vV.gif","h":"Place the stability ball on the ground and lie face down on top of it, with your hips resting on the ball and your feet against a wall or other stable surface. Position your hands behind your head or crossed over your chest. Engage your core and slowly lift your upper body off the ball, extending your back until your body forms a straight line from your head to your heels. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"3297","n":"back lever","b":"back","q":"body weight","t":"upper back","s":["biceps","forearms","core"],"img":"images/3297-GaSzzuh.jpg","gif":"videos/3297-GaSzzuh.gif","h":"Start by hanging from a pull-up bar with an overhand grip, hands slightly wider than shoulder-width apart. Engage your core and pull your shoulder blades down and back. Bend your knees and tuck them towards your chest. Slowly lift your legs up, keeping them straight, until your body is parallel to the ground. Hold this position for a few seconds, then slowly lower your legs back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1405","n":"back pec stretch","b":"back","q":"body weight","t":"lats","s":["shoulders","chest"],"img":"images/1405-chfnQnM.jpg","gif":"videos/1405-chfnQnM.gif","h":"Stand tall with your feet shoulder-width apart. Extend your arms straight out in front of you, parallel to the ground. Cross your arms in front of your body, with your right arm over your left arm. Interlock your fingers and rotate your palms away from your body. Slowly raise your arms up and away from your body, feeling a stretch in your back and chest. Hold the stretch for 15-30 seconds, then release. Repeat on the opposite side."},{"i":"1473","n":"backward jump","b":"upper legs","q":"body weight","t":"quads","s":["hamstrings","glutes","calves"],"img":"images/1473-SaDOwk7.jpg","gif":"videos/1473-SaDOwk7.gif","h":"Stand with your feet shoulder-width apart. Bend your knees slightly and jump backwards, pushing off with both feet. Land softly on the balls of your feet, bending your knees to absorb the impact. Repeat for the desired number of repetitions."},{"i":"0020","n":"balance board","b":"upper legs","q":"body weight","t":"quads","s":["calves","hamstrings","glutes"],"img":"images/0020-xAySMB0.jpg","gif":"videos/0020-xAySMB0.gif","h":"Place the balance board on a flat surface. Step onto the balance board with one foot, ensuring it is centered. Slowly shift your weight onto the foot on the balance board, keeping your core engaged. Maintain your balance and stability as you hold the position for a desired amount of time. Repeat the exercise with the other foot."},{"i":"0968","n":"band alternating biceps curl","b":"upper arms","q":"band","t":"biceps","s":["forearms"],"img":"images/0968-3omWx6P.jpg","gif":"videos/0968-3omWx6P.gif","h":"Stand with your feet shoulder-width apart and hold the band with an underhand grip, palms facing up. Keep your elbows close to your sides and slowly curl one arm up towards your shoulder, squeezing your biceps at the top. Lower the arm back down to the starting position and repeat with the other arm. Continue alternating arms for the desired number of repetitions."},{"i":"0969","n":"band alternating v-up","b":"waist","q":"band","t":"abs","s":["hip flexors"],"img":"images/0969-ztAa1RK.jpg","gif":"videos/0969-ztAa1RK.gif","h":"Lie flat on your back with your legs straight and your arms extended overhead, holding the band. Engage your abs and lift your legs and upper body off the ground simultaneously, reaching your hands towards your toes. As you lower your legs and upper body back down, switch the position of your legs, crossing one over the other. Repeat the movement, alternating the position of your legs with each repetition. Continue for the desired number of repetitions."},{"i":"0970","n":"band assisted pull-up","b":"back","q":"band","t":"lats","s":["biceps","forearms"],"img":"images/0970-r1XNRYB.jpg","gif":"videos/0970-r1XNRYB.gif","h":"Attach the band to a pull-up bar or sturdy anchor point. Step onto the band and grip the bar with your palms facing away from you, hands slightly wider than shoulder-width apart. Hang with your arms fully extended, keeping your core engaged and your shoulders down and back. Pull your body up towards the bar by squeezing your shoulder blades together and driving your elbows down towards your hips. Continue pulling until your chin is above the bar, then slowly lower yourself back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0971","n":"band assisted wheel rollerout","b":"waist","q":"band","t":"abs","s":["lower back"],"img":"images/0971-zhF9lW4.jpg","gif":"videos/0971-zhF9lW4.gif","h":"Kneel on the floor and hold the handles of the band with both hands, palms facing down. Place the band on the ground in front of you and position your hands shoulder-width apart. Engage your core and slowly roll the wheel forward, extending your body as far as you can while maintaining control. Pause for a moment at the furthest point, then slowly roll the wheel back towards your knees to return to the starting position. Repeat for the desired number of repetitions."},{"i":"1254","n":"band bench press","b":"chest","q":"band","t":"pectorals","s":["triceps","shoulders"],"img":"images/1254-khlHMqs.jpg","gif":"videos/1254-khlHMqs.gif","h":"Lie flat on a bench with your feet flat on the ground and your back pressed against the bench. Grasp the band handles with an overhand grip, slightly wider than shoulder-width apart. Extend your arms fully, pushing the bands away from your chest. Slowly lower the bands back down to your chest, keeping your elbows at a 90-degree angle. Repeat for the desired number of repetitions."},{"i":"0980","n":"band bent-over hip extension","b":"upper legs","q":"band","t":"glutes","s":["hamstrings","lower back"],"img":"images/0980-wSScovH.jpg","gif":"videos/0980-wSScovH.gif","h":"Attach the band to a sturdy anchor point at ankle height. Stand facing away from the anchor point with your feet shoulder-width apart. Step back to create tension in the band, keeping your knees slightly bent. Hinge at the hips and lean forward, maintaining a neutral spine. Extend your right leg straight back, squeezing your glutes at the top. Lower your right leg back down and repeat with the left leg. Continue alternating legs for the desired number of repetitions."},{"i":"0972","n":"band bicycle crunch","b":"waist","q":"band","t":"abs","s":["hip flexors","obliques"],"img":"images/0972-tZkGYZ9.jpg","gif":"videos/0972-tZkGYZ9.gif","h":"Lie flat on your back with your hands behind your head and your knees bent. Lift your feet off the ground and bring your right knee towards your chest while simultaneously twisting your torso to bring your left elbow towards your right knee. Straighten your right leg while bringing your left knee towards your chest and twisting your torso to bring your right elbow towards your left knee. Continue alternating the twisting motion, as if you are pedaling a bicycle, while keeping your core engaged throughout the movement. Repeat for the desired number of repetitions."},{"i":"0974","n":"band close-grip pulldown","b":"back","q":"band","t":"lats","s":["biceps","forearms"],"img":"images/0974-DptumMx.jpg","gif":"videos/0974-DptumMx.gif","h":"Attach the band to a high anchor point, such as a pull-up bar or sturdy beam. Stand facing the anchor point and grab the band with an underhand grip, hands shoulder-width apart. Step back to create tension in the band, keeping your feet hip-width apart. Engage your core and keep your back straight as you pull the band down towards your chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, then slowly release the band back to the starting position. Repeat for the desired number of repetitions."},{"i":"0975","n":"band close-grip push-up","b":"upper arms","q":"band","t":"triceps","s":["chest","shoulders"],"img":"images/0975-ufaxB52.jpg","gif":"videos/0975-ufaxB52.gif","h":"Place a band around your upper arms, just above the elbows. Assume a push-up position with your hands directly under your shoulders and your body in a straight line from head to heels. Bend your elbows and lower your chest towards the ground, keeping your elbows close to your sides. Push through your palms to extend your arms and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0976","n":"band concentration curl","b":"upper arms","q":"band","t":"biceps","s":["forearms"],"img":"images/0976-kmVVAfu.jpg","gif":"videos/0976-kmVVAfu.gif","h":"Sit on a bench or chair with your legs spread apart and your feet flat on the ground. Hold one end of the band in your hand and step on the other end with your foot on the same side. Lean forward slightly and rest your elbow on the inside of your thigh, just above the knee. With your palm facing up, slowly curl your hand towards your shoulder, keeping your upper arm stationary. Pause for a moment at the top, then slowly lower your hand back down to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"3117","n":"band fixed back close grip pulldown","b":"back","q":"band","t":"lats","s":["biceps","forearms"],"img":"images/3117-4LoWllp.jpg","gif":"videos/3117-4LoWllp.gif","h":"Attach the band to a fixed point above you, such as a pull-up bar or sturdy beam. Sit down on a bench or chair facing the band, with your feet flat on the ground and your knees bent. Grasp the band with a close grip, palms facing towards you. Keep your back straight and engage your core. Pull the band down towards your chest, squeezing your shoulder blades together. Pause for a moment at the bottom of the movement, feeling the contraction in your lats. Slowly release the band back to the starting position, maintaining control throughout the movement. Repeat for the desired number of repetitions."},{"i":"3116","n":"band fixed back underhand pulldown","b":"back","q":"band","t":"lats","s":["biceps","rhomboids","rear deltoids"],"img":"images/3116-ZH68exZ.jpg","gif":"videos/3116-ZH68exZ.gif","h":"Attach the band to a sturdy anchor point above your head. Stand facing the anchor point with your feet shoulder-width apart. Grasp the band with an underhand grip, hands slightly wider than shoulder-width apart. Step back to create tension in the band, keeping your arms fully extended. Engage your core and squeeze your shoulder blades together. Pull the band down towards your chest, leading with your elbows. Pause for a moment at the bottom of the movement, feeling the contraction in your lats. Slowly release the tension in the band and return to the starting position. Repeat for the desired number of repetitions."},{"i":"0977","n":"band front lateral raise","b":"shoulders","q":"band","t":"delts","s":["traps","upper back"],"img":"images/0977-sTg7iys.jpg","gif":"videos/0977-sTg7iys.gif","h":"Stand with your feet shoulder-width apart and hold the band in front of your thighs with your palms facing down. Keep your arms straight and lift the band up in front of you until your arms are parallel to the ground. Pause for a moment at the top, then slowly lower the band back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0978","n":"band front raise","b":"shoulders","q":"band","t":"delts","s":["triceps","upper back"],"img":"images/0978-TFA88iB.jpg","gif":"videos/0978-TFA88iB.gif","h":"Stand with your feet shoulder-width apart and hold the band in front of your thighs with your palms facing down. Keep your arms straight and slowly raise them forward until they are parallel to the ground. Pause for a moment at the top, then slowly lower your arms back down to the starting position. Repeat for the desired number of repetitions."},{"i":"1408","n":"band hip lift","b":"upper legs","q":"band","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/1408-E4R8Hz1.jpg","gif":"videos/1408-E4R8Hz1.gif","h":"Lie on your back with your knees bent and feet flat on the ground. Place a resistance band just above your knees. Engage your glutes and core muscles. Press your heels into the ground and lift your hips off the floor, squeezing your glutes at the top. Pause for a moment at the top, then slowly lower your hips back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0979","n":"band horizontal pallof press","b":"waist","q":"band","t":"abs","s":["obliques","glutes"],"img":"images/0979-9pa4H5m.jpg","gif":"videos/0979-9pa4H5m.gif","h":"Attach the band to a sturdy anchor point at waist height. Stand perpendicular to the anchor point with your feet shoulder-width apart. Grasp the band handle with both hands and step away from the anchor point to create tension in the band. Bring your hands to your chest, keeping your elbows bent and close to your body. Engage your core and maintain a stable stance. Extend your arms straight out in front of you, pushing the band away from your body. Hold the extended position for a few seconds, focusing on maintaining tension in your core. Slowly bring your hands back to your chest, resisting the pull of the band. Repeat for the desired number of repetitions."},{"i":"0981","n":"band jack knife sit-up","b":"waist","q":"band","t":"abs","s":["hip flexors"],"img":"images/0981-KCBKjma.jpg","gif":"videos/0981-KCBKjma.gif","h":"Lie flat on your back with your legs straight and your arms extended overhead, holding the band. Engage your abs and lift your legs and upper body simultaneously, bringing your hands towards your feet. Pause for a moment at the top, then slowly lower your legs and upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0983","n":"band kneeling one arm pulldown","b":"back","q":"band","t":"lats","s":["biceps","rhomboids"],"img":"images/0983-pmnrOp0.jpg","gif":"videos/0983-pmnrOp0.gif","h":"Attach the band to a sturdy anchor point above your head. Kneel down and hold the band with one hand, palm facing down. Extend your arm fully overhead, keeping your elbow slightly bent. Engage your lat muscles and pull the band down towards your side, bringing your elbow towards your ribcage. Pause for a moment at the bottom, then slowly release the tension and return to the starting position. Repeat for the desired number of repetitions, then switch sides."},{"i":"0985","n":"band kneeling twisting crunch","b":"waist","q":"band","t":"abs","s":["obliques"],"img":"images/0985-225x2Vd.jpg","gif":"videos/0985-225x2Vd.gif","h":"Attach the band to a sturdy anchor point at waist height. Kneel down facing away from the anchor point and hold the band with both hands, keeping your elbows bent and close to your sides. Engage your abs and slowly twist your torso to one side, bringing your hands towards your opposite hip. Pause for a moment, then slowly return to the starting position. Repeat on the other side. Continue alternating sides for the desired number of repetitions."},{"i":"0984","n":"band lying hip internal rotation","b":"upper legs","q":"band","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/0984-vIICElP.jpg","gif":"videos/0984-vIICElP.gif","h":"Lie on your back with your legs straight and a resistance band looped around your feet. Bend your knees and bring them towards your chest, keeping your feet together. Slowly rotate your knees outwards, away from each other, while keeping your feet together. Pause for a moment at the end of the rotation, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"1002","n":"band lying straight leg raise","b":"waist","q":"band","t":"abs","s":["hip flexors"],"img":"images/1002-bbLR7fB.jpg","gif":"videos/1002-bbLR7fB.gif","h":"Lie flat on your back with your legs straight and your feet together. Place the band around the arches of your feet and hold the ends of the band with your hands. Engaging your abs, lift both legs off the ground until they are perpendicular to the floor. Pause for a o create tension in the band, keeping your knees slightly bent. Hinge at the hips and push your glutes back, maintaining a slight bend in your knees. Lower your torso until it is parallel to the ground, feeling a stretch in your hamstrings. Drive your hips forward and squeeze your glutes to return to the starting position. Repeat for the desired number of repetitions."},{"i":"0992","n":"band push sit-up","b":"waist","q":"band","t":"abs","s":["shoulders","chest"],"img":"images/0992-zFzbBfL.jpg","gif":"videos/0992-zFzbBfL.gif","h":"Attach the band securely to a stable anchor point. Lie flat on your back with your knees bent and feet flat on the ground. Hold the band with both hands and extend your arms straight up towards the ceiling. Engaging your abs, slowly lift your upper body off the ground, curling forward until your torso is at a 45-degree angle. Pause for a moment at the top, then slowly lower your upper body back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0993","n":"band reverse fly","b":"shoulders","q":"band","t":"delts","s":["upper back","trapezius"],"img":"images/0993-sTfvVsG.jpg","gif":"videos/0993-sTfvVsG.gif","h":"Attach the band to a stationary object at chest height. Stand with your feet shoulder-width apart and hold the band with both hands in front of you. Keep your arms straight and lift them out to the sides until they are parallel to the ground. Squeeze your shoulder blades together at the top of the movement. Slowly lower your arms back to the starting position. Repeat for the desired number of repetitions."},{"i":"0994","n":"band reverse wrist curl","b":"lower arms","q":"band","t":"forearms","s":["forearms"],"img":"images/0994-Ezpnw9d.jpg","gif":"videos/0994-Ezpnw9d.gif","h":"Sit on a bench or chair with your feet flat on the ground. Hold the band with an overhand grip, palms facing down, and wrap it around your fingers. Rest your forearms on your thighs, with your wrists hanging off the edge. Slowly curl your wrists upward, squeezing your forearms. Pause for a moment at the top, then slowly lower your wrists back down to the starting position. Repeat for the desired number of repetitions."},{"i":"0996","n":"band seated hip internal rotation","b":"upper legs","q":"band","t":"glutes","s":["hamstrings","quadriceps"],"img":"images/0996-9gbyYKk.jpg","gif":"videos/0996-9gbyYKk.gif","h":"Sit on a chair or bench with your back straight and feet flat on the ground. Place a resistance band around your thighs, just above your knees. Keep your knees bent at a 90-degree angle and your feet shoulder-width apart. Engage your glutes and slowly rotate your knees outward, pushing against the resistance of the band. Pause for a moment at the end of the movement, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"1011","n":"band seated twist","b":"waist","q":"band","t":"abs","s":["obliques"],"img":"images/1011-S1JXDAG.jpg","gif":"videos/1011-S1JXDAG.gif","h":"Sit on the ground with your legs extended in front of you and your back straight. Wrap the band around your waist and hold the ends with both hands. Engage your abs and slowly twist your torso to one side, keeping your back straight and your feet on the ground. Pause for a moment at the end of the twist, then slowly return to the starting position. Repeat the twist to the other side. Continue alternating sides for the desired number of repetitions."},{"i":"0997","n":"band shoulder press","b":"shoulders","q":"band","t":"delts","s":["triceps","upper back"],"img":"images/0997-peAeMR3.jpg","gif":"videos/0997-peAeMR3.gif","h":"Stand with your feet shoulder-width apart and place the band under your feet. Hold the band with your palms facing forward and raise your hands to shoulder height, elbows bent. Press the band overhead, fully extending your arms. Pause for a moment at the top, then slowly lower the band back to shoulder height. Repeat for the desired number of repetitions."},{"i": ur back straight and chest lifted. From the squat position, pull the band handles towards your body, squeezing your shoulder blades together. Pause for a moment at the top, then slowly release the tension and return to the starting position. Repeat for the desired number of repetitions."},{"i":"1005","n":"band standing crunch","b":"waist","q":"band","t":"abs","s":["obliques"],"img":"images/1005-Kzg30R7.jpg","gif":"videos/1005-Kzg30R7.gif","h":"Attach the band to a sturdy anchor point at waist height. Stand facing away from the anchor point with your feet shoulder-width apart. Hold the band with both hands and bring it up to your chest, keeping your elbows bent and close to your body. Engage your abs and slowly crunch forward, bringing your chest towards your knees. Pause for a moment at the top of the crunch, then slowly return to the starting position. Repeat for the desired number of repetitions."},{"i":"1022","n":"band standing rear delt row","b":"shoulders","q":"band","t":"delts","s":["trapezius","rhomboids","biceps"],"img":"images/1022-tc5dYrf.jpg","gif":"videos/1022-tc5dYrf.gif","h":"Stand with your feet shoulder-width apart and place the band under your feet. Hold the band handles with your palms facing each other and your arms extended in front of you. Bend your knees slightly and hinge forward at the hips, keeping your back straight. Pull the band towards your chest, squeezing your shoulder blades together. Pause for a moment at the top, then slowly release the tension and return to the starting position. Repeat for the desired number of repetitions."},{"i":"1007","n":"band standing twisting crunch","b":"waist","q":"band","t":"abs","s":["obliques"],"img":"images/1007-euq4pwp.jpg","gif":"videos/1007-euq4pwp.gif","h":"Stand with your feet shoulder-width apart and place the band around your upper back, crossing it in front of your chest. Hold the ends of the band with your hands, keeping your elbows bent and close to your sides. Engage your abs and twist your
